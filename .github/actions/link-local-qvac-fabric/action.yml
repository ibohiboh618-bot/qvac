name: Link local @qvac/fabric
description: >-
  Install @qvac/fabric from packages/fabric when the consumer depends on it
  but the package is not yet published to npm. Optionally build fabric
  prebuilds from source when the cmake package is missing. No-op when the
  dependency is absent or packages/fabric is not present in the checkout.

inputs:
  workdir:
    description: Package directory that may depend on @qvac/fabric
    required: true
  build-if-missing:
    description: >-
      Build packages/fabric from source when prebuilds/share/qvac-fabric/cmake
      is absent. Requires bare-make and vcpkg to be available on the runner.
    required: false
    default: "false"
  platform:
    description: Optional bare-make platform for target-specific fabric prebuilds
    required: false
    default: ""
  arch:
    description: Optional bare-make arch for target-specific fabric prebuilds
    required: false
    default: ""
  tags:
    description: Optional suffix for target-specific prebuild directories, e.g. -simulator
    required: false
    default: ""
  flags:
    description: Optional extra bare-make generate flags, e.g. --simulator
    required: false
    default: ""
  asan:
    description: >-
      Build an AddressSanitizer-instrumented fabric runtime (Linux only) for the
      C++ unit tests. Compiles the qvac-fabric port and the module with
      -fsanitize=address into a dedicated vcpkg cache so the test executable's
      ASan can validate allocations originating inside fabric. Never publish the
      result: an instrumented .bare only loads inside an instrumented binary.
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Link local @qvac/fabric when available
      shell: bash
      working-directory: ${{ inputs.workdir }}
      run: |
        set -euo pipefail

        fabric_dep="$(
          node -e 'const fs = require("fs"); const pkg = JSON.parse(fs.readFileSync("package.json", "utf8")); console.log((pkg.dependencies && pkg.dependencies["@qvac/fabric"]) || (pkg.devDependencies && pkg.devDependencies["@qvac/fabric"]) || "")'
        )"
        if [ -z "${fabric_dep}" ] || [ "${fabric_dep}" = "null" ]; then
          echo "No @qvac/fabric dependency in package.json; skipping"
          exit 0
        fi

        skip_npm_link="false"
        if [[ "${fabric_dep}" == npm:* ]]; then
          if [ "${{ inputs.asan }}" != "true" ] && [ "${{ inputs.build-if-missing }}" != "true" ]; then
            echo "@qvac/fabric resolves from npm (${fabric_dep}); skipping local link"
            exit 0
          fi
          echo "@qvac/fabric resolves from npm (${fabric_dep}); will build local prebuilds only (no file: link)"
          skip_npm_link="true"
        fi

        repo_root="${GITHUB_WORKSPACE:-}"
        if [ -z "${repo_root}" ]; then
          repo_root="$(git rev-parse --show-toplevel)"
        fi

        fabric_dir=""
        for candidate in \
          "${repo_root}/packages/fabric" \
          "${repo_root}/addon/packages/fabric"; do
          if [ -f "${candidate}/package.json" ]; then
            fabric_dir="${candidate}"
            break
          fi
        done

        if [ -z "${fabric_dir}" ]; then
          echo "Local packages/fabric not found; @qvac/fabric must come from npm registry"
          exit 0
        fi

        target_platform="${{ inputs.platform }}"
        target_arch="${{ inputs.arch }}"
        target_tags="${{ inputs.tags }}"
        target_flags="${{ inputs.flags }}"
        cmake_config="${fabric_dir}/prebuilds/share/qvac-fabric/cmake/qvac-fabricConfig.cmake"
        target_runtime=""
        if [ -n "${target_platform}" ] && [ -n "${target_arch}" ]; then
          target_runtime="${fabric_dir}/prebuilds/${target_platform}-${target_arch}${target_tags}/qvac__fabric.bare"
        fi

        if [ "${{ inputs.build-if-missing }}" = "true" ]; then
          if [ -f "${cmake_config}" ] && { [ -z "${target_runtime}" ] || [ -f "${target_runtime}" ]; }; then
            echo "Local @qvac/fabric prebuilds already present"
          else
            echo "Local @qvac/fabric prebuilds missing; building from source..."
            # ASan builds use a dedicated cache so their instrumented archives
            # never collide with (or get restored from) the regular cache: the
            # overlay triplet adds -fsanitize=address without changing the
            # triplet file's name/ABI hash, so the two must stay separated.
            if [ "${{ inputs.asan }}" = "true" ]; then
              export QVAC_FABRIC_ASAN=1
              export VCPKG_BINARY_SOURCES="clear;files,${fabric_dir}/vcpkg/cache-asan,readwrite"
              mkdir -p "${fabric_dir}/vcpkg/cache-asan"
            else
              export VCPKG_BINARY_SOURCES="clear;files,${fabric_dir}/vcpkg/cache,readwrite"
              mkdir -p "${fabric_dir}/vcpkg/cache"
            fi
            if [ "${GITHUB_ACTIONS:-}" = "true" ] && [ -n "${VCPKG_ROOT:-}" ]; then
              rm -f "${VCPKG_ROOT}/downloads/git-tmp/.git/"*.lock
            fi
            npm install --ignore-scripts --prefix "${fabric_dir}"
            (
              cd "${fabric_dir}"
              if [ -n "${target_platform}" ] && [ -n "${target_arch}" ]; then
                bare-make generate --platform "${target_platform}" --arch "${target_arch}" ${target_flags}
              else
                bare-make generate
              fi
              bare-make build
              bare-make install
            )
          fi
        fi

        if [ "${skip_npm_link}" = "true" ]; then
          echo "Local fabric prebuilds ready at ${fabric_dir}; GPR install will overlay via normalize-gpr-fabric-prebuilds"
          exit 0
        fi

        echo "Installing @qvac/fabric from local monorepo package at ${fabric_dir}"
        npm install --no-save --install-links "@qvac/fabric@file:${fabric_dir}"

        if [ "${{ inputs.build-if-missing }}" = "true" ]; then
          installed_config="node_modules/@qvac/fabric/prebuilds/share/qvac-fabric/cmake/qvac-fabricConfig.cmake"
          if [ ! -f "${installed_config}" ]; then
            echo "Local @qvac/fabric install did not include ${installed_config}"
            exit 1
          fi
          if [ -n "${target_runtime}" ]; then
            installed_runtime="node_modules/@qvac/fabric/prebuilds/${target_platform}-${target_arch}${target_tags}/qvac__fabric.bare"
            if [ ! -f "${installed_runtime}" ]; then
              echo "Local @qvac/fabric install did not include ${installed_runtime}"
              exit 1
            fi
          fi
        fi
