name: Release Merge Guard
description: >-
  Enforces release-branch invariants before publish: branch naming, version
  bump, changelog update, and that the branch descends from main with a
  release-metadata-only delta (main-provenance check).
inputs:
  github-token:
    required: false
    description: Unused — retained for backward compatibility with callers
  base-ref:
    required: true
  base-sha:
    required: false
    default: ""
    description: "Base SHA for diff. Empty on workflow_dispatch — changelog check is skipped."
  head-sha:
    required: true
  package-slug:
    required: true
  package-json-path:
    required: true
  changelog-path:
    required: true
  main-ref:
    required: false
    default: "main"
    description: "Branch the release line must descend from (default: main)."
  enforce:
    required: false
    default: ""
    description: >-
      Main-provenance posture override. "true" fails the guard on injected
      non-main content; "false" forces warn-only. Empty uses the action's
      built-in default (currently warn-first / audit).

runs:
  using: node20
  main: dist/index.js
