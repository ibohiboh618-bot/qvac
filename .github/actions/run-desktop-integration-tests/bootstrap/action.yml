name: Desktop Test — Bootstrap
description: |
  Node.js + global Bare tooling setup for the desktop integration test
  pipeline.

  PRECONDITION: the consumer workflow MUST run its own workspace cleanup and
  actions/checkout as direct workflow steps BEFORE calling this composite. A
  local composite (uses: ./.github/actions/...) cannot perform the checkout
  that makes local composites available — that is a chicken-and-egg the runner
  rejects with "Can't find action.yml ... Did you forget to run
  actions/checkout". So checkout stays in the consumer; this composite only
  owns the post-checkout, addon-agnostic bits.

  Deliberately does NOT run `npm install` for the addon package — its timing
  varies per addon (dual-registry .npmrc first, or model cache first).

inputs:
  bare-packages:
    description: |
      Whitespace-separated global bare tooling packages. Defaults to the
      fleet-standard `bare bare-make`. LLM/diffusion/vla extend with
      `bare-runtime bare-https brittle`; classification uses `bare-runtime`.
    required: false
    default: "bare bare-make"

runs:
  using: composite
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # 6.3.0
      with:
        node-version: lts/*

    - name: Install bare tooling
      shell: bash
      run: npm install -g --force ${{ inputs.bare-packages }}
