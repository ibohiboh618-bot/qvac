name: Publish NPM
description: "Publish a package to NPM"

inputs:
  release:
    description: "Use tag. Release stream, temporary here for compatibility with old workflows"
    required: false

  tag:
    description: "Release Stream (npm dist-tag)"
    required: false

  path:
    description: "[DEPRECATED] Directory containing package.json (legacy); use workdir"
    required: false

  workdir:
    description: "Directory containing package.json (preferred for monorepo)"
    required: false

outputs:
  npm_published_version:
    description: "The version that was actually published to npm (empty if skipped)."
    value: ${{ steps.publish.outputs.npm_published_version }}
  npm_publish_skipped:
    description: "true if publish was skipped (dev/tmp or version already exists), else false."
    value: ${{ steps.publish.outputs.npm_publish_skipped }}

runs:
  using: composite
  steps:
    - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # 6.3.0
      with:
        node-version: "24.14.1" # installs npm version 11.11.0
        registry-url: https://registry.npmjs.org/
        scope: "@qvac"

    - name: Publish to NPM and optionally tag repo
      id: publish
      shell: bash
      env:
        INPUT_PATH: ${{ inputs.path }}
        INPUT_WORKDIR: ${{ inputs.workdir }}
        INPUT_TAG: ${{ inputs.tag }}
        INPUT_RELEASE: ${{ inputs.release }}
        EVENT_NAME: ${{ github.event_name }}
        GIT_REF: ${{ github.ref }}
      run: |
        set -euo pipefail

        ROOT="${GITHUB_WORKSPACE:-$(pwd)}"

        ####################################################################
        # Resolve target directory (workdir preferred; path supported legacy)
        ####################################################################
        TARGET_DIR=""

        if [ -n "${INPUT_PATH}" ]; then
          TARGET_DIR="${INPUT_PATH}"
          echo "::warning title=Deprecated input::inputs.path is deprecated; use inputs.workdir instead."
        elif [ -n "${INPUT_WORKDIR}" ]; then
          TARGET_DIR="${INPUT_WORKDIR}"
        else
          echo "ERROR: You must set inputs.workdir (preferred) or inputs.path (deprecated legacy)." >&2
          exit 1
        fi

        echo "Target directory: ${TARGET_DIR}"

        if [ ! -d "${TARGET_DIR}" ]; then
          echo "ERROR: Target directory does not exist: ${TARGET_DIR}" >&2
          exit 1
        fi

        cd "${TARGET_DIR}"

        if [ ! -f "package.json" ]; then
          echo "ERROR: package.json not found in target directory: ${TARGET_DIR}" >&2
          exit 1
        fi

        ####################################################################
        # Core logic preserved below
        ####################################################################

        TAG="${INPUT_TAG}"
        RELEASE="${INPUT_RELEASE}"

        if [ -z "$RELEASE" ]; then
          RELEASE="tmp"
        fi

        # Track whether the caller supplied an explicit tag. Empty input means
        # "auto-decide" on release branches (handled below); for non-release
        # branches it falls through to the dev/tmp short-circuit.
        EXPLICIT_TAG="true"
        if [ -z "$TAG" ]; then
          EXPLICIT_TAG="false"
          TAG=$RELEASE
        fi

        echo "Base branch: ${GIT_REF}"
        echo "Event name: ${EVENT_NAME}"

        # Hoist package metadata for both the auto-decide step and downstream logic.
        SHORT_SHA=$(git -C "$ROOT" rev-parse --short HEAD || echo "unknown")
        PACKAGE_VERSION=$(node -p "require('./package.json').version")
        PACKAGE_NAME=$(node -p "require('./package.json').name")
        VERSION="${PACKAGE_VERSION}"

        # Auto-decide the dist-tag on release branches when the caller did not
        # pass an explicit non-"latest" tag. Backports to older release-* lines
        # (where package.json version is lower than the current published
        # `latest`) are published under v<major>.<minor> so they never clobber
        # the homepage pointer. The newest release line auto-promotes `latest`.
        #
        # Triggered when:
        #   - caller passed empty input  (EXPLICIT_TAG=false), OR
        #   - caller passed literal "latest"
        # AND we are on a push/workflow_dispatch on a release-* branch.
        #
        # Any other explicit tag (e.g. "release-1.x") is respected verbatim as
        # an operator override.
        AUTO_DECIDE="false"
        if [[ "${EVENT_NAME}" == "push" || "${EVENT_NAME}" == "workflow_dispatch" ]]; then
          if [[ "${GIT_REF}" == refs/heads/release-* ]]; then
            if [ "$EXPLICIT_TAG" = "false" ] || [ "$TAG" = "latest" ]; then
              AUTO_DECIDE="true"
            fi
          fi
        fi

        if [ "$AUTO_DECIDE" = "true" ]; then
          CURRENT_LATEST=$(npm view "$PACKAGE_NAME" dist-tags.latest 2>/dev/null || echo "")
          if [ -z "$CURRENT_LATEST" ]; then
            CURRENT_LATEST="0.0.0"
          fi

          HIGHER=$(node -e '
            const s = v => v.replace(/^v/, "").split(".").map(Number);
            const [a,b,c] = s(process.argv[1]);
            const [x,y,z] = s(process.argv[2]);
            console.log((a-x || b-y || c-z) >= 0 ? "yes" : "no");
          ' "$PACKAGE_VERSION" "$CURRENT_LATEST")

          if [ "$HIGHER" = "yes" ]; then
            TAG="latest"
            REASON="package.json version $PACKAGE_VERSION >= current latest $CURRENT_LATEST"
          else
            MAJOR_MINOR=$(echo "$PACKAGE_VERSION" | awk -F. '{print $1"."$2}')
            TAG="v${MAJOR_MINOR}"
            REASON="package.json version $PACKAGE_VERSION < current latest $CURRENT_LATEST (backport)"
          fi

          echo "Auto-decided npm dist-tag for $PACKAGE_NAME: $TAG"
          echo "  Reason: $REASON"
          {
            echo "## NPM dist-tag decision"
            echo ""
            echo "- Package: \`$PACKAGE_NAME\`"
            echo "- New version: \`$PACKAGE_VERSION\`"
            echo "- Current \`latest\` on npm: \`$CURRENT_LATEST\`"
            echo "- Chosen dist-tag: \`$TAG\`"
            echo "- Reason: $REASON"
          } >> "$GITHUB_STEP_SUMMARY"
        fi

        if [ "$TAG" = "dev" ] || [ "$TAG" = "tmp" ]; then
          echo "Skipping publish to NPM for non-release tag: $TAG"
          # NEW: explicitly mark skipped and leave published_version empty
          echo "npm_publish_skipped=true" >> "$GITHUB_OUTPUT"
          echo "npm_published_version=" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        echo "Publishing package: $PACKAGE_NAME"
        echo "Publishing with tag: $TAG"
        echo "Publishing version: $VERSION"
        echo "Commit: $SHORT_SHA"

        ACCESS="public"

        if npm view "$PACKAGE_NAME@$VERSION" version >/dev/null 2>&1; then
          echo "Version $VERSION already exists for $PACKAGE_NAME on npm, skipping publish"
          # NEW: explicitly mark skipped and leave published_version empty
          echo "npm_publish_skipped=true" >> "$GITHUB_OUTPUT"
          echo "npm_published_version=" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        if ([ "${EVENT_NAME}" = "push" ] || [ "${EVENT_NAME}" = "workflow_dispatch" ]) && [ "$ACCESS" = "public" ]; then
          echo "Publishing with provenance statements"
          npm publish --tag "$TAG" --access "$ACCESS" --provenance
        else
          npm publish --tag "$TAG" --access "$ACCESS"
        fi

        echo "npm publish completed successfully"

        # NEW: publish succeeded — set outputs for downstream workflow/release creation
        echo "npm_publish_skipped=false" >> "$GITHUB_OUTPUT"
        echo "npm_published_version=${VERSION}" >> "$GITHUB_OUTPUT"
