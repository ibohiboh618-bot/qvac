name: Detect Native File Changes
description: |
  Checks whether native (C/C++/CMake/vcpkg) files changed between the PR
  base and head. Outputs a boolean flag and a deterministic hash of all
  native files, used as a cache key for prebuild artifact reuse.

  Native files: *.cpp, *.hpp, *.c, *.h, CMakeLists.txt, vcpkg.json,
  vcpkg-configuration.json, vcpkg/**

  Reusable across addons — pass the addon workdir to scope the check.

inputs:
  workdir:
    description: "Addon package directory relative to repo root (e.g. packages/llm-llamacpp)"
    required: true

outputs:
  native_changed:
    description: "'true' if native files changed between base and head, 'false' otherwise"
    value: ${{ steps.detect.outputs.native_changed }}
  native_hash:
    description: "Deterministic hash of all native files in the workdir (for cache key)"
    value: ${{ steps.detect.outputs.native_hash }}

runs:
  using: composite
  steps:
    - name: Detect native file changes
      id: detect
      shell: bash
      env:
        WORKDIR: ${{ inputs.workdir }}
        EVENT_NAME: ${{ github.event_name }}
        BASE_SHA: ${{ github.event.pull_request.base.sha }}
        HEAD_SHA: ${{ github.event.pull_request.head.sha }}
      run: |
        # Trusted events (dispatch, push): always treat as changed to force build.
        if [ "$EVENT_NAME" = "workflow_dispatch" ] || \
           [ "$EVENT_NAME" = "workflow_call" ] || \
           [ "$EVENT_NAME" = "push" ]; then
          echo "Trusted event ($EVENT_NAME) — treating native files as changed"
          echo "native_changed=true" >> "$GITHUB_OUTPUT"
          echo "native_hash=dispatch-$(date +%s)" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        # PR events: diff base..head for native files in the addon workdir.
        NATIVE_PATTERNS=(
          "$WORKDIR/**/*.cpp"
          "$WORKDIR/**/*.hpp"
          "$WORKDIR/**/*.c"
          "$WORKDIR/**/*.h"
          "$WORKDIR/**/CMakeLists.txt"
          "$WORKDIR/vcpkg.json"
          "$WORKDIR/vcpkg-configuration.json"
          "$WORKDIR/vcpkg/**"
        )

        CHANGED=false
        if [ -n "$BASE_SHA" ] && [ -n "$HEAD_SHA" ]; then
          DIFF_FILES=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" -- 2>/dev/null || true)
          for pattern in "${NATIVE_PATTERNS[@]}"; do
            # Use git-style glob matching
            if echo "$DIFF_FILES" | grep -qE "^${pattern//\*\*/.*}$" 2>/dev/null; then
              CHANGED=true
              break
            fi
          done

          # Simpler fallback: check each changed file against native extensions
          if [ "$CHANGED" = "false" ] && [ -n "$DIFF_FILES" ]; then
            while IFS= read -r file; do
              case "$file" in
                ${WORKDIR}/*.cpp|${WORKDIR}/*.hpp|${WORKDIR}/*.c|${WORKDIR}/*.h) CHANGED=true; break ;;
                ${WORKDIR}/*CMakeLists.txt) CHANGED=true; break ;;
                ${WORKDIR}/vcpkg.json|${WORKDIR}/vcpkg-configuration.json) CHANGED=true; break ;;
                ${WORKDIR}/vcpkg/*) CHANGED=true; break ;;
              esac
            done <<< "$DIFF_FILES"
          fi
        else
          # No base/head SHA (e.g. first PR event) — assume changed.
          echo "No base/head SHA available — treating as changed"
          CHANGED=true
        fi

        # Compute a deterministic hash of all native files in the workdir.
        # This serves as the cache key — same native files = same prebuilds.
        NATIVE_HASH=$(find "$WORKDIR" \
          \( -name "*.cpp" -o -name "*.hpp" -o -name "*.c" -o -name "*.h" \
             -o -name "CMakeLists.txt" -o -name "vcpkg.json" \
             -o -name "vcpkg-configuration.json" \) \
          -type f 2>/dev/null | sort | xargs cat 2>/dev/null | sha256sum | cut -d' ' -f1)

        if [ -z "$NATIVE_HASH" ]; then
          NATIVE_HASH="empty-$(date +%s)"
        fi

        echo "Native changed: $CHANGED"
        echo "Native hash: ${NATIVE_HASH:0:16}"
        echo "native_changed=$CHANGED" >> "$GITHUB_OUTPUT"
        echo "native_hash=${NATIVE_HASH:0:16}" >> "$GITHUB_OUTPUT"
