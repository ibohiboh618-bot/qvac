name: Extract addon performance report
description: >
  Runs addon-specific perf-report extraction (extract-from-log.js +
  aggregate.js) from Device Farm logs.  Optionally writes a GitHub Step
  Summary using render-step-summary.js and uploads the result as an
  artifact.  Replaces the near-identical "Extract performance report"
  + "Write perf to Step Summary" + "Upload perf artifact" blocks that
  were duplicated across every addon consumer workflow.

inputs:
  platform:
    description: 'Android or iOS'
    required: true
  log-dir-name:
    description: 'Root directory containing Device Farm logs (relative to workspace)'
    required: false
    default: 'devicefarm-logs'
  output-dir-name:
    description: 'Root directory for extracted perf results (relative to workspace)'
    required: false
    default: 'perf-results-mobile'
  filter:
    description: 'Regex passed to extract-from-log.js --filter (empty = no filter)'
    required: false
    default: ''
  merge:
    description: >
      When 'true', passes --merge to extract-from-log.js so multiple
      performance-report.json payloads from the same device (e.g. when
      a single physical device runs several Device Farm groups, like
      the LLM VLM image-*.test.js split) are unioned per device.
    required: false
    default: 'false'
  unzip-customer-artifacts:
    description: >
      When 'true', recursively unzips any Customer_Artifacts.zip files
      under the platform log dir before extraction. Required for addons
      whose perf markers land in bare_console.log / appium.log (zipped
      inside Customer_Artifacts) rather than in the plain LOG output.
      No-op when false or when no such zips exist.
    required: false
    default: 'false'
  step-summary-title:
    description: >
      If non-empty, writes a rich Step Summary table via
      render-step-summary.js using this string as the heading.
      Leave empty to skip (e.g. when a separate combine-reports job
      handles the summary).
    required: false
    default: ''
  artifact-name:
    description: 'Artifact name for the uploaded perf report.  If empty, upload is skipped.'
    required: false
    default: ''

outputs:
  extracted:
    description: 'true when a valid performance-report.json was produced'
    value: ${{ steps.extract.outputs.extracted }}
  output-dir:
    description: 'Absolute path to the per-platform output directory'
    value: ${{ steps.extract.outputs.output_dir }}

runs:
  using: composite
  steps:
    - name: Extract performance report from Device Farm logs
      id: extract
      shell: bash
      env:
        LOG_DIR_NAME: ${{ inputs.log-dir-name }}
        OUTPUT_DIR_NAME: ${{ inputs.output-dir-name }}
        PLATFORM: ${{ inputs.platform }}
        FILTER: ${{ inputs.filter }}
        MERGE: ${{ inputs.merge }}
        UNZIP_CUSTOMER_ARTIFACTS: ${{ inputs.unzip-customer-artifacts }}
      run: |
        LOG_DIR="${GITHUB_WORKSPACE}/${LOG_DIR_NAME}/${PLATFORM}"
        OUTPUT_DIR="${GITHUB_WORKSPACE}/${OUTPUT_DIR_NAME}/${PLATFORM}"
        SCRIPTS_DIR="${GITHUB_WORKSPACE}/addon/scripts/perf-report"
        mkdir -p "$OUTPUT_DIR"
        echo "output_dir=$OUTPUT_DIR" >> "$GITHUB_OUTPUT"

        if [ ! -f "$SCRIPTS_DIR/extract-from-log.js" ]; then
          echo "::warning::$SCRIPTS_DIR/extract-from-log.js not found; skipping"
          echo "extracted=false" >> "$GITHUB_OUTPUT"
          exit 0
        fi
        if [ ! -d "$LOG_DIR" ]; then
          echo "No $LOG_DIR — skipping perf extraction."
          echo "extracted=false" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        # Optional: unzip every Customer_Artifacts.zip inline so
        # PERF_REPORT markers buried in bare_console.log / appium.log
        # become scannable by extract-from-log.js alongside the plain
        # LOG artifacts.
        if [ "$UNZIP_CUSTOMER_ARTIFACTS" = "true" ]; then
          echo "Unzipping Customer_Artifacts.zip in $LOG_DIR ..."
          find "$LOG_DIR" -name "*Customer_Artifacts.zip" -type f | while read -r zf; do
            extract_to="$(dirname "$zf")/$(basename "$zf" .zip)_unpacked"
            rm -rf "$extract_to"
            mkdir -p "$extract_to"
            if unzip -qo "$zf" -d "$extract_to" 2>/dev/null; then
              echo "  Unpacked: $zf"
            else
              echo "  WARNING: failed to unzip $zf"
            fi
          done
        fi

        EXTRA_ARGS=""
        if [ -n "$FILTER" ]; then
          EXTRA_ARGS="$EXTRA_ARGS --filter $FILTER"
        fi
        if [ "$MERGE" = "true" ]; then
          EXTRA_ARGS="$EXTRA_ARGS --merge"
        fi

        node "$SCRIPTS_DIR/extract-from-log.js" \
          "$LOG_DIR" \
          "$OUTPUT_DIR/performance-report.json" \
          --run-number "${{ github.run_number }}" \
          $EXTRA_ARGS || true

        if find "$OUTPUT_DIR" -name "performance-report.json" -type f -size +0 | head -1 | grep -q .; then
          echo "Generating HTML/MD/summary..."
          node "$SCRIPTS_DIR/aggregate.js" \
            --dir "$OUTPUT_DIR" \
            --output-html "$OUTPUT_DIR/performance-report.html" \
            --output-json "$OUTPUT_DIR/performance-summary.json" \
            --output "$OUTPUT_DIR/performance-report.md" || true
          echo "extracted=true" >> "$GITHUB_OUTPUT"
        else
          echo "::warning::No performance-report.json produced for ${PLATFORM}"
          echo "extracted=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Write perf report to GitHub Step Summary
      if: always() && steps.extract.outputs.extracted == 'true' && inputs.step-summary-title != ''
      shell: bash
      env:
        TITLE: ${{ inputs.step-summary-title }}
      run: |
        OUTPUT_DIR="${{ steps.extract.outputs.output_dir }}"
        RENDERER="${GITHUB_WORKSPACE}/addon/scripts/perf-report/render-step-summary.js"

        if [ ! -f "$RENDERER" ]; then
          echo "::warning::render-step-summary.js not found; skipping Step Summary"
          exit 0
        fi

        # Single-device layout (iOS, or Android with one pool).
        if [ -f "$OUTPUT_DIR/performance-report.json" ]; then
          node "$RENDERER" \
            "$OUTPUT_DIR/performance-report.json" \
            "$GITHUB_STEP_SUMMARY" \
            --title "$TITLE"
          exit 0
        fi

        # Multi-device fallback (Android matrix → per-device subdirs).
        for DEV_DIR in "$OUTPUT_DIR"/*/; do
          DEV_REPORT="$DEV_DIR/performance-report.json"
          [ -f "$DEV_REPORT" ] || continue
          DEV_NAME=$(basename "$DEV_DIR" | tr '_' ' ')
          # Mirror the old per-addon title format: if the caller title
          # ends with ")" (e.g. "… (Android)"), insert the device name
          # inside the parentheses → "… (Android · Pixel 9)".
          if [[ "$TITLE" == *")" ]]; then
            MULTI_TITLE="${TITLE%)} · ${DEV_NAME})"
          else
            MULTI_TITLE="${TITLE} · ${DEV_NAME}"
          fi
          node "$RENDERER" \
            "$DEV_REPORT" \
            "$GITHUB_STEP_SUMMARY" \
            --title "$MULTI_TITLE"
        done

    - name: Upload performance report artifact
      if: always() && steps.extract.outputs.extracted == 'true' && inputs.artifact-name != ''
      uses: actions/upload-artifact@4cec3d8aa04e39d1a68397de0c4cd6fb9dce8ec1 # 4.6.1
      with:
        name: ${{ inputs.artifact-name }}
        path: ${{ steps.extract.outputs.output_dir }}/
        retention-days: 90
        if-no-files-found: ignore
