name: Benchmark VLM (LLM)

# Manually-triggered VLM benchmark. Runs
# packages/llm-llamacpp/benchmarks/vlm-performance against Qwen3.5-VL
# on a fixed object-listing task and uploads a consolidated report.
#
# First iteration scope:
#   - Desktop: Windows + Linux on GitHub-hosted runners (CPU only).
#   - Android: present as an input but currently a stub — the on-device
#     test bundle integration for our benchmark is not yet wired. Once
#     it is, the stub job will be replaced with a real Device Farm run.
#   - Candidate only (no baseline diff). Baseline comparison wires in
#     once we either auto-build the merge-base commit or cache its
#     prebuilds.

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref (branch / tag / SHA) to benchmark"
        required: false
        type: string
      warmup_runs:
        description: "Warmup iterations per cell (discarded)"
        required: false
        type: string
        default: "1"
      measured_runs:
        description: "Measured iterations per cell (median reported)"
        required: false
        type: string
        default: "3"
      thinking:
        description: "Qwen3.5 reasoning mode (off = faster, on = full <think> trace)"
        required: false
        type: choice
        default: "off"
        options:
          - "off"
          - "on"
      run_windows:
        description: "Run on Windows (windows-latest, CPU)"
        required: false
        type: boolean
        default: true
      run_linux:
        description: "Run on Linux (ubuntu-latest, CPU)"
        required: false
        type: boolean
        default: true
      run_android:
        description: "Run on Android (stub - real wiring planned)"
        required: false
        type: boolean
        default: false
      compare_baseline:
        description: "Compare branch HEAD against the merge-base with main. Adds ~3 min per leg."
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  packages: read
  id-token: write

jobs:
  # ── Context ────────────────────────────────────────────────────────
  # Resolves the repo + ref so downstream jobs check out the right
  # commit even when the workflow_dispatch is invoked without `ref`,
  # and builds the desktop matrix from the per-platform input toggles.
  # Matrix is computed here (instead of via job-level `if:`) because
  # GitHub Actions doesn't allow `matrix.*` references in job-level
  # conditions — they're evaluated before the matrix is expanded.
  context:
    runs-on: ubuntu-latest
    outputs:
      repository: ${{ steps.ctx.outputs.repository }}
      ref: ${{ steps.ctx.outputs.ref }}
      desktop_matrix: ${{ steps.matrix.outputs.value }}
      desktop_count: ${{ steps.matrix.outputs.count }}
      merge_base: ${{ steps.commits.outputs.merge_base }}
      head_sha: ${{ steps.commits.outputs.head_sha }}
      head_title: ${{ steps.commits.outputs.head_title }}
      head_date: ${{ steps.commits.outputs.head_date }}
      base_title: ${{ steps.commits.outputs.base_title }}
      base_date: ${{ steps.commits.outputs.base_date }}
    steps:
      - id: ctx
        shell: bash
        env:
          INPUT_REF: ${{ inputs.ref }}
          REPO: ${{ github.repository }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          repo="$REPO"
          ref="${INPUT_REF:-$REF_NAME}"
          echo "repository=$repo" >> "$GITHUB_OUTPUT"
          echo "ref=$ref" >> "$GITHUB_OUTPUT"
      - id: matrix
        shell: bash
        run: |
          entries='[]'
          if [[ "${{ inputs.run_windows }}" == "true" ]]; then
            entries=$(echo "$entries" | jq -c '. + [{"platform":"windows-x64","runner":"windows-latest"}]')
          fi
          if [[ "${{ inputs.run_linux }}" == "true" ]]; then
            entries=$(echo "$entries" | jq -c '. + [{"platform":"linux-x64","runner":"ubuntu-latest"}]')
          fi
          count=$(echo "$entries" | jq 'length')
          echo "value=$entries" >> "$GITHUB_OUTPUT"
          echo "count=$count" >> "$GITHUB_OUTPUT"
          echo "Desktop matrix: $entries (count=$count)"
      # Resolve commit metadata so the consolidated report can show what
      # the candidate ref + merge-base actually point at (hash, title,
      # date). Needs a real clone — sparse checkout doesn't give us git
      # history.
      - name: Checkout for commit lookup
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          repository: ${{ steps.ctx.outputs.repository }}
          ref: ${{ steps.ctx.outputs.ref }}
          fetch-depth: 0
      - id: commits
        shell: bash
        run: |
          git fetch origin main --quiet
          HEAD_SHA=$(git rev-parse HEAD)
          MERGE_BASE=$(git merge-base HEAD origin/main || echo "")
          HEAD_TITLE=$(git log -1 --pretty=%s "$HEAD_SHA")
          HEAD_DATE=$(git log -1 --pretty=%cI "$HEAD_SHA")
          if [[ -n "$MERGE_BASE" ]]; then
            BASE_TITLE=$(git log -1 --pretty=%s "$MERGE_BASE")
            BASE_DATE=$(git log -1 --pretty=%cI "$MERGE_BASE")
          else
            BASE_TITLE=""
            BASE_DATE=""
          fi
          {
            echo "head_sha=$HEAD_SHA"
            echo "merge_base=$MERGE_BASE"
            echo "head_title=$HEAD_TITLE"
            echo "head_date=$HEAD_DATE"
            echo "base_title=$BASE_TITLE"
            echo "base_date=$BASE_DATE"
          } >> "$GITHUB_OUTPUT"
          echo "HEAD:       $HEAD_SHA - $HEAD_TITLE ($HEAD_DATE)"
          echo "merge-base: $MERGE_BASE - $BASE_TITLE ($BASE_DATE)"

  # ── Desktop benchmark matrix ───────────────────────────────────────
  # Each leg is the same shape — pick the runner via matrix.runner.
  # GitHub-hosted runners are CPU-only; GPU coverage moves to the
  # self-hosted runners (qvac-win25-x64-gpu, ai-run-linux-gpu) in a
  # later iteration. The matrix itself is built dynamically by the
  # context job above based on run_windows / run_linux inputs.
  desktop:
    needs: context
    if: needs.context.outputs.desktop_count != '0'
    name: vlm-${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.context.outputs.desktop_matrix) }}
    env:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      WORKDIR: packages/llm-llamacpp/benchmarks/vlm-performance
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          repository: ${{ needs.context.outputs.repository }}
          ref: ${{ needs.context.outputs.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # 4.4.0
        with:
          node-version: lts/*

      - name: Install benchmark deps
        shell: bash
        working-directory: ${{ env.WORKDIR }}
        run: npm install --no-audit --no-fund

      - name: Prepare models
        shell: bash
        working-directory: ${{ env.WORKDIR }}
        run: npm run prepare:models

      # ── Optional baseline setup (compare_baseline=true) ───────────
      # We use the npm-published @qvac/llm-llamacpp version pinned in
      # packages/llm-llamacpp/package.json at the merge-base commit as
      # the baseline. This is fast (~30s extra) but only meaningful
      # when the branch bumped the addon version. When the pin is
      # identical at both commits, the consolidated report flags the
      # comparison as "no version bump on branch - baseline == candidate"
      # so the reviewer knows nothing was actually exercised.
      #
      # A true source-level compare (build the addon at both commits)
      # is planned as a follow-up; it needs the clang-22 + vcpkg
      # toolchain orchestration and adds ~30-60 min per leg.
      - name: Resolve baseline addon version
        if: inputs.compare_baseline
        id: baseline
        shell: bash
        run: |
          MERGE_BASE="${{ needs.context.outputs.merge_base }}"
          if [[ -z "$MERGE_BASE" ]]; then
            echo "::warning::No merge-base resolved; skipping baseline install"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          HEAD_PKG_VER=$(node -e "console.log(require('./packages/llm-llamacpp/package.json').version)")
          BASE_PKG_VER=$(git show "${MERGE_BASE}:packages/llm-llamacpp/package.json" | node -e "let s=''; process.stdin.on('data',c=>s+=c); process.stdin.on('end',()=>{console.log(JSON.parse(s).version)})")
          echo "head_pkg_version=$HEAD_PKG_VER" >> "$GITHUB_OUTPUT"
          echo "base_pkg_version=$BASE_PKG_VER" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "candidate addon = @qvac/llm-llamacpp@$HEAD_PKG_VER"
          echo "baseline  addon = @qvac/llm-llamacpp@$BASE_PKG_VER"

      - name: Install baseline addon
        if: inputs.compare_baseline && steps.baseline.outputs.skip != 'true'
        shell: bash
        working-directory: ${{ env.WORKDIR }}
        run: |
          mkdir -p baseline-addon
          cd baseline-addon
          npm init -y > /dev/null
          # If the version isn't published (e.g. branch bumped to a
          # not-yet-released version), npm will fail — we let the run
          # continue with a clear warning so the user still gets the
          # candidate row.
          if npm install --no-audit --no-fund "@qvac/llm-llamacpp@${{ steps.baseline.outputs.base_pkg_version }}"; then
            echo "Baseline addon installed."
          else
            echo "::warning::Baseline version @qvac/llm-llamacpp@${{ steps.baseline.outputs.base_pkg_version }} not installable; baseline row will be missing"
          fi

      - name: Run VLM benchmark
        shell: bash
        working-directory: ${{ env.WORKDIR }}
        run: |
          BASELINE_ARG="--skip-baseline"
          if [[ "${{ inputs.compare_baseline }}" == "true" && "${{ steps.baseline.outputs.skip }}" != "true" ]]; then
            BASELINE_PATH="$(pwd)/baseline-addon/node_modules/@qvac/llm-llamacpp"
            if [[ -d "$BASELINE_PATH" ]]; then
              BASELINE_ARG="--baseline-addon-path=$BASELINE_PATH"
              echo "Using baseline addon at $BASELINE_PATH"
            else
              echo "::warning::baseline-addon dir not found; falling back to skip-baseline"
            fi
          fi
          npm run run:vlm-bench -- \
            $BASELINE_ARG \
            --warmup-runs=${{ inputs.warmup_runs }} \
            --measured-runs=${{ inputs.measured_runs }} \
            --thinking=${{ inputs.thinking }}

      - name: Upload per-platform results
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # 7.0.0
        with:
          name: vlm-perf-${{ matrix.platform }}-${{ github.run_number }}
          path: |
            ${{ env.WORKDIR }}/results/vlm-perf-*.md
            ${{ env.WORKDIR }}/results/vlm-perf-*.json
            ${{ env.WORKDIR }}/results/cell-*-stderr.log
          retention-days: 14
          if-no-files-found: warn

  # ── Android (stub) ─────────────────────────────────────────────────
  # Earlier iteration tried to reuse integration-mobile-test-llm-
  # llamacpp.yml in perf-only mode, but the existing mobile workflow
  # is built for breadth (Android + iOS matrix, 3+12 Device-Farm
  # sessions covering many tests) — one full invocation took ~20 min
  # of mostly-irrelevant work for our use case. Until we either land a
  # leaner mobile workflow that runs just our benchmark, or bundle our
  # benchmark logic into the existing mobile test app, this job is a
  # placeholder so the workflow shape covers Android.
  #
  # Default is OFF — flip run_android to true to see the marker
  # artifact and confirm wiring.
  android:
    needs: context
    if: inputs.run_android
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Stub notice
        shell: bash
        run: |
          mkdir -p android-stub
          cat > android-stub/README.txt <<'EOF'
          Android VLM benchmark - placeholder
          ===================================
          The full Android benchmark is not yet wired. The existing
          mobile workflow (integration-mobile-test-llm-llamacpp.yml)
          runs the broader integration test suite and is too heavy
          for the one-cell VLM benchmark; a dedicated leaner mobile
          path is planned.

          For Android perf numbers right now, run
            Actions -> Benchmark Performance (LLM) -> Run workflow
          (workflow file: benchmark-performance-infer-llm-llamacpp.yml)
          EOF
          echo "Android benchmark is a stub in this iteration."
          cat android-stub/README.txt
      - name: Upload Android stub marker
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # 7.0.0
        with:
          name: vlm-perf-android-${{ github.run_number }}
          path: android-stub/
          retention-days: 14

  # ── Summarize ──────────────────────────────────────────────────────
  # Downloads every desktop artifact and renders a consolidated table.
  # `if: always()` keeps the summary going when one matrix leg fails.
  summarize:
    needs:
      - context
      - desktop
      - android
    if: always() && needs.context.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          repository: ${{ needs.context.outputs.repository }}
          ref: ${{ needs.context.outputs.ref }}
          sparse-checkout: |
            packages/llm-llamacpp/benchmarks/vlm-performance/scripts
          sparse-checkout-cone-mode: false

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # 4.4.0
        with:
          node-version: lts/*

      - name: Download desktop per-platform artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # 8.0.1
        with:
          pattern: vlm-perf-*-${{ github.run_number }}
          path: per-platform

      - name: Build commit-info JSON
        shell: bash
        run: |
          cat > commit-info.json <<EOF
          {
            "head": {
              "sha": "${{ needs.context.outputs.head_sha }}",
              "title": ${{ toJSON(needs.context.outputs.head_title) }},
              "date": "${{ needs.context.outputs.head_date }}"
            },
            "merge_base": {
              "sha": "${{ needs.context.outputs.merge_base }}",
              "title": ${{ toJSON(needs.context.outputs.base_title) }},
              "date": "${{ needs.context.outputs.base_date }}"
            },
            "compare_baseline_requested": ${{ inputs.compare_baseline }}
          }
          EOF
          cat commit-info.json

      - name: Aggregate into one report
        shell: bash
        run: |
          mkdir -p consolidated
          node packages/llm-llamacpp/benchmarks/vlm-performance/scripts/aggregate-platforms.js \
            --inputs=per-platform \
            --commit-info=commit-info.json \
            --output-md=consolidated/vlm-perf-consolidated.md \
            --output-json=consolidated/vlm-perf-consolidated.json

      - name: Post step summary
        if: always()
        shell: bash
        run: |
          {
            echo "## VLM Benchmark - Consolidated"
            echo ""
            if [ -f consolidated/vlm-perf-consolidated.md ]; then
              tail -n +2 consolidated/vlm-perf-consolidated.md
            else
              echo "No consolidated report generated."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload consolidated report
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # 7.0.0
        with:
          name: vlm-perf-consolidated-${{ github.run_number }}
          path: consolidated/
          retention-days: 30
          if-no-files-found: warn
