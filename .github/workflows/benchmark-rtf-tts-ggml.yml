name: Benchmark RTF (TTS GGML)

# Self-contained benchmark orchestrator for the GGML (tts-cpp) TTS RTF +
# streaming benchmarks. Lives separately from `Integration Tests (TTS GGML)` so
# a normal PR integration run never pays the benchmark cost; this workflow is
# dispatched manually (or weekly via cron) and is the only place that runs the
# benchmarks.
#
# Desktop benchmarks run on the `qvac-*-gpu` self-hosted runners (that's where
# the QVAC registry models, the Vulkan ICDs, and the prebuild plumbing already
# live — see integration-test-tts-ggml.yml). The mobile leg (Android / iOS via
# AWS Device Farm) is independently toggled via the `include_desktop` /
# `include_mobile` dispatch inputs. Desktop is on by default; mobile is off by
# default (and on the weekly cron) so AWS Device Farm capacity is only consumed
# for explicit dispatches.

on:
  workflow_dispatch:
    inputs:
      repository:
        description: "Repository to benchmark (defaults to current)"
        required: false
        type: string
      ref:
        description: "Git ref (branch/tag/SHA) to benchmark"
        required: false
        type: string
      include_desktop:
        description: "Run the desktop benchmark matrix (qvac-*-gpu self-hosted runners)"
        required: false
        type: boolean
        default: true
      include_mobile:
        description: "Run the mobile (Android / iOS) benchmark leg on AWS Device Farm"
        required: false
        type: boolean
        default: false
      benchmark_matrix_json:
        description: "Optional JSON array overriding the per-runner benchmark matrix for all runners"
        required: false
        type: string
  # Weekly baseline run (Monday 06:30 UTC). Picks up main, produces fresh
  # cross-platform findings so regressions show up without a manual trigger.
  # Desktop-only: mobile stays off unless explicitly dispatched.
  schedule:
    - cron: '30 6 * * 1'

permissions:
  contents: read
  packages: read
  id-token: write

env:
  ADDON_DIR: packages/tts-ggml

jobs:
  context:
    runs-on: ubuntu-latest
    outputs:
      repository: ${{ steps.ctx.outputs.repository }}
      ref: ${{ steps.ctx.outputs.ref }}
      include_desktop: ${{ steps.ctx.outputs.include_desktop }}
      include_mobile: ${{ steps.ctx.outputs.include_mobile }}
    steps:
      - id: ctx
        shell: bash
        env:
          INPUT_REPO: ${{ inputs.repository }}
          INPUT_REF: ${{ inputs.ref }}
          INPUT_INCLUDE_DESKTOP: ${{ inputs.include_desktop }}
          INPUT_INCLUDE_MOBILE: ${{ inputs.include_mobile }}
          REPO: ${{ github.repository }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          repo="${INPUT_REPO:-$REPO}"
          ref="${INPUT_REF:-$REF_NAME}"
          echo "repository=$repo" >> "$GITHUB_OUTPUT"
          echo "ref=$ref" >> "$GITHUB_OUTPUT"
          # On the cron schedule both inputs are empty: desktop defaults on
          # (anything other than the literal 'false'), mobile defaults off
          # (only the literal 'true' enables it).
          echo "include_desktop=${INPUT_INCLUDE_DESKTOP}" >> "$GITHUB_OUTPUT"
          echo "include_mobile=${INPUT_INCLUDE_MOBILE}" >> "$GITHUB_OUTPUT"

  prebuild:
    needs: context
    permissions:
      contents: write
      packages: write
      pull-requests: write
      id-token: write
    uses: ./.github/workflows/prebuilds-tts-ggml.yml
    secrets: inherit
    with:
      repository: ${{ needs.context.outputs.repository }}
      ref: ${{ needs.context.outputs.ref }}

  # Desktop RTF + streaming benchmark matrix on the qvac-*-gpu self-hosted
  # runners. Each runner measures CPU + Vulkan for the three default engines.
  # GGUF weights come from the QVAC registry (npm run download-models:registry),
  # not HuggingFace, so this leg deliberately stays on the qvac runners where
  # that path is wired (unlike the ONNX benchmark, which uses GitHub-hosted CPU
  # runners with HuggingFace downloads).
  benchmarks-self-hosted:
    needs: [context, prebuild]
    if: ${{ needs.context.outputs.include_desktop != 'false' }}
    continue-on-error: true
    runs-on: ${{ matrix.runner }}
    environment: release
    name: benchmark-${{ matrix.runner }}
    timeout-minutes: 180
    permissions:
      contents: read
      packages: read
      id-token: write
    env:
      GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
      NO_GPU: 'false'
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: qvac-ubuntu2204-x64-gpu
            os: ubuntu-22.04
            platform: linux
            arch: x64
            os_version: u22-gpu
            benchmark_matrix_json: >-
              [{"engine":"chatterbox","useGPU":false,"backendHint":"cpu"},{"engine":"chatterbox-mtl","useGPU":false,"backendHint":"cpu"},{"engine":"supertonic","useGPU":false,"backendHint":"cpu"},{"engine":"chatterbox","useGPU":true,"backendHint":"vulkan"},{"engine":"chatterbox-mtl","useGPU":true,"backendHint":"vulkan"},{"engine":"supertonic","useGPU":true,"backendHint":"vulkan"}]
          - runner: qvac-ubuntu2404-x64-gpu
            os: ubuntu-24.04
            platform: linux
            arch: x64
            os_version: u24-gpu
            benchmark_matrix_json: >-
              [{"engine":"chatterbox","useGPU":false,"backendHint":"cpu"},{"engine":"chatterbox-mtl","useGPU":false,"backendHint":"cpu"},{"engine":"supertonic","useGPU":false,"backendHint":"cpu"},{"engine":"chatterbox","useGPU":true,"backendHint":"vulkan"},{"engine":"chatterbox-mtl","useGPU":true,"backendHint":"vulkan"},{"engine":"supertonic","useGPU":true,"backendHint":"vulkan"}]
          - runner: qvac-win25-x64-gpu
            os: windows-2025
            platform: win32
            arch: x64
            os_version: w25-gpu
            benchmark_matrix_json: >-
              [{"engine":"chatterbox","useGPU":false,"backendHint":"cpu"},{"engine":"chatterbox-mtl","useGPU":false,"backendHint":"cpu"},{"engine":"supertonic","useGPU":false,"backendHint":"cpu"},{"engine":"chatterbox","useGPU":true,"backendHint":"vulkan"},{"engine":"chatterbox-mtl","useGPU":true,"backendHint":"vulkan"},{"engine":"supertonic","useGPU":true,"backendHint":"vulkan"}]

    steps:
      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # 6.3.0
        with:
          node-version: lts/*

      - name: Manual Workspace Cleanup
        if: runner.environment != 'github-hosted'
        shell: bash
        working-directory: .
        run: rm -rf "$GITHUB_WORKSPACE" && mkdir -p "$GITHUB_WORKSPACE"

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          repository: ${{ needs.context.outputs.repository }}
          ref: ${{ needs.context.outputs.ref }}
          token: ${{ secrets.PAT_TOKEN }}

      - name: Install NPM dependencies
        working-directory: ${{ github.workspace }}/${{ env.ADDON_DIR }}
        run: npm install

      - name: Install bare tooling
        run: npm install -g --force bare bare-make

      - run: mkdir -p "${{ runner.temp }}/tts-ggml"
        shell: bash
      - run: mkdir -p "${{ github.workspace }}/${{ env.ADDON_DIR }}/prebuilds"
        shell: bash

      - name: Download prebuilds from artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # 8.0.1
        with:
          pattern: tts-ggml-*
          path: ${{ runner.temp }}/tts-ggml
          merge-multiple: true

      - name: Stage prebuilds into the addon
        shell: bash
        run: cp -r "${{ runner.temp }}/tts-ggml"/* "${{ github.workspace }}/${{ env.ADDON_DIR }}/prebuilds"

      - name: Set Vulkan SDK Path on Windows Server 2025
        if: ${{ matrix.os == 'windows-2025' }}
        run: echo "VULKAN_SDK=C:\VulkanSDK" >> $Env:GITHUB_ENV

      - name: Cache TTS GGML GGUF models
        id: model-cache
        uses: ./.github/actions/cache-models
        with:
          package: tts-ggml
          paths: packages/tts-ggml/models
          hash-files-glob: packages/tts-ggml/scripts/download-tts-ggml-models.js
          enable-cross-os: 'true'

      - name: Download GGUF models from registry
        if: steps.model-cache.outputs.cache-hit != 'true'
        shell: bash
        working-directory: ${{ github.workspace }}/${{ env.ADDON_DIR }}
        run: npm run download-models:registry

      # `continue-on-error` is intentionally absent on this step: the matrix
      # runner already catches per-entry errors and keeps going, and the
      # "Verify benchmark output" step below turns the matrix entry red only
      # when ZERO artifacts were produced. The downstream summarize job uses
      # `if: always()` so one failed runner never blocks aggregation.
      - name: Run RTF benchmark matrix
        shell: bash
        working-directory: ${{ github.workspace }}/${{ env.ADDON_DIR }}
        run: node scripts/run-rtf-benchmark-matrix.js
        env:
          QVAC_TTS_GGML_BENCHMARK_VARIANT: q4
          QVAC_TTS_GGML_BENCHMARK_DEVICE: ${{ matrix.runner }}
          QVAC_TTS_GGML_BENCHMARK_RUNNER: self-hosted-${{ matrix.runner }}
          QVAC_TTS_GGML_BENCHMARK_MATRIX_JSON: ${{ inputs.benchmark_matrix_json || matrix.benchmark_matrix_json }}
          LD_LIBRARY_PATH: ${{ github.workspace }}/${{ env.ADDON_DIR }}/prebuilds/${{ matrix.platform }}-${{ matrix.arch }}
          DYLD_LIBRARY_PATH: ${{ github.workspace }}/${{ env.ADDON_DIR }}/prebuilds/${{ matrix.platform }}-${{ matrix.arch }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_RUN_ATTEMPT: ${{ github.run_attempt }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_WORKFLOW: ${{ github.workflow }}
          GITHUB_JOB: ${{ github.job }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: Verify benchmark output exists
        if: always()
        shell: bash
        working-directory: ${{ github.workspace }}/${{ env.ADDON_DIR }}
        run: |
          set -euo pipefail
          results_dir="benchmarks/results"
          mkdir -p "$results_dir"
          rtf_count=$(find "$results_dir" -maxdepth 1 -type f -name 'rtf-benchmark-*.json' | wc -l)
          stream_count=$(find "$results_dir" -maxdepth 1 -type f -name 'streaming-benchmark-*.json' | wc -l)
          echo "Benchmark output in $results_dir:"
          ls -la "$results_dir" || true
          echo
          echo "rtf-benchmark-*.json: $rtf_count"
          echo "streaming-benchmark-*.json: $stream_count"
          {
            echo "### Benchmark output — ${{ matrix.runner }} (${{ matrix.platform }}-${{ matrix.arch }})"
            echo "- rtf-benchmark JSON files: \`$rtf_count\`"
            echo "- streaming-benchmark JSON files: \`$stream_count\`"
          } >> "$GITHUB_STEP_SUMMARY"
          if [ "$rtf_count" -eq 0 ]; then
            echo "::error title=No RTF benchmark output::Step \`Run RTF benchmark matrix\` produced zero rtf-benchmark-*.json files on ${{ matrix.runner }}. Check the matrix runner log above for model-fetch failures, prebuild path issues, or per-entry crashes."
            exit 1
          fi

      - name: Upload RTF results
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # 7.0.0
        with:
          name: rtf-results-tts-ggml-${{ matrix.runner }}-${{ matrix.os_version }}
          path: |
            ${{ env.ADDON_DIR }}/benchmarks/results/rtf-benchmark-*.json
            ${{ env.ADDON_DIR }}/benchmarks/results/streaming-benchmark-*.json
          retention-days: 30
          if-no-files-found: error

      - name: Add RTF summary to step summary
        if: always()
        continue-on-error: true
        shell: bash
        working-directory: ${{ github.workspace }}/${{ env.ADDON_DIR }}
        run: |
          echo "### TTS GGML RTF — ${{ matrix.runner }} (${{ matrix.platform }}-${{ matrix.arch }})" >> $GITHUB_STEP_SUMMARY
          node -e "
            const fs = require('fs');
            const path = require('path');
            const resultsDir = path.resolve('benchmarks/results');
            if (!fs.existsSync(resultsDir)) process.exit(0);
            const files = fs.readdirSync(resultsDir)
              .filter(file => file.startsWith('rtf-benchmark-') && file.endsWith('.json'))
              .sort();
            if (files.length === 0) process.exit(0);
            const lines = [
              '| Engine | Variant | GPU | Backend | Active | Label | Mean RTF | P50 | P95 | Cold RTF | Mean Wall (ms) | Load (ms) | Peak RSS (MB) | Noisy |',
              '|--------|---------|-----|---------|--------|-------|----------|-----|-----|----------|----------------|-----------|---------------|-------|'
            ];
            for (const file of files) {
              const report = JSON.parse(fs.readFileSync(path.join(resultsDir, file), 'utf8'));
              const summary = report.summary || {};
              const rtf = summary.rtf || {};
              const wallMs = summary.wallMs || {};
              const useGPU = report.requested && report.requested.useGPU;
              const noisy = summary.noisy === true;
              const coldRtf = summary.coldRtf;
              const loadMs = summary.modelLoadMs;
              const peakRss = summary.peakRssBytes;
              const label = (report.labels && report.labels.label) || '';
              const active = (report.labels && report.labels.activeBackend) || '';
              lines.push(
                '| ' + (report.engine || 'unknown') +
                ' | ' + ((report.model && report.model.variant) || 'q4') +
                ' | ' + (useGPU ? 'yes' : 'no') +
                ' | ' + ((report.labels && report.labels.backend) || (report.requested && report.requested.backendHint) || 'n/a') +
                ' | ' + (active || '-') +
                ' | ' + (label || '-') +
                ' | ' + (rtf.mean !== undefined ? Number(rtf.mean).toFixed(4) : 'n/a') +
                ' | ' + (rtf.p50 !== undefined ? Number(rtf.p50).toFixed(4) : 'n/a') +
                ' | ' + (rtf.p95 !== undefined ? Number(rtf.p95).toFixed(4) : 'n/a') +
                ' | ' + (coldRtf !== undefined && coldRtf !== null ? Number(coldRtf).toFixed(4) : 'n/a') +
                ' | ' + (wallMs.mean !== undefined ? Math.round(Number(wallMs.mean)) : 'n/a') +
                ' | ' + (loadMs !== undefined && loadMs !== null ? Math.round(Number(loadMs)) : 'n/a') +
                ' | ' + (peakRss !== undefined && peakRss !== null ? Math.round(Number(peakRss) / 1024 / 1024) : 'n/a') +
                ' | ' + (noisy ? '⚠' : '-') +
                ' |'
              );
            }
            console.log(lines.join('\n'));
          " >> $GITHUB_STEP_SUMMARY

  # Mobile (Android / iOS) RTF + streaming benchmark leg.
  # Reuses the standard mobile integration workflow with run_rtf_benchmarks so
  # the on-device shims delegate to the canonical test/benchmark suites and emit
  # [PERF_REPORT_START] blocks scraped into perf-report-tts-ggml-* artifacts.
  # Opt-in via include_mobile so the weekly cron never burns AWS Device Farm
  # capacity. Depends on prebuild for the tts-ggml-* artifacts the mobile setup
  # composite downloads.
  mobile-benchmarks:
    needs: [context, prebuild]
    if: ${{ needs.context.outputs.include_mobile == 'true' }}
    permissions:
      contents: read
      packages: read
      pull-requests: write
      id-token: write
    uses: ./.github/workflows/integration-mobile-test-tts-ggml.yml
    secrets: inherit
    with:
      repository: ${{ needs.context.outputs.repository }}
      ref: ${{ needs.context.outputs.ref }}
      run_rtf_benchmarks: true

  summarize:
    needs: [context, benchmarks-self-hosted, mobile-benchmarks]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          repository: ${{ needs.context.outputs.repository }}
          ref: ${{ needs.context.outputs.ref }}
          token: ${{ secrets.PAT_TOKEN }}

      # NOTE: no merge-multiple here. Same-platform runners emit identically
      # named files (e.g. both qvac-ubuntu2204 and qvac-ubuntu2404 write
      # rtf-benchmark-linux-x64-*.json), so merging them into one directory
      # would clobber all but the last-downloaded runner. Each artifact lands
      # in its own subdirectory instead; the aggregator's walkFiles recurses,
      # and dedupe keys on `device` so per-runner rows stay distinct.
      - name: Download desktop benchmark artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # 8.0.1
        with:
          pattern: rtf-results-tts-ggml-*
          path: benchmark-artifacts/desktop
        continue-on-error: true

      # Same rationale: Android + iOS both emit performance-report.json, so a
      # merge would drop one device. Per-artifact subdirectories keep both.
      - name: Download mobile benchmark artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # 8.0.1
        with:
          pattern: perf-report-tts-ggml-*
          path: benchmark-artifacts/mobile
        continue-on-error: true

      - name: Generate consolidated benchmark report
        run: |
          mkdir -p benchmark-artifacts
          node scripts/perf-report/aggregate-tts-ggml-rtf.js \
            --dir benchmark-artifacts \
            --manual-dir packages/tts-ggml/benchmarks/manual-results \
            --output benchmark-artifacts/tts-ggml-performance-findings.md \
            --output-json benchmark-artifacts/tts-ggml-performance-findings.json

      - name: Add summary
        if: always()
        run: |
          if [ -f "benchmark-artifacts/tts-ggml-performance-findings.md" ]; then
            cat benchmark-artifacts/tts-ggml-performance-findings.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "_No consolidated benchmark report was produced._" >> "$GITHUB_STEP_SUMMARY"
          fi

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### GPU coverage map" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Backend | Coverage | How |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---------|----------|-----|" >> "$GITHUB_STEP_SUMMARY"
          echo "| cpu | linux x64, win32 x64 | qvac-*-gpu self-hosted runners |" >> "$GITHUB_STEP_SUMMARY"
          echo "| vulkan | linux x64, win32 x64 | qvac-*-gpu self-hosted runners |" >> "$GITHUB_STEP_SUMMARY"
          echo "| mobile cpu | Android / iOS flagships | AWS Device Farm, opt-in via \`include_mobile=true\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| metal | not on CI (hosted macOS Metal crash) | drop JSON into packages/tts-ggml/benchmarks/manual-results/ |" >> "$GITHUB_STEP_SUMMARY"
          echo "| cuda | not in default tts-cpp cascade | drop JSON into packages/tts-ggml/benchmarks/manual-results/ |" >> "$GITHUB_STEP_SUMMARY"
          echo "| opencl | Adreno-only | drop JSON into packages/tts-ggml/benchmarks/manual-results/ |" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload consolidated benchmark report
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # 7.0.0
        with:
          name: tts-ggml-performance-findings
          path: |
            benchmark-artifacts/tts-ggml-performance-findings.md
            benchmark-artifacts/tts-ggml-performance-findings.json
          retention-days: 30
          if-no-files-found: ignore
