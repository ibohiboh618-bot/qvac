name: Run Integration Tests (Parakeet)

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref (branch/tag/SHA) to test"
        type: string
        required: false
        default: main
      prebuild_package:
        description: "NPM package containing prebuilds (e.g. @qvac/transcription-parakeet@1.0.0)"
        required: true
        type: string
      run_integration_tests:
        description: "Run the regular integration suite"
        required: false
        type: boolean
        default: true

  workflow_call:
    inputs:
      ref:
        description: 'ref'
        type: string
      repository:
        type: string
      run_integration_tests:
        description: "Run the regular integration suite"
        type: boolean
        required: false
        default: true

jobs:
  run-integration-tests:
    timeout-minutes: 60
    continue-on-error: true
    runs-on: ${{ matrix.runner || matrix.os }}
    environment: release
    name: ${{ matrix.os }}-${{ matrix.platform }}-${{ matrix.arch }}-integration-tests
    env:
      GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
      NO_GPU: ${{ matrix.no_gpu || 'false' }}
      WORKDIR: packages/transcription-parakeet
    permissions:
      contents: read
      packages: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            platform: linux
            arch: x64
            runner: qvac-ubuntu2204-x64
            no_gpu: 'true'
          - os: ubuntu-24.04
            platform: linux
            arch: x64
            runner: qvac-ubuntu2404-x64-gpu
          - os: ubuntu-24.04-arm
            platform: linux
            arch: arm64
            no_gpu: 'true'
          - os: macos-14-xlarge
            platform: darwin
            arch: arm64
            no_gpu: 'true'
          - os: macos-15-large
            platform: darwin
            arch: x64
            no_gpu: 'true'
          - os: windows-2025
            platform: win32
            arch: x64
            runner: qvac-win25-x64
            no_gpu: 'true'

    steps:
      - name: Manual Workspace Cleanup
        if: runner.environment != 'github-hosted'
        shell: bash
        run: rm -rf "$GITHUB_WORKSPACE" && mkdir -p "$GITHUB_WORKSPACE"

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          repository: ${{ inputs.repository || github.repository }}
          ref: ${{ inputs.ref || github.ref }}
          token: ${{ secrets.PAT_TOKEN }}

      - name: Bootstrap
        uses: ./.github/actions/run-desktop-integration-tests/bootstrap

      - name: Install NPM dependencies
        working-directory: ${{ env.WORKDIR }}
        shell: bash
        run: npm install

      - name: Resolve prebuilds
        uses: ./.github/actions/run-desktop-integration-tests/resolve-prebuilds
        with:
          platform: ${{ matrix.platform }}
          workdir: ${{ env.WORKDIR }}
          prebuild-package: ${{ inputs.prebuild_package }}
          rename: single-underscore

      - name: Install system dependencies
        uses: ./.github/actions/run-desktop-integration-tests/install-system-deps
        with:
          platform: ${{ matrix.platform }}
          arch: ${{ matrix.arch }}
          os: ${{ matrix.os }}
          set-windows-vulkan-sdk: "true"
          # Python (3.12) is needed for the .nemo -> .gguf conversion on
          # arm64 / darwin model staging.
          python-version: ${{ (matrix.arch == 'arm64' || matrix.platform == 'darwin') && '3.12' || '' }}

      - name: Cache Parakeet GGUF models
        id: model-cache
        if: startsWith(matrix.runner, 'qvac-')
        uses: ./.github/actions/cache-models
        with:
          package: transcription-parakeet
          paths: packages/transcription-parakeet/models
          hash-files-glob: packages/transcription-parakeet/scripts/download-models.sh
          enable-cross-os: 'false'

      - name: Stage GGUF models (npm run setup-models)
        if: steps.model-cache.outputs.cache-hit != 'true'
        shell: bash
        working-directory: ${{ env.WORKDIR }}
        run: npm run setup-models

      - name: Run integration test
        if: ${{ inputs.run_integration_tests != false }}
        shell: bash
        working-directory: ${{ env.WORKDIR }}
        run: npm run test:integration
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
          INTEGRATION_TEST_TIMEOUT: ${{ matrix.platform == 'win32' && '1800' || '600' }}
          LD_LIBRARY_PATH: ${{ github.workspace }}/packages/transcription-parakeet/prebuilds/${{ matrix.platform }}-${{ matrix.arch }}
          DYLD_LIBRARY_PATH: ${{ github.workspace }}/packages/transcription-parakeet/prebuilds/${{ matrix.platform }}-${{ matrix.arch }}
