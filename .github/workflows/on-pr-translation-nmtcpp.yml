name: On PR Trigger (NMTCPP)

on:
  pull_request_target:
    types:
      - opened
      - synchronize
      - reopened
      - labeled
    branches:
      - main
      - release-*
      - feature-*
      - tmp-*
    paths:
      - "packages/translation-nmtcpp/**"
      - ".github/workflows/*nmtcpp*.yml"
      - ".github/actions/cache-models/**"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read
  packages: read
  id-token: write

env:
  PKG_DIR: packages/translation-nmtcpp

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  label-gate:
    name: Authorise (label-gate)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    outputs:
      authorised: ${{ steps.gate.outputs.authorised }}
    steps:
      - name: Checkout (label-gate action only)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # 7.0.0
        with:
          ref: ${{ github.event.repository.default_branch }}
          sparse-checkout: .github/actions/label-gate
          sparse-checkout-cone-mode: false
      - name: Run label-gate
        id: gate
        uses: ./.github/actions/label-gate
        with:
          github-token: ${{ secrets.PAT_TOKEN }}

  ci-router:
    name: CI Router (label detection)
    runs-on: ubuntu-latest
    timeout-minutes: 2
    permissions:
      contents: read
      pull-requests: read
    outputs:
      run_verified_checks: ${{ steps.route.outputs.run_verified_checks }}
      run_prebuilds: ${{ steps.route.outputs.run_prebuilds }}
      run_cpp_tests: ${{ steps.route.outputs.run_cpp_tests }}
      run_desktop: ${{ steps.route.outputs.run_desktop }}
      run_mobile: ${{ steps.route.outputs.run_mobile }}
    steps:
      - name: Checkout ci-router composite (default branch)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # 7.0.0
        with:
          ref: ${{ github.event.repository.default_branch }}
          sparse-checkout: .github/actions/ci-router
          sparse-checkout-cone-mode: false
      - name: Route CI stages
        id: route
        uses: ./.github/actions/ci-router

  authorize:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    outputs:
      allowed: ${{ steps.auth.outputs.allowed }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # 7.0.0
      - name: Authorize
        id: auth
        uses: ./.github/actions/authorize-pr
        with:
          github-token: ${{ github.token }}

  changes:
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      pkg: ${{ steps.filter.outputs.pkg }}
    steps:
      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # 4.0.2
        id: filter
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          filters: |
            pkg:
              - "packages/translation-nmtcpp/**"
              - ".github/workflows/*nmtcpp*.yml"
  verify-fabric-lockstep:
    needs: [authorize, changes]
    if: always() && !cancelled() && needs.authorize.outputs.allowed == 'true' && (needs.changes.outputs.pkg == 'true' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # 7.0.0

      - name: Verify qvac-fabric versions are lockstep
        id: lockstep
        uses: ./.github/actions/verify-qvac-fabric-lockstep

      - name: Report verified version
        run: 'echo "Verified qvac-fabric version: ${{ steps.lockstep.outputs.version }}"'

  sanity-checks:
    needs:
      - authorize
      - changes
      - verify-fabric-lockstep
      - ci-router
      - label-gate
    if: always() && !cancelled() && needs.ci-router.outputs.run_verified_checks == 'true' && needs.label-gate.outputs.authorised == 'true' && ((needs.changes.outputs.pkg == 'true' && needs.authorize.outputs.allowed == 'true') || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # 7.0.0
        with:
          fetch-depth: 0

      - name: Run Sanity checks
        uses: ./.github/actions/sanity-checks
        with:
          secret-token: ${{ secrets.GITHUB_TOKEN }}
          pat-token: ${{ secrets.PAT_TOKEN }}
          run-integration: ${{ needs.authorize.outputs.allowed == 'true' }}
          workdir: packages/translation-nmtcpp

  ts-checks:
    needs: [authorize, changes, sanity-checks]
    if: always() && !cancelled() && needs.authorize.outputs.allowed == 'true' && (needs.changes.outputs.pkg == 'true' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.PKG_DIR }}
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # 7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # 6.4.0
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Type declaration check
        run: npm run test:dts

  cpp-lint:
    needs:
      - authorize
      - changes
      - sanity-checks
      - ci-router
      - label-gate
    if: |-
      always() && !cancelled() && needs.ci-router.outputs.run_verified_checks == 'true' && needs.label-gate.outputs.authorised == 'true' && needs.authorize.outputs.allowed == 'true' && (needs.changes.outputs.pkg == 'true' || github.event_name == 'workflow_dispatch')
    uses: ./.github/workflows/cpp-lint.yaml
    secrets: inherit
    with:
      sha: ${{ github.event.pull_request.base.sha || github.event.before || 'HEAD~1' }}
      pr_head_sha: ${{ github.event.pull_request.head.sha || github.sha }}
      workdir: packages/translation-nmtcpp

  cpp-tests:
    needs:
      - authorize
      - changes
      - sanity-checks
      - ci-router
      - label-gate
    permissions:
      contents: read
      packages: read
      pull-requests: write
      id-token: write
    if: |-
      always() && !cancelled() && needs.ci-router.outputs.run_cpp_tests == 'true' && needs.label-gate.outputs.authorised == 'true' && needs.authorize.outputs.allowed == 'true' && (needs.changes.outputs.pkg == 'true' || github.event_name == 'workflow_dispatch')
    uses: ./.github/workflows/reusable-cpp-tests-translation-nmtcpp.yml
    secrets: inherit
    with:
      ref: ${{ github.event.pull_request.head.ref || github.ref }}
      repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}

  detect-native-changes:
    needs:
      - authorize
      - changes
      - ci-router
      - label-gate
    if: |-
      always() && !cancelled() && needs.ci-router.outputs.run_prebuilds == 'true' && needs.label-gate.outputs.authorised == 'true' && needs.authorize.outputs.allowed == 'true' && (needs.changes.outputs.pkg == 'true' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      native_changed: ${{ steps.detect.outputs.native_changed }}
      native_hash: ${{ steps.detect.outputs.native_hash }}
    steps:
      - name: Checkout composite source (default branch)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # 7.0.0
        with:
          ref: ${{ github.event.repository.default_branch }}
      - name: Detect native file changes
        id: detect
        uses: ./.github/actions/detect-native-changes
        with:
          workdir: packages/translation-nmtcpp

  prebuild-artifact-reuse:
    if: needs.label-gate.outputs.authorised == 'true' && needs.detect-native-changes.outputs.native_changed == 'false'
    needs:
      - detect-native-changes
      - sanity-checks
      - label-gate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      actions: read
    outputs:
      reuse_hit: ${{ steps.reuse.outputs.reuse_hit }}
    steps:
      - name: Checkout prebuild-artifact-reuse composite (default branch)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # 7.0.0
        with:
          ref: ${{ github.event.repository.default_branch }}
          sparse-checkout: .github/actions/prebuild-artifact-reuse
          sparse-checkout-cone-mode: false
      - name: Reuse prebuilds from a prior run
        id: reuse
        uses: ./.github/actions/prebuild-artifact-reuse
        with:
          github-token: ${{ github.token }}
          workflow-file: on-pr-translation-nmtcpp.yml
          native-hash: ${{ needs.detect-native-changes.outputs.native_hash }}
          pr-number: ${{ github.event.pull_request.number }}

  prebuild:
    permissions:
      contents: write
      packages: write
      pull-requests: write
      id-token: write
    needs:
      - authorize
      - changes
      - ci-router
      - sanity-checks
      - detect-native-changes
      - prebuild-artifact-reuse
      - label-gate
    if: |-
      always() && needs.sanity-checks.result == 'success' && needs.ci-router.outputs.run_prebuilds == 'true' && needs.label-gate.outputs.authorised == 'true' && needs.authorize.outputs.allowed == 'true' && (needs.changes.outputs.pkg == 'true' || github.event_name == 'workflow_dispatch') && (needs.detect-native-changes.outputs.native_changed == 'true' || needs.prebuild-artifact-reuse.outputs.reuse_hit != 'true')
    uses: ./.github/workflows/prebuilds-translation-nmtcpp.yml
    secrets: inherit
    with:
      repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
      ref: ${{ github.event.pull_request.head.ref || github.ref }}

  prebuild-artifact-save:
    if: always() && needs.label-gate.outputs.authorised == 'true' && needs.prebuild.result == 'success'
    needs:
      - prebuild
      - detect-native-changes
      - label-gate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Checkout prebuild-artifact-save composite (default branch)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # 7.0.0
        with:
          ref: ${{ github.event.repository.default_branch }}
          sparse-checkout: .github/actions/prebuild-artifact-save
          sparse-checkout-cone-mode: false
      - name: Save reuse marker
        uses: ./.github/actions/prebuild-artifact-save
        with:
          native-hash: ${{ needs.detect-native-changes.outputs.native_hash }}
          pr-number: ${{ github.event.pull_request.number }}

  run-integration-tests:
    needs:
      - authorize
      - changes
      - sanity-checks
      - prebuild
      - prebuild-artifact-reuse
      - ci-router
      - label-gate
    if: |-
      always() && needs.ci-router.outputs.run_desktop == 'true' && needs.label-gate.outputs.authorised == 'true' && needs.authorize.outputs.allowed == 'true' && (needs.changes.outputs.pkg == 'true' || github.event_name == 'workflow_dispatch') && (needs.prebuild.result == 'success' || needs.prebuild-artifact-reuse.outputs.reuse_hit == 'true')
    permissions:
      contents: read
      packages: read
      id-token: write
    uses: ./.github/workflows/integration-test-translation-nmtcpp.yml
    secrets: inherit
    with:
      repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
      ref: ${{ github.event.pull_request.head.ref || github.ref }}

  run-mobile-integration-tests:
    permissions:
      contents: read
      packages: read
      pull-requests: write # Allow commenting on PRs
      id-token: write
    needs:
      - authorize
      - changes
      - sanity-checks
      - prebuild
      - prebuild-artifact-reuse
      - ci-router
      - label-gate
    if: |-
      always() && needs.ci-router.outputs.run_mobile == 'true' && needs.label-gate.outputs.authorised == 'true' && needs.authorize.outputs.allowed == 'true' && (needs.changes.outputs.pkg == 'true' || github.event_name == 'workflow_dispatch') && (needs.prebuild.result == 'success' || needs.prebuild-artifact-reuse.outputs.reuse_hit == 'true')
    uses: ./.github/workflows/integration-mobile-test-translation-nmtcpp.yml
    secrets: inherit
    with:
      repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
      ref: ${{ github.event.pull_request.head.ref || github.ref }}

  merge-guard:
    needs: [authorize, changes, ci-router, verify-fabric-lockstep, sanity-checks, ts-checks, cpp-lint, cpp-tests, prebuild, prebuild-artifact-reuse, prebuild-artifact-save, detect-native-changes, run-integration-tests, run-mobile-integration-tests]
    if: always() && !cancelled() && (needs.changes.outputs.pkg == 'true' || github.event_name == 'workflow_dispatch')
    uses: ./.github/workflows/public-pr.yml
    with:
      sanity-checks-status: ${{ needs.verify-fabric-lockstep.result == 'success' && needs.sanity-checks.result == 'success' && (needs.cpp-tests.result == 'success' || needs.cpp-tests.result == 'skipped') && needs.ts-checks.result == 'success' }}
      build-status: ${{ needs.prebuild.result == 'success' || needs.prebuild-artifact-reuse.outputs.reuse_hit == 'true' }}
      integration-tests-status: ${{ needs.run-integration-tests.result == 'success' || needs.run-integration-tests.result == 'skipped' }}
