name: Manual — Test All Inference Addons

# Manually fan-out the full per-addon PR CI surface across every consumer
# of `inference-addon-cpp`. Intended for validating changes in shared
# dependencies across all addons at once. Not wired into PR/push triggers:
# it is too expensive to gate on every change and is meant to be dispatched
# on demand from the Actions tab.
#
# Mirrors what `on-pr-<addon>.yml` runs:
#   - cpp-lint                (skipped for decoder-audio — pure JS)
#   - sanity-checks           (JS lint + unit tests via ./.github/actions/run-lint-and-unit-tests)
#   - ts-checks               (6 addons: classification, diffusion, embed, llm, translation, vla)
#   - verify-fabric-lockstep  (4 addons: embed, llm, translation, vla)
#   - cpp-tests / coverage    (skipped for decoder-audio and ocr-onnx)
#   - prebuilds               (skipped for decoder-audio — no native build)
#   - integration-test
#   - integration-mobile-test
#
# All jobs that exercise package code (sanity-checks, ts-checks, integration,
# mobile) wait on `prebuilds-<addon>` so the native artifacts are available
# in the workspace before tests run.
#
# To test a single addon, dispatch its own per-addon workflow (e.g.
# `integration-test-transcription-whispercpp.yml`) directly — this one
# always runs everything.

permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref (branch/tag/SHA) of qvac to test. Empty = workflow's own ref."
        type: string
        required: false
      repository:
        description: "Repository to checkout. Empty = current repo."
        type: string
        required: false

jobs:
  # ---------- bci-whispercpp ----------
  cpp-lint-bci-whispercpp:
    uses: ./.github/workflows/cpp-lint.yaml
    with:
      workdir: packages/bci-whispercpp
    secrets: inherit

  cpp-tests-bci-whispercpp:
    uses: ./.github/workflows/cpp-test-coverage-bci-whispercpp.yml
    with:
      ref: ${{ inputs.ref }}
      repository: ${{ inputs.repository }}
    secrets: inherit

  prebuilds-bci-whispercpp:
    uses: ./.github/workflows/prebuilds-bci-whispercpp.yml
    with:
      ref: ${{ inputs.ref }}
      repository: ${{ inputs.repository }}
    secrets: inherit

  sanity-checks-bci-whispercpp:
    needs: prebuilds-bci-whispercpp
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          repository: ${{ inputs.repository }}
          ref: ${{ inputs.ref }}
          token: ${{ secrets.PAT_TOKEN }}
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # 8.0.1
        with:
          path: packages/bci-whispercpp/prebuilds
          merge-multiple: true
      - uses: ./.github/actions/run-lint-and-unit-tests
        with:
          gpr-token: ${{ secrets.GITHUB_TOKEN }}
          pat-token: ${{ secrets.PAT_TOKEN }}
          registry-type: gpr
          workdir: packages/bci-whispercpp

  bci-whispercpp:
    needs: prebuilds-bci-whispercpp
    uses: ./.github/workflows/integration-test-bci-whispercpp.yml
    with:
      ref: ${{ inputs.ref }}
      repository: ${{ inputs.repository }}
    secrets: inherit

  # ---------- classification-ggml ----------
