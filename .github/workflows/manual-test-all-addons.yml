name: Manual — Test All Inference Addons

# Manually fan-out the full per-addon CI sweep across every consumer of
# `inference-addon-cpp`. Intended for validating changes in shared
# dependencies across all addons at once. Not wired into PR/push triggers:
# it is too expensive to gate on every change and is meant to be dispatched
# on demand from the Actions tab.
#
# Per addon, runs:
#   - prebuilds               (skipped for decoder-audio — pure JS)
#   - cpp-tests / coverage    (skipped for decoder-audio and ocr-onnx)
#   - unit-tests              (JS unit tests — `npm run test:unit`)
#   - integration-test        (desktop e2e)
#   - integration-mobile-test (mobile e2e)
#
# Lint, type-decl checks, fabric-lockstep checks, and publish steps are
# intentionally out of scope here — they belong to per-PR / on-merge CI.
#
# cpp-tests + unit-tests + integration + mobile wait on `prebuilds-<addon>`
# so the native artifacts are available before tests run (where applicable).

permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref (branch/tag/SHA) of qvac to test. Empty = workflow's own ref."
        type: string
        required: false
      repository:
        description: "Repository to checkout. Empty = current repo."
        type: string
        required: false

jobs:
  # ---------- bci-whispercpp ----------
  prebuilds-bci-whispercpp:
    uses: ./.github/workflows/prebuilds-bci-whispercpp.yml
    with:
      ref: ${{ inputs.ref }}
      repository: ${{ inputs.repository }}
    secrets: inherit

  cpp-tests-bci-whispercpp:
    uses: ./.github/workflows/cpp-test-coverage-bci-whispercpp.yml
    with:
      ref: ${{ inputs.ref }}
      repository: ${{ inputs.repository }}
    secrets: inherit

  unit-tests-bci-whispercpp:
    needs: prebuilds-bci-whispercpp
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          repository: ${{ inputs.repository }}
          ref: ${{ inputs.ref }}
          token: ${{ secrets.PAT_TOKEN }}
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # 6.3.0
        with:
          node-version: "18.x"
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # 8.0.1
        with:
          path: packages/bci-whispercpp/prebuilds
          merge-multiple: true
      - name: Configure .npmrc
        shell: bash
        working-directory: packages/bci-whispercpp
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          : > .npmrc
          echo "registry=https://registry.npmjs.org/" >> .npmrc
          echo "@qvac:registry=https://registry.npmjs.org/" >> .npmrc
          if [ -n "${PAT_TOKEN}" ]; then
            echo "@tetherto:registry=https://npm.pkg.github.com/" >> .npmrc
            echo "//npm.pkg.github.com/:_authToken=${PAT_TOKEN}" >> .npmrc
            git config --global url."https://${PAT_TOKEN}:@github.com/".insteadOf "https://github.com/"
          fi
      - name: Install dependencies
        shell: bash
        working-directory: packages/bci-whispercpp
        run: npm install
      - name: Install bare
        shell: bash
        run: npm install -g --force bare
      - name: Run unit tests
        shell: bash
        working-directory: packages/bci-whispercpp
        run: npm run test:unit --if-present

  bci-whispercpp:
    needs: prebuilds-bci-whispercpp
    uses: ./.github/workflows/integration-test-bci-whispercpp.yml
    with:
      ref: ${{ inputs.ref }}
      repository: ${{ inputs.repository }}
    secrets: inherit

