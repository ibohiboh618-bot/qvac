name: On PR Trigger (OCR-GGML)

on:
  pull_request_target:
    types:
      - opened
      - synchronize
      - reopened
      - labeled
    branches:
      - main
      - release-*
      - feature-*
      - tmp-*
    paths:
      - "packages/ocr-ggml/**"
      - ".github/workflows/*ocr-ggml*.yml"
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read
  pull-requests: read
  packages: read
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  label-gate:
    name: Authorise (label-gate)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: write
    outputs:
      authorised: ${{ steps.gate.outputs.authorised }}
    steps:
      - name: Checkout (label-gate action only)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          ref: ${{ github.event.repository.default_branch }}
          sparse-checkout: .github/actions/label-gate
          sparse-checkout-cone-mode: false
      - name: Run label-gate
        id: gate
        uses: ./.github/actions/label-gate
        with:
          github-token: ${{ secrets.PAT_TOKEN }}

  authorize:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: write
    outputs:
      allowed: ${{ steps.auth.outputs.allowed }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
      - name: Authorize
        id: auth
        uses: ./.github/actions/authorize-pr
        with:
          github-token: ${{ github.token }}

  verify-fabric-lockstep:
    if: needs.authorize.outputs.allowed == 'true'
    needs: [authorize]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2

      - name: Verify qvac-fabric versions are lockstep
        id: lockstep
        uses: ./.github/actions/verify-qvac-fabric-lockstep

      - name: Report verified version
        run: 'echo "Verified qvac-fabric version: ${{ steps.lockstep.outputs.version }}"'

  # Gate the workflow so label events (and other PR_target quirks) don't trigger unrelated packages.
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      pkg: ${{ steps.filter.outputs.pkg }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          fetch-depth: 0

      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # 4.0.1
        id: filter
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          filters: |
            pkg:
              - "packages/ocr-ggml/**"
              - ".github/workflows/*ocr-ggml*.yml"

  sanity-checks:
    if: |-
      needs.label-gate.outputs.authorised == 'true' && ((needs.changes.outputs.pkg == 'true' && needs.authorize.outputs.allowed == 'true') || github.event_name == 'workflow_dispatch')
    needs: 
      - authorize
      - changes
      - label-gate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          fetch-depth: 0

      - name: Run Sanity checks
        uses: ./.github/actions/sanity-checks
        with:
          secret-token: ${{ secrets.GITHUB_TOKEN }}
          pat-token: ${{ secrets.PAT_TOKEN }}
          run-integration: ${{ needs.authorize.outputs.allowed == 'true' }}
          workdir: packages/ocr-ggml

      - name: Verify that yaml files are formatted
        id: yamlfmt
        uses: ./.github/actions/yamlfmt
        with:
          workdir: ${{ env.PKG_DIR }}
        continue-on-error: true

  cpp-lint:
    needs: [authorize, changes, label-gate]
    if: needs.label-gate.outputs.authorised == 'true' && (needs.authorize.outputs.allowed == 'true' || github.event_name == 'workflow_dispatch')
    uses: ./.github/workflows/cpp-lint.yaml
    secrets: inherit
    with:
      sha: ${{ github.event.pull_request.base.sha }}
      pr_head_sha: ${{ github.event.pull_request.head.sha }}
      workdir: packages/ocr-ggml

  ts-checks:
    needs: authorize
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # 6.3.0
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: packages/llm-llamacpp
        run: npm install

      - name: Type declaration check
        working-directory: packages/llm-llamacpp
        run: npm run test:dts

  prebuild:
    permissions:
      contents: write
      pull-requests: write
      packages: write
      id-token: write
    needs: [authorize, changes, label-gate]
    if: |-
      needs.label-gate.outputs.authorised == 'true' && ((needs.changes.outputs.pkg == 'true' || github.event_name == 'workflow_dispatch') && ( github.event_name == 'workflow_dispatch' || needs.authorize.outputs.allowed == 'true' ))
    uses: ./.github/workflows/prebuilds-ocr-ggml.yml
    secrets: inherit
    with:
      repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
      ref: ${{ github.event.pull_request.head.ref || github.ref }}

  run-integration-tests:
    permissions:
      contents: read
      packages: read
      id-token: write
    needs: [authorize, changes, prebuild, label-gate]
    if: |-
      needs.label-gate.outputs.authorised == 'true' && ((needs.changes.outputs.pkg == 'true' || github.event_name == 'workflow_dispatch') && ( github.event_name == 'workflow_dispatch' || needs.authorize.outputs.allowed == 'true' ))
    uses: ./.github/workflows/integration-test-ocr-ggml.yml
    secrets: inherit
    with:
      repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
      ref: ${{ github.event.pull_request.head.ref || github.ref }}

  merge-guard:
    needs: [authorize, changes, sanity-checks, prebuild, run-integration-tests, label-gate]
    if: always() && needs.label-gate.outputs.authorised == 'true' && (needs.changes.outputs.pkg == 'true' || github.event_name == 'workflow_dispatch')
    uses: ./.github/workflows/public-pr.yml
    with:
      sanity-checks-status: ${{ needs.sanity-checks.result == 'success' }}
      build-status: ${{ needs.prebuild.result == 'success' }}
      integration-tests-status: ${{ needs.run-integration-tests.result == 'success' }}
