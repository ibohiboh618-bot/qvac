# Build-only workflow. Publishing is handled by on-merge-qvac-lib-infer-nmtcpp.yml
name: Prebuilds (NMTCPP)

on:
  workflow_call:
    inputs:
      ref:
        description: "ref"
        type: string
      repository:
        type: string
        default: "tetherto/qvac"
  workflow_dispatch:

env:
  PKG_DIR: packages/qvac-lib-infer-nmtcpp

permissions:
  contents: read

jobs:
  prebuild:
    permissions:
      contents: write
      pull-requests: write
      id-token: write
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux builds on Ubuntu 22.04 for glibc compatibility
          - os: ubuntu-22.04
            platform: linux
            arch: x64
          - os: ubuntu-22.04-arm
            platform: linux
            arch: arm64
          # Android build requires Ubuntu 24.04 for NDK tooling
          - os: ubuntu-24.04
            platform: android
            arch: arm64
            flags: -D ANDROID_STL=c++_shared -D BUILD_TESTING=OFF
          - os: macos-14
            platform: darwin
            arch: x64
          - os: macos-14
            platform: darwin
            arch: arm64
          - os: macos-14
            platform: ios
            arch: arm64
            flags: -D BUILD_TESTING=OFF
          - os: macos-14
            platform: ios
            arch: arm64
            tags: -simulator
            flags: --simulator -D BUILD_TESTING=OFF
          - os: macos-14
            platform: ios
            arch: x64
            tags: -simulator
            flags: --simulator -D BUILD_TESTING=OFF
          - os: windows-2022
            platform: win32
            arch: x64

    runs-on: ${{ matrix.os }}
    environment: release
    name: ${{ matrix.platform }}-${{ matrix.arch }}${{ matrix.tags }}

    steps:
      - name: Echo workflow inputs
        shell: bash
        env:
          INPUT_REF: ${{ inputs.ref || github.ref }}
          INPUT_REPO: ${{ inputs.repository || github.repository }}
          MATRIX_PLATFORM: ${{ matrix.platform }}
          MATRIX_ARCH: ${{ matrix.arch }}
          MATRIX_TAGS: ${{ matrix.tags }}
          PKG_DIR_VAR: ${{ env.PKG_DIR }}
        run: |
          echo "Workflow inputs:"
          echo "Ref: $INPUT_REF"
          echo "Repository: $INPUT_REPO"
          echo "Matrix platform: $MATRIX_PLATFORM"
          echo "Matrix arch: $MATRIX_ARCH"
          echo "Matrix tags: $MATRIX_TAGS"
          echo "PKG_DIR: $PKG_DIR_VAR"

      - name: Setup build host
        uses: tetherto/qvac/.github/actions/setup-build-host@3d48906579d044429f42e2d1ff2cba6ec5853d91
        with:
          platform: ${{ matrix.platform }}
          arch: ${{ matrix.arch }}

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          repository: ${{ inputs.repository || github.repository }}
          ref: ${{ inputs.ref || github.ref }}
          token: ${{ secrets.PAT_TOKEN }}

      - name: Setup AWS + Windows CLI
        uses: tetherto/qvac/.github/actions/setup-aws-prebuild@0bbdca93da303a0b1634ba14a89cec085621078d
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}

      - name: Setup vcpkg
        uses: tetherto/qvac/.github/actions/setup-vcpkg@3d48906579d044429f42e2d1ff2cba6ec5853d91
        env:
          MODEL_S3_BUCKET: ${{ secrets.MODEL_S3_BUCKET }}
        with:
          platform: ${{ matrix.platform }}
          arch: ${{ matrix.arch }}

      - name: Setup Bare tooling
        uses: tetherto/qvac/.github/actions/setup-bare-tooling@0bbdca93da303a0b1634ba14a89cec085621078d

      - name: Setup Apple Clang
        uses: tetherto/qvac/.github/actions/setup-apple-clang@3d48906579d044429f42e2d1ff2cba6ec5853d91

      - name: Setup Vulkan SDK
        uses: tetherto/qvac/.github/actions/setup-vulkan-sdk@0bbdca93da303a0b1634ba14a89cec085621078d
        env:
          MODEL_S3_BUCKET: ${{ secrets.MODEL_S3_BUCKET }}
        with:
          platform: ${{ matrix.platform }}
          arch: ${{ matrix.arch }}
          aws-role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: eu-central-1

      - name: Print run state
        working-directory: ${{ env.PKG_DIR }}
        shell: bash
        run: |
          echo "node version: $(node -v)"
          echo "npm version: $(npm -v)"
          echo "bare version: $(bare -v)"
          echo "bare-make version: $(bare-make --version)"
          echo "cmake version: $(cmake --version)"
          npm list --global || true
          npm list || true
          npm list --global --depth 1 || true
          npm list --all --depth 1 || true
          echo "Environment variables:"
          env | sort
        continue-on-error: true

      - name: Configure git
        shell: bash
        run: |
          GIT_PAT="${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}"
          git config --global --add url."https://${GIT_PAT}:x-oauth-basic@github.com/".insteadOf "https://github.com/"
          git config --global --add url."https://${GIT_PAT}:x-oauth-basic@github.com/".insteadOf "git@github.com:"
          git config --global --add url."https://${GIT_PAT}:x-oauth-basic@github.com/".insteadOf "ssh://git@github.com/"

      - name: Install dependencies
        working-directory: ${{ env.PKG_DIR }}
        shell: bash
        run: npm install

      - name: Create config.cmake for Bergamot backend
        working-directory: ${{ env.PKG_DIR }}
        shell: bash
        run: |
          echo "set(USE_BERGAMOT ON CACHE BOOL \"Enable Bergamot backend support\" FORCE)" > config.cmake
          # Enable intgemm ONLY for x86/x64 platforms (intgemm requires x86 SIMD instructions)
          # ARM platforms (darwin-arm64, ios-arm64, android-arm64) should NOT enable intgemm
          if [[ "${{ matrix.platform }}" == "linux" || "${{ matrix.platform }}" == "win32" ]] && [[ "${{ matrix.arch }}" == "x64" || "${{ matrix.arch }}" == "x86" ]]; then
            echo "set(USE_INTGEMM ON CACHE BOOL \"Use INTGEMM for int8 quantized models\" FORCE)" >> config.cmake
          fi
          # For x86/x64 platforms, set BUILD_ARCH explicitly instead of using 'native':
          # - Linux x64: use x86-64-v2 (SSE4.2) for binary compatibility across runners
          # - darwin-x64 & ios-x64-simulator: use x86-64-v2 to avoid 'apple-m1' errors when
          #   cross-compiling x86_64 on ARM64 hosts (macos-14 runners). 'native' would expand
          #   to 'apple-m1' which is not a valid x86_64 CPU target.
          if [[ "${{ matrix.arch }}" == "x64" && ("${{ matrix.platform }}" == "linux" || "${{ matrix.platform }}" == "darwin" || "${{ matrix.platform }}" == "ios") ]]; then
            echo "set(BUILD_ARCH x86-64-v2 CACHE STRING \"Target CPU architecture\" FORCE)" >> config.cmake
          fi
          # For ARM64 platforms, explicitly set BUILD_ARCH to armv8-a to prevent x86 arch being used
          if [[ "${{ matrix.arch }}" == "arm64" && "${{ matrix.platform }}" == "linux" ]]; then
            echo "set(BUILD_ARCH armv8-a CACHE STRING \"Target CPU architecture\" FORCE)" >> config.cmake
          fi
          echo "Configuration created:"
          cat config.cmake

      - name: Run bare-make generate
        working-directory: ${{ env.PKG_DIR }}
        run: bare-make generate --platform ${{ matrix.platform }} --arch ${{ matrix.arch }} ${{ matrix.flags }}

      - name: Run bare-make build
        working-directory: ${{ env.PKG_DIR }}
        shell: bash
        run: bare-make build

      - name: Run bare-make install
        working-directory: ${{ env.PKG_DIR }}
        shell: bash
        run: bare-make install

      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # 7.0.0
        with:
          name: ${{ matrix.platform }}-${{ matrix.arch }}${{ matrix.tags }}
          path: ${{ env.PKG_DIR }}/prebuilds/*

  merge:
    runs-on: ubuntu-latest
    needs: prebuild
    permissions:
      contents: write
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # 8.0.1
        with:
          path: prebuilds
          merge-multiple: true

      - name: Upload merged artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # 7.0.0
        with:
          name: prebuilds
          path: prebuilds
