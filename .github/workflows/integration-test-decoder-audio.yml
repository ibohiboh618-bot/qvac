name: Integration Tests (Decoder-audio)

on:
    workflow_call:
        inputs:
            ref:
                description: "ref"
                type: string
            repository:
                type: string
            workdir:
                description: "Working directory inside the repo (monorepo package path)"
                type: string
                required: false
                default: "packages/decoder-audio"

jobs:
    run-integration-tests:
        runs-on: ${{ matrix.runner || matrix.os }}
        environment: release
        name: test-${{ matrix.platform }}-${{ matrix.arch }}
        permissions:
            contents: read
            packages: read
        strategy:
            fail-fast: false
            matrix:
                include:
                    - os: ubuntu-22.04
                      platform: linux
                      arch: x64
                      runner: qvac-ubuntu2204-x64-gpu
                    - os: ubuntu-24.04
                      platform: linux
                      arch: x64
                      runner: qvac-ubuntu2404-x64-gpu
                    - os: ubuntu-24.04-arm
                      platform: linux
                      arch: arm64
                    - os: macos-15-large
                      platform: darwin
                      arch: x64
                    - os: macos-14
                      platform: darwin
                      arch: arm64
                    - os: windows-2025
                      platform: win32
                      arch: x64
                      runner: qvac-win25-x64-gpu

        steps:
            - name: Manual Workspace Cleanup
              if: runner.environment != 'github-hosted'
              shell: bash
              run: rm -rf "$GITHUB_WORKSPACE" && mkdir -p "$GITHUB_WORKSPACE"

            - name: Checkout code
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
              with:
                  repository: ${{ inputs.repository || github.repository }}
                  ref: ${{ inputs.ref || github.ref }}
                  token: ${{ secrets.PAT_TOKEN }}

            # decoder-audio relies on bare-ffmpeg's prebuilds, not its own, so no
            # resolve-prebuilds step is needed.
            - name: Bootstrap
              uses: ./.github/actions/run-desktop-integration-tests/bootstrap

            - name: Install NPM dependencies
              working-directory: ${{ inputs.workdir }}
              shell: bash
              run: npm install

            - name: Run integration test
              working-directory: ${{ inputs.workdir }}
              timeout-minutes: 10
              run: npm run test:integration
              env:
                  QASE_API_TOKEN: ${{ secrets.QASE_API_TOKEN }}
