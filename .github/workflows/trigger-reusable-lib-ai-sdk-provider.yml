name: General CI/CD (ai-sdk-provider)

on:
  push:
    branches:
      - main
      - release-*
      - feature-*
      - tmp-*
    paths:
      - "packages/ai-sdk-provider/**"
      - ".github/workflows/trigger-reusable-lib-ai-sdk-provider.yml"
  workflow_dispatch:
    inputs:
      npm_tag:
        description: "Optional npm dist-tag override for release branches"
        required: false
        type: string

permissions:
  contents: read

env:
  WORKDIR: packages/ai-sdk-provider

jobs:
  label-gate:
    name: Authorise (label-gate)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    outputs:
      authorised: ${{ steps.gate.outputs.authorised }}
    steps:
      - name: Checkout (label-gate action only)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # 7.0.0
        with:
          ref: ${{ github.event.repository.default_branch }}
          sparse-checkout: .github/actions/label-gate
          sparse-checkout-cone-mode: false

      - name: Run label-gate
        id: gate
        uses: ./.github/actions/label-gate
        with:
          github-token: ${{ secrets.PAT_TOKEN }}

  release-merge-guard:
    name: Release Merge Guard
    if: >-
      github.event_name == 'push' && startsWith(github.ref_name, 'release-')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # 7.0.0
        with:
          fetch-depth: 0

      - uses: ./.github/actions/release-merge-guard
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          base-ref: ${{ github.ref_name }}
          base-sha: ${{ github.event.before }}
          head-sha: ${{ github.sha }}
          package-slug: ai-sdk-provider
          package-json-path: packages/ai-sdk-provider/package.json
          changelog-path: packages/ai-sdk-provider/CHANGELOG.md

  publish-logic:
    runs-on: ubuntu-latest
    outputs:
      publish_main: ${{ steps.logic.outputs.publish_main }}
      publish_release: ${{ steps.logic.outputs.publish_release }}
      publish_feature: ${{ steps.logic.outputs.publish_feature }}
      publish_tmp: ${{ steps.logic.outputs.publish_tmp }}
      gpr_tag: ${{ steps.logic.outputs.gpr_tag }}
    steps:
      - id: logic
        uses: tetherto/qvac-actions/npm-publish-logic@38693d9315c5fb6bba1354d8d1ef9823bf6c10a3 # 0.1.0

  build:
    name: Build package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # 7.0.0

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # 2.2.0
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: ${{ env.WORKDIR }}
        run: bun install

      - name: Run checks
        working-directory: ${{ env.WORKDIR }}
        run: npm run check

      - name: Run tests
        working-directory: ${{ env.WORKDIR }}
        run: npm run test:unit

      - name: Build package
        working-directory: ${{ env.WORKDIR }}
        run: npm run build

      - name: Upload package dist
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # 7.0.1
        with:
          name: ai-sdk-provider-dist
          path: packages/ai-sdk-provider/dist
          if-no-files-found: error
          retention-days: 30

  publish-main-gpr-dev:
    needs:
      - publish-logic
      - label-gate
      - build
    if: needs.label-gate.outputs.authorised == 'true' && needs.publish-logic.outputs.publish_main == 'true'
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # 7.0.0

      - name: Download package dist
        uses: ./.github/actions/download-release-artifact
        with:
          name: ai-sdk-provider-dist
          path: packages/ai-sdk-provider/dist

      - name: Publish to GitHub Packages (dev)
        uses: ./.github/actions/publish-library-to-gpr
        with:
          secret-token: ${{ secrets.GITHUB_TOKEN }}
          npm-token: ${{ secrets.NPM_TOKEN }}
          tag: ${{ needs.publish-logic.outputs.gpr_tag }}
          workdir: packages/ai-sdk-provider
          name-suffix: "-mono"

  publish-release-npm:
    needs:
      - publish-logic
      - release-merge-guard
      - label-gate
      - build
    if: |-
      needs.label-gate.outputs.authorised == 'true' && (always() && needs.publish-logic.outputs.publish_release == 'true' && (needs.release-merge-guard.result == 'success' || needs.release-merge-guard.result == 'skipped'))
    runs-on: ubuntu-latest
    environment: npm
    outputs:
      published_version: ${{ steps.publish-npm.outputs.npm_published_version }}
    permissions:
      contents: write
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # 7.0.0
        with:
          fetch-depth: 0

      - name: Download package dist
        uses: ./.github/actions/download-release-artifact
        with:
          name: ai-sdk-provider-dist
          path: packages/ai-sdk-provider/dist

      - name: Determine dist-tag
        id: dist-tag
        uses: tetherto/qvac-actions/npm-dist-tag-determination@38693d9315c5fb6bba1354d8d1ef9823bf6c10a3 # 0.1.0
        with:
          workdir: packages/ai-sdk-provider
          tag: ${{ inputs.npm_tag }}

      - name: Publish to NPM
        id: publish-npm
        uses: tetherto/qvac-actions/publish-library-to-npm@38693d9315c5fb6bba1354d8d1ef9823bf6c10a3 # 0.1.0
        with:
          tag: ${{ steps.dist-tag.outputs.tag }}
          workdir: packages/ai-sdk-provider

  # Tag the published version (no GitHub Release; SDK-only releases policy)
  create-tag:
    needs: [publish-release-npm]
    if: needs.publish-release-npm.result == 'success' && needs.publish-release-npm.outputs.published_version != ''
    permissions:
      contents: write
    uses: ./.github/workflows/create-release-tag.yml
    with:
      repo_name: "ai-sdk-provider"
      published_version: ${{ needs.publish-release-npm.outputs.published_version }}

  publish-feature-gpr:
    needs:
      - publish-logic
      - label-gate
      - build
    if: needs.label-gate.outputs.authorised == 'true' && needs.publish-logic.outputs.publish_feature == 'true'
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # 7.0.0

      - name: Download package dist
        uses: ./.github/actions/download-release-artifact
        with:
          name: ai-sdk-provider-dist
          path: packages/ai-sdk-provider/dist

      - name: Publish to GitHub Packages (feature)
        uses: ./.github/actions/publish-library-to-gpr
        with:
          secret-token: ${{ secrets.GITHUB_TOKEN }}
          npm-token: ${{ secrets.NPM_TOKEN }}
          tag: ${{ needs.publish-logic.outputs.gpr_tag }}
          workdir: packages/ai-sdk-provider
          name-suffix: "-mono"

  publish-tmp-gpr:
    needs:
      - publish-logic
      - label-gate
      - build
    if: needs.label-gate.outputs.authorised == 'true' && needs.publish-logic.outputs.publish_tmp == 'true'
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # 7.0.0

      - name: Download package dist
        uses: ./.github/actions/download-release-artifact
        with:
          name: ai-sdk-provider-dist
          path: packages/ai-sdk-provider/dist

      - name: Publish to GitHub Packages (tmp)
        uses: ./.github/actions/publish-library-to-gpr
        with:
          secret-token: ${{ secrets.GITHUB_TOKEN }}
          npm-token: ${{ secrets.NPM_TOKEN }}
          tag: ${{ needs.publish-logic.outputs.gpr_tag }}
          workdir: packages/ai-sdk-provider
          name-suffix: "-mono"
