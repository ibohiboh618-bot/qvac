name: Integration Tests (LLM)

on:
    workflow_call:
        inputs:
            ref:
                description: "ref"
                type: string
            repository:
                type: string
            model:
                type: string
            qvac_perf_runs:
                description: "Override QVAC_PERF_RUNS (number of counted iterations per perf test). Empty = test default."
                type: string
                required: false
                default: ""
            qvac_perf_warmup_runs:
                description: "Override QVAC_PERF_WARMUP_RUNS (number of warmup iterations per perf test). Empty = test default."
                type: string
                required: false
                default: ""
            qvac_perf_only:
                description: "If true, run only the perf-emitting tests (image-elephant, image-fruit-plate, image-high-res-aurora, bitnet, tool-calling)."
                type: boolean
                required: false
                default: false

    workflow_dispatch:
        inputs:
            ref:
                description: "Git ref (branch/tag/SHA) to test"
                type: string
                required: false
                default: main
            prebuild_package:
                description: "NPM package containing prebuilds (e.g. @qvac/llm-llamacpp@1.0.0)"
                type: string
                required: true
            qvac_perf_runs:
                description: "Override QVAC_PERF_RUNS (number of counted iterations per perf test). Empty = test default."
                type: string
                required: false
                default: ""
            qvac_perf_warmup_runs:
                description: "Override QVAC_PERF_WARMUP_RUNS (number of warmup iterations per perf test). Empty = test default."
                type: string
                required: false
                default: ""
            qvac_perf_only:
                description: "If true, run only the perf-emitting tests."
                type: boolean
                required: false
                default: false

jobs:
    run-integration-tests:
        timeout-minutes: ${{ matrix.timeout_minutes || 360 }}
        continue-on-error: true
        runs-on: ${{ matrix.runner }}
        environment: release
        name: test-${{ matrix.platform }}-${{ matrix.arch }}
        env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
            WORKDIR: packages/llm-llamacpp
            NO_GPU: ${{ matrix.no_gpu || 'false' }}
        permissions:
            contents: read
            packages: read
            id-token: write
        strategy:
            fail-fast: false
            matrix:
                # QVAC-17830: `label` disambiguates matrix entries that share
                # the same `<platform>-<arch>` tuple so every entry produces a
                # uniquely-named perf-report artifact. Without this, the two
                # `linux-x64` entries (CPU-only vs GPU runner) and the two
                # `linux-arm64` entries (ubuntu 22 vs 24) collided on upload
                # and `actions/download-artifact` silently dropped one of each,
                # hiding GPU data in the combined report.
                include:
                    - os: ubuntu-22.04
                      platform: linux
                      arch: x64
                      runner: qvac-ubuntu2204-x64
                      no_gpu: "true"
                      label: linux-x64-cpu
                    - os: ubuntu-24.04
                      platform: linux
                      arch: x64
                      runner: qvac-ubuntu2404-x64-gpu
                      timeout_minutes: 480
                      label: linux-x64-gpu
                    - os: ubuntu-24.04-arm
                      platform: linux
                      arch: arm64
                      runner: ubuntu-24.04-arm
                      no_gpu: "true"
                      label: linux-arm64-u24
                    - os: ubuntu-22.04-arm
                      platform: linux
                      arch: arm64
                      runner: ubuntu-22.04-arm
                      no_gpu: "true"
                      label: linux-arm64-u22
                    - os: macos-15-xlarge
                      platform: darwin
                      arch: arm64
                      runner: macos-15-xlarge
                      label: darwin-arm64
                    - os: macos-15-large
                      platform: darwin
                      arch: x64
                      runner: macos-15-large
                      label: darwin-x64
                    - os: windows-2025
                      platform: win32
                      arch: x64
                      runner: qvac-win25-x64-gpu
                      label: win32-x64

        steps:
            - name: Windows - configure git
              if: ${{ matrix.platform == 'win32' }}
              run: |
                  # git config --system core.longpaths true
                  git config --global url."https://${{ secrets.PAT_TOKEN }}:@github.com/".insteadOf "https://github.com/"
                  git config --global url."https://${{ secrets.PAT_TOKEN }}:@github.com/".insteadOf "git@github.com:"
              shell: powershell

            - name: Bootstrap
              uses: ./.github/actions/run-desktop-integration-tests/bootstrap
              with:
                  runner: ${{ matrix.runner }}
                  repository: ${{ inputs.repository }}
                  ref: ${{ inputs.ref }}
                  pat-token: ${{ secrets.PAT_TOKEN }}
                  bare-packages: bare bare-make bare-runtime bare-https brittle

            - name: Cache integration test models
              id: model-cache
              if: startsWith(matrix.runner, 'qvac-')
              uses: ./.github/actions/cache-models
              with:
                  package: llm-llamacpp

            - name: Configure AWS credentials via OIDC
              uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # 6.0.0
              with:
                  role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
                  aws-region: eu-central-1

            - name: Install NPM dependencies
              working-directory: ${{ env.WORKDIR }}
              shell: bash
              run: npm install

            - name: Resolve prebuilds
              uses: ./.github/actions/run-desktop-integration-tests/resolve-prebuilds
              with:
                  platform: ${{ matrix.platform }}
                  workdir: ${{ env.WORKDIR }}
                  prebuild-package: ${{ inputs.prebuild_package }}

            - name: Install system dependencies
              uses: ./.github/actions/run-desktop-integration-tests/install-system-deps
              with:
                  platform: ${{ matrix.platform }}
                  arch: ${{ matrix.arch }}
                  os: ${{ matrix.os }}

            - name: Run integration test (Linux/macOS)
              if: ${{ matrix.platform != 'win32' }}
              working-directory: ${{ env.WORKDIR }}
              run: |
                  if [ "${{ inputs.qvac_perf_only }}" = "true" ]; then
                    echo "qvac_perf_only=true: regenerating test/integration/all.js with perf-emitting tests only"
                    npx brittle -r test/integration/all.js \
                      test/integration/bitnet.test.js \
                      test/integration/tool-calling.test.js \
                      test/integration/image-elephant.test.js \
                      test/integration/image-fruit-plate.test.js \
                      test/integration/image-high-res-aurora.test.js
                    bare test/integration/all.js --exit 2>&1 | tee test-output.log
                    exit ${PIPESTATUS[0]}
                  fi
                  npm run test:integration 2>&1 | tee test-output.log
                  exit ${PIPESTATUS[0]}
              shell: bash
              env:
                  QASE_API_TOKEN: ${{ secrets.QASE_API_TOKEN }}
                  QVAC_PERF_RUNS: ${{ inputs.qvac_perf_runs }}
                  QVAC_PERF_WARMUP_RUNS: ${{ inputs.qvac_perf_warmup_runs }}

            - name: Run integration test (Windows)
              if: ${{ matrix.platform == 'win32' }}
              working-directory: ${{ env.WORKDIR }}
              run: |
                  if ("${{ inputs.qvac_perf_only }}" -eq "true") {
                    Write-Host "qvac_perf_only=true: regenerating test/integration/all.js with perf-emitting tests only"
                    npx brittle -r test/integration/all.js `
                      test/integration/bitnet.test.js `
                      test/integration/tool-calling.test.js `
                      test/integration/image-elephant.test.js `
                      test/integration/image-fruit-plate.test.js `
                      test/integration/image-high-res-aurora.test.js
                  } else {
                    npm run test:integration:generate
                  }
                  bare test/integration/all.js --exit | Tee-Object test-output.log
              shell: powershell
              env:
                  QASE_API_TOKEN: ${{ secrets.QASE_API_TOKEN }}
                  QVAC_PERF_RUNS: ${{ inputs.qvac_perf_runs }}
                  QVAC_PERF_WARMUP_RUNS: ${{ inputs.qvac_perf_warmup_runs }}

            # Label-based artifact name (two matrix entries share the same
            # platform-arch tuple — see the matrix `label` comment above), supplied
            # via the composite's artifact-name override.
            - name: Collect performance report
              if: ${{ always() && !cancelled() }}
              uses: ./.github/actions/run-desktop-integration-tests/collect-perf-report
              with:
                  workdir: ${{ env.WORKDIR }}
                  artifact-name: perf-report-llamacpp-llm-${{ matrix.label }}-${{ github.run_number }}
                  retention-days: "90"
