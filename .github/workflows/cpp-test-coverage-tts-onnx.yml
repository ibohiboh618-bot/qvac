name: CPP Tests (TTS)

on:
  push:
    branches: [main, "release-*"]
    paths:
      - "packages/tts-onnx/**"

  workflow_call:
    inputs:
      ref:
        description: "Git ref/sha to checkout"
        required: false
        type: string
      repository:
        description: "owner/repo to checkout"
        required: false
        type: string
      workdir:
        description: "Package working directory in monorepo"
        required: false
        type: string
        default: "packages/tts-onnx"

  workflow_dispatch:
    inputs:
      workdir:
        description: "Package working directory in monorepo"
        required: false
        type: string
        default: "packages/tts-onnx"
      ref:
        description: "Optional ref/sha override"
        required: false
        type: string

env:
  BUILD_TYPE: Debug
  ENABLE_COVERAGE: ON

jobs:
  cpp-tests:
    runs-on: ${{ matrix.runner || matrix.os }}
    environment: release
    name: ${{ matrix.platform }}-${{ matrix.arch }}-cpp-tests
    permissions:
      contents: read
      id-token: write
      checks: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            platform: linux
            arch: x64
            runner: qvac-ubuntu2204-x64
            coverage: true

    env:
      VCPKG_BINARY_SOURCES: "clear;files,${{ github.workspace }}/vcpkg/cache,readwrite"
      WORKDIR: ${{ inputs.workdir || github.event.inputs.workdir || 'packages/tts-onnx' }}

    steps:
      - name: Manual Workspace Cleanup
        run: rm -rf "$GITHUB_WORKSPACE" && mkdir -p "$GITHUB_WORKSPACE"
        shell: bash
        working-directory: .
        if: runner.environment != 'github-hosted'
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # 7.0.0
        with:
          repository: ${{ inputs.repository || github.repository }}
          ref: ${{ inputs.ref || github.event.inputs.ref || github.event.pull_request.head.sha || github.sha }}
          token: ${{ secrets.PAT_TOKEN }}
          lfs: true
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # 6.4.0
        with:
          node-version: lts/*

      - name: Install bare tooling
        run: npm install -g --force bare bare-make

      - name: Install NPM dependencies
        working-directory: ${{ env.WORKDIR }}
        run: |
          npm install

      - if: ${{ matrix.os == 'ubuntu-22.04' }}
        name: Configure vcpkg in linux
        run: echo "VCPKG_ROOT=$VCPKG_INSTALLATION_ROOT" >> $GITHUB_ENV

      - name: Cleanup vcpkg
        shell: bash
        run: |
          rm -rf $VCPKG_ROOT/buildtrees/*
          rm -rf $VCPKG_ROOT/packages/*

      - name: Generate and build unit tests
        working-directory: ${{ env.WORKDIR }}
        run: |
          npm run coverage:cpp:build

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@254c19bd240aabef8777f48595e9d2d7b972184b # 6.2.1
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: eu-central-1

      - name: Ensure TTS models for integration tests
        working-directory: ${{ env.WORKDIR }}
        run: npm run models:ensure

      - name: Run C++ Unit Tests
        id: cpp_tests
        working-directory: ${{ env.WORKDIR }}
        run: |
          npm run coverage:cpp:run
        continue-on-error: true

      - name: Check if test results exist
        id: check-test-results
        working-directory: ${{ env.WORKDIR }}
        run: |
          if [ -f build/addon/test/unit/cpp-test-results.xml ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi
        continue-on-error: true

      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@d0a4676d0e0b938bc201470d88276b7c74c712b3 # 2.24.0
        if: always() && steps.check-test-results.outputs.exists == 'true'
        with:
          files: ${{ env.WORKDIR }}/build/addon/test/unit/cpp-test-results.xml
          comment_mode: off
          check_name: "C++ Test Results (${{ matrix.platform }}-${{ matrix.arch }})"

      - name: Generate Coverage Report
        if: ${{ matrix.coverage }}
        working-directory: ${{ env.WORKDIR }}
        run: |
          npm run coverage:cpp:report
          COVERAGE=$(grep 'TOTAL' build/addon/test/unit/coverage-summary.txt | awk '{print $10}')
          echo "LINE_COVERAGE_PERCENTAGE=${COVERAGE}" >> $GITHUB_ENV
          echo "Line Coverage: ${COVERAGE}" > coverage-badge.txt

      - name: Archive Coverage Results
        if: ${{ matrix.coverage }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # 7.0.1
        with:
          name: coverage-report-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            ${{ env.WORKDIR }}/build/addon/test/unit/coverage-html/
            ${{ env.WORKDIR }}/build/addon/test/unit/lcov.info
            ${{ env.WORKDIR }}/build/addon/test/unit/coverage-summary.txt
            ${{ env.WORKDIR }}/build/addon/test/unit/cpp-test-results.xml
          retention-days: 30

      - name: Coverage Summary
        if: ${{ matrix.coverage }}
        working-directory: ${{ env.WORKDIR }}
        run: |
          echo "## 🎯 Coverage Summary" >> $GITHUB_STEP_SUMMARY
          echo "**Platform:** ${{ matrix.platform }}-${{ matrix.arch }}" >> $GITHUB_STEP_SUMMARY
          echo "**Coverage:** ${{ env.LINE_COVERAGE_PERCENTAGE }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f build/addon/test/unit/coverage-summary.txt ]; then
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            cat build/addon/test/unit/coverage-summary.txt >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          fi

  coverage-report:
    permissions:
      contents: read
      actions: read
    needs: cpp-tests
    runs-on: ubuntu-latest
    if: ${{ always() }}
    steps:
      - name: Download all coverage reports
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # 8.0.1
        with:
          path: coverage-reports

      - name: Combine Coverage Reports
        run: |
          echo "## 📊 C++ Comprehensive Code Coverage Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Built on:** Professional test foundation" >> $GITHUB_STEP_SUMMARY
          echo "**Test Suite:** 100+ comprehensive test cases" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          for report in coverage-reports/*/coverage-summary.txt; do
            if [ -f "$report" ]; then
              platform=$(basename $(dirname "$report"))
              echo "### $platform" >> $GITHUB_STEP_SUMMARY
              echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
              cat "$report" >> $GITHUB_STEP_SUMMARY
              echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
            fi
          done
