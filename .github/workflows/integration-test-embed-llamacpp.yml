name: Integration Tests (EMBED)

on:
  workflow_call:
    inputs:
      ref:
        description: "ref"
        type: string
      repository:
        type: string
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref (branch/tag/SHA) to test"
        type: string
        required: false
        default: main
      prebuild_package:
        description: "NPM package containing prebuilds (e.g. @qvac/embed-llamacpp@1.0.0)"
        type: string
        required: true

jobs:
  run-integration-tests:
    runs-on: ${{ matrix.runner || matrix.os }}
    environment: release
    name: ${{ matrix.platform }}-${{ matrix.arch }}-integration-tests
    permissions:
      contents: read
      packages: read

    env:
      WORKDIR: packages/embed-llamacpp

    strategy:
      fail-fast: false
      matrix:
        include:
          # Run Linux x64 tests on both Ubuntu 22.04 and 24.04 to ensure compatibility
          - os: ubuntu-22.04
            platform: linux
            arch: x64
            runner: qvac-ubuntu2204-x64-gpu
          - os: ubuntu-24.04
            platform: linux
            arch: x64
            runner: qvac-ubuntu2404-x64-gpu
          - os: ubuntu-22.04-arm
            platform: linux
            arch: arm64
            runner: ubuntu-22.04-arm
          - os: ubuntu-24.04-arm
            platform: linux
            arch: arm64
            runner: ubuntu-24.04-arm
          - os: macos-15-xlarge
            platform: darwin
            arch: arm64
          - os: macos-15-large
            platform: darwin
            arch: x64
          - os: windows-2025
            platform: win32
            arch: x64
            runner: qvac-win25-x64-gpu

    steps:
      - name: Bootstrap
        uses: ./.github/actions/run-desktop-integration-tests/bootstrap
        with:
          runner: ${{ matrix.runner }}
          repository: ${{ inputs.repository }}
          ref: ${{ inputs.ref }}
          pat-token: ${{ secrets.PAT_TOKEN }}

      - name: Cache integration test models
        id: model-cache
        if: startsWith(matrix.runner, 'qvac-')
        uses: ./.github/actions/cache-models
        with:
          package: embed-llamacpp

      - name: Install NPM dependencies
        working-directory: ${{ env.WORKDIR }}
        shell: bash
        run: npm install

      - name: Resolve prebuilds
        uses: ./.github/actions/run-desktop-integration-tests/resolve-prebuilds
        with:
          platform: ${{ matrix.platform }}
          workdir: ${{ env.WORKDIR }}
          prebuild-package: ${{ inputs.prebuild_package }}

      - name: Install system dependencies
        uses: ./.github/actions/run-desktop-integration-tests/install-system-deps
        with:
          platform: ${{ matrix.platform }}
          arch: ${{ matrix.arch }}
          os: ${{ matrix.os }}

      - name: Install gh cli for arm64 based ubuntu images
        if: matrix.os == 'ubuntu-22.04-arm' || matrix.os == 'ubuntu-24.04-arm'
        shell: bash
        run: |
          (type -p wget >/dev/null || (sudo apt update && sudo apt-get install wget -y)) \
            && sudo mkdir -p -m 755 /etc/apt/keyrings \
                  && out=$(mktemp) && wget -nv -O$out https://cli.github.com/packages/githubcli-archive-keyring.gpg \
                  && cat $out | sudo tee /etc/apt/keyrings/githubcli-archive-keyring.gpg > /dev/null \
            && sudo chmod go+r /etc/apt/keyrings/githubcli-archive-keyring.gpg \
            && echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null \
            && sudo apt update \
            && sudo apt install gh -y
          gh --version
        continue-on-error: true

      - name: Run integration test
        working-directory: ${{ env.WORKDIR }}
        run: npm run test:integration ${{ matrix.platform }}-${{ matrix.arch }}
