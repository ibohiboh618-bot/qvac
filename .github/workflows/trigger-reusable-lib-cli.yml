name: General CI/CD (cli)

on:
  push:
    branches:
      - main
      - release-*
      - feature-*
      - tmp-*
    paths:
      - "packages/cli/**"
  workflow_dispatch:
    inputs:
      custom_input_1:
        required: false
        type: string
      custom_input_2:
        required: false
        type: string
      custom_input_3:
        required: false
        type: string
      npm_tag:
        description: "NPM dist-tag (default: latest). e.g. release-1.x"
        required: false
        default: ""
        type: string

env:
  WORKDIR: packages/cli

permissions:
  contents: read

jobs:
  label-gate:
    name: Authorise (label-gate)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    outputs:
      authorised: ${{ steps.gate.outputs.authorised }}
    steps:
      - name: Checkout (label-gate action only)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # 7.0.0
        with:
          ref: ${{ github.event.repository.default_branch }}
          sparse-checkout: .github/actions/label-gate
          sparse-checkout-cone-mode: false
      - name: Run label-gate
        id: gate
        uses: ./.github/actions/label-gate
        with:
          github-token: ${{ secrets.PAT_TOKEN }}
  release-merge-guard:
    name: Release Merge Guard
    if: >-
      github.event_name == 'push' && startsWith(github.ref_name, 'release-')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # 7.0.0
        with:
          fetch-depth: 0
      - uses: ./.github/actions/release-merge-guard
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          base-ref: ${{ github.ref_name }}
          base-sha: ${{ github.event.before }}
          head-sha: ${{ github.sha }}
          package-slug: cli
          package-json-path: packages/cli/package.json
          changelog-path: packages/cli/CHANGELOG.md

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # 7.0.0

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # 6.4.0
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install
        working-directory: ${{ env.WORKDIR }}

      - name: Run checks
        run: npm run check
        working-directory: ${{ env.WORKDIR }}

      - name: Build
        run: npm run build
        working-directory: ${{ env.WORKDIR }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # 7.0.1
        with:
          name: cli-dist
          path: ${{ env.WORKDIR }}/dist/
          retention-days: 30

  publish-logic:
    runs-on: ubuntu-latest
    outputs:
      publish_main: ${{ steps.logic.outputs.publish_main }}
      publish_release: ${{ steps.logic.outputs.publish_release }}
      publish_feature: ${{ steps.logic.outputs.publish_feature }}
      publish_tmp: ${{ steps.logic.outputs.publish_tmp }}
      gpr_tag: ${{ steps.logic.outputs.gpr_tag }}
    steps:
      - id: logic
        uses: tetherto/qvac-actions/npm-publish-logic@38693d9315c5fb6bba1354d8d1ef9823bf6c10a3 # 0.1.0

  publish-main-gpr-dev:
    needs:
      - build
      - publish-logic
      - label-gate
    if: needs.label-gate.outputs.authorised == 'true' && (needs.publish-logic.outputs.publish_main == 'true')
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # 7.0.0
        with:
          fetch-depth: 0

      - name: Download build artifacts
        uses: ./.github/actions/download-release-artifact
        with:
          name: cli-dist
          path: ${{ env.WORKDIR }}/dist/

      - name: Rewrite SDK scope for GPR
        uses: ./.github/actions/cli-rewrite-sdk-scope-for-gpr

      - name: Publish to GitHub Packages (dev)
        uses: ./.github/actions/publish-library-to-gpr
        with:
          secret-token: ${{ secrets.GITHUB_TOKEN }}
          npm-token: ${{ secrets.NPM_TOKEN }}
          tag: ${{ needs.publish-logic.outputs.gpr_tag }}
          workdir: packages/cli
          name-suffix: "-mono"

  publish-release-npm:
    needs:
      - build
      - publish-logic
      - release-merge-guard
      - label-gate
    if: >-
      needs.label-gate.outputs.authorised == 'true' && (needs.publish-logic.outputs.publish_release == 'true' && (needs.release-merge-guard.result == 'success' || needs.release-merge-guard.result == 'skipped'))
    runs-on: ubuntu-latest
    environment: npm
    outputs:
      published_version: ${{ steps.publish.outputs.npm_published_version }}
    permissions:
      contents: write
      packages: write
      id-token: write
    steps:
      - name: Validate npm_tag input
        if: inputs.npm_tag != ''
        shell: bash
        run: |
          tag="${{ inputs.npm_tag }}"
          if ! echo "$tag" | grep -qE '^[a-zA-Z0-9][a-zA-Z0-9._-]*$'; then
            echo "::error::Invalid npm dist-tag '$tag'. Must match ^[a-zA-Z0-9][a-zA-Z0-9._-]*$ (e.g. release-1.x)"
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # 7.0.0

      - name: Download build artifacts
        uses: ./.github/actions/download-release-artifact
        with:
          name: cli-dist
          path: ${{ env.WORKDIR }}/dist/

      - name: Determine dist-tag
        id: dist-tag
        uses: tetherto/qvac-actions/npm-dist-tag-determination@38693d9315c5fb6bba1354d8d1ef9823bf6c10a3 # 0.1.0
        with:
          workdir: ${{ env.WORKDIR }}
          tag: ${{ inputs.npm_tag }}

      - name: Publish to NPM
        id: publish
        uses: tetherto/qvac-actions/publish-library-to-npm@38693d9315c5fb6bba1354d8d1ef9823bf6c10a3 # 0.1.0
        with:
          tag: ${{ steps.dist-tag.outputs.tag }}
          workdir: ${{ env.WORKDIR }}

  # Tag the published version (no GitHub Release; SDK-only releases policy)
  create-tag:
    needs: [publish-release-npm]
    if: needs.publish-release-npm.result == 'success' && needs.publish-release-npm.outputs.published_version != ''
    permissions:
      contents: write
    uses: ./.github/workflows/create-release-tag.yml
    with:
      repo_name: "cli"
      published_version: ${{ needs.publish-release-npm.outputs.published_version }}

  publish-feature-gpr:
    needs:
      - build
      - publish-logic
      - label-gate
    if: needs.label-gate.outputs.authorised == 'true' && (needs.publish-logic.outputs.publish_feature == 'true')
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # 7.0.0
        with:
          fetch-depth: 0

      - name: Download build artifacts
        uses: ./.github/actions/download-release-artifact
        with:
          name: cli-dist
          path: ${{ env.WORKDIR }}/dist/

      - name: Rewrite SDK scope for GPR
        uses: ./.github/actions/cli-rewrite-sdk-scope-for-gpr

      - name: Publish to GitHub Packages (feature)
        uses: ./.github/actions/publish-library-to-gpr
        with:
          secret-token: ${{ secrets.GITHUB_TOKEN }}
          npm-token: ${{ secrets.NPM_TOKEN }}
          tag: ${{ needs.publish-logic.outputs.gpr_tag }}
          workdir: packages/cli
          name-suffix: "-mono"

  publish-tmp-gpr:
    needs:
      - build
      - publish-logic
      - label-gate
    if: needs.label-gate.outputs.authorised == 'true' && (needs.publish-logic.outputs.publish_tmp == 'true')
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # 7.0.0
        with:
          fetch-depth: 0

      - name: Download build artifacts
        uses: ./.github/actions/download-release-artifact
        with:
          name: cli-dist
          path: ${{ env.WORKDIR }}/dist/

      - name: Rewrite SDK scope for GPR
        uses: ./.github/actions/cli-rewrite-sdk-scope-for-gpr

      - name: Publish to GitHub Packages (tmp)
        uses: ./.github/actions/publish-library-to-gpr
        with:
          secret-token: ${{ secrets.GITHUB_TOKEN }}
          npm-token: ${{ secrets.NPM_TOKEN }}
          tag: ${{ needs.publish-logic.outputs.gpr_tag }}
          workdir: packages/cli
          name-suffix: "-mono"
