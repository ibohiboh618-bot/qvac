# TEMPORARY — verifies the docs-health-check Slack bot path on the PR branch.
# Triggers on push to feat/docs-health-monitor (workflow_dispatch can't be used
# until the workflow is on the default branch). Delete before merge.
name: TMP Slack Bot Test

on:
  push:
    branches:
      - feat/docs-health-monitor

permissions: {}

jobs:
  slack-test:
    name: Post test message to Slack
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Post test message via bot
        uses: slackapi/slack-github-action@45a88b9581bfab2566dc881e2cd66d334e621e2c # v3.0.3
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          # Fail the step loudly if the token/channel/scope is wrong.
          errors: true
          payload: |
            {
              "channel": "C09MQ34GCH5",
              "text": "[TEST] Docs Health Check Slack bot verification — please ignore",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": ":test_tube: *[TEST]* verifying the docs health-check Slack bot — please ignore.\n\n🚨 *Docs Site Alert*\nBroken pages were detected during the daily health check.\n\nSee the <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|GitHub Actions report> for details.\n\ncc <@U092N54FW7Q> <@U0AFBC3G2EQ> <@U07HUCA3A3H>"
                  }
                }
              ]
            }
