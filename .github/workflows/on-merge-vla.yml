name: On Merge Trigger (Vla)

on:
  push:
    branches:
      - main
      - release-*
      - feature-*
      - tmp-*
    paths:
      - "packages/vla-ggml/**"
      - ".github/workflows/*-vla.yml"

  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish with"
        required: false
        default: "dev"
        type: choice
        options:
          - latest
          - dev

  workflow_call:
    inputs:
      tag:
        description: "Tag to publish with"
        required: false
        type: string

permissions:
  contents: read
  pull-requests: read
  packages: read
  id-token: write

jobs:
  publish-logic:
    runs-on: ubuntu-latest
    environment: release
    outputs:
      publish_main: ${{ steps.logic.outputs.publish_main }}
      publish_release: ${{ steps.logic.outputs.publish_release }}
      publish_feature: ${{ steps.logic.outputs.publish_feature }}
      publish_tmp: ${{ steps.logic.outputs.publish_tmp }}
      gpr_tag: ${{ steps.logic.outputs.gpr_tag }}
    steps:
      - id: logic
        uses: tetherto/qvac-actions/npm-publish-logic@38693d9315c5fb6bba1354d8d1ef9823bf6c10a3 # 0.1.0

  release-merge-guard:
    name: Release Merge Guard
    if: >-
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
      startsWith(github.ref_name, 'release-')
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # 7.0.0
        with:
          fetch-depth: 0
      - uses: ./.github/actions/release-merge-guard
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          base-ref: ${{ github.ref_name }}
          base-sha: ${{ github.event.before }}
          head-sha: ${{ github.sha }}
          package-slug: vla
          package-json-path: packages/vla-ggml/package.json
          changelog-path: packages/vla-ggml/CHANGELOG.md

  # Build prebuilds (build + merge only, no publishing)
  build:
    needs: publish-logic
    if: >-
      needs.publish-logic.outputs.publish_main == 'true' ||
      needs.publish-logic.outputs.publish_release == 'true' ||
      needs.publish-logic.outputs.publish_feature == 'true' ||
      needs.publish-logic.outputs.publish_tmp == 'true'
    permissions:
      contents: write
      packages: write
      pull-requests: write
      id-token: write
    uses: ./.github/workflows/prebuilds-vla.yml
    secrets: inherit
    with:
      workdir: "packages/vla-ggml"

  # Publish to GitHub Package Registry (GPR) for non-release branches
  publish-gpr:
    needs: [build, publish-logic]
    if: >-
      needs.publish-logic.outputs.publish_main == 'true' ||
      needs.publish-logic.outputs.publish_feature == 'true' ||
      needs.publish-logic.outputs.publish_tmp == 'true'
    continue-on-error: true
    runs-on: ubuntu-latest
    environment: release
    outputs:
      published_version: ${{ steps.publish.outputs.npm_published_version }}
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # 7.0.0
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: Download prebuild artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # 8.0.1
        with:
          name: prebuilds
          path: packages/vla-ggml/prebuilds

      - name: Publish to GitHub Package Registry
        id: publish
        uses: ./.github/actions/publish-library-to-gpr
        with:
          secret-token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ inputs.tag || needs.publish-logic.outputs.gpr_tag }}
          name-suffix: "-mono"
          workdir: packages/vla-ggml

  # Publish to NPM for release branches
  publish-npm:
    needs: [build, publish-logic, release-merge-guard]
    if: >-
      !cancelled() &&
      needs.build.result == 'success' &&
      needs.publish-logic.outputs.publish_release == 'true' &&
      (needs.release-merge-guard.result == 'success' || needs.release-merge-guard.result == 'skipped')
    runs-on: ubuntu-latest
    environment: npm
    outputs:
      published_version: ${{ steps.publish.outputs.npm_published_version }}
    permissions:
      contents: write
      packages: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # 7.0.0
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: Download prebuild artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # 8.0.1
        with:
          name: prebuilds
          path: packages/vla-ggml/prebuilds

      - name: Determine dist-tag
        id: dist-tag
        uses: tetherto/qvac-actions/npm-dist-tag-determination@38693d9315c5fb6bba1354d8d1ef9823bf6c10a3 # 0.1.0
        with:
          workdir: packages/vla-ggml
          tag: "latest"

      - name: Publish to NPM Package Registry
        id: publish
        uses: tetherto/qvac-actions/publish-library-to-npm@38693d9315c5fb6bba1354d8d1ef9823bf6c10a3 # 0.1.0
        with:
          tag: ${{ steps.dist-tag.outputs.tag }}
          workdir: packages/vla-ggml

  # Tag the published version (no GitHub Release; SDK-only releases policy)
  create-tag:
    needs: [publish-npm]
    if: >-
      !cancelled() &&
      needs.publish-npm.result == 'success' &&
      needs.publish-npm.outputs.published_version != ''
    permissions:
      contents: write
    uses: ./.github/workflows/create-release-tag.yml
    with:
      repo_name: "vla"
      published_version: ${{ needs.publish-npm.outputs.published_version }}
