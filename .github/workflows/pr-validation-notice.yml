# NOTICE drift gate — QVAC-21558
#
# Verifies that the committed per-package NOTICE files are byte-identical to a
# fresh regeneration from the qv-notice-generate scripts. If a PR changes a
# dependency manifest (package.json / lockfile / vcpkg.json), a Python
# requirement, or the model registry (models.prod.json) without regenerating
# the affected NOTICE, this gate fails with the exact diff and tells the author
# how to fix it.
#
# Why this exists: the per-package NOTICE files in the monorepo are generated
# by hand today (the qv-notice-generate skill). Nothing stops them from going
# stale between releases, which is a license-compliance breach — most OSS and
# model licenses only permit redistribution if their attribution travels with
# the shipped artifact. This wraps the existing generator scripts in CI so
# drift is caught on PR. Generator output is deterministic and sorted, so a
# clean tree means an empty diff.
#
# SCOPE (PROVISIONAL): the matrix below lists the Tier-1 shipping packages —
# the C1 ("ships to end users") and C4 ("signs/publishes releases") rows. The
# authoritative list is docs/devops/TIER-1-SCOPE.md (QVAC-19052), which is
# still DRAFT pending the "shipped" definition sign-off (Olu). Reconcile this
# matrix with that doc before promoting this check to REQUIRED in branch
# protection. Until then keep it advisory: do NOT add notice-drift-gate to the
# ruleset yet.
#
# Fork safety: this runs on plain `pull_request` (checking out PR HEAD is safe
# because fork PRs receive a read-only token and no secrets). The regeneration
# step needs the private vcpkg registry + npm registry, so it is SKIPPED for
# fork PRs; an internal maintainer re-runs it from a trusted branch. No secret
# is ever exposed to fork-controlled code, and `pull_request_target` is
# deliberately avoided (it would expose secrets to PR code — the pwn-request
# pattern).
#
# Authored with assistance from the qv-notice-generate skill.

name: NOTICE drift (Tier-1)

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
      - release-*
      - feature-*
      - tmp-*
    paths:
      # Dependency surfaces that change attributions:
      - "packages/**/package.json"
      - "packages/**/package-lock.json"
      - "packages/**/vcpkg.json"
      - "packages/**/requirements*.txt"
      - "packages/**/pyproject.toml"
      - "packages/registry-server/data/models.prod.json"
      # The committed NOTICE files, the generator, and this workflow:
      - "packages/**/NOTICE"
      - ".cursor/skills/qv-notice-generate/**"
      - ".github/workflows/pr-validation-notice.yml"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  notice-drift:
    name: notice-drift
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Skip on fork PRs: regeneration needs GH_TOKEN/NPM_TOKEN (private vcpkg
    # registry + GitHub API + private npm packages), which fork PRs never
    # receive. Same-repo PRs and manual runs proceed normally.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.pull_request.head.repo.full_name == github.repository
    strategy:
      fail-fast: false
      matrix:
        # PROVISIONAL Tier-1 shipping scope — reconcile with
        # docs/devops/TIER-1-SCOPE.md (QVAC-19052) before making this required.
        package:
          - sdk
          - bare-sdk
          - cli
          - rag
          - ai-sdk-provider
          - registry-server/client
          - llm-llamacpp
          - embed-llamacpp
          - transcription-whispercpp
          - transcription-parakeet
          - tts-onnx
          - tts-ggml
          - ocr-onnx
          - ocr-ggml
          - diffusion-cpp
          - translation-nmtcpp
          - classification-ggml
          - vla-ggml
          - bci-whispercpp
          - decoder-audio
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # 6.3.0
        with:
          node-version: "20"

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # 6.2.0
        with:
          python-version: "3.12"

      - name: Regenerate NOTICE for ${{ matrix.package }}
        env:
          # Secrets are passed through env (never interpolated into run:).
          # The generator reads GH_TOKEN; the repo's GitHub PAT (PAT_TOKEN) is
          # required because the C++ scan reads portfiles from the PRIVATE
          # tetherto/qvac-registry-vcpkg repo, which the default GITHUB_TOKEN
          # cannot access.
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          PKG: ${{ matrix.package }}
        run: |
          set -euo pipefail
          node .cursor/skills/qv-notice-generate/scripts/generate-notice.js "$PKG"

      - name: Fail on NOTICE drift
        env:
          PKG: ${{ matrix.package }}
        run: |
          set -euo pipefail
          NOTICE_PATH="packages/$PKG/NOTICE"
          if git diff --quiet -- "$NOTICE_PATH"; then
            echo "OK: $NOTICE_PATH is up to date."
            exit 0
          fi
          {
            echo "### NOTICE drift detected for \`$PKG\`"
            echo ""
            echo "\`$NOTICE_PATH\` is stale. Regenerate it and commit the result:"
            echo ""
            echo '```bash'
            echo "source .env"
            echo "node .cursor/skills/qv-notice-generate/scripts/generate-notice.js $PKG"
            echo '```'
            echo ""
            echo "<details><summary>Diff (committed vs freshly generated)</summary>"
            echo ""
            echo '```diff'
            git diff -- "$NOTICE_PATH"
            echo '```'
            echo ""
            echo "</details>"
          } >> "$GITHUB_STEP_SUMMARY"
          echo "::error file=$NOTICE_PATH::NOTICE is out of date — regenerate with qv-notice-generate and commit."
          exit 1

  # Single, stable status check that aggregates the matrix. Make THIS the
  # required check once docs/devops/TIER-1-SCOPE.md is signed off — its name
  # stays constant regardless of how the matrix changes. Passes when the matrix
  # was skipped (fork PR) so it never blocks external contributors.
  notice-drift-gate:
    name: notice-drift-gate
    needs: notice-drift
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check matrix result
        env:
          RESULT: ${{ needs.notice-drift.result }}
        run: |
          set -euo pipefail
          echo "notice-drift result: $RESULT"
          if [ "$RESULT" = "failure" ]; then
            echo "::error::One or more NOTICE files are out of date. See the notice-drift jobs above."
            exit 1
          fi
          echo "No NOTICE drift detected (matrix succeeded or was skipped for a fork PR)."
