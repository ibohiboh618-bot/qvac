# NOTICE drift gate — QVAC-21558
#
# Verifies that the committed per-package NOTICE files are byte-identical to a
# fresh regeneration from the qv-notice-generate scripts. If a PR changes a
# dependency manifest (package.json / lockfile / vcpkg.json), a Python
# requirement, or the model registry (models.prod.json) without regenerating
# the affected NOTICE, this gate fails with the exact diff and tells the author
# how to fix it.
#
# Why this exists: the per-package NOTICE files in the monorepo are generated
# by hand today (the qv-notice-generate skill). Nothing stops them from going
# stale between releases, which is a license-compliance breach — most OSS and
# model licenses only permit redistribution if their attribution travels with
# the shipped artifact. This wraps the existing generator scripts in CI so
# drift is caught on PR. Generator output is deterministic and sorted, so a
# clean tree means an empty diff.
#
# Scoped to changed packages: the `select` job resolves which in-scope packages
# a PR actually touches (via .github/scripts/notice-affected-packages.mjs) and
# the drift matrix only runs over those. A change to the generator, this
# workflow, the selector script, or the model registry forces a FULL re-check.
# This keeps the gate relevant (it flags drift a PR introduces, not pre-existing
# repo-wide drift) and fast. A manual run (workflow_dispatch) always checks the
# full set.
#
# SCOPE (PROVISIONAL): the in-scope Tier-1 shipping list (C1 "ships to end
# users" / C4 "signs/publishes releases") lives in
# .github/scripts/notice-affected-packages.mjs. The authoritative list is
# docs/devops/TIER-1-SCOPE.md (QVAC-19052), still DRAFT pending the "shipped"
# definition sign-off. Reconcile the two before promoting notice-drift-gate to
# a REQUIRED check; until then keep it advisory (do NOT add it to the ruleset).
#
# Fork safety: this runs on plain `pull_request` (checking out PR HEAD is safe
# because fork PRs receive a read-only token and no secrets). No secret is ever
# exposed to fork-controlled code, and `pull_request_target` is deliberately
# avoided (it would expose secrets to PR code — the pwn-request pattern).
#
# Credentials: the generator needs only GH_TOKEN (the repo PAT_TOKEN) for the
# GitHub API used by the C++/vcpkg scan and @tetherto GitHub Packages. It does
# NOT use NPM_TOKEN — the @qvac deps are public on npmjs and install
# anonymously. PAT_TOKEN is a repo secret, so this gate ENFORCES on same-repo
# PRs. On fork PRs (no secrets) regeneration is skipped and the gate passes, so
# it never blocks external contributors.
#
# Authored with assistance from the qv-notice-generate skill.

name: NOTICE drift (Tier-1)

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
      - release-*
      - feature-*
      - tmp-*
    paths:
      # Dependency surfaces that change attributions:
      - "packages/**/package.json"
      - "packages/**/package-lock.json"
      - "packages/**/vcpkg.json"
      - "packages/**/requirements*.txt"
      - "packages/**/pyproject.toml"
      - "packages/registry-server/data/models.prod.json"
      # The committed NOTICE files, the generator, the selector, and this workflow:
      - "packages/**/NOTICE"
      - ".cursor/skills/qv-notice-generate/**"
      - ".github/scripts/notice-affected-packages.mjs"
      - ".github/workflows/pr-validation-notice.yml"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # Resolve the in-scope packages affected by this PR. Skipped on fork PRs (no
  # secrets); when skipped, the downstream jobs are skipped too and the gate
  # passes, so external contributors are never blocked.
  select:
    name: select-packages
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: read
      pull-requests: read
    outputs:
      packages: ${{ steps.pick.outputs.packages }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # 6.3.0
        with:
          node-version: "20"

      - name: Resolve affected in-scope packages
        id: pick
        env:
          # github.token (read-only) is enough to list this repo's PR files.
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          node .github/scripts/notice-affected-packages.mjs

  notice-drift:
    name: notice-drift
    needs: select
    # Only run when the selector resolved at least one in-scope package.
    if: needs.select.outputs.packages != '' && needs.select.outputs.packages != '[]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJSON(needs.select.outputs.packages) }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # 6.3.0
        with:
          node-version: "20"

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # 6.2.0
        with:
          python-version: "3.12"

      # The generator requires GH_TOKEN (PAT_TOKEN). It is a repo secret, so it
      # is present on same-repo PRs but absent on fork PRs. When it is not
      # present we SKIP regeneration (and the drift check) rather than fail, so
      # the gate never blocks fork PRs; it ENFORCES drift on same-repo PRs.
      - name: Check for required credentials
        id: creds
        env:
          # Presence-only check — the value is never printed.
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
          PKG: ${{ matrix.package }}
        run: |
          set -euo pipefail
          # Slash-free artifact name (registry-server/client -> registry-server-client).
          echo "safe=notice-${PKG//\//-}" >> "$GITHUB_OUTPUT"
          if [ -n "${GH_TOKEN:-}" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
            echo "Credentials present — NOTICE drift will be verified."
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping NOTICE regeneration — GH_TOKEN (PAT_TOKEN) not available in this context (e.g. fork PR). The drift gate only enforces where it is present."
          fi

      - name: Regenerate NOTICE for ${{ matrix.package }}
        if: steps.creds.outputs.available == 'true'
        env:
          # Secrets are passed through env (never interpolated into run:).
          # Only GH_TOKEN is needed: the C++ scan reads portfiles from the
          # PRIVATE tetherto/qvac-registry-vcpkg repo (the default GITHUB_TOKEN
          # cannot), and @tetherto GitHub Packages auth uses it too. NPM_TOKEN is
          # intentionally NOT used — the @qvac deps are public on npmjs and
          # install anonymously.
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
          PKG: ${{ matrix.package }}
        run: |
          set -euo pipefail
          node .cursor/skills/qv-notice-generate/scripts/generate-notice.js "$PKG"

      - name: Fail on NOTICE drift
        if: steps.creds.outputs.available == 'true'
        env:
          PKG: ${{ matrix.package }}
        run: |
          set -euo pipefail
          NOTICE_PATH="packages/$PKG/NOTICE"
          if git diff --quiet -- "$NOTICE_PATH"; then
            echo "OK: $NOTICE_PATH is up to date."
            exit 0
          fi
          {
            echo "### NOTICE drift detected for \`$PKG\`"
            echo ""
            echo "\`$NOTICE_PATH\` is stale. Regenerate it and commit the result:"
            echo ""
            echo '```bash'
            echo "source .env"
            echo "node .cursor/skills/qv-notice-generate/scripts/generate-notice.js $PKG"
            echo '```'
            echo ""
            echo "<details><summary>Diff (committed vs freshly generated)</summary>"
            echo ""
            echo '```diff'
            git diff -- "$NOTICE_PATH"
            echo '```'
            echo ""
            echo "</details>"
          } >> "$GITHUB_STEP_SUMMARY"
          echo "::error file=$NOTICE_PATH::NOTICE is out of date — regenerate with qv-notice-generate and commit."
          exit 1

      # Publish the freshly generated NOTICE so a maintainer can download and
      # commit it to clear drift. Runs even when the drift check above fails
      # (that is the case where the artifact is actually needed).
      - name: Upload regenerated NOTICE
        if: always() && steps.creds.outputs.available == 'true'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # 7.0.0
        with:
          name: ${{ steps.creds.outputs.safe }}
          path: packages/${{ matrix.package }}/NOTICE
          retention-days: 1
          if-no-files-found: error

  # Single, stable status check that aggregates the matrix. Make THIS the
  # required check once docs/devops/TIER-1-SCOPE.md is signed off — its name
  # stays constant regardless of how the matrix changes. Passes when no in-scope
  # package changed (matrix skipped) or on fork PRs (select skipped), so it
  # never blocks unrelated or external contributions.
  notice-drift-gate:
    name: notice-drift-gate
    needs: [select, notice-drift]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check matrix result
        env:
          SELECT: ${{ needs.select.result }}
          DRIFT: ${{ needs.notice-drift.result }}
        run: |
          set -euo pipefail
          echo "select=$SELECT notice-drift=$DRIFT"
          if [ "$DRIFT" = "failure" ]; then
            echo "::error::One or more NOTICE files are out of date. See the notice-drift jobs above."
            exit 1
          fi
          echo "No NOTICE drift detected (no in-scope package changed, or all regenerations matched, or skipped on a fork PR)."
