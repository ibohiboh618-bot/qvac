name: Benchmark Performance (Whispercpp)

on:
  workflow_dispatch:
    inputs:
      repository:
        description: "Repository to benchmark"
        required: false
        type: string
      ref:
        description: "Git ref (branch/tag/SHA) to benchmark"
        required: false
        type: string
      include_desktop:
        description: "Run desktop benchmark matrix"
        required: false
        type: boolean
        default: true
      include_mobile:
        description: "Run mobile benchmark matrix"
        required: false
        type: boolean
        default: true

permissions:
  contents: read
  packages: read
  id-token: write

jobs:
  context:
    runs-on: ubuntu-latest
    outputs:
      repository: ${{ steps.ctx.outputs.repository }}
      ref: ${{ steps.ctx.outputs.ref }}
      include_desktop: ${{ steps.ctx.outputs.include_desktop }}
      include_mobile: ${{ steps.ctx.outputs.include_mobile }}
    steps:
      - id: ctx
        shell: bash
        env:
          INPUT_REPO: ${{ inputs.repository }}
          INPUT_REF: ${{ inputs.ref }}
          INPUT_INCLUDE_DESKTOP: ${{ inputs.include_desktop }}
          INPUT_INCLUDE_MOBILE: ${{ inputs.include_mobile }}
          REPO: ${{ github.repository }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          repo="${INPUT_REPO:-$REPO}"
          ref="${INPUT_REF:-$REF_NAME}"
          echo "repository=$repo" >> "$GITHUB_OUTPUT"
          echo "ref=$ref" >> "$GITHUB_OUTPUT"
          echo "include_desktop=${INPUT_INCLUDE_DESKTOP}" >> "$GITHUB_OUTPUT"
          echo "include_mobile=${INPUT_INCLUDE_MOBILE}" >> "$GITHUB_OUTPUT"

  prebuild:
    needs: context
    permissions:
      contents: write
      packages: write
      pull-requests: write
      id-token: write
    uses: ./.github/workflows/prebuilds-qvac-lib-infer-whispercpp.yml
    secrets: inherit
    with:
      repository: ${{ needs.context.outputs.repository }}
      ref: ${{ needs.context.outputs.ref }}

  desktop-benchmarks:
    needs: [context, prebuild]
    if: needs.context.outputs.include_desktop != 'false'
    permissions:
      contents: read
      packages: read
      id-token: write
    uses: ./.github/workflows/integration-test-qvac-lib-infer-whispercpp.yml
    secrets: inherit
    with:
      repository: ${{ needs.context.outputs.repository }}
      ref: ${{ needs.context.outputs.ref }}
      run_integration_tests: false
      run_rtf_benchmarks: true



  mobile-benchmarks:
    needs: [context, prebuild]
    if: needs.context.outputs.include_mobile != 'false'
    permissions:
      contents: read
      packages: read
      pull-requests: write
      id-token: write
    uses: ./.github/workflows/integration-mobile-test-qvac-lib-infer-whispercpp.yml
    secrets: inherit
    with:
      repository: ${{ needs.context.outputs.repository }}
      ref: ${{ needs.context.outputs.ref }}

  summarize:
    needs: [context, desktop-benchmarks, mobile-benchmarks]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          repository: ${{ needs.context.outputs.repository }}
          ref: ${{ needs.context.outputs.ref }}
          token: ${{ secrets.PAT_TOKEN }}

      - name: Download desktop benchmark artifacts
        if: needs.context.outputs.include_desktop != 'false'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # 8.0.1
        with:
          pattern: rtf-results-*
          path: benchmark-artifacts/desktop
          merge-multiple: true


      - name: Download mobile benchmark artifacts
        if: needs.context.outputs.include_mobile != 'false'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # 8.0.1
        with:
          pattern: perf-report-whispercpp-*
          path: benchmark-artifacts/mobile

      - name: Generate consolidated benchmark report
        run: |
          node scripts/perf-report/aggregate-whisper-rtf.js \
            --dir benchmark-artifacts/desktop \
            --manual-dir packages/qvac-lib-infer-whispercpp/benchmarks/manual-results \
            --output benchmark-artifacts/whisper-performance-findings.md \
            --output-json benchmark-artifacts/whisper-performance-findings.json

      - name: Add summary
        run: cat benchmark-artifacts/whisper-performance-findings.md >> "$GITHUB_STEP_SUMMARY"


      - name: Generate consolidated mobile performance report
        if: needs.context.outputs.include_mobile != 'false'
        run: |
          node scripts/perf-report/aggregate.js             --dir benchmark-artifacts/mobile             --output benchmark-artifacts/whisper-mobile-performance.md             --output-html benchmark-artifacts/whisper-mobile-performance.html             --output-json benchmark-artifacts/whisper-mobile-performance.json || true

      - name: Add mobile summary
        if: needs.context.outputs.include_mobile != 'false'
        run: |
          if [ -s benchmark-artifacts/whisper-mobile-performance.md ]; then
            cat benchmark-artifacts/whisper-mobile-performance.md >> "$GITHUB_STEP_SUMMARY"
          fi


      - name: Upload consolidated benchmark report
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # 7.0.0
        with:
          name: whisper-performance-findings
          path: |
            benchmark-artifacts/whisper-performance-findings.md
            benchmark-artifacts/whisper-performance-findings.json
            benchmark-artifacts/whisper-mobile-performance.md
            benchmark-artifacts/whisper-mobile-performance.html
            benchmark-artifacts/whisper-mobile-performance.json
          retention-days: 30
