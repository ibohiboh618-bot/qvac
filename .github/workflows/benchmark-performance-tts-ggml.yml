name: Benchmark Performance (TTS GGML)

on:
  workflow_dispatch:
    inputs:
      repository:
        description: "Repository to benchmark"
        required: false
        type: string
      ref:
        description: "Git ref (branch/tag/SHA) to benchmark"
        required: false
        type: string
      run_desktop:
        description: "Run desktop (CPU/GPU) RTF benchmarks"
        required: false
        type: boolean
        default: true
      run_mobile:
        description: "Run mobile (Android/iOS) RTF benchmarks on Device Farm"
        required: false
        type: boolean
        default: true
      benchmark_matrix_json:
        description: "Optional JSON array overriding the desktop benchmark matrix for all runners"
        required: false
        type: string

permissions:
  contents: read
  packages: read

env:
  ADDON_DIR: packages/tts-ggml

jobs:
  label-gate:
    name: Authorise (label-gate)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    outputs:
      authorised: ${{ steps.gate.outputs.authorised }}
    steps:
      - name: Checkout (label-gate action only)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          ref: ${{ github.event.repository.default_branch }}
          sparse-checkout: .github/actions/label-gate
          sparse-checkout-cone-mode: false
      - name: Run label-gate
        id: gate
        uses: ./.github/actions/label-gate
        with:
          github-token: ${{ secrets.PAT_TOKEN }}

  context:
    runs-on: ubuntu-latest
    outputs:
      repository: ${{ steps.ctx.outputs.repository }}
      ref: ${{ steps.ctx.outputs.ref }}
      benchmark_matrix_json: ${{ steps.ctx.outputs.benchmark_matrix_json }}
    steps:
      - id: ctx
        shell: bash
        env:
          INPUT_REPO: ${{ inputs.repository }}
          INPUT_REF: ${{ inputs.ref }}
          INPUT_BENCHMARK_MATRIX_JSON: ${{ inputs.benchmark_matrix_json }}
          REPO: ${{ github.repository }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          repo="${INPUT_REPO:-$REPO}"
          ref="${INPUT_REF:-$REF_NAME}"
          echo "repository=$repo" >> "$GITHUB_OUTPUT"
          echo "ref=$ref" >> "$GITHUB_OUTPUT"
          echo "benchmark_matrix_json=$INPUT_BENCHMARK_MATRIX_JSON" >> "$GITHUB_OUTPUT"

  prebuild:
    needs:
      - context
      - label-gate
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    uses: ./.github/workflows/prebuilds-tts-ggml.yml
    secrets: inherit
    with:
      repository: ${{ needs.context.outputs.repository }}
      ref: ${{ needs.context.outputs.ref }}
    if: needs.label-gate.outputs.authorised == 'true'

  desktop-benchmarks:
    needs:
      - context
      - prebuild
      - label-gate
    permissions:
      contents: read
      packages: read
    uses: ./.github/workflows/integration-test-tts-ggml.yml
    secrets: inherit
    with:
      repository: ${{ needs.context.outputs.repository }}
      ref: ${{ needs.context.outputs.ref }}
      run_integration_tests: false
      run_rtf_benchmarks: true
      benchmark_matrix_json: ${{ needs.context.outputs.benchmark_matrix_json }}
    if: needs.label-gate.outputs.authorised == 'true' && inputs.run_desktop

  mobile-benchmarks:
    needs:
      - context
      - prebuild
      - label-gate
    permissions:
      contents: read
      packages: read
      pull-requests: write
      id-token: write
    uses: ./.github/workflows/integration-mobile-test-tts-ggml.yml
    secrets: inherit
    with:
      repository: ${{ needs.context.outputs.repository }}
      ref: ${{ needs.context.outputs.ref }}
      run_rtf_benchmarks: true
    if: needs.label-gate.outputs.authorised == 'true' && inputs.run_mobile

  summarize:
    needs:
      - context
      - desktop-benchmarks
      - mobile-benchmarks
      - label-gate
    if: needs.label-gate.outputs.authorised == 'true' && (always())
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          repository: ${{ needs.context.outputs.repository }}
          ref: ${{ needs.context.outputs.ref }}
          token: ${{ secrets.PAT_TOKEN }}

      # No merge-multiple: same-platform runners emit identically named
      # rtf-benchmark-*.json files, so per-artifact subdirectories preserve all
      # rows for the recursive aggregator.
      - name: Download desktop benchmark artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # 8.0.1
        continue-on-error: true
        with:
          pattern: rtf-results-tts-ggml-*
          path: benchmark-artifacts/desktop

      # Android and iOS each upload performance-report.json, so keep each
      # artifact isolated and let the aggregator recurse.
      - name: Download mobile benchmark artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # 8.0.1
        continue-on-error: true
        with:
          pattern: perf-report-tts-ggml-*
          path: benchmark-artifacts/mobile

      - name: Generate consolidated benchmark report
        run: |
          mkdir -p benchmark-artifacts
          node scripts/perf-report/aggregate-tts-ggml-rtf.js \
            --dir benchmark-artifacts \
            --manual-dir packages/tts-ggml/benchmarks/manual-results \
            --output benchmark-artifacts/tts-ggml-performance-findings.md \
            --output-json benchmark-artifacts/tts-ggml-performance-findings.json

      - name: Add summary
        run: |
          cat benchmark-artifacts/tts-ggml-performance-findings.md >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### GPU coverage map" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Backend | Coverage | How |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---------|----------|-----|" >> "$GITHUB_STEP_SUMMARY"
          echo "| cpu | linux x64/arm64, macOS arm64/x64, win32 x64 | desktop integration matrix |" >> "$GITHUB_STEP_SUMMARY"
          echo "| vulkan | linux x64, win32 x64 | qvac-*-gpu self-hosted runners |" >> "$GITHUB_STEP_SUMMARY"
          echo "| mobile cpu | Android / iOS flagships | AWS Device Farm |" >> "$GITHUB_STEP_SUMMARY"
          echo "| metal | not on CI (hosted macOS Metal crash) | drop JSON into packages/tts-ggml/benchmarks/manual-results/ |" >> "$GITHUB_STEP_SUMMARY"
          echo "| cuda | not in default tts-cpp cascade | drop JSON into packages/tts-ggml/benchmarks/manual-results/ |" >> "$GITHUB_STEP_SUMMARY"
          echo "| opencl | Adreno-only | drop JSON into packages/tts-ggml/benchmarks/manual-results/ |" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload consolidated benchmark report
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # 7.0.0
        with:
          name: tts-ggml-performance-findings
          path: |
            benchmark-artifacts/tts-ggml-performance-findings.md
            benchmark-artifacts/tts-ggml-performance-findings.json
          retention-days: 30
