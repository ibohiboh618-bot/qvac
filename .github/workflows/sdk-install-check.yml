name: SDK Install Check (public npm)

# Verifies that `@qvac/sdk` and each of its `@qvac/*` runtime dependencies
# are reachable on the public npm registry under the version range pinned in
# `packages/sdk/package.json`. Catches visibility regressions (e.g. a package
# accidentally re-published as private) before end users hit "404 Not Found"
# during `npm install @qvac/sdk`.
#
# The list of packages and ranges lives in `scripts/install-check/packages.json`
# so it can be diffed mechanically against `packages/sdk/package.json`.
#
# Optional secret: `SLACK_WEBHOOK_URL_CI_ALERTS` — incoming webhook for the CI
# alerts channel. When set, failures (scheduled or manual `workflow_dispatch`)
# additionally post a structured Slack message via `notify-slack-on-failure`.
# When unset, that job is a no-op; the workflow does not fail.

on:
  schedule:
    - cron: "0 6 * * *" # daily 06:00 UTC, after EU mornings
  workflow_dispatch:
    inputs:
      package-filter:
        description: "Run only one package (e.g. @qvac/translation-nmtcpp). Empty = all."
        type: string
        required: false

permissions:
  contents: read

jobs:
  build-matrix:
    name: Build matrix
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      packages: ${{ steps.derive.outputs.packages }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2

      - name: Derive package matrix
        id: derive
        shell: node {0}
        env:
          # Even though `package-filter` is a free-form string, it is consumed
          # only via `process.env` (no `${{ }}` interpolation inside `run:`)
          # so workflow-expression injection is not possible here.
          FILTER: ${{ inputs.package-filter }}
        run: |
          const fs = require('fs');
          const list = JSON.parse(
            fs.readFileSync('scripts/install-check/packages.json', 'utf8')
          ).packages;
          const filter = (process.env.FILTER || '').trim();
          const filtered = filter ? list.filter((p) => p.name === filter) : list;
          if (filtered.length === 0) {
            console.log(`No packages match filter "${filter}". Available: ${list.map((p) => p.name).join(', ')}`);
            process.exit(1);
          }
          fs.appendFileSync(
            process.env.GITHUB_OUTPUT,
            `packages=${JSON.stringify(filtered)}\n`
          );
          console.log(`Matrix size: ${filtered.length}`);
          for (const p of filtered) console.log(`  ${p.name}@${p.range}`);

  install-check:
    name: ${{ matrix.package.name }}@${{ matrix.package.range }}
    needs: build-matrix
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      # Surface every failing package, not just the first one — when nmtcpp
      # goes 404 we want to know whether anything else regressed in the same
      # window.
      fail-fast: false
      matrix:
        package: ${{ fromJson(needs.build-matrix.outputs.packages) }}
    steps:
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # 6.3.0
        with:
          node-version: lts/*

      - name: Configure public npm registry
        run: |
          # Deliberately no NPM_TOKEN: every `@qvac/*` runtime dep is supposed
          # to be reachable to anonymous end users, which is exactly the
          # failure mode of the original `@qvac/translation-nmtcpp` 404 bug.
          mkdir -p /tmp/install-check
          printf '%s\n' \
            'registry=https://registry.npmjs.org/' \
            '@qvac:registry=https://registry.npmjs.org/' \
            > /tmp/install-check/.npmrc

      - name: Probe registry visibility
        env:
          PKG_NAME: ${{ matrix.package.name }}
          PKG_RANGE: ${{ matrix.package.range }}
        working-directory: /tmp/install-check
        run: |
          set -eo pipefail
          echo "::group::npm view $PKG_NAME@$PKG_RANGE"
          npm view "$PKG_NAME@$PKG_RANGE" version dist-tags
          echo "::endgroup::"

      - name: Install in fresh dir
        env:
          PKG_NAME: ${{ matrix.package.name }}
          PKG_RANGE: ${{ matrix.package.range }}
        working-directory: /tmp/install-check
        run: |
          set -eo pipefail
          npm init -y > /dev/null
          # `--ignore-scripts` keeps this check focused on registry visibility
          # and tarball download. Many @qvac/* packages have native postinstall
          # steps (vcpkg/CMake) that we explicitly do NOT want to exercise here
          # — those are covered by per-addon prebuild + integration workflows.
          npm install --no-fund --no-audit --ignore-scripts "$PKG_NAME@$PKG_RANGE"

      - name: Smoke require (SDK only)
        if: matrix.package.name == '@qvac/sdk'
        working-directory: /tmp/install-check
        run: |
          # Pure-JS load of the SDK entry point. Catches "installs but fails
          # to load" regressions (bad `exports`, broken transpile output) on
          # top of the registry-visibility check.
          node -e "require('@qvac/sdk'); console.log('require ok')"

  notify-on-failure:
    name: Open or update tracking issue
    needs: install-check
    # Only the scheduled trigger should spam the issue tracker. Manual
    # `workflow_dispatch` runs (used for testing) intentionally stay silent.
    if: failure() && github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2

      - name: Open or update tracking issue
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # 8.0.0
        with:
          script: |
            const title = 'SDK install-check failing on public npm';
            const label = 'npm-visibility';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              `Scheduled SDK install-check failed.`,
              ``,
              `- Run: ${runUrl}`,
              `- Triage: open the failed matrix leg(s); the failing package is the matrix label.`,
              `- Likely cause: package was re-published as private, or a release PR to \`release-*\` did not land, leaving \`packages/sdk/package.json\` pinned to a range that npm cannot resolve.`,
              `- Fix: re-publish from the appropriate \`release-*\` branch with public access (\`publish-library-to-npm\` action, see \`docs/gitflow.md\`).`,
            ].join('\n');

            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: label,
              per_page: 5,
            });

            if (existing.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing[0].number,
                body,
              });
              core.info(`Appended comment to existing issue #${existing[0].number}`);
            } else {
              const created = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: [label],
              });
              core.info(`Opened new issue #${created.data.number}`);
            }

  notify-slack-on-failure:
    name: Post Slack alert
    needs: install-check
    # Pages on-call faster than the issue tracker. Unlike `notify-on-failure`,
    # this job DOES fire on manual `workflow_dispatch` so the channel can be
    # smoke-tested end-to-end (forced failure -> Slack message) without waiting
    # for the next scheduled tick. Issue tracking stays schedule-only.
    if: failure() && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2

      - name: Post Slack alert
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # 8.0.0
        env:
          # The webhook URL is consumed only via `process.env` (no `${{ }}`
          # interpolation inside the script body) so it stays redacted in logs
          # and cannot be smuggled in via workflow-expression injection.
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL_CI_ALERTS }}
        with:
          script: |
            const fs = require('fs');

            const webhook = process.env.SLACK_WEBHOOK_URL;
            if (!webhook) {
              core.info('SLACK_WEBHOOK_URL_CI_ALERTS not set, skipping Slack notification');
              return;
            }

            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            const { data: jobsData } = await github.rest.actions.listJobsForWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.runId,
              per_page: 100,
            });

            const nonMatrixJobNames = new Set([
              'Build matrix',
              'Open or update tracking issue',
              'Post Slack alert',
            ]);
            const failedLegs = jobsData.jobs
              .filter((j) => j.conclusion === 'failure' && !nonMatrixJobNames.has(j.name))
              .map((j) => {
                const at = j.name.lastIndexOf('@');
                return at > 0
                  ? { name: j.name, pkg: j.name.slice(0, at), legRange: j.name.slice(at + 1) }
                  : { name: j.name, pkg: j.name, legRange: '' };
              });

            let pkgDeps = {};
            try {
              const pkg = JSON.parse(fs.readFileSync('packages/sdk/package.json', 'utf8'));
              pkgDeps = pkg.dependencies || {};
            } catch (err) {
              core.warning(`Could not read packages/sdk/package.json: ${err.message}`);
            }

            const enriched = failedLegs.map((leg) => ({
              ...leg,
              pinnedRange: pkgDeps[leg.pkg] || leg.legRange || '(unknown)',
            }));

            const MAX_LISTED = 25;
            const visible = enriched.slice(0, MAX_LISTED);
            const overflow = enriched.length - visible.length;

            const failedListLines = visible.map(
              (leg) => `• \`${leg.pkg}\` (range from \`packages/sdk/package.json\`: \`${leg.pinnedRange}\`)`
            );
            if (overflow > 0) {
              failedListLines.push(`… and ${overflow} more — see run for full list`);
            }
            const failedListMd = failedListLines.length > 0
              ? failedListLines.join('\n')
              : '_(could not enumerate failed legs — see run for details)_';

            const fallback = `SDK install-check failed: ${enriched.length} package(s) — ${runUrl}`;

            const payload = {
              text: fallback,
              blocks: [
                {
                  type: 'header',
                  text: { type: 'plain_text', text: 'SDK install-check failed' },
                },
                {
                  type: 'section',
                  fields: [
                    { type: 'mrkdwn', text: `*Run:*\n<${runUrl}|View workflow run>` },
                    { type: 'mrkdwn', text: `*Trigger:*\n\`${context.eventName}\`` },
                    { type: 'mrkdwn', text: `*Repo:*\n\`${context.repo.owner}/${context.repo.repo}\`` },
                    { type: 'mrkdwn', text: `*Commit:*\n\`${context.sha.slice(0, 7)}\`` },
                  ],
                },
                {
                  type: 'section',
                  text: {
                    type: 'mrkdwn',
                    text: `*Failed packages (${enriched.length}):*\n${failedListMd}`,
                  },
                },
                {
                  type: 'section',
                  text: {
                    type: 'mrkdwn',
                    text: '*Runbook:* re-publish from the appropriate `release-*` branch with public access (`publish-library-to-npm` action, see `docs/gitflow.md`), or check the `@qvac` npm package access settings.',
                  },
                },
              ],
            };

            const res = await fetch(webhook, {
              method: 'POST',
              headers: { 'content-type': 'application/json' },
              body: JSON.stringify(payload),
            });

            if (!res.ok) {
              const detail = await res.text().catch(() => '');
              core.setFailed(`Slack webhook returned ${res.status} ${res.statusText}${detail ? `: ${detail}` : ''}`);
              return;
            }

            core.info(`Posted Slack alert for ${enriched.length} failed package(s)`);
