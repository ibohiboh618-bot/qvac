name: Integration Tests (BCI Whispercpp)

on:
  workflow_dispatch:
    inputs:
      prebuild_package:
        description: "NPM package containing prebuilds (e.g. @qvac/bci-whispercpp@0.1.0)"
        required: false
        type: string
      run_integration_tests:
        description: "Run the regular integration suite"
        required: false
        type: boolean
        default: true
      run_rtf_benchmarks:
        description: "Run the RTF/throughput benchmark matrix (writes rtf-results-* artifacts)"
        required: false
        type: boolean
        default: false
      benchmark_matrix_json:
        description: "Optional JSON array overriding the per-runner benchmark matrix"
        required: false
        type: string
      workdir:
        description: "Relative path to package directory in monorepo"
        type: string
        required: false
        default: "packages/bci-whispercpp"
  workflow_call:
    inputs:
      ref:
        description: "ref"
        type: string
      repository:
        type: string
      prebuild_package:
        description: "NPM package containing prebuilds (e.g. @qvac/bci-whispercpp@0.1.0)"
        required: false
        type: string
      run_integration_tests:
        description: "Run the regular integration suite"
        required: false
        type: boolean
        default: true
      run_rtf_benchmarks:
        description: "Run the RTF/throughput benchmark matrix (writes rtf-results-* artifacts)"
        required: false
        type: boolean
        default: false
      benchmark_matrix_json:
        description: "Optional JSON array overriding the per-runner benchmark matrix"
        required: false
        type: string
      workdir:
        description: "Relative path to package directory in monorepo"
        required: false
        default: "packages/bci-whispercpp"
        type: string

jobs:
  run-integration-tests:
    timeout-minutes: 60
    continue-on-error: true
    runs-on: ${{ matrix.runner || matrix.os }}
    environment: release
    name: ${{ matrix.platform }}-${{ matrix.arch }}${{ matrix.no_gpu == 'true' && '' || '-gpu' }}-integration-tests

    env:
      GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
      # Per-runner GPU toggle (mirrors integration-test-tts-ggml.yml): GPU
      # runners (qvac-*-gpu) leave no_gpu unset so the gpu-smoke runs and
      # asserts the GPU backend; CPU runners and hosted macOS (where the
      # Paravirtual Metal device crashes ggml's encoder) set no_gpu:'true' to
      # skip it. bci ships a Vulkan desktop build (see vcpkg.json), so the Linux
      # GPU runner exercises real desktop GPU. Mobile GPU coverage runs on
      # Device Farm via test/mobile/integration-runtime.cjs (NO_GPU=false).
      NO_GPU: ${{ matrix.no_gpu || 'false' }}

    permissions:
      contents: read
      packages: read

    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x64 on a GPU runner: exercises the Vulkan desktop build
          # (no_gpu unset -> NO_GPU=false -> gpu-smoke runs + asserts GPU).
          # BCI ships a single registry model, so the benchmark sweeps
          # platform × CPU/GPU backend (no quant dimension).
          - os: ubuntu-22.04
            platform: linux
            arch: x64
            runner: qvac-ubuntu2204-x64-gpu
            benchmark_matrix_json: >-
              [{"useGPU":false,"backendHint":"cpu"},{"useGPU":true,"backendHint":"vulkan"}]
          - os: ubuntu-24.04-arm
            platform: linux
            arch: arm64
            no_gpu: 'true'
            benchmark_matrix_json: >-
              [{"useGPU":false,"backendHint":"cpu"}]
          - os: macos-14-xlarge
            platform: darwin
            arch: arm64
            no_gpu: 'true'
            benchmark_matrix_json: >-
              [{"useGPU":false,"backendHint":"cpu"}]
          - os: macos-15-large
            platform: darwin
            arch: x64
            no_gpu: 'true'
            benchmark_matrix_json: >-
              [{"useGPU":false,"backendHint":"cpu"}]
          - os: windows-2025
            platform: win32
            arch: x64
            runner: qvac-win25-x64
            no_gpu: 'true'
            benchmark_matrix_json: >-
              [{"useGPU":false,"backendHint":"cpu"}]

    steps:
      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # 6.3.0
        with:
          node-version: lts/*
      - name: Manual Workspace Cleanup
        run: rm -rf "$GITHUB_WORKSPACE" && mkdir -p "$GITHUB_WORKSPACE"
        shell: bash
        working-directory: .
        if: runner.environment != 'github-hosted'

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          repository: ${{ inputs.repository || github.repository }}
          ref: ${{ inputs.ref || github.ref }}
          token: ${{ secrets.PAT_TOKEN }}

      - name: Install NPM dependencies
        working-directory: ${{ inputs.workdir }}
        run: |
          npm install

      - name: Install bare tooling
        run: npm install -g --force bare bare-make

      - name: Download prebuilds from artifact
        if: ${{ !inputs.prebuild_package }}
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # 8.0.1
        with:
          path: ${{ runner.temp }}/prebuilds-staging
          merge-multiple: true

      - name: Move prebuilds from staging to workspace (Unix)
        if: ${{ !inputs.prebuild_package && matrix.platform != 'win32' }}
        shell: bash
        run: |
          mkdir -p ${{ inputs.workdir }}/prebuilds
          cp -r ${{ runner.temp }}/prebuilds-staging/* ${{ inputs.workdir }}/prebuilds/
          echo "Prebuilds moved from staging area"
          ls -la ${{ inputs.workdir }}/prebuilds/

      # Windows path: bash cp -r mangles `${{ runner.temp }}` (= "C:\a\_temp")
      # because Git Bash interprets `\a`/`\_` as escape sequences, so the source
      # path becomes invalid and the copy silently no-ops (leaving no prebuild
      # -> ADDON_NOT_FOUND). Use PowerShell Copy-Item with native Windows paths.
      - name: Move prebuilds from staging to workspace (Windows)
        if: ${{ !inputs.prebuild_package && matrix.platform == 'win32' }}
        shell: powershell
        run: |
          $dst = "${{ inputs.workdir }}/prebuilds"
          New-Item -ItemType Directory -Force -Path $dst | Out-Null
          Copy-Item -Recurse -Force "${{ runner.temp }}\prebuilds-staging\*" $dst
          Write-Host "Prebuilds moved from staging area"
          Get-ChildItem -Recurse $dst | Select-Object FullName | Format-Table -AutoSize

      - name: Download prebuilds from package (Unix)
        if: ${{ inputs.prebuild_package && matrix.platform != 'win32' }}
        working-directory: ${{ inputs.workdir }}
        shell: bash
        run: |
          mkdir -p prebuilds "${{ runner.temp }}/tmp"
          rm -f "${{ runner.temp }}/tmp"/*.tgz
          rm -rf "${{ runner.temp }}/tmp/package"
          npm pack ${{ inputs.prebuild_package }} --pack-destination "${{ runner.temp }}/tmp"
          tar -xzf "${{ runner.temp }}/tmp"/*.tgz -C "${{ runner.temp }}/tmp"
          cp -r "${{ runner.temp }}/tmp"/package/prebuilds/* prebuilds/
          find prebuilds -type f -name 'tetherto__*' | while read f; do
            mv "$f" "${f/tetherto__/qvac__}"
          done

      - name: Download prebuilds from package (Windows)
        if: ${{ inputs.prebuild_package && matrix.platform == 'win32' }}
        working-directory: ${{ inputs.workdir }}
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path prebuilds | Out-Null
          New-Item -ItemType Directory -Force -Path "${{ runner.temp }}\tmp" | Out-Null
          npm pack ${{ inputs.prebuild_package }} --pack-destination "${{ runner.temp }}\tmp"
          $tgz = Get-ChildItem "${{ runner.temp }}\tmp\*.tgz" | Select-Object -First 1
          tar -xzf $tgz.FullName -C "${{ runner.temp }}\tmp"
          Copy-Item -Path "${{ runner.temp }}\tmp\package\prebuilds\*" -Destination prebuilds -Recurse -Force
          Get-ChildItem -Path prebuilds -Recurse -File -Filter 'tetherto__*' | ForEach-Object {
            $newName = $_.Name -replace 'tetherto__', 'qvac__'
            Rename-Item -Path $_.FullName -NewName $newName
          }

      - name: macOS - install whisper dependencies
        if: matrix.platform == 'darwin'
        shell: bash
        run: |
          brew install --quiet openblas lapack fftw

      - if: ${{ matrix.os == 'windows-2025' }}
        name: Set Vulkan SDK Path on Windows Server 2025
        working-directory: ${{ env.WORKDIR }}
        run: echo "VULKAN_SDK=C:\VulkanSDK" >> $Env:GITHUB_ENV

      - name: Download models (registry)
        working-directory: ${{ inputs.workdir }}
        shell: bash
        run: npm run download-models
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}

      - name: Run integration test (Unix)
        if: ${{ matrix.platform != 'win32' && inputs.run_integration_tests != false }}
        working-directory: ${{ inputs.workdir }}
        shell: bash
        run: npm run test:integration
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}

      - name: Run integration test (Windows)
        if: ${{ matrix.platform == 'win32' && inputs.run_integration_tests != false }}
        working-directory: ${{ inputs.workdir }}
        shell: powershell
        run: npm run test:integration
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}

      # RTF/throughput benchmark leg (run_rtf_benchmarks=true, set by
      # benchmark-performance-bci-whispercpp.yml). Runs the matrix runner once
      # per (useGPU) combo with the single BCI model and writes per-config JSON
      # under benchmarks/results/, uploaded as rtf-results-* for the
      # orchestrator's summarize job. Skipped on normal integration runs.
      - name: Run RTF benchmark (Unix)
        if: ${{ always() && !cancelled() && matrix.platform != 'win32' && inputs.run_rtf_benchmarks }}
        continue-on-error: true
        working-directory: ${{ inputs.workdir }}
        shell: bash
        run: node scripts/run-rtf-benchmark-matrix.js
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
          QVAC_BCI_BENCHMARK_DEVICE: ${{ matrix.runner || matrix.os }}
          QVAC_BCI_BENCHMARK_RUNNER: ${{ matrix.runner || matrix.os }}
          QVAC_BCI_BENCHMARK_MATRIX_JSON: ${{ inputs.benchmark_matrix_json || matrix.benchmark_matrix_json }}

      - name: Run RTF benchmark (Windows)
        if: ${{ always() && !cancelled() && matrix.platform == 'win32' && inputs.run_rtf_benchmarks }}
        continue-on-error: true
        working-directory: ${{ inputs.workdir }}
        shell: powershell
        run: node scripts/run-rtf-benchmark-matrix.js
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
          QVAC_BCI_BENCHMARK_DEVICE: ${{ matrix.runner || matrix.os }}
          QVAC_BCI_BENCHMARK_RUNNER: ${{ matrix.runner || matrix.os }}
          QVAC_BCI_BENCHMARK_MATRIX_JSON: ${{ inputs.benchmark_matrix_json || matrix.benchmark_matrix_json }}

      - name: Upload RTF benchmark results
        if: ${{ always() && !cancelled() && inputs.run_rtf_benchmarks }}
        continue-on-error: true
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # 7.0.0
        with:
          name: rtf-results-${{ matrix.runner || matrix.os }}-${{ matrix.platform }}-${{ matrix.arch }}
          path: ${{ inputs.workdir }}/benchmarks/results/rtf-benchmark-*.json
          retention-days: 30
          if-no-files-found: ignore

      - name: Print run state (Unix)
        if: ${{ matrix.platform != 'win32' }}
        working-directory: ${{ inputs.workdir }}
        shell: bash
        run: |
          ls -la prebuilds || true
          tree prebuilds || true
        continue-on-error: true

      - name: Print run state (Windows)
        if: ${{ matrix.platform == 'win32' }}
        working-directory: ${{ inputs.workdir }}
        shell: powershell
        run: |
          Get-ChildItem prebuilds -ErrorAction SilentlyContinue
          tree prebuilds /F 2>$null
        continue-on-error: true
