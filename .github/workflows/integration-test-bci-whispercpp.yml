name: Integration Tests (BCI Whispercpp)

on:
  workflow_dispatch:
    inputs:
      prebuild_package:
        description: "NPM package containing prebuilds (e.g. @qvac/bci-whispercpp@0.1.0)"
        required: false
        type: string
      workdir:
        description: "Relative path to package directory in monorepo"
        type: string
        required: false
        default: "packages/bci-whispercpp"
  workflow_call:
    inputs:
      ref:
        description: "ref"
        type: string
      repository:
        type: string
      prebuild_package:
        description: "NPM package containing prebuilds (e.g. @qvac/bci-whispercpp@0.1.0)"
        required: false
        type: string
      workdir:
        description: "Relative path to package directory in monorepo"
        required: false
        default: "packages/bci-whispercpp"
        type: string

jobs:
  run-integration-tests:
    timeout-minutes: 60
    continue-on-error: true
    runs-on: ${{ matrix.runner || matrix.os }}
    environment: release
    name: ${{ matrix.platform }}-${{ matrix.arch }}-integration-tests

    env:
      GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}

    permissions:
      contents: read
      packages: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            platform: linux
            arch: x64
            runner: qvac-ubuntu2204-x64
          - os: ubuntu-24.04-arm
            platform: linux
            arch: arm64
          - os: macos-14-xlarge
            platform: darwin
            arch: arm64
          - os: macos-15-large
            platform: darwin
            arch: x64
          - os: windows-2025
            platform: win32
            arch: x64
            runner: qvac-win25-x64

    steps:
      - name: Bootstrap
        uses: ./.github/actions/run-desktop-integration-tests/bootstrap
        with:
          runner: ${{ matrix.runner }}
          repository: ${{ inputs.repository }}
          ref: ${{ inputs.ref }}
          pat-token: ${{ secrets.PAT_TOKEN }}

      - name: Install NPM dependencies
        working-directory: ${{ inputs.workdir }}
        shell: bash
        run: npm install

      - name: Resolve prebuilds
        uses: ./.github/actions/run-desktop-integration-tests/resolve-prebuilds
        with:
          platform: ${{ matrix.platform }}
          workdir: ${{ inputs.workdir }}
          prebuild-package: ${{ inputs.prebuild_package }}
          rename: double-underscore

      - name: Install system dependencies
        uses: ./.github/actions/run-desktop-integration-tests/install-system-deps
        with:
          platform: ${{ matrix.platform }}
          arch: ${{ matrix.arch }}
          os: ${{ matrix.os }}
          macos-brew-packages: openblas lapack fftw
          set-windows-vulkan-sdk: "true"

      - name: Run integration test (Unix)
        if: ${{ matrix.platform != 'win32' }}
        working-directory: ${{ inputs.workdir }}
        shell: bash
        run: npm run test:integration
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}

      - name: Run integration test (Windows)
        if: ${{ matrix.platform == 'win32' }}
        working-directory: ${{ inputs.workdir }}
        shell: powershell
        run: npm run test:integration
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
