name: Integration Tests (BCI Whispercpp)

on:
  workflow_dispatch:
    inputs:
      prebuild_package:
        description: "NPM package containing prebuilds (e.g. @qvac/bci-whispercpp@0.1.0)"
        required: false
        type: string
      workdir:
        description: "Relative path to package directory in monorepo"
        type: string
        required: false
        default: "packages/bci-whispercpp"
  workflow_call:
    inputs:
      ref:
        description: "ref"
        type: string
      repository:
        type: string
      prebuild_package:
        description: "NPM package containing prebuilds (e.g. @qvac/bci-whispercpp@0.1.0)"
        required: false
        type: string
      workdir:
        description: "Relative path to package directory in monorepo"
        required: false
        default: "packages/bci-whispercpp"
        type: string

jobs:
  run-integration-tests:
    timeout-minutes: 60
    continue-on-error: true
    runs-on: ${{ matrix.runner || matrix.os }}
    environment: release
    name: ${{ matrix.platform }}-${{ matrix.arch }}${{ matrix.no_gpu == 'true' && '' || '-gpu' }}-integration-tests

    env:
      GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
      # Per-runner GPU toggle (mirrors integration-test-tts-ggml.yml): GPU
      # runners (qvac-*-gpu) leave no_gpu unset so the gpu-smoke runs and
      # asserts the GPU backend; CPU runners and hosted macOS (where the
      # Paravirtual Metal device crashes ggml's encoder) set no_gpu:'true' to
      # skip it. bci ships a Vulkan desktop build (see vcpkg.json), so the Linux
      # GPU runner exercises real desktop GPU. Mobile GPU coverage runs on
      # Device Farm via test/mobile/integration-runtime.cjs (NO_GPU=false).
      NO_GPU: ${{ matrix.no_gpu || 'false' }}

    permissions:
      contents: read
      packages: read

    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x64 on a GPU runner: exercises the Vulkan desktop build
          # (no_gpu unset -> NO_GPU=false -> gpu-smoke runs + asserts GPU).
          - os: ubuntu-22.04
            platform: linux
            arch: x64
            runner: qvac-ubuntu2204-x64-gpu
          - os: ubuntu-24.04-arm
            platform: linux
            arch: arm64
            no_gpu: 'true'
          - os: macos-14-xlarge
            platform: darwin
            arch: arm64
            no_gpu: 'true'
          - os: macos-15-large
            platform: darwin
            arch: x64
            no_gpu: 'true'
          # Use the GPU runner: the prebuilt Windows addon is a Vulkan build that
          # links against the Vulkan loader (vulkan-1.dll), which only exists on
          # qvac-win25-x64-gpu (Vulkan SDK preinstalled at C:\VulkanSDK). On the
          # plain qvac-win25-x64 runner the addon fails to load with Win32 error
          # 126 (ADDON_NOT_FOUND). Mirrors transcription-whispercpp / vla.
          - os: windows-2025
            platform: win32
            arch: x64
            runner: qvac-win25-x64-gpu
            no_gpu: 'true'

    steps:
      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # 6.3.0
        with:
          node-version: lts/*
      - name: Manual Workspace Cleanup
        run: rm -rf "$GITHUB_WORKSPACE" && mkdir -p "$GITHUB_WORKSPACE"
        shell: bash
        working-directory: .
        if: runner.environment != 'github-hosted'

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          repository: ${{ inputs.repository || github.repository }}
          ref: ${{ inputs.ref || github.ref }}
          token: ${{ secrets.PAT_TOKEN }}

      - name: Install NPM dependencies
        working-directory: ${{ inputs.workdir }}
        run: |
          npm install

      - name: Install bare tooling
        run: npm install -g --force bare bare-make

      - name: Download prebuilds from artifact
        if: ${{ !inputs.prebuild_package }}
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # 8.0.1
        with:
          path: ${{ runner.temp }}/prebuilds-staging
          merge-multiple: true

      - name: Move prebuilds from staging to workspace
        if: ${{ !inputs.prebuild_package }}
        run: |
          mkdir -p ${{ inputs.workdir }}/prebuilds
          cp -r ${{ runner.temp }}/prebuilds-staging/* ${{ inputs.workdir }}/prebuilds/ 2>/dev/null || true
          echo "Prebuilds moved from staging area"
        shell: bash

      - name: Download prebuilds from package (Unix)
        if: ${{ inputs.prebuild_package && matrix.platform != 'win32' }}
        working-directory: ${{ inputs.workdir }}
        shell: bash
        run: |
          mkdir -p prebuilds "${{ runner.temp }}/tmp"
          rm -f "${{ runner.temp }}/tmp"/*.tgz
          rm -rf "${{ runner.temp }}/tmp/package"
          npm pack ${{ inputs.prebuild_package }} --pack-destination "${{ runner.temp }}/tmp"
          tar -xzf "${{ runner.temp }}/tmp"/*.tgz -C "${{ runner.temp }}/tmp"
          cp -r "${{ runner.temp }}/tmp"/package/prebuilds/* prebuilds/
          find prebuilds -type f -name 'tetherto__*' | while read f; do
            mv "$f" "${f/tetherto__/qvac__}"
          done

      - name: Download prebuilds from package (Windows)
        if: ${{ inputs.prebuild_package && matrix.platform == 'win32' }}
        working-directory: ${{ inputs.workdir }}
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path prebuilds | Out-Null
          New-Item -ItemType Directory -Force -Path "${{ runner.temp }}\tmp" | Out-Null
          npm pack ${{ inputs.prebuild_package }} --pack-destination "${{ runner.temp }}\tmp"
          $tgz = Get-ChildItem "${{ runner.temp }}\tmp\*.tgz" | Select-Object -First 1
          tar -xzf $tgz.FullName -C "${{ runner.temp }}\tmp"
          Copy-Item -Path "${{ runner.temp }}\tmp\package\prebuilds\*" -Destination prebuilds -Recurse -Force
          Get-ChildItem -Path prebuilds -Recurse -File -Filter 'tetherto__*' | ForEach-Object {
            $newName = $_.Name -replace 'tetherto__', 'qvac__'
            Rename-Item -Path $_.FullName -NewName $newName
          }

      - name: macOS - install whisper dependencies
        if: matrix.platform == 'darwin'
        shell: bash
        run: |
          brew install --quiet openblas lapack fftw

      # The prebuilt Windows addon is a Vulkan build that links against the
      # Vulkan loader (vulkan-1.dll), which ships in C:\VulkanSDK\Bin on the
      # qvac-win25-x64-gpu runner. We export VULKAN_SDK / add its Bin to PATH,
      # but that alone is not enough for bci-whispercpp (see the "stage Vulkan
      # loader next to addon" step below): the .bare statically imports
      # vulkan-1.dll and bare's loader does not search PATH for it, so it fails
      # with Win32 error 126 (ADDON_NOT_FOUND). Mirrors integration-test-vla.yml.
      - if: ${{ matrix.os == 'windows-2025' }}
        name: Set Vulkan SDK Path on Windows Server 2025
        shell: powershell
        run: |
          echo "VULKAN_SDK=C:\VulkanSDK" >> $Env:GITHUB_ENV
          echo "C:\VulkanSDK\Bin" >> $Env:GITHUB_PATH

      # Diagnostic: dump the prebuilt addon's DLL import table so we can see
      # exactly which dependency LoadLibrary is missing when the addon fails to
      # load (Win32 error 126). `dumpbin` ships with the VS Build Tools that the
      # qvac-win25-x64-gpu runner has installed. Mirrors integration-test-vla.yml.
      - if: ${{ matrix.platform == 'win32' }}
        name: Windows - dump addon DLL imports (diagnostic)
        working-directory: ${{ inputs.workdir }}
        shell: powershell
        run: |
          $addon = Get-ChildItem -Recurse -Filter 'qvac__bci-whispercpp*.bare' prebuilds/ | Select-Object -First 1
          if (-not $addon) { Write-Host "no .bare in prebuilds/"; exit 0 }
          Write-Host "addon: $($addon.FullName)"
          $dumpbin = Get-ChildItem -Path "C:\Program Files\Microsoft Visual Studio\2022" -Filter dumpbin.exe -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $dumpbin) { Write-Host "dumpbin not found"; exit 0 }
          & $dumpbin.FullName /dependents $addon.FullName

      # Unlike vla-ggml (which builds ggml with dynamic backends, so ggml-vulkan
      # and its vulkan-1.dll dependency are only loaded lazily when the GPU is
      # used), bci-whispercpp statically links whisper/ggml with Vulkan, so the
      # .bare has a HARD import on vulkan-1.dll that must resolve at load time.
      # bare's addon loader does not resolve that static import via PATH, so we
      # place the Vulkan loader in the addon's own directory (Windows always
      # searches the loaded module's own directory first).
      - if: ${{ matrix.platform == 'win32' }}
        name: Windows - stage Vulkan loader next to addon
        working-directory: ${{ inputs.workdir }}
        shell: powershell
        run: |
          $vk = Get-ChildItem -Path "C:\VulkanSDK" -Filter vulkan-1.dll -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $vk) { Write-Host "vulkan-1.dll not found under C:\VulkanSDK"; exit 1 }
          $dir = Get-ChildItem -Recurse -Filter 'qvac__bci-whispercpp*.bare' prebuilds/ | Select-Object -First 1 | ForEach-Object { $_.DirectoryName }
          if (-not $dir) { Write-Host "no .bare dir in prebuilds/"; exit 1 }
          Write-Host "copying $($vk.FullName) -> $dir"
          Copy-Item -Path $vk.FullName -Destination $dir -Force

      - name: Download models (registry)
        working-directory: ${{ inputs.workdir }}
        shell: bash
        run: npm run download-models
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}

      - name: Run integration test (Unix)
        if: ${{ matrix.platform != 'win32' }}
        working-directory: ${{ inputs.workdir }}
        shell: bash
        run: npm run test:integration
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}

      - name: Run integration test (Windows)
        if: ${{ matrix.platform == 'win32' }}
        working-directory: ${{ inputs.workdir }}
        shell: powershell
        run: npm run test:integration
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}

      - name: Print run state (Unix)
        if: ${{ matrix.platform != 'win32' }}
        working-directory: ${{ inputs.workdir }}
        shell: bash
        run: |
          ls -la prebuilds || true
          tree prebuilds || true
        continue-on-error: true

      - name: Print run state (Windows)
        if: ${{ matrix.platform == 'win32' }}
        working-directory: ${{ inputs.workdir }}
        shell: powershell
        run: |
          Get-ChildItem prebuilds -ErrorAction SilentlyContinue
          tree prebuilds /F 2>$null
        continue-on-error: true
