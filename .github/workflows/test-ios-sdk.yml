name: QVAC iOS Tests (Device Farm)
# Reusable workflow for running iOS tests via AWS Device Farm

on:
  workflow_call:
    inputs:
      working-directory:
        description: "Working directory containing qvac-test.config.js"
        required: false
        type: string
        default: "."
      project-directory:
        description: "Root project directory (where package.json lives)"
        required: true
        type: string
      consumer-timeout:
        description: "Timeout in seconds for consumer connection (mobile needs longer)"
        required: false
        type: number
        default: 600
      filter:
        description: "Filter tests by category or testId prefix (comma-separated)"
        required: false
        type: string
      suite:
        description: "Suite filter (e.g. 'smoke'). Empty = all tests."
        required: false
        type: string
      exclude-suite:
        description: "Exclude suites (comma-separated)"
        required: false
        type: string
      device-farm-timeout:
        description: "Maximum time in minutes to keep Device Farm session alive."
        required: false
        type: number
        default: 60
      device-farm-project-arn:
        description: "AWS Device Farm project ARN"
        required: true
        type: string
      ios-device-pools:
        description: 'JSON array of iOS device pools [{name, arn}]'
        required: true
        type: string
      test-version:
        description: "Git ref to checkout (branch, tag, or SHA). Defaults to trigger ref."
        required: false
        type: string
      cache-models:
        description: |
          Pre-cache mobile bootstrap models on the Device Farm host.
          When true, the build job downloads every model the mobile
          consumer needs into a local SDK cache directory and ships
          them bundled *inside* the Appium test package
          (APPIUM_NODE_TEST_PACKAGE). Device Farm extracts that
          package onto the test host at
          `$DEVICEFARM_TEST_PACKAGE_PATH`, and the iOS test-spec
          `pymobiledevice3 apps push`-es each model into the app's
          Documents/ before launching the test session. This
          replaces the earlier EXTERNAL_DATA path, which AWS caps at
          5 GiB — well below our ~16 GiB bundle.
          When false, only a tiny stub test package is uploaded and
          the app falls through to network downloads at bootstrap.
          Default mirrors `test-sdk.yml` (true).
        required: false
        type: boolean
        default: true
    secrets:
      # MQTT_*, NPM_TOKEN, and Apple signing secrets (TEST_APP_APPLE_*,
      # APPLE_P12_PASSWORD, APPLE_KEYCHAIN_PASSWORD) are typically provided
      # via the release environment (see jobs with `environment: release`).
      # They are declared required: false here so `secrets: inherit` from a
      # caller with no repo-level values does not fail at the workflow_call
      # boundary; the jobs that consume them have environment access.
      # PAT_TOKEN and AWS_OIDC_ROLE_ARN remain required:true because they are
      # repo-level.
      PAT_TOKEN:
        required: true
      NPM_TOKEN:
        required: false
      MQTT_PROTOCOL:
        required: false
      MQTT_HOST:
        required: false
      MQTT_PORT:
        required: false
      MQTT_USERNAME:
        required: false
      MQTT_PASSWORD:
        required: false
      MQTT_CA_CERT:
        required: false
      AWS_OIDC_ROLE_ARN:
        required: true
      TEST_APP_APPLE_DISTRIBUTION_CERTIFICATE:
        required: false
      APPLE_P12_PASSWORD:
        required: false
      TEST_APP_APPLE_PROVISIONING_PROFILE:
        required: false
      APPLE_KEYCHAIN_PASSWORD:
        required: false
      APPLE_TEAM_ID:
        required: false

env:
  APP_BUNDLE_ID: "io.tether.test.qvac"

permissions:
  actions: read
  id-token: write
  contents: read

jobs:
  report-start:
    name: "[ios] report-start"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    outputs:
      comment-ids: ${{ steps.report.outputs.comment-ids }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          sparse-checkout: .github/actions/sdk-e2e-report-start
          sparse-checkout-cone-mode: false

      - name: Post running comment
        id: report
        uses: ./.github/actions/sdk-e2e-report-start
        with:
          family: ios
          platforms: '["ios"]'
          suite: ${{ inputs.suite }}
          filter: ${{ inputs.filter }}
          exclude-suite: ${{ inputs.exclude-suite }}

  build:
    name: "[ios] build"
    runs-on: macos-14
    environment: release
    timeout-minutes: 90
    outputs:
      runId: ${{ steps.runid.outputs.runId }}
      # When `cache-models=true` the build job creates the Appium test
      # package itself (with models bundled in) and exposes the ARN
      # here. The device-farm job uses this ARN directly and skips its
      # own dummy-test-package upload. When false, the value is the
      # empty string and the device-farm job falls back to the
      # legacy "create + upload tiny stub" path.
      test-pkg-arn: ${{ steps.test-pkg-upload.outputs.arn }}
    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
      MQTT_PROTOCOL: ${{ secrets.MQTT_PROTOCOL }}
      MQTT_HOST: ${{ secrets.MQTT_HOST }}
      MQTT_PORT: ${{ secrets.MQTT_PORT }}
      MQTT_USERNAME: ${{ secrets.MQTT_USERNAME }}
      MQTT_PASSWORD: ${{ secrets.MQTT_PASSWORD }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          ref: ${{ inputs.test-version || github.event.pull_request.head.sha || github.sha }}
          token: ${{ secrets.PAT_TOKEN }}
          sparse-checkout: ${{ inputs.project-directory }}

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # 6.3.0
        with:
          node-version: 22

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # 2.2.0
        with:
          bun-version: latest

      - name: Select Xcode
        run: |
          echo "Available Xcode versions:"
          ls -d /Applications/Xcode*.app 2>/dev/null || echo "No Xcode found"

          if [ -d "/Applications/Xcode_16.1.app" ]; then
            sudo xcode-select -s /Applications/Xcode_16.1.app
          elif [ -d "/Applications/Xcode_16.1.0.app" ]; then
            sudo xcode-select -s /Applications/Xcode_16.1.0.app
          elif [ -d "/Applications/Xcode_16.2.app" ]; then
            sudo xcode-select -s /Applications/Xcode_16.2.app
          else
            echo "No suitable Xcode version found (need >= 16.1)"
            exit 1
          fi

          xcodebuild -version
          xcodebuild -showsdks | grep -i ios

      # GitHub-hosted `macos-14` images ship with ~14 GiB of free disk
      # space, while the full mobile model bundle plus a side-by-side
      # `zip -0` archive easily doubles that (the first run on this
      # workflow died with "zip I/O error: No space left on device"
      # after the zip got to ~7 GiB). Reclaim space by deleting every
      # pre-installed component we know we don't need on this job:
      # unused Xcode versions (we already pinned 16.1 in the step
      # above), the bundled Android SDK (this is an iOS pipeline), and
      # a handful of language toolchains the consumer build never
      # touches. Each of these is in the tens of GiB, so even partial
      # cleanup is worth running before model download/zip.
      #
      # Gated on `cache-models` because:
      #   1. It's the only path that needs the extra room.
      #   2. We don't want to wait ~30s freeing disk on every iOS run.
      - name: Free disk space (macOS)
        if: inputs.cache-models
        run: |
          set -uo pipefail
          echo "=== Disk usage before cleanup ==="
          df -h /
          echo "=== /Applications/Xcode*.app sizes ==="
          sudo du -sh /Applications/Xcode*.app 2>/dev/null || true

          # Keep only the Xcode picked by `xcode-select` above. Anything
          # not pointed at by `xcode-select -p` is safe to delete.
          SELECTED_XCODE=$(xcode-select -p | sed -E 's|/Contents/Developer$||')
          echo "Keeping selected Xcode: $SELECTED_XCODE"
          for app in /Applications/Xcode*.app; do
            if [ "$app" != "$SELECTED_XCODE" ]; then
              echo "Removing unused Xcode: $app"
              sudo rm -rf "$app"
            fi
          done

          # iOS workflow — Android SDK is dead weight (~15 GiB).
          if [ -n "${ANDROID_HOME:-}" ] && [ -d "$ANDROID_HOME" ]; then
            echo "Removing Android SDK at $ANDROID_HOME"
            sudo rm -rf "$ANDROID_HOME"
          fi
          if [ -d "$HOME/Library/Android" ]; then
            sudo rm -rf "$HOME/Library/Android"
          fi

          # Misc toolchains the iOS consumer build never invokes. Best
          # effort — silently skipped if absent (a future runner image
          # may drop them).
          sudo rm -rf /Users/runner/.ghcup || true
          sudo rm -rf /Users/runner/.dotnet || true
          sudo rm -rf /Users/runner/Library/Caches/Homebrew || true

          echo "=== Disk usage after cleanup ==="
          df -h /

      - name: Install CocoaPods
        run: |
          sudo gem install cocoapods
          pod --version

      - name: Create Keychain and Import Certificate
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.TEST_APP_APPLE_DISTRIBUTION_CERTIFICATE }}
          P12_PASSWORD: ${{ secrets.APPLE_P12_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.TEST_APP_APPLE_PROVISIONING_PROFILE }}
          KEYCHAIN_PASSWORD: ${{ secrets.APPLE_KEYCHAIN_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
          echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o $PP_PATH

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          PP_UUID=$(/usr/libexec/PlistBuddy -c 'Print :UUID' /dev/stdin <<< $(security cms -D -i $PP_PATH))
          echo "PP_UUID=$PP_UUID" >> $GITHUB_ENV
          echo "Provisioning Profile UUID: $PP_UUID"

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles/$PP_UUID.mobileprovision

          security find-identity -p codesigning -v

      - name: Verify provisioning profile
        run: |
          echo "Verifying provisioning profile..."
          PP_FILE=~/Library/MobileDevice/Provisioning\ Profiles/$PP_UUID.mobileprovision
          if [ ! -f "$PP_FILE" ]; then
            echo "Provisioning profile not found at: $PP_FILE"
            ls -la ~/Library/MobileDevice/Provisioning\ Profiles/
            exit 1
          fi

          security cms -D -i "$PP_FILE" > /tmp/profile.plist

          PROFILE_NAME=$(/usr/libexec/PlistBuddy -c "Print :Name" /tmp/profile.plist 2>/dev/null || echo "Unknown")
          PROFILE_BUNDLE_ID=$(/usr/libexec/PlistBuddy -c "Print :Entitlements:application-identifier" /tmp/profile.plist 2>/dev/null || echo "Unknown")
          PROFILE_TEAM_ID=$(/usr/libexec/PlistBuddy -c "Print :Entitlements:com.apple.developer.team-identifier" /tmp/profile.plist 2>/dev/null || echo "Unknown")

          HAS_DEVICES=$(/usr/libexec/PlistBuddy -c "Print :ProvisionedDevices" /tmp/profile.plist 2>/dev/null && echo "yes" || echo "no")
          PROVISIONS_ALL=$(/usr/libexec/PlistBuddy -c "Print :ProvisionsAllDevices" /tmp/profile.plist 2>/dev/null || echo "false")
          HAS_GET_TASK_ALLOW=$(/usr/libexec/PlistBuddy -c "Print :Entitlements:get-task-allow" /tmp/profile.plist 2>/dev/null || echo "false")

          if [[ "$PROVISIONS_ALL" == "true" ]]; then
            EXPORT_METHOD="enterprise"
          elif [[ "$HAS_DEVICES" == "yes" && "$HAS_GET_TASK_ALLOW" == "true" ]]; then
            EXPORT_METHOD="development"
          elif [[ "$HAS_DEVICES" == "yes" && "$HAS_GET_TASK_ALLOW" == "false" ]]; then
            EXPORT_METHOD="ad-hoc"
          else
            EXPORT_METHOD="app-store"
          fi

          echo "  Name: $PROFILE_NAME"
          echo "  Export Method: $EXPORT_METHOD"
          echo "  Application ID: $PROFILE_BUNDLE_ID"
          echo "  Team ID: $PROFILE_TEAM_ID"
          echo "  Expected Bundle ID: $APP_BUNDLE_ID"

          echo "EXPORT_METHOD=$EXPORT_METHOD" >> $GITHUB_ENV

          BUNDLE_ID_ONLY=$(echo "$PROFILE_BUNDLE_ID" | sed 's/^[^.]*\.//')
          if [[ "$BUNDLE_ID_ONLY" != "$APP_BUNDLE_ID" ]]; then
            echo "Provisioning profile bundle ID mismatch: $BUNDLE_ID_ONLY vs $APP_BUNDLE_ID"
            exit 1
          fi

          echo "Provisioning profile matches expected bundle ID"

      - name: Generate runId
        id: runid
        shell: node {0}
        env:
          EXPECTED_JOB_NAME: "[ios] build"
          PR_NUMBER: ${{ github.event.pull_request.number || '' }}
          CHECKOUT_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          const fs = require('fs');

          (async () => {
          async function fetchJobs(page) {
            const url =
              `https://api.github.com/repos/${process.env.GITHUB_REPOSITORY}` +
              `/actions/runs/${process.env.GITHUB_RUN_ID}` +
              `/attempts/${process.env.GITHUB_RUN_ATTEMPT}/jobs?per_page=100&page=${page}`;
            const res = await fetch(url, {
              headers: {
                Authorization: `Bearer ${process.env.GITHUB_TOKEN}`,
                Accept: 'application/vnd.github+json',
                'X-GitHub-Api-Version': '2022-11-28',
              },
            });
            if (!res.ok) {
              throw new Error(`Failed to list workflow jobs: ${res.status} ${await res.text()}`);
            }
            return res.json();
          }

          const jobs = [];
          for (let page = 1; ; page++) {
            const data = await fetchJobs(page);
            jobs.push(...(data.jobs || []));
            if (!data.jobs || data.jobs.length < 100) break;
          }

          const matches = jobs.filter(
            (job) => job.name === process.env.EXPECTED_JOB_NAME ||
              job.name.endsWith(` / ${process.env.EXPECTED_JOB_NAME}`),
          );
          const runnerMatches = matches.filter((job) => job.runner_name === process.env.RUNNER_NAME);
          const job = runnerMatches.length === 1 ? runnerMatches[0] : matches[0];
          if (!job) {
            throw new Error(`Could not resolve current job id for ${process.env.EXPECTED_JOB_NAME}`);
          }

          const sha = (process.env.CHECKOUT_SHA || process.env.GITHUB_SHA).substring(0, 7);
          const refPart = process.env.PR_NUMBER ? `pr${process.env.PR_NUMBER}-${sha}` : sha;
          // Base36-encode the numeric job.id so the literal decimal digits
          // no longer appear in the runId. GitHub's secret masker does a
          // substring match against masked secret values; if a short numeric
          // secret (e.g. `secrets.MQTT_PORT`) happens to appear as a
          // substring of the decimal job.id, the masker will both redact
          // the runId in logs and silently drop the job-level output with a
          // "Skip output 'runId' since it may contain secret." warning,
          // breaking every downstream `needs.build.outputs.runId` consumer.
          // Encoding job.id as base36 keeps the value unique and stable
          // while structurally eliminating numeric-substring collisions.
          const jobIdEncoded = BigInt(job.id).toString(36);
          const runId = `ios-${refPart}-${jobIdEncoded}`;

          fs.appendFileSync(process.env.GITHUB_OUTPUT, `runId=${runId}\n`, 'utf8');
          console.log(`Generated runId: ${runId}`);
          })().catch((err) => {
            console.error(err);
            process.exit(1);
          });

      - name: Configure npm registries
        shell: node {0}
        run: |
          const fs = require('fs');
          const path = require('path');

          if (!process.env.NPM_TOKEN) { console.log('NPM_TOKEN is empty'); process.exit(1); }
          if (!process.env.PAT_TOKEN) { console.log('PAT_TOKEN is empty'); process.exit(1); }

          const lines = [
            'registry=https://registry.npmjs.org/',
            '@qvac:registry=https://registry.npmjs.org/',
            '@tetherto:registry=https://npm.pkg.github.com/',
            `//registry.npmjs.org/:_authToken=${process.env.NPM_TOKEN}`,
            `//npm.pkg.github.com/:_authToken=${process.env.PAT_TOKEN}`
          ];
          const npmrc = lines.join('\n');
          const target = path.join('${{ inputs.project-directory }}', '.npmrc');
          fs.writeFileSync(target, npmrc, 'utf8');
          console.log(`.npmrc configured at ${target}`);

      - name: Setup MQTT CA certificate
        shell: node {0}
        env:
          CA_CERT: ${{ secrets.MQTT_CA_CERT }}
        run: |
          const fs = require('fs');
          const path = require('path');
          const os = require('os');

          const caCert = (process.env.CA_CERT || '').trim();
          if (caCert) {
            const certsDir = path.join(os.tmpdir(), 'mqtt-certs');
            fs.mkdirSync(certsDir, { recursive: true });
            const caPath = path.join(certsDir, 'ca.crt');
            fs.writeFileSync(caPath, caCert, 'utf8');
            fs.appendFileSync(process.env.GITHUB_ENV, `MQTT_CA_PATH=${caPath}\n`, 'utf8');
            console.log('CA certificate written');
          }

      - name: Install dependencies (project)
        working-directory: ${{ inputs.project-directory }}
        run: bun install

      - name: Build project
        working-directory: ${{ inputs.project-directory }}
        shell: node {0}
        run: |
          const { execSync } = require('child_process');
          const fs = require('fs');

          const packageJson = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          if (packageJson.scripts && packageJson.scripts.build) {
            console.log('Building project...');
            execSync('bun run build', { stdio: 'inherit' });
          } else {
            console.log('No build script found in package.json - skipping');
          }

      - name: Copy .npmrc to consumer directory
        shell: node {0}
        run: |
          const fs = require('fs');
          const path = require('path');
          const projectDir = '${{ inputs.project-directory }}';
          const consumerDir = '${{ inputs.working-directory }}';
          if (consumerDir !== projectDir) {
            const source = path.join(projectDir, '.npmrc');
            const npmrcContent = fs.readFileSync(source, 'utf8');
            fs.writeFileSync(path.join(consumerDir, '.npmrc'), npmrcContent, 'utf8');
            console.log('.npmrc copied to consumer directory');
          }

      - name: Install dependencies (consumer)
        if: inputs.working-directory != inputs.project-directory
        working-directory: ${{ inputs.working-directory }}
        run: npm install --install-links

      - name: Build consumer
        if: inputs.working-directory != inputs.project-directory
        working-directory: ${{ inputs.working-directory }}
        run: bun run build

      # --- Model pre-caching (only when `cache-models: true`) ---------------
      # Architecture (see also test-android-sdk.yml for the parallel flow):
      #   1. Download all bootstrap models the mobile consumer needs into
      #      `.qvac-cache/` (cached across runs via actions/cache).
      #   2. Bundle them *inside* the Appium test package — i.e. zip
      #      package.json + gen-junit.py + qvac-models/*.* and upload as
      #      APPIUM_NODE_TEST_PACKAGE. This is the workaround for
      #      EXTERNAL_DATA's 5 GiB cap; APPIUM_NODE_TEST_PACKAGE has no
      #      documented per-type size limit and is the bucket Lauri's
      #      "we already upload that one" suggestion (Asana
      #      #1214055683820708) points at.
      #   3. The iOS test-spec pulls the models from
      #      `$DEVICEFARM_TEST_PACKAGE_PATH/qvac-models/` and `pmd3 apps
      #      push`-es each one into the app's Documents/ at run time —
      #      see device-farm/test-spec-ios.yml for the per-file push
      #      loop and the cache-pending/cache-marker handshake.
      - name: Configure SDK cache for pre-download
        if: inputs.cache-models
        shell: bash
        env:
          WORKDIR: ${{ inputs.working-directory }}
        run: |
          set -euo pipefail
          CACHE_DIR="$GITHUB_WORKSPACE/$WORKDIR/.qvac-cache"
          mkdir -p "$CACHE_DIR"
          CONFIG_PATH="$GITHUB_WORKSPACE/$WORKDIR/qvac.config.json"
          printf '{ "cacheDirectory": "%s" }\n' "$CACHE_DIR" > "$CONFIG_PATH"
          {
            echo "QVAC_CONFIG_PATH=$CONFIG_PATH"
            echo "QVAC_MOBILE_CACHE_DIR=$CACHE_DIR"
          } >> "$GITHUB_ENV"
          echo "SDK cache directory: $CACHE_DIR"

      - name: Restore models cache (GitHub Actions)
        id: models-cache
        if: inputs.cache-models
        uses: actions/cache/restore@2f8e54208210a422b2efd51efaa6bd6d7ca8920f # v3.4.3
        with:
          path: ${{ inputs.working-directory }}/.qvac-cache
          # See android workflow for cache-key design notes; same keys
          # so Android & iOS runs can share a warm host cache when the
          # registry hasn't changed.
          key: qvac-mobile-models-${{ hashFiles('packages/sdk/models/registry/models.ts') }}
          enableCrossOsArchive: true

      - name: Download mobile bootstrap models
        if: inputs.cache-models && steps.models-cache.outputs.cache-hit != 'true'
        working-directory: ${{ inputs.working-directory }}
        run: |
          echo "Cache miss — downloading mobile bootstrap models..."
          bun run scripts/download-mobile-models.ts

      - name: Save models cache (GitHub Actions)
        if: inputs.cache-models && steps.models-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@2f8e54208210a422b2efd51efaa6bd6d7ca8920f # v3.4.3
        with:
          path: ${{ inputs.working-directory }}/.qvac-cache
          key: qvac-mobile-models-${{ hashFiles('packages/sdk/models/registry/models.ts') }}
          enableCrossOsArchive: true

      - name: Build APPIUM_NODE_TEST_PACKAGE with bundled models
        if: inputs.cache-models
        shell: bash
        env:
          WORKDIR: ${{ inputs.working-directory }}
        run: |
          set -euo pipefail
          PKG_ROOT=/tmp/qvac-test-pkg
          ZIP_OUT=/tmp/qvac-test-pkg.zip
          rm -rf "$PKG_ROOT" "$ZIP_OUT"
          mkdir -p "$PKG_ROOT/qvac-models"

          # Minimal Appium-Node package shape — Device Farm validates
          # `package.json` exists; gen-junit.py is consumed by both
          # platforms' post_test phase.
          echo '{"name":"qvac-test-pkg","version":"1.0.0"}' > "$PKG_ROOT/package.json"
          cp "$GITHUB_WORKSPACE/$WORKDIR/device-farm/gen-junit.py" "$PKG_ROOT/"

          # Copy (not symlink — zip would follow them but archive
          # behaviour is more predictable with real files) the model
          # cache into qvac-models/. The test-spec reads from
          # $DEVICEFARM_TEST_PACKAGE_PATH/qvac-models/ on the test host.
          cp -R "$QVAC_MOBILE_CACHE_DIR/." "$PKG_ROOT/qvac-models/"

          FILE_COUNT=$(find "$PKG_ROOT/qvac-models" -type f | wc -l)
          MODELS_BYTES=$(du -sk "$PKG_ROOT/qvac-models" | awk '{print $1*1024}')
          echo "Bundled $FILE_COUNT model files ($((MODELS_BYTES / 1024 / 1024)) MiB) into test package"

          # `zip -0` (store, no compression) — model weights are already
          # compressed/packed quantisations, deflate adds CPU and saves
          # ~0%. Store-only also halves the test-host extraction wall.
          (cd "$PKG_ROOT" && zip -0 -r "$ZIP_OUT" .)

          # BSD stat on macOS uses -f%z, GNU on Linux uses -c%s. CI's
          # build host for iOS is `macos-14`, so prefer the BSD flag.
          if ZIP_SIZE=$(stat -f%z "$ZIP_OUT" 2>/dev/null); then :; else
            ZIP_SIZE=$(stat -c%s "$ZIP_OUT")
          fi
          echo "Built test package zip: ${ZIP_SIZE} bytes ($((ZIP_SIZE / 1024 / 1024)) MiB)"
          # Intentionally NO client-side size guard — we want the first
          # run to surface whichever AWS surface actually rejects (S3
          # presigned PUT 4xx, get-upload FAILED, or schedule-run
          # validation) so we know the real cap on
          # APPIUM_NODE_TEST_PACKAGE rather than assuming the
          # EXTERNAL_DATA 5 GiB cap also applies here.
          echo "QVAC_TEST_PKG_ZIP=$ZIP_OUT" >> "$GITHUB_ENV"

      - name: Configure AWS credentials (for Device Farm test-package upload)
        if: inputs.cache-models
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # 6.0.0
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: us-west-2

      - name: Upload test package to Device Farm
        id: test-pkg-upload
        if: inputs.cache-models
        shell: bash
        run: |
          set -euo pipefail
          UPLOAD_NAME="qvac-test-pkg-${{ steps.runid.outputs.runId }}.zip"
          UPLOAD_RESPONSE=$(aws devicefarm create-upload \
            --project-arn "${{ inputs.device-farm-project-arn }}" \
            --name "$UPLOAD_NAME" \
            --type "APPIUM_NODE_TEST_PACKAGE" \
            --output json)
          PKG_URL=$(echo "$UPLOAD_RESPONSE" | jq -r '.upload.url')
          PKG_ARN=$(echo "$UPLOAD_RESPONSE" | jq -r '.upload.arn')

          # `--fail-with-body` surfaces S3's <Error>...</Error> XML in
          # the log when the presigned PUT 4xx's (e.g. EntityTooLarge),
          # which is exactly the empirical evidence we need to know
          # whether this upload type also caps at 5 GiB.
          curl --fail-with-body -T "$QVAC_TEST_PKG_ZIP" "$PKG_URL"

          echo "Waiting for APPIUM_NODE_TEST_PACKAGE processing..."
          for i in {1..60}; do
            STATUS=$(aws devicefarm get-upload --arn "$PKG_ARN" --query "upload.status" --output text)
            echo "Test package status (attempt $i/60): $STATUS"
            if [ "$STATUS" = "SUCCEEDED" ]; then
              echo "Test package upload processed"
              break
            fi
            if [ "$STATUS" = "FAILED" ]; then
              echo "Test package upload failed; full response:"
              aws devicefarm get-upload --arn "$PKG_ARN"
              exit 1
            fi
            sleep 10
          done

          echo "arn=$PKG_ARN" >> "$GITHUB_OUTPUT"
          echo "APPIUM_NODE_TEST_PACKAGE ARN: $PKG_ARN"

      # --- End model pre-caching --------------------------------------------

      - name: Build iOS consumer IPA
        working-directory: ${{ inputs.working-directory }}
        env:
          NPM_CONFIG_USERCONFIG: ${{ github.workspace }}/${{ inputs.working-directory }}/.npmrc
          QVAC_IOS_BUNDLE_ID: ${{ env.APP_BUNDLE_ID }}
          QVAC_IOS_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          QVAC_IOS_CODE_SIGN_IDENTITY: "Apple Distribution"
          QVAC_IOS_PROVISIONING_PROFILE: ${{ env.PP_UUID }}
          QVAC_IOS_EXPORT_METHOD: ${{ env.EXPORT_METHOD }}
        run: |
          echo "Building iOS consumer IPA..."
          echo "   Run ID: ${{ steps.runid.outputs.runId }}"
          echo "   Bundle ID: $QVAC_IOS_BUNDLE_ID"
          echo "   MQTT Host: $MQTT_HOST"

          npx qvac-test build:consumer:ios \
            --runId "${{ steps.runid.outputs.runId }}" \
            --config .

          IPA_PATH="build/consumers/ios/consumer.ipa"
          if [ -f "$IPA_PATH" ]; then
            echo "IPA built successfully"
            ls -lh "$IPA_PATH"
          else
            echo "IPA not found at $IPA_PATH"
            exit 1
          fi

      - name: Upload IPA artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # 7.0.0
        with:
          name: consumer-ipa-ios
          path: ${{ inputs.working-directory }}/build/consumers/ios/consumer.ipa
          retention-days: 7

  device-farm:
    name: "[ios] device-farm"
    needs: build
    runs-on: ubuntu-latest
    environment: release
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        device: ${{ fromJson(inputs.ios-device-pools) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          ref: ${{ inputs.test-version || github.event.pull_request.head.sha || github.sha }}
          sparse-checkout: ${{ inputs.working-directory }}/device-farm

      - name: Download IPA artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # 8.0.1
        with:
          name: consumer-ipa-ios
          path: ./ipa

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # 6.0.0
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: us-west-2

      - name: Upload IPA to Device Farm
        id: upload-app
        run: |
          echo "Uploading IPA to Device Farm for ${{ matrix.device.name }}..."

          IPA_FILE=$(find ./ipa -name "*.ipa" | head -1)
          if [ -z "$IPA_FILE" ]; then
            echo "No IPA file found in ./ipa"
            ls -la ./ipa/
            exit 1
          fi

          UPLOAD_RESPONSE=$(aws devicefarm create-upload \
            --project-arn "${{ inputs.device-farm-project-arn }}" \
            --name "consumer-${{ needs.build.outputs.runId }}-${{ matrix.device.name }}.ipa" \
            --type "IOS_APP" \
            --output json)

          APP_UPLOAD_URL=$(echo $UPLOAD_RESPONSE | jq -r '.upload.url')
          APP_UPLOAD_ARN=$(echo $UPLOAD_RESPONSE | jq -r '.upload.arn')

          echo "app-arn=$APP_UPLOAD_ARN" >> $GITHUB_OUTPUT

          curl -T "$IPA_FILE" "$APP_UPLOAD_URL"

          echo "Waiting for IPA to be processed..."
          for i in {1..30}; do
            STATUS=$(aws devicefarm get-upload --arn "$APP_UPLOAD_ARN" --query "upload.status" --output text)
            echo "Status (attempt $i/30): $STATUS"

            if [ "$STATUS" = "SUCCEEDED" ]; then
              echo "IPA upload successful"
              break
            fi

            if [ "$STATUS" = "FAILED" ]; then
              echo "IPA upload failed"
              aws devicefarm get-upload --arn "$APP_UPLOAD_ARN"
              exit 1
            fi

            sleep 10
          done

      # Fallback only: when `cache-models=false` the build job did NOT
      # upload a test package, so we create a tiny stub one here.
      # When `cache-models=true` we instead reuse the build job's
      # `test-pkg-arn` (which is the same package shape + bundled
      # models) and skip this step entirely — see the
      # `if: needs.build.outputs.test-pkg-arn == ''` gate.
      - name: Create and upload dummy test package
        id: upload-test-pkg
        if: needs.build.outputs.test-pkg-arn == ''
        run: |
          mkdir -p /tmp/dummy-test-pkg
          echo '{"name":"qvac-test-stub","version":"1.0.0"}' > /tmp/dummy-test-pkg/package.json
          cp "${{ inputs.working-directory }}/device-farm/gen-junit.py" /tmp/dummy-test-pkg/
          (cd /tmp/dummy-test-pkg && zip -r /tmp/dummy-test-pkg.zip .)

          PKG_RESPONSE=$(aws devicefarm create-upload \
            --project-arn "${{ inputs.device-farm-project-arn }}" \
            --name "qvac-test-stub.zip" \
            --type "APPIUM_NODE_TEST_PACKAGE" \
            --output json)

          PKG_URL=$(echo $PKG_RESPONSE | jq -r '.upload.url')
          PKG_ARN=$(echo $PKG_RESPONSE | jq -r '.upload.arn')

          echo "pkg-arn=$PKG_ARN" >> $GITHUB_OUTPUT

          curl -T /tmp/dummy-test-pkg.zip "$PKG_URL"

          for i in {1..15}; do
            STATUS=$(aws devicefarm get-upload --arn "$PKG_ARN" --query "upload.status" --output text)
            if [ "$STATUS" = "SUCCEEDED" ]; then
              echo "Test package upload successful"
              break
            fi
            if [ "$STATUS" = "FAILED" ]; then
              echo "Test package upload failed"
              aws devicefarm get-upload --arn "$PKG_ARN"
              exit 1
            fi
            sleep 5
          done

      - name: Upload test spec to Device Farm
        id: upload-spec
        run: |
          SPEC_RESPONSE=$(aws devicefarm create-upload \
            --project-arn "${{ inputs.device-farm-project-arn }}" \
            --name "qvac-ios-test-spec-${{ needs.build.outputs.runId }}.yml" \
            --type "APPIUM_NODE_TEST_SPEC" \
            --output json)

          SPEC_URL=$(echo $SPEC_RESPONSE | jq -r '.upload.url')
          SPEC_ARN=$(echo $SPEC_RESPONSE | jq -r '.upload.arn')

          echo "spec-arn=$SPEC_ARN" >> $GITHUB_OUTPUT

          TIMEOUT_SECONDS=$(( ${{ inputs.device-farm-timeout || 90 }} * 60 ))
          sed -i "s/DEVICEFARM_TIMEOUT:-5400/DEVICEFARM_TIMEOUT:-${TIMEOUT_SECONDS}/" "${{ inputs.working-directory }}/device-farm/test-spec-ios.yml"
          curl -T "${{ inputs.working-directory }}/device-farm/test-spec-ios.yml" "$SPEC_URL"

          echo "Waiting for test spec to be processed..."
          for i in {1..15}; do
            STATUS=$(aws devicefarm get-upload --arn "$SPEC_ARN" --query "upload.status" --output text)
            echo "Status (attempt $i/15): $STATUS"

            if [ "$STATUS" = "SUCCEEDED" ]; then
              echo "Test spec upload successful"
              break
            fi

            if [ "$STATUS" = "FAILED" ]; then
              echo "Test spec upload failed"
              aws devicefarm get-upload --arn "$SPEC_ARN"
              exit 1
            fi

            sleep 5
          done

      - name: Schedule Device Farm run
        id: schedule
        env:
          # When the build job uploaded a models-bundled test package
          # we use its ARN; otherwise fall back to the dummy one this
          # job created above.
          BUILD_PKG_ARN: ${{ needs.build.outputs.test-pkg-arn }}
          DUMMY_PKG_ARN: ${{ steps.upload-test-pkg.outputs.pkg-arn }}
        run: |
          echo "Scheduling Device Farm run on ${{ matrix.device.name }}..."

          RUN_NAME="ios-${{ matrix.device.name }}-${{ github.run_number }}-${{ github.run_attempt }}"

          if [ -n "$BUILD_PKG_ARN" ]; then
            TEST_PKG_ARN="$BUILD_PKG_ARN"
            echo "Using build job's bundled-models test package: $TEST_PKG_ARN"
          else
            TEST_PKG_ARN="$DUMMY_PKG_ARN"
            echo "Using device-farm job's stub test package: $TEST_PKG_ARN"
          fi

          RUN_ARN=$(aws devicefarm schedule-run \
            --project-arn "${{ inputs.device-farm-project-arn }}" \
            --device-pool-arn "${{ matrix.device.arn }}" \
            --app-arn "${{ steps.upload-app.outputs.app-arn }}" \
            --name "$RUN_NAME" \
            --test "type=APPIUM_NODE,testPackageArn=$TEST_PKG_ARN,testSpecArn=${{ steps.upload-spec.outputs.spec-arn }}" \
            --execution-configuration jobTimeoutMinutes=${{ inputs.device-farm-timeout }} \
            --query 'run.arn' --output text)

          echo "run-arn=$RUN_ARN" >> $GITHUB_OUTPUT
          echo "Device Farm run scheduled: $RUN_ARN"

          PROJECT_ID=$(echo "${{ inputs.device-farm-project-arn }}" | sed -n 's/.*:project:\(.*\)/\1/p')
          RUN_ID=$(echo "$RUN_ARN" | sed -n 's/.*:run:[^/]*\/\(.*\)/\1/p')
          DF_URL="https://us-west-2.console.aws.amazon.com/devicefarm/home#/mobile/projects/${PROJECT_ID}/runs/${RUN_ID}"
          echo "Device Farm Console (${{ matrix.device.name }}): $DF_URL"

          echo "### Device Farm: ${{ matrix.device.name }}" >> $GITHUB_STEP_SUMMARY
          echo "[Open Device Farm Console]($DF_URL)" >> $GITHUB_STEP_SUMMARY

      - name: Save run ARN
        id: save-arn
        run: |
          SAFE_NAME=$(echo "${{ matrix.device.name }}" | tr ' /\\:*?"<>|' '_')
          echo "${{ steps.schedule.outputs.run-arn }}" > "${SAFE_NAME}.txt"
          echo "safe-name=${SAFE_NAME}" >> $GITHUB_OUTPUT

      - name: Upload run ARN
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # 7.0.0
        with:
          name: device-farm-arn-ios-${{ needs.build.outputs.runId }}-${{ steps.save-arn.outputs.safe-name }}
          path: ${{ steps.save-arn.outputs.safe-name }}.txt
          retention-days: 1

  run-producer:
    name: "[ios] run-producer"
    needs: build
    runs-on: ubuntu-latest
    environment: release
    timeout-minutes: 90
    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
      MQTT_PROTOCOL: ${{ secrets.MQTT_PROTOCOL }}
      MQTT_HOST: ${{ secrets.MQTT_HOST }}
      MQTT_PORT: ${{ secrets.MQTT_PORT }}
      MQTT_USERNAME: ${{ secrets.MQTT_USERNAME }}
      MQTT_PASSWORD: ${{ secrets.MQTT_PASSWORD }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          ref: ${{ inputs.test-version || github.event.pull_request.head.sha || github.sha }}
          token: ${{ secrets.PAT_TOKEN }}
          sparse-checkout: ${{ inputs.project-directory }}

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # 6.3.0
        with:
          node-version: 22

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # 2.2.0
        with:
          bun-version: latest

      - name: Configure npm registries
        shell: node {0}
        run: |
          const fs = require('fs');
          const path = require('path');

          const lines = [
            'registry=https://registry.npmjs.org/',
            '@qvac:registry=https://registry.npmjs.org/',
            '@tetherto:registry=https://npm.pkg.github.com/',
            `//registry.npmjs.org/:_authToken=${process.env.NPM_TOKEN}`,
            `//npm.pkg.github.com/:_authToken=${process.env.PAT_TOKEN}`
          ];
          const npmrc = lines.join('\n');
          const target = path.join('${{ inputs.project-directory }}', '.npmrc');
          fs.writeFileSync(target, npmrc, 'utf8');

      - name: Setup MQTT CA certificate
        shell: node {0}
        env:
          CA_CERT: ${{ secrets.MQTT_CA_CERT }}
        run: |
          const fs = require('fs');
          const path = require('path');
          const os = require('os');

          const caCert = (process.env.CA_CERT || '').trim();
          if (caCert) {
            const certsDir = path.join(os.tmpdir(), 'mqtt-certs');
            fs.mkdirSync(certsDir, { recursive: true });
            const caPath = path.join(certsDir, 'ca.crt');
            fs.writeFileSync(caPath, caCert, 'utf8');
            fs.appendFileSync(process.env.GITHUB_ENV, `MQTT_CA_PATH=${caPath}\n`, 'utf8');
            console.log('CA certificate written');
          }

      - name: Copy .npmrc to consumer directory
        shell: node {0}
        run: |
          const fs = require('fs');
          const path = require('path');
          const projectDir = '${{ inputs.project-directory }}';
          const consumerDir = '${{ inputs.working-directory }}';
          if (consumerDir !== projectDir) {
            const source = path.join(projectDir, '.npmrc');
            const npmrcContent = fs.readFileSync(source, 'utf8');
            fs.writeFileSync(path.join(consumerDir, '.npmrc'), npmrcContent, 'utf8');
          }

      - name: Install dependencies (project)
        working-directory: ${{ inputs.project-directory }}
        run: bun install

      - name: Build project
        working-directory: ${{ inputs.project-directory }}
        shell: node {0}
        run: |
          const { execSync } = require('child_process');
          const fs = require('fs');

          const packageJson = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          if (packageJson.scripts && packageJson.scripts.build) {
            execSync('bun run build', { stdio: 'inherit' });
          }

      - name: Install dependencies (consumer)
        if: inputs.working-directory != inputs.project-directory
        working-directory: ${{ inputs.working-directory }}
        run: npm install --install-links

      - name: Build consumer
        if: inputs.working-directory != inputs.project-directory
        working-directory: ${{ inputs.working-directory }}
        run: bun run build

      - name: Run producer
        working-directory: ${{ inputs.working-directory }}
        run: |
          echo "Starting producer..."
          echo "   Run ID: ${{ needs.build.outputs.runId }}"
          echo "   Consumer timeout: ${{ inputs.consumer-timeout }}s"
          echo "   Filter: ${{ inputs.filter || '(none)' }}"
          echo "   Suite: ${{ inputs.suite || '(all)' }}"
          echo "   Exclude suite: ${{ inputs.exclude-suite || '(none)' }}"

          FILTER_ARG=""
          if [ -n "${{ inputs.filter }}" ]; then
            FILTER_ARG="--filter=${{ inputs.filter }}"
          fi

          SUITE_ARG=""
          if [ -n "${{ inputs.suite }}" ]; then
            SUITE_ARG="--suite=${{ inputs.suite }}"
          fi

          EXCLUDE_SUITE_ARG=""
          if [ -n "${{ inputs.exclude-suite }}" ]; then
            EXCLUDE_SUITE_ARG="--exclude-suite=${{ inputs.exclude-suite }}"
          fi

          npx qvac-test run:producer \
            --runId "${{ needs.build.outputs.runId }}" \
            --consumer-timeout "${{ inputs.consumer-timeout }}" \
            --config . \
            --report-dir=./reports \
            $FILTER_ARG \
            $SUITE_ARG \
            $EXCLUDE_SUITE_ARG

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # 7.0.0
        with:
          name: results-ios
          path: ${{ inputs.working-directory }}/reports/
          retention-days: 30

      - name: Download baseline (best-effort)
        if: always() && github.event.pull_request.base.ref != ''
        uses: dawidd6/action-download-artifact@20319c5641d495c8a52e688b7dc5fada6c3a9fbc # v8
        continue-on-error: true
        with:
          workflow: test-ios-sdk.yml
          branch: ${{ github.event.pull_request.base.ref }}
          name: baseline-ios
          path: ${{ inputs.working-directory }}/baseline
          github_token: ${{ github.token }}
          if_no_artifact_found: warn

      - name: Compare vs baseline
        if: always()
        working-directory: ${{ inputs.working-directory }}
        shell: node {0}
        run: |
          const fs = require('fs');
          const path = require('path');
          const { execSync } = require('child_process');

          if (!fs.existsSync('baseline')) {
            console.log('No baseline directory - skipping compare.');
            process.exit(0);
          }
          const baselineFiles = fs.readdirSync('baseline').filter((f) => f.endsWith('.json'));
          if (baselineFiles.length === 0) {
            console.log('Baseline directory contains no json files - skipping compare.');
            process.exit(0);
          }
          if (!fs.existsSync('reports')) {
            console.log('No reports directory - skipping compare.');
            process.exit(0);
          }
          const currentFiles = fs.readdirSync('reports')
            .filter((f) => f.startsWith('results-') && f.endsWith('.json'));
          if (currentFiles.length === 0) {
            console.log('No current results json - skipping compare.');
            process.exit(0);
          }

          const baseline = path.join('baseline', baselineFiles[0]);
          const current = path.join('reports', currentFiles[0]);
          execSync(
            `npx qvac-test report:compare --baseline "${baseline}" --current "${current}" --output "comparison-ios.json"`,
            { stdio: 'inherit' }
          );

      - name: Format comparison
        if: always()
        working-directory: ${{ inputs.working-directory }}
        shell: node {0}
        run: |
          const fs = require('fs');
          const { execSync } = require('child_process');

          const input = 'comparison-ios.json';
          if (!fs.existsSync(input)) {
            console.log('No comparison json - skipping format.');
            process.exit(0);
          }
          execSync(
            `npx qvac-test report:format --input "${input}" --format markdown --output "section-ios.md"`,
            { stdio: 'inherit' }
          );

      - name: Upload report section
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # 7.0.0
        with:
          name: report-section-ios
          path: |
            ${{ inputs.working-directory }}/section-*.md
            ${{ inputs.working-directory }}/comparison-*.json
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload baseline (main/develop only)
        if: always() && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # 7.0.0
        with:
          name: baseline-ios
          path: ${{ inputs.working-directory }}/reports/results-*.json
          retention-days: 90
          overwrite: true

  cleanup-device-farm:
    name: "[ios] cleanup-device-farm"
    needs: [build, run-producer, device-farm]
    if: always()
    runs-on: ubuntu-latest
    environment: release
    timeout-minutes: 35
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # 6.0.0
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: us-west-2

      - name: Download run ARNs
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # 8.0.1
        with:
          pattern: device-farm-arn-ios-${{ needs.build.outputs.runId }}-*
          path: ./run-arns
          merge-multiple: true

      - name: Stop Device Farm runs and download artifacts
        run: |
          echo "Cleaning up Device Farm runs for runId: ${{ needs.build.outputs.runId }}"
          mkdir -p ./device-farm-logs

          for arn_file in run-arns/*.txt; do
            if [ -f "$arn_file" ]; then
              RUN_ARN=$(cat "$arn_file")
              DEVICE_NAME=$(basename "$arn_file" .txt)

              STATUS=$(aws devicefarm get-run --arn "$RUN_ARN" --query 'run.status' --output text 2>/dev/null || echo "UNKNOWN")
              echo "Device $DEVICE_NAME: status=$STATUS"

              if [ "$STATUS" = "RUNNING" ] || [ "$STATUS" = "PENDING" ]; then
                echo "Stopping run: $RUN_ARN"
                aws devicefarm stop-run --arn "$RUN_ARN" || true
              fi

              echo "Waiting for run to finish: $DEVICE_NAME (up to 30 min)..."
              for attempt in $(seq 1 120); do
                STATUS=$(aws devicefarm get-run --arn "$RUN_ARN" --query 'run.status' --output text 2>/dev/null || echo "UNKNOWN")
                if [ "$STATUS" = "COMPLETED" ] || [ "$STATUS" = "STOPPED" ] || [ "$STATUS" = "ERRORED" ]; then
                  echo "Run $DEVICE_NAME finished with status: $STATUS"
                  break
                fi
                if [ $((attempt % 6)) -eq 0 ]; then
                  echo "Run $DEVICE_NAME still $STATUS (${attempt}/120, $((attempt * 15))s elapsed)..."
                fi
                sleep 15
              done

              DEVICE_DIR="./device-farm-logs/$DEVICE_NAME"
              mkdir -p "$DEVICE_DIR"

              echo "Downloading Customer Artifacts for $DEVICE_NAME..."
              JOBS=$(aws devicefarm list-jobs --arn "$RUN_ARN" --query 'jobs[*].arn' --output text 2>/dev/null || echo "")
              for JOB_ARN in $JOBS; do
                aws devicefarm list-artifacts \
                  --arn "$JOB_ARN" \
                  --type FILE \
                  --query "artifacts[?contains(name,'Customer')].[name,extension,url]" \
                  --output text 2>/dev/null \
                | while IFS=$'\t' read -r NAME EXT URL; do
                    if [ -z "$URL" ] || [ "$URL" = "None" ]; then
                      continue
                    fi
                    SAFE_NAME=$(echo "$NAME" | tr ' /' '__')
                    echo "  Downloading ${SAFE_NAME}.${EXT}"
                    curl -sS -o "$DEVICE_DIR/${SAFE_NAME}.${EXT}" "$URL" || echo "  Failed: ${SAFE_NAME}.${EXT}"
                  done
              done

              echo "Artifacts for $DEVICE_NAME:"
              ls -lh "$DEVICE_DIR" 2>/dev/null || echo "  (empty)"
            fi
          done

      - name: Upload Device Farm logs
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # 7.0.0
        with:
          name: device-farm-logs-ios-${{ needs.build.outputs.runId }}
          path: ./device-farm-logs/
          retention-days: 30

  report-finalize:
    name: "[ios] report-finalize"
    needs: [report-start, run-producer]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          sparse-checkout: .github/actions/sdk-e2e-report-finalize
          sparse-checkout-cone-mode: false

      - uses: ./.github/actions/sdk-e2e-report-finalize
        with:
          family: ios
          platforms: '["ios"]'
          comment-ids: ${{ needs.report-start.outputs.comment-ids }}
          suite: ${{ inputs.suite }}
          filter: ${{ inputs.filter }}
          exclude-suite: ${{ inputs.exclude-suite }}

  report-artifacts-refresh:
    name: "[ios] report-artifacts-refresh"
    needs: [report-start, run-producer, cleanup-device-farm]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          sparse-checkout: .github/actions/sdk-e2e-report-finalize
          sparse-checkout-cone-mode: false

      - uses: ./.github/actions/sdk-e2e-report-finalize
        with:
          family: ios
          platforms: '["ios"]'
          comment-ids: ${{ needs.report-start.outputs.comment-ids }}
          suite: ${{ inputs.suite }}
          filter: ${{ inputs.filter }}
          exclude-suite: ${{ inputs.exclude-suite }}
          update-summary: "false"
