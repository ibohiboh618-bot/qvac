name: On Merge Trigger (Decoder-audio)

on:
  push:
    branches:
      - main
      - release-*
      - feature-*
      - tmp-*
    paths:
      - "packages/decoder-audio/**"
      - ".github/workflows/*decoder-audio*.yml"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish with"
        required: false
        default: "dev"
        type: choice
        options:
          - latest
          - dev
      npm_tag:
        description: "NPM dist-tag (default: latest). e.g. release-1.x"
        required: false
        default: ""
        type: string

permissions:
  contents: read
  pull-requests: read
  packages: read
  id-token: write

jobs:
  label-gate:
    name: Authorise (label-gate)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    outputs:
      authorised: ${{ steps.gate.outputs.authorised }}
    steps:
      - name: Checkout (label-gate action only)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # 7.0.0
        with:
          ref: ${{ github.event.repository.default_branch }}
          sparse-checkout: .github/actions/label-gate
          sparse-checkout-cone-mode: false
      - name: Run label-gate
        id: gate
        uses: ./.github/actions/label-gate
        with:
          github-token: ${{ secrets.PAT_TOKEN }}
  publish-logic:
    runs-on: ubuntu-latest
    outputs:
      publish_main: ${{ steps.logic.outputs.publish_main }}
      publish_release: ${{ steps.logic.outputs.publish_release }}
      publish_feature: ${{ steps.logic.outputs.publish_feature }}
      publish_tmp: ${{ steps.logic.outputs.publish_tmp }}
      gpr_tag: ${{ steps.logic.outputs.gpr_tag }}
    steps:
      - id: logic
        uses: tetherto/qvac-actions/npm-publish-logic@38693d9315c5fb6bba1354d8d1ef9823bf6c10a3 # 0.1.0

  release-merge-guard:
    name: Release Merge Guard
    if: >-
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && startsWith(github.ref_name, 'release-')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # 7.0.0
        with:
          fetch-depth: 0
      - uses: ./.github/actions/release-merge-guard
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          base-ref: ${{ github.ref_name }}
          base-sha: ${{ github.event.before }}
          head-sha: ${{ github.sha }}
          package-slug: decoder-audio
          package-json-path: packages/decoder-audio/package.json
          changelog-path: packages/decoder-audio/CHANGELOG.md

  run-integration-tests:
    needs:
      - publish-logic
      - label-gate
    if: |-
      needs.label-gate.outputs.authorised == 'true' && (needs.publish-logic.outputs.publish_main == 'true' || needs.publish-logic.outputs.publish_release == 'true' || needs.publish-logic.outputs.publish_feature == 'true' || needs.publish-logic.outputs.publish_tmp == 'true')
    uses: ./.github/workflows/integration-test-decoder-audio.yml
    secrets: inherit
    with:
      repository: ${{ github.repository }}
      ref: ${{ github.sha }}
      workdir: "packages/decoder-audio"

  mobile-integration-tests:
    needs:
      - publish-logic
      - label-gate
    permissions:
      contents: read
      packages: read
      pull-requests: write
      id-token: write
    if: |-
      needs.label-gate.outputs.authorised == 'true' && (needs.publish-logic.outputs.publish_main == 'true' || needs.publish-logic.outputs.publish_release == 'true' || needs.publish-logic.outputs.publish_feature == 'true' || needs.publish-logic.outputs.publish_tmp == 'true')
    uses: ./.github/workflows/integration-mobile-test-decoder-audio.yml
    secrets: inherit
    with:
      repository: ${{ github.repository }}
      ref: ${{ github.sha }}
      workdir: "packages/decoder-audio"

  publish-gpr:
    needs:
      - publish-logic
      - run-integration-tests
      - mobile-integration-tests
      - label-gate
    if: |-
      needs.label-gate.outputs.authorised == 'true' && (needs.publish-logic.outputs.publish_main == 'true' || needs.publish-logic.outputs.publish_feature == 'true' || needs.publish-logic.outputs.publish_tmp == 'true')
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # 7.0.0
        with:
          fetch-depth: 0

      - name: Publish to GitHub Packages
        uses: ./.github/actions/publish-library-to-gpr
        with:
          secret-token: ${{ secrets.GITHUB_TOKEN }}
          npm-token: ${{ secrets.NPM_TOKEN }}
          tag: ${{ needs.publish-logic.outputs.gpr_tag }}
          workdir: "packages/decoder-audio"
          name-suffix: "-mono"

  publish-release-npm:
    needs:
      - publish-logic
      - release-merge-guard
      - run-integration-tests
      - mobile-integration-tests
      - label-gate
    if: |-
      needs.label-gate.outputs.authorised == 'true' && (!cancelled() && needs.publish-logic.outputs.publish_release == 'true' && needs.release-merge-guard.result == 'success')
    runs-on: ubuntu-latest
    environment: npm
    outputs:
      published_version: ${{ steps.publish.outputs.npm_published_version }}
    permissions:
      contents: write
      packages: write
      id-token: write
    steps:
      - name: Validate npm_tag input
        if: inputs.npm_tag != ''
        shell: bash
        run: |
          tag="${{ inputs.npm_tag }}"
          if ! echo "$tag" | grep -qE '^[a-zA-Z0-9][a-zA-Z0-9._-]*$'; then
            echo "::error::Invalid npm dist-tag '$tag'. Must match ^[a-zA-Z0-9][a-zA-Z0-9._-]*$ (e.g. release-1.x)"
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # 7.0.0

      - name: Determine dist-tag
        id: dist-tag
        uses: tetherto/qvac-actions/npm-dist-tag-determination@38693d9315c5fb6bba1354d8d1ef9823bf6c10a3 # 0.1.0
        with:
          workdir: "packages/decoder-audio"
          tag: ${{ inputs.npm_tag }}

      - name: Publish to NPM Package Registry
        id: publish
        uses: tetherto/qvac-actions/publish-library-to-npm@38693d9315c5fb6bba1354d8d1ef9823bf6c10a3 # 0.1.0
        with:
          tag: ${{ steps.dist-tag.outputs.tag }}
          workdir: "packages/decoder-audio"

  # Tag the published version (no GitHub Release; SDK-only releases policy)
  create-tag:
    needs: [publish-release-npm]
    if: |
      !cancelled() &&
      needs.publish-release-npm.result == 'success' &&
      needs.publish-release-npm.outputs.published_version != ''
    permissions:
      contents: write
    uses: ./.github/workflows/create-release-tag.yml
    with:
      repo_name: "decoder-audio"
      published_version: ${{ needs.publish-release-npm.outputs.published_version }}
