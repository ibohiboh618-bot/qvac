name: Integration Tests (OCR-GGML)

on:
  workflow_dispatch:
    inputs:
      prebuild_package:
        description: "NPM package containing prebuilds (e.g. @qvac/ocr-ggml@0.1.0)"
        required: false
        type: string
  workflow_call:
    inputs:
      ref:
        description: "ref"
        type: string
        required: false
      repository:
        type: string
        required: false
        default: "tetherto/qvac"
      model:
        type: string
        required: false
      workdir:
        description: "Working directory inside the repo (monorepo package path)"
        type: string
        required: false
        default: "packages/ocr-ggml"

permissions:
  contents: read

env:
  PKG_DIR: packages/ocr-ggml

jobs:
  run-integration-tests:
    timeout-minutes: 30
    runs-on: ${{ matrix.runner }}
    environment: release
    name: test-${{ matrix.platform }}-${{ matrix.arch }}

    permissions:
      contents: read
      packages: read
      id-token: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            platform: linux
            arch: x64
            runner: qvac-ubuntu2204-x64
          - os: ubuntu-24.04
            platform: linux
            arch: x64
            runner: qvac-ubuntu2404-x64-gpu
          - os: ubuntu-24.04-arm
            platform: linux
            arch: arm64
            runner: ubuntu-24.04-arm
          - os: ubuntu-22.04-arm
            platform: linux
            arch: arm64
            runner: ubuntu-22.04-arm
          - os: macos-15-xlarge
            platform: darwin
            arch: arm64
            runner: macos-15-xlarge
          - os: windows-2025
            platform: win32
            arch: x64
            runner: qvac-win25-x64-gpu

    steps:
      - name: Windows - enable git long paths
        if: ${{ matrix.platform == 'win32' }}
        shell: powershell
        run: |
          git config --global core.longpaths true
          git config --global url."https://${{ secrets.PAT_TOKEN }}:@github.com/".insteadOf "https://github.com/"
          git config --global url."https://${{ secrets.PAT_TOKEN }}:@github.com/".insteadOf "git@github.com:"

      - name: Manual Workspace Cleanup
        if: runner.environment != 'github-hosted'
        shell: bash
        run: rm -rf "$GITHUB_WORKSPACE" && mkdir -p "$GITHUB_WORKSPACE"

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          repository: ${{ inputs.repository || github.repository }}
          ref: ${{ inputs.ref || github.ref }}
          token: ${{ secrets.PAT_TOKEN }}

      - name: Bootstrap
        uses: ./.github/actions/run-desktop-integration-tests/bootstrap

      - name: Install NPM dependencies
        working-directory: ${{ inputs.workdir || env.PKG_DIR }}
        shell: bash
        run: npm install

      - name: Resolve prebuilds
        uses: ./.github/actions/run-desktop-integration-tests/resolve-prebuilds
        with:
          platform: ${{ matrix.platform }}
          workdir: ${{ inputs.workdir || env.PKG_DIR }}
          prebuild-package: ${{ inputs.prebuild_package }}

      - name: Install system dependencies
        uses: ./.github/actions/run-desktop-integration-tests/install-system-deps
        with:
          platform: ${{ matrix.platform }}
          arch: ${{ matrix.arch }}
          os: ${{ matrix.os }}
          install-gpp-13: "true"

      # EasyOCR + Doctr GGUFs live in S3 under date-stamped snapshot
      # directories. Bump the date segments in download-command when new
      # snapshots are published (and the cache key invalidates with this file).
      - name: Fetch models
        uses: ./.github/actions/run-desktop-integration-tests/fetch-models
        with:
          runner: ${{ matrix.runner }}
          aws-role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          cache-package: ocr-ggml
          cache-paths: packages/ocr-ggml/models
          cache-hash-files-glob: .github/workflows/integration-test-ocr-ggml.yml
          download-working-directory: ${{ inputs.workdir || env.PKG_DIR }}
          download-command: |
            mkdir -p models
            aws s3 cp \
              "s3://${{ secrets.MODEL_S3_BUCKET }}/qvac_models_compiled/ocr/gguf/easyocr/2026-05-14/" \
              models/ \
              --recursive
            aws s3 cp \
              "s3://${{ secrets.MODEL_S3_BUCKET }}/qvac_models_compiled/ocr/gguf/doctrf16/2026-05-15/" \
              models/ \
              --recursive
            ls -lh models/

      - name: Run integration tests
        working-directory: ${{ inputs.workdir || env.PKG_DIR }}
        shell: bash
        run: npm run test:integration
        env:
          QASE_API_TOKEN: ${{ secrets.QASE_API_TOKEN }}
          OCR_GGML_DETECTOR: models/craft_mlt_25k.gguf
          OCR_GGML_RECOGNIZER: models/latin_g2.gguf
          OCR_GGML_DOCTR_DETECTOR: models/db_mobilenet_v3_large.gguf
          OCR_GGML_DOCTR_RECOGNIZER: models/crnn_mobilenet_v3_small.gguf

      - name: Collect performance report
        if: always() && !cancelled()
        uses: ./.github/actions/run-desktop-integration-tests/collect-perf-report
        with:
          addon-name: ocr
          os: ${{ matrix.os }}
          arch: ${{ matrix.arch }}
          workdir: ${{ inputs.workdir || env.PKG_DIR }}
          aggregate: "false"
          retention-days: "90"
