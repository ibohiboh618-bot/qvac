name: Integration Tests (OCR-GGML)

# Builds @qvac/ocr-ggml on the canonical CI matrix, pulls the pinned
# EasyOCR GGUF snapshot from S3, and runs `npm run test:integration`.
#
# Models are downloaded into `packages/ocr-ggml/models/` and exposed to
# the test via `OCR_GGML_DETECTOR` / `OCR_GGML_RECOGNIZER` /
# `OCR_GGML_RECOGNIZER_LATIN` env vars (smoke test reads these and
# selects the appropriate pipeline).
#
# Doctr GGUFs are not yet distributed; the Doctr code path inside the
# smoke test auto-skips when the corresponding env vars are unset.

on:
  workflow_dispatch:
    inputs:
      prebuild_package:
        description: "NPM package containing prebuilds (e.g. @qvac/ocr-ggml@0.1.0)"
        required: false
        type: string
  workflow_call:
    inputs:
      ref:
        description: "ref"
        type: string
        required: false
      repository:
        type: string
        required: false
        default: "tetherto/qvac"
      model:
        type: string
        required: false
      workdir:
        description: "Working directory inside the repo (monorepo package path)"
        type: string
        required: false
        default: "packages/ocr-ggml"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PKG_DIR: packages/ocr-ggml

jobs:
  run-integration-tests:
    continue-on-error: true
    timeout-minutes: 30
    runs-on: ${{ matrix.os }}
    environment: release
    name: test-${{ matrix.platform }}-${{ matrix.arch }}

    permissions:
      contents: read
      packages: read
      id-token: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            platform: linux
            arch: x64
          - os: ubuntu-24.04
            platform: linux
            arch: x64
          - os: ubuntu-24.04-arm
            platform: linux
            arch: arm64
          - os: ubuntu-22.04-arm
            platform: linux
            arch: arm64
          - os: macos-15-xlarge
            platform: darwin
            arch: arm64
          - os: windows-2022
            platform: win32
            arch: x64

    steps:
      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # 6.3.0
        with:
          node-version: lts/*

      - name: Windows - enable git long paths
        if: ${{ matrix.platform == 'win32' }}
        shell: bash
        run: git config --system core.longpaths true

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          repository: ${{ inputs.repository || github.repository }}
          ref: ${{ inputs.ref || github.ref }}
          token: ${{ secrets.PAT_TOKEN }}

      - name: Install NPM dependencies
        working-directory: ${{ inputs.workdir || env.PKG_DIR }}
        shell: bash
        run: |
          npm install
          npm install -g bare bare-make

      - name: Download prebuilds from artifact
        if: ${{ !inputs.prebuild_package }}
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # 8.0.1
        with:
          path: ${{ inputs.workdir || env.PKG_DIR }}/prebuilds
          merge-multiple: true

      - name: Download prebuilds from package
        if: ${{ inputs.prebuild_package }}
        working-directory: ${{ inputs.workdir || env.PKG_DIR }}
        shell: bash
        run: |
          mkdir -p prebuilds
          npm pack ${{ inputs.prebuild_package }} --pack-destination /tmp
          tar -xzf /tmp/*.tgz -C /tmp
          cp -r /tmp/package/prebuilds/* prebuilds/

      - name: Linux - install dependencies
        if: matrix.platform == 'linux' || matrix.platform == 'android'
        shell: bash
        run: sudo apt-get update && sudo apt-get install -y mesa-vulkan-drivers

      - if: ${{ matrix.os == 'ubuntu-24.04' }}
        name: Update c++ tools to install GLIBC++
        run: |
          sudo apt update
          sudo apt install -y g++-13

      # EasyOCR GGUFs live in S3 under a date-stamped snapshot directory.
      # Bump the date here when a new snapshot is published.
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # 6.0.0
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: eu-central-1

      - name: Download EasyOCR GGUF model files
        working-directory: ${{ inputs.workdir || env.PKG_DIR }}
        shell: bash
        run: |
          mkdir -p models
          aws s3 cp \
            "s3://${{ secrets.MODEL_S3_BUCKET }}/qvac_models_compiled/ocr/gguf/easyocr/2026-05-14/" \
            models/ \
            --recursive
          ls -lh models/

      # Doctr GGUFs (DBNet + CRNN-mobilenet) are not yet in S3; the Doctr
      # integration tests auto-skip when OCR_GGML_DOCTR_DETECTOR /
      # OCR_GGML_DOCTR_RECOGNIZER are unset. Add those env entries below
      # once the Doctr models land in S3.
      - name: Run integration test
        working-directory: ${{ inputs.workdir || env.PKG_DIR }}
        shell: bash
        run: npm run test:integration
        env:
          QASE_API_TOKEN: ${{ secrets.QASE_API_TOKEN }}
          OCR_GGML_DETECTOR: models/craft_mlt_25k.gguf
          OCR_GGML_RECOGNIZER: models/english_g2.gguf
          OCR_GGML_RECOGNIZER_LATIN: models/latin_g2.gguf
