name: On PR Trigger (LLM)

on:
  pull_request_target:
    types:
      - opened
      - synchronize
      - reopened
      - labeled
    branches:
      - main
      - release-*
      - feature-*
      - tmp-*
    paths:
      - "packages/llm-llamacpp/**"
      - ".github/workflows/*llm-llamacpp*.yml"
      - ".github/actions/cache-models/**"

  workflow_dispatch:
  workflow_call:

permissions:
  contents: read
  pull-requests: read
  packages: read
  id-token: write

env:
  PKG_DIR: packages/llm-llamacpp

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  label-gate:
    name: Authorise (label-gate)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    outputs:
      authorised: ${{ steps.gate.outputs.authorised }}
    steps:
      - name: Checkout (label-gate action only)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          ref: ${{ github.event.repository.default_branch }}
          sparse-checkout: .github/actions/label-gate
          sparse-checkout-cone-mode: false
      - name: Run label-gate
        id: gate
        uses: ./.github/actions/label-gate
        with:
          github-token: ${{ secrets.PAT_TOKEN }}
  ci-router:
    name: CI Router (label detection)
    runs-on: ubuntu-latest
    timeout-minutes: 2
    permissions:
      contents: read
      pull-requests: read
    outputs:
      run_verified_checks: ${{ steps.route.outputs.run_verified_checks }}
      run_prebuilds: ${{ steps.route.outputs.run_prebuilds }}
      run_cpp_tests: ${{ steps.route.outputs.run_cpp_tests }}
      run_desktop: ${{ steps.route.outputs.run_desktop }}
      run_mobile: ${{ steps.route.outputs.run_mobile }}
    steps:
      - name: Route CI stages
        id: route
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_LABELS_JSON: ${{ toJSON(github.event.pull_request.labels.*.name) }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ] || \
             [ "$EVENT_NAME" = "workflow_call" ] || \
             [ "$EVENT_NAME" = "push" ] || \
             [ "$EVENT_NAME" = "schedule" ]; then
            echo "Trusted event ($EVENT_NAME) — enabling all CI stages"
            for out in run_verified_checks run_prebuilds run_cpp_tests run_desktop run_mobile; do
              echo "$out=true" >> "$GITHUB_OUTPUT"
            done
            exit 0
          fi
          # First pass: detect which labels are present (order-independent).
          HAS_VERIFIED=false
          HAS_PREBUILDS=false
          HAS_CPP=false
          HAS_DESKTOP=false
          HAS_MOBILE=false
          if [ -n "$PR_LABELS_JSON" ] && [ "$PR_LABELS_JSON" != "null" ]; then
            for label in $(echo "$PR_LABELS_JSON" | jq -r '.[]' 2>/dev/null); do
              case "$label" in
                verified)                 HAS_VERIFIED=true ;;
                prebuilds)                HAS_PREBUILDS=true ;;
                run-cpp-addon-tests)      HAS_CPP=true ;;
                run-desktop-addon-tests)  HAS_DESKTOP=true ;;
                run-mobile-addon-tests)   HAS_MOBILE=true ;;
              esac
            done
          fi

          VERIFIED=false
          PREBUILDS=false
          CPP_TESTS=false
          DESKTOP=false
          MOBILE=false

          # `verified` is the trust gate and ONLY the trust gate: it authorises
          # a PR to run expensive / secret-exposing jobs, but no longer selects
          # any stage on its own. Each heavy stage runs only when its granular
          # label is present AND `verified` authorises it — so a granular label
          # without `verified` never triggers anything (the security invariant),
          # and `verified` alone runs only the baseline verified checks.
          # cpp-tests builds the addon itself (different flag) so it does NOT
          # depend on prebuilds; desktop + mobile DO need prebuilds.
          if [ "$HAS_VERIFIED" = "true" ]; then
            VERIFIED=true
            [ "$HAS_CPP" = "true" ]      && CPP_TESTS=true
            [ "$HAS_DESKTOP" = "true" ]  && { DESKTOP=true; PREBUILDS=true; }
            [ "$HAS_MOBILE" = "true" ]   && { MOBILE=true; PREBUILDS=true; }
            [ "$HAS_PREBUILDS" = "true" ] && PREBUILDS=true
          fi
          echo "CI Router: verified=$VERIFIED prebuilds=$PREBUILDS cpp=$CPP_TESTS desktop=$DESKTOP mobile=$MOBILE"
          echo "run_verified_checks=$VERIFIED" >> "$GITHUB_OUTPUT"
          echo "run_prebuilds=$PREBUILDS" >> "$GITHUB_OUTPUT"
          echo "run_cpp_tests=$CPP_TESTS" >> "$GITHUB_OUTPUT"
          echo "run_desktop=$DESKTOP" >> "$GITHUB_OUTPUT"
          echo "run_mobile=$MOBILE" >> "$GITHUB_OUTPUT"

  authorize:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    outputs:
      allowed: ${{ steps.auth.outputs.allowed }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
      - name: Authorize
        id: auth
        uses: ./.github/actions/authorize-pr
        with:
          github-token: ${{ github.token }}

  verify-fabric-lockstep:
    if: needs.authorize.outputs.allowed == 'true'
    needs: [authorize]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2

      - name: Verify qvac-fabric versions are lockstep
        id: lockstep
        uses: ./.github/actions/verify-qvac-fabric-lockstep

      - name: Report verified version
        run: 'echo "Verified qvac-fabric version: ${{ steps.lockstep.outputs.version }}"'

  sanity-checks:
    if: needs.ci-router.outputs.run_verified_checks == 'true' && needs.label-gate.outputs.authorised == 'true' && needs.authorize.outputs.allowed == 'true'
    needs:
      - authorize
      - verify-fabric-lockstep
      - ci-router
      - label-gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          fetch-depth: 0

      - name: Run Sanity checks
        uses: ./.github/actions/sanity-checks
        with:
          secret-token: ${{ secrets.GITHUB_TOKEN }}
          pat-token: ${{ secrets.PAT_TOKEN }}
          run-integration: ${{ needs.authorize.outputs.allowed == 'true' }}
          workdir: packages/llm-llamacpp

  cpp-tests:
    if: needs.ci-router.outputs.run_cpp_tests == 'true' && needs.label-gate.outputs.authorised == 'true' && needs.authorize.outputs.allowed == 'true'
    needs:
      - authorize
      - sanity-checks
      - ci-router
      - label-gate
    uses: ./.github/workflows/cpp-tests-llm.yml
    secrets: inherit
    with:
      workdir: packages/llm-llamacpp
      repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
      ref: ${{ github.event.pull_request.head.ref || github.ref }}

  cpp-lint:
    if: needs.ci-router.outputs.run_verified_checks == 'true' && needs.label-gate.outputs.authorised == 'true' && needs.authorize.outputs.allowed == 'true'
    uses: ./.github/workflows/cpp-lint.yaml
    needs:
      - authorize
      - ci-router
      - label-gate
    secrets: inherit
    with:
      sha: ${{ github.event.pull_request.base.sha || github.sha }}
      pr_head_sha: ${{ github.event.pull_request.head.sha || github.sha }}
      workdir: packages/llm-llamacpp

  ts-checks:
    needs: authorize
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # 6.3.0
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: packages/llm-llamacpp
        run: npm install

      - name: Type declaration check
        working-directory: packages/llm-llamacpp
        run: npm run test:dts

      - name: Run lint and unit tests
        id: run_lint_and_unit_tests
        uses: ./.github/actions/run-lint-and-unit-tests
        with:
          gpr-token: ${{ secrets.GITHUB_TOKEN }}
          pat-token: ${{ secrets.GITHUB_TOKEN }}
          registry-type: gpr
          workdir: packages/llm-llamacpp

  detect-native-changes:
    if: needs.ci-router.outputs.run_prebuilds == 'true' && needs.label-gate.outputs.authorised == 'true' && needs.authorize.outputs.allowed == 'true'
    needs:
      - authorize
      - ci-router
      - label-gate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      native_changed: ${{ steps.detect.outputs.native_changed }}
      native_hash: ${{ steps.detect.outputs.native_hash }}
    steps:
      - name: Checkout base branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
      - name: Detect native file changes
        id: detect
        env:
          WORKDIR: packages/llm-llamacpp
          EVENT_NAME: ${{ github.event_name }}
          EVENT_ACTION: ${{ github.event.action }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          BEFORE_SHA: ${{ github.event.before }}
          HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ] || \
             [ "$EVENT_NAME" = "workflow_call" ] || \
             [ "$EVENT_NAME" = "push" ]; then
            echo "Trusted event ($EVENT_NAME) — treating native files as changed"
            echo "native_changed=true" >> "$GITHUB_OUTPUT"
            echo "native_hash=dispatch-$(date +%s)" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Fetch the PR head commit for read-only git operations (diff + ls-tree).
          # Same-repo PRs: fetch by SHA from origin.
          # Fork PRs: SHA may not be fetchable from origin — fetch from
          # the fork repo by ref instead. Does NOT check out PR code.
          FETCHED=false
          if [ -n "$HEAD_SHA" ]; then
            if git fetch origin "$HEAD_SHA" --depth=1 2>/dev/null; then
              FETCHED=true
            elif [ -n "$HEAD_REPO" ] && [ -n "$HEAD_REF" ]; then
              echo "SHA not fetchable from origin (likely fork PR) — trying $HEAD_REPO/$HEAD_REF"
              if git fetch "https://github.com/${HEAD_REPO}.git" "$HEAD_REF" --depth=1 2>/dev/null; then
                HEAD_SHA=$(git rev-parse FETCH_HEAD)
                FETCHED=true
              fi
            fi
          fi

          if [ "$FETCHED" != "true" ]; then
            echo "::warning::Could not fetch PR head — treating as changed (cache disabled for this push)"
            echo "native_changed=true" >> "$GITHUB_OUTPUT"
            echo "native_hash=unfetchable-$(date +%s)" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Pick the diff base by how the PR head moved on THIS event:
          #   • opened                      → full PR diff (base..head): first
          #     evaluation, so the whole PR delta is the right thing to inspect.
          #   • head advanced (synchronize) → previous head..current head, the
          #     per-push delta. github.event.before is populated only for
          #     synchronize, so a JS-only push after earlier C++ commits reports
          #     native_changed=false and restores from cache.
          #   • labeled / reopened on an UNCHANGED head → before is empty, so we
          #     diff head..head (empty) → native_changed=false. Adding a routing
          #     label (e.g. run-mobile-addon-tests) on an already-built head must
          #     NOT rerun the prebuild matrix.
          # native_hash always uses the full HEAD tree for cache-key correctness,
          # so a wrong "false" can never restore a stale binary — the key (which
          # encodes the HEAD native tree) simply would not match.
          DIFF_FROM="$HEAD_SHA"
          if [ "$EVENT_ACTION" = "opened" ]; then
            DIFF_FROM="$BASE_SHA"
          elif [ -n "$BEFORE_SHA" ] && [ "$BEFORE_SHA" != "$HEAD_SHA" ]; then
            DIFF_FROM="$BEFORE_SHA"
            # Fetch BEFORE_SHA — same fork fallback as HEAD_SHA.
            # For fork PRs the previous head may only exist in the fork repo.
            if ! git fetch origin "$BEFORE_SHA" --depth=1 2>/dev/null; then
              if [ -n "$HEAD_REPO" ] && [ -n "$HEAD_REF" ]; then
                git fetch "https://github.com/${HEAD_REPO}.git" "$HEAD_REF" --depth=50 2>/dev/null || true
              fi
              # If BEFORE_SHA is still unreachable, fall back to base..head diff.
              if ! git cat-file -e "$BEFORE_SHA" 2>/dev/null; then
                echo "::warning::BEFORE_SHA ($BEFORE_SHA) unreachable — falling back to base..head diff"
                DIFF_FROM="$BASE_SHA"
              fi
            fi
          fi

          # Ensure the diff base (DIFF_FROM) is present locally. The checkout is
          # shallow and only HEAD_SHA / BEFORE_SHA were fetched above; the PR base
          # SHA is otherwise absent, so `git diff` would fail and force the safe
          # rebuild-everything fallback — silently defeating the cache. BASE_SHA
          # always lives in origin (the base repo), so a plain fetch suffices.
          if [ -n "$DIFF_FROM" ] && ! git cat-file -e "$DIFF_FROM" 2>/dev/null; then
            git fetch origin "$DIFF_FROM" --depth=1 2>/dev/null || true
          fi

          CHANGED=false
          if [ -n "$DIFF_FROM" ] && [ -n "$HEAD_SHA" ]; then
            DIFF_FILES=$(git diff --name-only "$DIFF_FROM" "$HEAD_SHA" -- 2>&1) || {
              echo "::warning::git diff failed — treating as changed"
              echo "native_changed=true" >> "$GITHUB_OUTPUT"
              echo "native_hash=diff-failed-$(date +%s)" >> "$GITHUB_OUTPUT"
              exit 0
            }
            if [ -n "$DIFF_FILES" ]; then
              while IFS= read -r file; do
                case "$file" in
                  ${WORKDIR}/*.cpp|${WORKDIR}/*.hpp|${WORKDIR}/*.c|${WORKDIR}/*.h) CHANGED=true; break ;;
                  ${WORKDIR}/*CMakeLists.txt) CHANGED=true; break ;;
                  ${WORKDIR}/vcpkg.json|${WORKDIR}/vcpkg-configuration.json) CHANGED=true; break ;;
                  ${WORKDIR}/vcpkg/*) CHANGED=true; break ;;
                esac
              done <<< "$DIFF_FILES"
            fi
          else
            echo "No base/head SHA — treating as changed"
            CHANGED=true
          fi

          # Hash from the PR HEAD tree. The file set MUST stay in lockstep with
          # the detection predicate above (source *.cpp/*.hpp/*.c/*.h, any
          # CMakeLists.txt, vcpkg manifests, and ANY file under vcpkg/ —
          # overlays / portfiles / patches / triplets). If the hash were
          # narrower than detection, a native change could trigger a rebuild
          # without moving the cache key; `cache/save` would then no-op on the
          # existing key and a later JS-only push would restore the stale
          # pre-change binary. We therefore ls-tree the whole package and apply
          # the same predicate as detection. git ls-tree reads the tree object
          # without checkout — secure and correct.
          NATIVE_HASH=$(git ls-tree -r "$HEAD_SHA" -- "$WORKDIR" 2>/dev/null \
            | grep -E '\.(cpp|hpp|c|h)$|CMakeLists\.txt$|vcpkg\.json$|vcpkg-configuration\.json$|/vcpkg/' \
            | sha256sum | cut -d' ' -f1)
          [ -z "$NATIVE_HASH" ] && NATIVE_HASH="empty-$(date +%s)"

          echo "Native changed: $CHANGED | Hash: ${NATIVE_HASH:0:16}"
          echo "native_changed=$CHANGED" >> "$GITHUB_OUTPUT"
          echo "native_hash=${NATIVE_HASH:0:16}" >> "$GITHUB_OUTPUT"

  # Reuse a prior run's prebuilds via ARTIFACTS rather than actions/cache.
  # actions/cache cannot WRITE from a pull_request_target trigger (the reserve
  # is rejected — see QVAC-21199 follow-up bug), so the cache was never
  # populated and every push rebuilt. Instead, prebuild-artifact-save tags each
  # successful prebuild run with a tiny marker artifact named with the native
  # hash; here, on a no-native-change push, we find the most recent prior run of
  # this PR's branch that carries the matching marker and download ITS
  # `prebuilds` artifact, re-publishing it for downstream jobs. Falls back to a
  # rebuild (reuse_hit=false) whenever nothing matches.
  prebuild-artifact-reuse:
    if: needs.label-gate.outputs.authorised == 'true' && needs.detect-native-changes.outputs.native_changed == 'false'
    needs:
      - detect-native-changes
      - sanity-checks
      - label-gate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      actions: read
    outputs:
      reuse_hit: ${{ steps.reuse.outputs.hit }}
    steps:
      - name: Find + download a matching prebuilds artifact from a prior run
        id: reuse
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
          NATIVE_HASH: ${{ needs.detect-native-changes.outputs.native_hash }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          RUN_ID: ${{ github.run_id }}
        run: |
          set -u
          # Marker is scoped by PR NUMBER (globally unique in the base repo) so a
          # PR can only ever reuse ITS OWN prior prebuilds — a malicious PR's
          # artifact can never be served to a different (victim) PR even if they
          # share a fork branch name and native_hash. (Restores the per-PR
          # isolation the replaced actions/cache key had.)
          WANT="prebuilds-cache-pr-${PR_NUMBER}-${NATIVE_HASH}"
          echo "Looking for marker '$WANT' among prior runs of branch '$HEAD_REF'"
          RUNS=$(gh api "repos/$REPO/actions/workflows/on-pr-llm-llamacpp.yml/runs?branch=${HEAD_REF}&per_page=40" \
                   --jq ".workflow_runs[] | select(.id != ${RUN_ID}) | .id")
          HIT=false
          for rid in $RUNS; do
            NAMES=$(gh api "repos/$REPO/actions/runs/$rid/artifacts" \
                      --jq '.artifacts[] | select(.expired==false) | .name' 2>/dev/null || true)
            if echo "$NAMES" | grep -qx "$WANT" && echo "$NAMES" | grep -qx "prebuilds"; then
              echo "Match in run $rid — downloading its prebuilds artifact"
              if gh run download "$rid" --repo "$REPO" --name prebuilds --dir cached-prebuilds; then
                HIT=true
                echo "reused-run=$rid" >> "$GITHUB_OUTPUT"
                break
              fi
            fi
          done
          echo "hit=$HIT" >> "$GITHUB_OUTPUT"
          echo "Prebuild reuse hit: $HIT"
      - name: Re-publish reused prebuilds for downstream jobs
        if: steps.reuse.outputs.hit == 'true'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # 7.0.0
        with:
          name: prebuilds
          path: cached-prebuilds

  prebuild:
    needs:
      - authorize
      - ci-router
      - sanity-checks
      - detect-native-changes
      - prebuild-artifact-reuse
      - label-gate
    if: |
      always() &&
      needs.sanity-checks.result == 'success' &&
      needs.ci-router.outputs.run_prebuilds == 'true' &&
      needs.label-gate.outputs.authorised == 'true' &&
      needs.authorize.outputs.allowed == 'true' &&
      (needs.detect-native-changes.outputs.native_changed == 'true' || needs.prebuild-artifact-reuse.outputs.reuse_hit != 'true')
    permissions:
      contents: write
      packages: write
      pull-requests: write
      id-token: write
    uses: ./.github/workflows/prebuilds-llm-llamacpp.yml
    secrets: inherit
    with:
      repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
      ref: ${{ github.event.pull_request.head.ref || github.ref }}

  prebuild-artifact-save:
    # Tag this successful prebuild run with a tiny marker artifact named with
    # the native hash. A later no-native-change push (prebuild-artifact-reuse)
    # finds the marker and reuses THIS run's `prebuilds` artifact instead of
    # rebuilding. Runs whenever prebuild succeeds, so the first build on any PR
    # records reuse for subsequent JS-only pushes; native changes produce a new
    # hash → a new marker → a fresh rebuild. Replaces actions/cache/save, which
    # cannot write from pull_request_target.
    if: always() && needs.label-gate.outputs.authorised == 'true' && needs.prebuild.result == 'success'
    needs:
      - prebuild
      - detect-native-changes
      - label-gate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Write reuse marker
        run: |
          mkdir -p reuse-marker
          echo "$GITHUB_RUN_ID" > reuse-marker/producing-run-id.txt
      - name: Upload reuse marker (named with native hash)
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # 7.0.0
        with:
          name: prebuilds-cache-pr-${{ github.event.pull_request.number }}-${{ needs.detect-native-changes.outputs.native_hash }}
          path: reuse-marker
          retention-days: 14

  run-integration-tests:
    if: always() && needs.ci-router.outputs.run_desktop == 'true' && needs.label-gate.outputs.authorised == 'true' && needs.authorize.outputs.allowed == 'true' && (needs.prebuild.result == 'success' || needs.prebuild-artifact-reuse.outputs.reuse_hit == 'true')
    needs:
      - authorize
      - prebuild
      - prebuild-artifact-reuse
      - ci-router
      - label-gate
    permissions:
      contents: read
      packages: read
      id-token: write
    uses: ./.github/workflows/integration-test-llm-llamacpp.yml
    secrets: inherit
    with:
      repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
      ref: ${{ github.event.pull_request.head.ref || github.ref }}

  run-mobile-integration-tests:
    permissions:
      contents: read
      packages: read
      pull-requests: write # Allow commenting on PRs
      id-token: write
    if: always() && needs.ci-router.outputs.run_mobile == 'true' && needs.label-gate.outputs.authorised == 'true' && needs.authorize.outputs.allowed == 'true' && (needs.prebuild.result == 'success' || needs.prebuild-artifact-reuse.outputs.reuse_hit == 'true')
    needs:
      - authorize
      - prebuild
      - prebuild-artifact-reuse
      - label-gate
      - ci-router
    uses: ./.github/workflows/integration-mobile-test-llm-llamacpp.yml
    secrets: inherit
    with:
      repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
      ref: ${{ github.event.pull_request.head.ref || github.ref }}

  # QVAC-17830: per-run joint perf reporter. Lives in the umbrella (not in
  # either child workflow) so it can block on BOTH `run-integration-tests`
  # (desktop matrix) and `run-mobile-integration-tests` (Android / iOS)
  # before scanning for perf-report artifacts. Fixes the race where
  # test-darwin-x64 (or any slow desktop job) finished AFTER the old
  # mobile-local combine-reports had already shipped the summary.
  # SECURITY (CodeQL js/cache-poisoning, alerts 735/736):
  # This job runs in the privileged `pull_request_target` context (see
  # `on:` at the top of this file). The integration matrix it depends
  # on already runs PR-author code on real hardware, so this aggregator
  # by definition consumes attacker-controllable artifacts (the per-leg
  # `performance-report.json` files). The mitigations are:
  #   - The checkout below has NO `repository:` / `ref:` override, so
  #     in `pull_request_target` context `actions/checkout` falls back
  #     to the base-branch SHA. `aggregate.js` therefore runs from the
  #     trusted default branch, not from PR-author code. On
  #     `workflow_dispatch` runs, `github.ref` resolves to the dispatch
  #     branch, so manual verification still uses the latest
  #     `aggregate.js` from that branch.
  #   - `permissions: contents: read` only — no write access, no
  #     packages / id-token / pull-requests permissions.
  #   - No use of `actions/cache` here, so there is no shared cache
  #     for a malicious PR to poison for the default branch.
  #   - `aggregate.js` does not touch GITHUB_TOKEN, secrets, or any
  #     external network endpoints; its only outputs are artifact files.
  #   - `device.name` (the only attacker-controllable string we let
  #     near a filesystem path) is sanitised through a strict
  #     `[A-Za-z0-9-]` allowlist + 64-char cap below before use.
  combine-perf-reports:
    name: Combined Performance Report
    needs: [authorize, run-integration-tests, run-mobile-integration-tests]
    if: always() && !cancelled() && needs.authorize.outputs.allowed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout addon repository
        # No explicit `repository:` / `ref:` — see SECURITY block above.
        # In `pull_request_target` context this resolves to the base
        # branch SHA (trusted code); on `workflow_dispatch` it resolves
        # to the dispatch branch.
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          sparse-checkout: |
            scripts/perf-report
            packages/llm-llamacpp/media

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # 4.4.0
        with:
          node-version: lts/*

      - name: Download all perf report artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # 8.0.1
        with:
          pattern: perf-report-llamacpp-llm-*-${{ github.run_number }}
          path: combined-reports
        continue-on-error: true

      - name: Fix desktop device names
        shell: bash
        run: |
          # Every desktop matrix entry uses a unique `label` in its
          # artifact name (e.g. linux-x64-u22-gpu / linux-x64-u24-gpu). The sed
          # below strips our fixed prefix + run number; the remainder
          # IS the raw matrix label.
          #
          # QVAC-17830 (combined-report fix): the CI matrix intentionally
          # runs two GPU legs on the same physical Linux x64 target
          # (ubuntu 22.04 and 24.04) and likewise two ubuntu versions for
          # linux-arm64. In the
          # combined summary those should show up as ONE column per
          # platform — otherwise the GPU row on the "*-u22" /
          # "*-u24" columns renders as "-" and looks like missing data
          # even though the data lives in the sibling leg.
          #
          # We therefore fold them to the physical platform name here so
          # `aggregate.js` buckets CPU and GPU measurements under one
          # device. Test labels already carry [CPU]/[GPU], so the rows
          # stay distinct.
          for dir in combined-reports/perf-report-llamacpp-llm-*/; do
            [ -d "$dir" ] || continue
            base=$(basename "$dir")
            platform=$(echo "$base" | sed "s/^perf-report-llamacpp-llm-//" | sed "s/-${{ github.run_number }}$//")

            case "$platform" in Android|iOS) continue ;; esac

            case "$platform" in
              linux-x64-u22-gpu|linux-x64-u24-gpu) device_name="linux-x64" ;;
              linux-arm64-u22|linux-arm64-u24) device_name="linux-arm64" ;;
              *) device_name="$platform" ;;
            esac

            for json in $(find "$dir" -name "performance-report.json" 2>/dev/null); do
              if command -v jq >/dev/null 2>&1; then
                jq --arg name "$device_name" '.device.name = $name' "$json" > "${json}.tmp" && mv "${json}.tmp" "$json"
                echo "Patched device name in $json -> $device_name (was matrix label $platform)"
              fi
            done
          done

      - name: Generate combined report
        shell: bash
        run: |
          # SECURITY (CodeQL alerts 735/736, actions/cache-poisoning/poisonable-step):
          # `aggregate.js` is checked out from the base branch (no
          # `repository:` / `ref:` override on the checkout above), so
          # this step does not execute PR-author code. The job-level
          # `permissions: contents: read` (no actions/cache, no secrets,
          # no GITHUB_TOKEN write usage) bounds the blast radius further
          # — see the block comment on the `combine-perf-reports` job
          # above. The script's only side effect is writing artifact
          # files to `combined-output/`; the artifacts themselves are
          # uploaded via SHA-pinned `actions/upload-artifact` and
          # consumed only by reviewers from the run page.
          if ! find combined-reports -name "performance-report.json" -type f 2>/dev/null | grep -q .; then
            echo "No performance reports found."
            exit 0
          fi

          echo "=== Reports found ==="
          find combined-reports -name "performance-report.json" -type f

          mkdir -p combined-output

          # QVAC-17830: combined PR summary surfaces BOTH the squashed
          # Mean ± std mini-tables (Total Time / TTFT / TPS, grouped
          # by scenario) AND the per-device detail tables underneath
          # them. Detail-table cells now render `mean ±std` themselves
          # so the std is visible at every metric, not just the
          # rolled-up ones. HTML keeps the same content.
          node scripts/perf-report/aggregate.js \
            --dir combined-reports \
            --addon-type vision \
            --device-details \
            --output-html combined-output/performance-report-combined.html \
            --output-json combined-output/performance-summary-combined.json \
            --output combined-output/performance-report-combined.md

      - name: Generate per-device HTML reports
        if: always() && !cancelled()
        shell: bash
        run: |
          # SECURITY: `aggregate.js` runs from the base branch (see
          # SECURITY block on the job above), but the
          # `performance-report.json` files it consumes are still
          # produced by PR-author code in the matrix legs, so
          # `device.name` is attacker-controlled. We do not interpolate
          # it into shell or pass it as code; we sanitise it to an
          # alphanumeric+hyphen filename slug capped at 64 chars before
          # using it as a path suffix, which prevents path traversal and
          # any kind of shell-meta exposure even if the JSON were crafted.
          mkdir -p per-device-reports
          for json in $(find combined-reports -name "performance-report.json" -type f 2>/dev/null); do
            device_name=$(node -e "const d=JSON.parse(require('fs').readFileSync(process.argv[1],'utf8'));process.stdout.write((d.device&&typeof d.device.name==='string'?d.device.name:'Unknown'))" "$json" 2>/dev/null)
            [ -z "$device_name" ] || [ "$device_name" = "Unknown" ] && continue

            # Strict allowlist: collapse anything that is not [A-Za-z0-9-]
            # to '_', then truncate to 64 characters.
            safe_name=$(printf '%s' "$device_name" | LC_ALL=C tr -c 'A-Za-z0-9-' '_' | cut -c1-64)
            [ -z "$safe_name" ] && continue

            tmp_dir=$(mktemp -d)
            mkdir -p "$tmp_dir/device"
            cp "$json" "$tmp_dir/device/performance-report.json"

            echo "Generating HTML for $device_name (slug: $safe_name)..."
            node scripts/perf-report/aggregate.js \
              --dir "$tmp_dir" \
              --addon-type vision \
              --device-details \
              --output-html "per-device-reports/HTML-Report-${safe_name}.html" \
              2>/dev/null || true

            rm -rf "$tmp_dir"
          done
          echo "=== Per-device reports generated ==="
          ls -la per-device-reports/ 2>/dev/null || echo "No per-device reports"

      - name: Upload combined HTML report
        if: always() && !cancelled()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # 7.0.0
        with:
          name: HTML-Report-All-Platforms-${{ github.run_number }}
          path: combined-output/performance-report-combined.html
          retention-days: 90
          if-no-files-found: ignore

      - name: Upload per-device HTML reports
        if: always() && !cancelled()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # 7.0.0
        with:
          name: HTML-Reports-Per-Device-${{ github.run_number }}
          path: per-device-reports/
          retention-days: 90
          if-no-files-found: ignore

      - name: Write combined summary
        if: always() && !cancelled()
        shell: bash
        run: |
          set +e
          MD_FILE="combined-output/performance-report-combined.md"
          echo "## LLM / VLM Performance Report (All Platforms)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f "$MD_FILE" ]; then
            cat "$MD_FILE" >> $GITHUB_STEP_SUMMARY
          else
            echo "No combined performance report available." >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Downloadable HTML Reports" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f "combined-output/performance-report-combined.html" ]; then
            echo "> **Full Combined Report (all platforms)**: download artifact \`HTML-Report-All-Platforms-${{ github.run_number }}\`" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi
          HAS_DEVICES=0
          for html in per-device-reports/HTML-Report-*.html; do
            [ -f "$html" ] || continue
            if [ "$HAS_DEVICES" -eq 0 ]; then
              echo "> **Individual Device Reports**: download artifact \`HTML-Reports-Per-Device-${{ github.run_number }}\`" >> $GITHUB_STEP_SUMMARY
              echo ">" >> $GITHUB_STEP_SUMMARY
              echo "> Includes:" >> $GITHUB_STEP_SUMMARY
              HAS_DEVICES=1
            fi
            device=$(basename "$html" .html | sed 's/^HTML-Report-//' | tr '-' ' ')
            echo "> - ${device}" >> $GITHUB_STEP_SUMMARY
          done
          echo "" >> $GITHUB_STEP_SUMMARY

  merge-guard:
    needs: [authorize, verify-fabric-lockstep, run-integration-tests, run-mobile-integration-tests, sanity-checks, prebuild, prebuild-artifact-reuse, prebuild-artifact-save, detect-native-changes, cpp-tests, cpp-lint, ts-checks, ci-router, label-gate]
    if: always() && !cancelled()
    uses: ./.github/workflows/public-pr.yml
    with:
      sanity-checks-status: ${{ needs.verify-fabric-lockstep.result == 'success' && needs.sanity-checks.result == 'success' }}
      build-status: ${{ needs.prebuild.result == 'success' || needs.prebuild-artifact-reuse.outputs.reuse_hit == 'true' }}
