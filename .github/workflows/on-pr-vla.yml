name: On PR Trigger (VLA)

on:
  pull_request_target:
    types:
      - opened
      - synchronize
      - reopened
      - labeled
    branches:
      - main
      - release-*
      - feature-*
      - tmp-*
    paths:
      - "packages/vla-ggml/**"
      - ".github/workflows/*-vla.yml"
      - ".github/actions/cache-models/**"
  workflow_dispatch:

  workflow_call:

permissions:
  contents: read
  pull-requests: read
  packages: read
  id-token: write

env:
  PKG_DIR: packages/vla-ggml

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  label-gate:
    name: Authorise (label-gate)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    outputs:
      authorised: ${{ steps.gate.outputs.authorised }}
    steps:
      - name: Checkout (label-gate action only)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          ref: ${{ github.event.repository.default_branch }}
          sparse-checkout: .github/actions/label-gate
          sparse-checkout-cone-mode: false
      - name: Run label-gate
        id: gate
        uses: ./.github/actions/label-gate
        with:
          github-token: ${{ secrets.PAT_TOKEN }}

  ci-router:
    name: CI Router (label detection)
    runs-on: ubuntu-latest
    timeout-minutes: 2
    permissions:
      contents: read
      pull-requests: read
    outputs:
      run_verified_checks: ${{ steps.route.outputs.run_verified_checks }}
      run_prebuilds: ${{ steps.route.outputs.run_prebuilds }}
      run_cpp_tests: ${{ steps.route.outputs.run_cpp_tests }}
      run_desktop: ${{ steps.route.outputs.run_desktop }}
      run_mobile: ${{ steps.route.outputs.run_mobile }}
    steps:
      - name: Checkout ci-router composite (default branch)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          ref: ${{ github.event.repository.default_branch }}
          sparse-checkout: .github/actions/ci-router
          sparse-checkout-cone-mode: false
      - name: Route CI stages
        id: route
        uses: ./.github/actions/ci-router

  authorize:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    outputs:
      allowed: ${{ steps.auth.outputs.allowed }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
      - name: Authorize
        id: auth
        uses: ./.github/actions/authorize-pr
        with:
          github-token: ${{ github.token }}

  verify-fabric-lockstep:
    if: needs.authorize.outputs.allowed == 'true'
    needs: [authorize]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2

      - name: Verify qvac-fabric versions are lockstep
        id: lockstep
        uses: ./.github/actions/verify-qvac-fabric-lockstep

      - name: Report verified version
        run: 'echo "Verified qvac-fabric version: ${{ steps.lockstep.outputs.version }}"'

  sanity-checks:
    if: always() && !cancelled() && needs.ci-router.outputs.run_verified_checks == 'true' && needs.label-gate.outputs.authorised == 'true' && needs.authorize.outputs.allowed == 'true'
    needs: [authorize, verify-fabric-lockstep, ci-router, label-gate]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          fetch-depth: 0
      - name: Run Sanity checks
        uses: ./.github/actions/sanity-checks
        with:
          secret-token: ${{ secrets.GITHUB_TOKEN }}
          pat-token: ${{ secrets.PAT_TOKEN }}
          run-integration: ${{ needs.authorize.outputs.allowed == 'true' }}
          workdir: packages/vla-ggml

  cpp-lint:
    # Runs on PRs (base SHA diff target) and on manual workflow_dispatch, where
    # cpp-lint.yaml's Resolve refs falls back to HEAD~1 for the format/tidy diff
    # base. Manual dispatch pointing at a branch lets us validate workflow
    # changes (e.g. the hip-backend ROCm setup) before they land on the base.
    if: always() && !cancelled() && needs.ci-router.outputs.run_verified_checks == 'true' && needs.label-gate.outputs.authorised == 'true' && needs.authorize.outputs.allowed == 'true' && (github.event_name == 'pull_request_target' || github.event_name == 'workflow_dispatch')
    needs: [authorize, ci-router, label-gate]
    uses: ./.github/workflows/cpp-lint.yaml
    secrets: inherit
    with:
      sha: ${{ github.event.pull_request.base.sha }}
      pr_head_sha: ${{ github.event.pull_request.head.sha }}
      workdir: packages/vla-ggml
      # vla pulls qvac-fabric[hip-backend]; ggml-config find_dependency(hip)
      # needs ROCm on the lint runner at configure time.
      include-rocm-sdk: true

  cpp-tests:
    permissions:
      contents: read
      packages: read
      pull-requests: write
    if: always() && !cancelled() && needs.ci-router.outputs.run_cpp_tests == 'true' && needs.label-gate.outputs.authorised == 'true' && needs.authorize.outputs.allowed == 'true'
    needs: [authorize, sanity-checks, ci-router, label-gate]
    uses: ./.github/workflows/cpp-tests-vla.yml
    secrets: inherit
    with:
      repository: ${{ github.event.pull_request.head.repo.full_name }}
      ref: ${{ github.event.pull_request.head.ref }}

  ts-checks:
    if: needs.authorize.outputs.allowed == 'true'
    needs: authorize
    runs-on: ubuntu-latest
    environment: release
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # 6.3.0
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: packages/vla-ggml
        run: npm install

      - name: Type declaration check
        working-directory: packages/vla-ggml
        run: npm run test:dts

      - name: Run lint and unit tests
        id: run_lint_and_unit_tests
        uses: ./.github/actions/run-lint-and-unit-tests
        with:
          gpr-token: ${{ secrets.GITHUB_TOKEN }}
          pat-token: ${{ secrets.GITHUB_TOKEN }}
          registry-type: gpr
          workdir: packages/vla-ggml

  detect-native-changes:
    if: needs.ci-router.outputs.run_prebuilds == 'true' && needs.label-gate.outputs.authorised == 'true' && needs.authorize.outputs.allowed == 'true'
    needs: [authorize, ci-router, label-gate]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      native_changed: ${{ steps.detect.outputs.native_changed }}
      native_hash: ${{ steps.detect.outputs.native_hash }}
    steps:
      - name: Checkout composite source (default branch)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          ref: ${{ github.event.repository.default_branch }}
      - name: Detect native file changes
        id: detect
        uses: ./.github/actions/detect-native-changes
        with:
          workdir: packages/vla-ggml

  prebuild-artifact-reuse:
    if: needs.label-gate.outputs.authorised == 'true' && needs.detect-native-changes.outputs.native_changed == 'false'
    needs: [detect-native-changes, sanity-checks, label-gate]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      actions: read
    outputs:
      reuse_hit: ${{ steps.reuse.outputs.reuse_hit }}
    steps:
      - name: Checkout prebuild-artifact-reuse composite (default branch)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          ref: ${{ github.event.repository.default_branch }}
          sparse-checkout: .github/actions/prebuild-artifact-reuse
          sparse-checkout-cone-mode: false
      - name: Reuse prebuilds from a prior run
        id: reuse
        uses: ./.github/actions/prebuild-artifact-reuse
        with:
          github-token: ${{ github.token }}
          workflow-file: on-pr-vla.yml
          native-hash: ${{ needs.detect-native-changes.outputs.native_hash }}
          pr-number: ${{ github.event.pull_request.number }}

  prebuild:
    permissions:
      contents: write
      packages: write
      pull-requests: write
      id-token: write
    if: |
      always() &&
      needs.sanity-checks.result == 'success' &&
      needs.ci-router.outputs.run_prebuilds == 'true' &&
      needs.label-gate.outputs.authorised == 'true' &&
      needs.authorize.outputs.allowed == 'true' &&
      (needs.detect-native-changes.outputs.native_changed == 'true' || needs.prebuild-artifact-reuse.outputs.reuse_hit != 'true')
    needs: [authorize, ci-router, sanity-checks, detect-native-changes, prebuild-artifact-reuse, label-gate]
    uses: ./.github/workflows/prebuilds-vla.yml
    secrets: inherit
    with:
      repository: ${{ github.event.pull_request.head.repo.full_name }}
      ref: ${{ github.event.pull_request.head.ref }}

  prebuild-artifact-save:
    if: always() && needs.label-gate.outputs.authorised == 'true' && needs.prebuild.result == 'success'
    needs: [prebuild, detect-native-changes, label-gate]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Checkout prebuild-artifact-save composite (default branch)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          ref: ${{ github.event.repository.default_branch }}
          sparse-checkout: .github/actions/prebuild-artifact-save
          sparse-checkout-cone-mode: false
      - name: Save reuse marker
        uses: ./.github/actions/prebuild-artifact-save
        with:
          native-hash: ${{ needs.detect-native-changes.outputs.native_hash }}
          pr-number: ${{ github.event.pull_request.number }}

  integration-tests:
    needs: [authorize, prebuild, prebuild-artifact-reuse, ci-router, label-gate]
    if: always() && needs.ci-router.outputs.run_desktop == 'true' && needs.label-gate.outputs.authorised == 'true' && needs.authorize.outputs.allowed == 'true' && (needs.prebuild.result == 'success' || needs.prebuild-artifact-reuse.outputs.reuse_hit == 'true')
    permissions:
      contents: read
      packages: read
      id-token: write
    uses: ./.github/workflows/integration-test-vla.yml
    secrets: inherit
    with:
      repository: ${{ github.event.pull_request.head.repo.full_name }}
      ref: ${{ github.event.pull_request.head.ref }}

  run-mobile-integration-tests:
    permissions:
      contents: read
      packages: read
      pull-requests: write
      id-token: write
    if: always() && needs.ci-router.outputs.run_mobile == 'true' && needs.label-gate.outputs.authorised == 'true' && needs.authorize.outputs.allowed == 'true' && (needs.prebuild.result == 'success' || needs.prebuild-artifact-reuse.outputs.reuse_hit == 'true')
    needs: [authorize, prebuild, prebuild-artifact-reuse, label-gate, ci-router]
    uses: ./.github/workflows/integration-mobile-test-vla.yml
    secrets: inherit
    with:
      repository: ${{ github.event.pull_request.head.repo.full_name }}
      ref: ${{ github.event.pull_request.head.ref }}

  merge-guard:
    needs: [authorize, verify-fabric-lockstep, sanity-checks, cpp-lint, cpp-tests, prebuild, prebuild-artifact-reuse, prebuild-artifact-save, detect-native-changes, integration-tests, run-mobile-integration-tests, ts-checks, ci-router, label-gate]
    if: always() && !cancelled()
    uses: ./.github/workflows/public-pr.yml
    with:
      sanity-checks-status: ${{ needs.verify-fabric-lockstep.result == 'success' && needs.sanity-checks.result == 'success' }}
      build-status: ${{ needs.prebuild.result == 'success' || needs.prebuild-artifact-reuse.outputs.reuse_hit == 'true' }}
