name: Run Integration Tests (TTS GGML)

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref (branch/tag/SHA) to test"
        type: string
        required: false
        default: main
      prebuild_package:
        description: "NPM package containing prebuilds (e.g. @qvac/tts-ggml@1.0.0)"
        required: true
        type: string
      run_integration_tests:
        description: "Run the regular integration suite"
        required: false
        type: boolean
        default: true
      run_rtf_benchmarks:
        description: "Run the RTF benchmark matrix (writes rtf-results-* artifacts)"
        required: false
        type: boolean
        default: false
      benchmark_matrix_json:
        description: "Optional JSON array overriding the desktop benchmark matrix"
        required: false
        type: string

  workflow_call:
    inputs:
      ref:
        description: 'ref'
        type: string
      repository:
        type: string
      run_integration_tests:
        description: "Run the regular integration suite"
        type: boolean
        required: false
        default: true
      run_rtf_benchmarks:
        description: "Run the RTF benchmark matrix (writes rtf-results-* artifacts)"
        type: boolean
        required: false
        default: false
      benchmark_matrix_json:
        description: "Optional JSON array overriding the desktop benchmark matrix"
        type: string
        required: false
        default: ""

# Least-privilege default scoped to the whole file (CodeQL
# actions/missing-workflow-permissions).  Individual jobs widen this as
# needed; today the only job (run-integration-tests) explicitly requests
# contents:read + packages:read, both already covered here.
permissions:
  contents: read
  packages: read

jobs:
  # NOTE: continue-on-error: true mirrors the early-days landing posture
  # we use for parakeet's matching workflow.  The on-pr-tts-ggml.yml
  # merge-guard treats this job's `success || skipped` as a pass, so a
  # hard failure inside the integration suite does NOT block a merge —
  # only sanity-checks + cpp-lint + cpp-tests-coverage + prebuild really
  # gate today.  Tighten this gate (drop `continue-on-error` and/or
  # change merge-guard to require `success`) once the addon's flake
  # surface is small enough to make a hard gate cheap.
  run-integration-tests:
    timeout-minutes: 120
    continue-on-error: true
    runs-on: ${{ matrix.runner || matrix.os }}
    environment: release
    name: ${{ matrix.os }}-${{ matrix.platform }}-${{ matrix.arch }}${{ matrix.no_gpu == 'true' && '' || '-gpu' }}-integration-tests
    env:
      GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
      NO_GPU: ${{ matrix.no_gpu || 'false' }}
    permissions:
      contents: read
      packages: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            platform: linux
            arch: x64
            runner: qvac-ubuntu2204-x64-gpu
          - os: ubuntu-24.04
            platform: linux
            arch: x64
            runner: qvac-ubuntu2404-x64-gpu
          - os: ubuntu-24.04-arm
            platform: linux
            arch: arm64
            no_gpu: 'true'
          - os: macos-14-xlarge
            platform: darwin
            arch: arm64
            no_gpu: 'true'
          - os: macos-15-large
            platform: darwin
            arch: x64
            no_gpu: 'true'
          - os: windows-2025
            platform: win32
            arch: x64
            runner: qvac-win25-x64
            no_gpu: 'true'
          - os: windows-2025
            platform: win32
            arch: x64
            runner: qvac-win25-x64-gpu

    steps:
      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # 6.3.0
        with:
          node-version: lts/*
      - name: Manual Workspace Cleanup
        run: rm -rf "$GITHUB_WORKSPACE" && mkdir -p "$GITHUB_WORKSPACE"
        shell: bash
        working-directory: .
        if: runner.environment != 'github-hosted'

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          repository: ${{ inputs.repository || github.repository }}
          ref: ${{ inputs.ref || github.ref }}
          token: ${{ secrets.PAT_TOKEN }}

      - name: Install NPM dependencies
        working-directory: ${{ github.workspace }}/packages/tts-ggml
        run: |
          npm install
  
      - name: Install bare tooling
        run: npm install -g --force bare bare-make


      - run: mkdir -p "${{ runner.temp }}/tts-ggml"
        shell: bash
      - run: mkdir -p "${{ github.workspace }}/packages/tts-ggml/prebuilds"
        shell: bash

      - name: Download prebuilds from artifact
        if: ${{ !inputs.prebuild_package }}
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # 8.0.1
        with:
          path: ${{ runner.temp }}/tts-ggml
          merge-multiple: true

      - if: ${{ !inputs.prebuild_package }}
        shell: bash
        run: cp -r "${{ runner.temp }}/tts-ggml"/* "${{ github.workspace }}/packages/tts-ggml/prebuilds"

      - name: Download prebuilds from package
        if: ${{ inputs.prebuild_package }}
        working-directory: ${{ runner.temp }}/tts-ggml
        shell: bash
        run: |
          npm pack ${{ inputs.prebuild_package }}
          tar -xzf *.tgz
          cp -r ./package/prebuilds/* "${{ github.workspace }}/packages/tts-ggml/prebuilds"

      - name: Rename prebuilds from tetherto_ to qvac_ prefix
        if: ${{ inputs.prebuild_package }}
        working-directory: ${{ github.workspace }}/packages/tts-ggml
        shell: bash
        run: |
          find prebuilds -depth -name 'tetherto_*' | while read -r file; do
            dir=$(dirname "$file")
            base=$(basename "$file")
            newbase=$(echo "$base" | sed 's/^tetherto_/qvac_/')
            mv "$file" "$dir/$newbase"
          done

      - name: Linux - install dependencies
        if: matrix.arch == 'arm64' && (matrix.platform == 'linux' || matrix.platform == 'android')
        shell: bash
        run: |
          sudo apt-get update
          # libgomp1   - GNU OpenMP runtime, used when ggml-cpu's libgomp
          #              path is selected.
          # libomp5    - LLVM OpenMP runtime (libomp.so.5).  tts-cpp is
          #              built with clang under our linux-clang toolchain
          #              and links against libomp at -fopenmp time, so
          #              load fails with `libomp.so.5: cannot open shared
          #              object file` without this package.
          # libblas3   - runtime BLAS soname (libblas.so.3) required by
          #              the Linux prebuilds on x64.
          # mesa-vulkan-drivers - software / Mesa Vulkan ICD so the
          #              Vulkan-enabled prebuild's runtime backend probe
          #              has at least one Vulkan device to enumerate
          #              (works for the no_gpu matrix entries too,
          #              because the test runners explicitly force
          #              useGPU=false when NO_GPU=true).
          sudo apt-get install -y libgomp1 libomp5 libblas3 mesa-vulkan-drivers

      - if: ${{ matrix.os == 'windows-2025' }}
        name: Set Vulkan SDK Path on Windows Server 2025
        run: echo "VULKAN_SDK=C:\VulkanSDK" >> $Env:GITHUB_ENV

      - name: Cache TTS GGML GGUF models
        id: model-cache
        if: runner.environment != 'github-hosted'
        uses: ./.github/actions/cache-models
        with:
          package: tts-ggml
          paths: packages/tts-ggml/models
          hash-files-glob: packages/tts-ggml/scripts/download-tts-ggml-models.js
          enable-cross-os: 'true'

      - name: Download GGUF models from registry
        if: steps.model-cache.outputs.cache-hit != 'true'
        shell: bash
        working-directory: ${{ github.workspace }}/packages/tts-ggml
        run: npm run download-models:registry

      - name: Run integration test
        if: ${{ inputs.run_integration_tests != false }}
        shell: bash
        working-directory: ${{ github.workspace }}/packages/tts-ggml
        run: npm run test:integration
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
          INTEGRATION_TEST_TIMEOUT: ${{ matrix.platform == 'win32' && '1800' || '600' }}
          LD_LIBRARY_PATH: ${{ github.workspace }}/packages/tts-ggml/prebuilds/${{ matrix.platform }}-${{ matrix.arch }}
          DYLD_LIBRARY_PATH: ${{ github.workspace }}/packages/tts-ggml/prebuilds/${{ matrix.platform }}-${{ matrix.arch }}

      # Benchmark leg (run_rtf_benchmarks=true, set by
      # benchmark-performance-tts-ggml.yml). CPU entries run across the desktop
      # integration matrix, matching the Parakeet benchmark posture. GPU
      # entries are included only on runners that advertise GPU support.
      - name: Run RTF benchmark matrix
        if: ${{ inputs.run_rtf_benchmarks }}
        shell: bash
        working-directory: ${{ github.workspace }}/packages/tts-ggml
        run: |
          set -euo pipefail
          if [ -n "$QVAC_TTS_GGML_BENCHMARK_MATRIX_OVERRIDE" ]; then
            export QVAC_TTS_GGML_BENCHMARK_MATRIX_JSON="$QVAC_TTS_GGML_BENCHMARK_MATRIX_OVERRIDE"
          elif [ "${{ matrix.no_gpu || 'false' }}" = "true" ]; then
            export QVAC_TTS_GGML_BENCHMARK_MATRIX_JSON='[{"engine":"chatterbox","useGPU":false,"backendHint":"cpu"},{"engine":"chatterbox-mtl","useGPU":false,"backendHint":"cpu"},{"engine":"supertonic","useGPU":false,"backendHint":"cpu"},{"engine":"supertonic-mtl","useGPU":false,"backendHint":"cpu"}]'
          else
            export QVAC_TTS_GGML_BENCHMARK_MATRIX_JSON='[{"engine":"chatterbox","useGPU":false,"backendHint":"cpu"},{"engine":"chatterbox-mtl","useGPU":false,"backendHint":"cpu"},{"engine":"supertonic","useGPU":false,"backendHint":"cpu"},{"engine":"supertonic-mtl","useGPU":false,"backendHint":"cpu"},{"engine":"chatterbox","useGPU":true,"backendHint":"vulkan"},{"engine":"chatterbox-mtl","useGPU":true,"backendHint":"vulkan"},{"engine":"supertonic","useGPU":true,"backendHint":"vulkan"},{"engine":"supertonic-mtl","useGPU":true,"backendHint":"vulkan"}]'
          fi
          node scripts/run-rtf-benchmark-matrix.js
        env:
          QVAC_TTS_GGML_BENCHMARK_VARIANT: q4
          QVAC_TTS_GGML_BENCHMARK_MATRIX_OVERRIDE: ${{ inputs.benchmark_matrix_json }}
          QVAC_TTS_GGML_BENCHMARK_DEVICE: ${{ matrix.runner || matrix.os }}
          QVAC_TTS_GGML_BENCHMARK_RUNNER: ${{ matrix.runner || matrix.os }}
          LD_LIBRARY_PATH: ${{ github.workspace }}/packages/tts-ggml/prebuilds/${{ matrix.platform }}-${{ matrix.arch }}
          DYLD_LIBRARY_PATH: ${{ github.workspace }}/packages/tts-ggml/prebuilds/${{ matrix.platform }}-${{ matrix.arch }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_RUN_ATTEMPT: ${{ github.run_attempt }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_WORKFLOW: ${{ github.workflow }}
          GITHUB_JOB: ${{ github.job }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_REPOSITORY: ${{ github.repository }}

      # The matrix runner deliberately exits 0 on partial failure so one
      # engine/backend does not sink the whole leg. A run with zero artifacts
      # means every entry failed and should still fail loudly.
      - name: Verify RTF benchmark output exists
        if: ${{ always() && inputs.run_rtf_benchmarks }}
        shell: bash
        working-directory: ${{ github.workspace }}/packages/tts-ggml
        run: |
          set -euo pipefail
          results_dir="benchmarks/results"
          mkdir -p "$results_dir"
          shopt -s nullglob
          rtf_files=("$results_dir"/rtf-benchmark-*.json)
          stream_files=("$results_dir"/streaming-benchmark-*.json)
          rtf_count=${#rtf_files[@]}
          stream_count=${#stream_files[@]}
          echo "Benchmark output in $results_dir:"
          ls -la "$results_dir" || true
          echo
          echo "rtf-benchmark-*.json: $rtf_count"
          echo "streaming-benchmark-*.json: $stream_count"
          {
            echo "### Benchmark output — ${{ matrix.runner || matrix.os }} (${{ matrix.platform }}-${{ matrix.arch }})"
            echo "- rtf-benchmark JSON files: \`$rtf_count\`"
            echo "- streaming-benchmark JSON files: \`$stream_count\`"
          } >> "$GITHUB_STEP_SUMMARY"
          if [ "$rtf_count" -eq 0 ]; then
            echo "::error title=No RTF benchmark output::scripts/run-rtf-benchmark-matrix.js produced zero rtf-benchmark-*.json files on ${{ matrix.runner || matrix.os }}. Every benchmark entry failed — check the matrix runner log above for model-fetch failures, prebuild path issues, or per-entry crashes."
            exit 1
          fi

      - name: Upload RTF benchmark results
        if: ${{ always() && inputs.run_rtf_benchmarks }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # 7.0.0
        with:
          name: rtf-results-tts-ggml-${{ matrix.runner || matrix.os }}-${{ matrix.arch }}${{ matrix.no_gpu == 'true' && '-cpu' || '-gpu' }}
          path: |
            packages/tts-ggml/benchmarks/results/rtf-benchmark-*.json
            packages/tts-ggml/benchmarks/results/streaming-benchmark-*.json
          if-no-files-found: warn
          retention-days: 30
