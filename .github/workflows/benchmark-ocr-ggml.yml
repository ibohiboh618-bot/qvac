name: Benchmark (OCR GGML)

on:
  workflow_dispatch:
    inputs:
      pipeline:
        description: 'GGML pipeline(s) to evaluate (easyocr, doctr, or both)'
        required: false
        default: 'both'
        type: choice
        options:
          - both
          - easyocr
          - doctr
      tasks:
        description: 'Tasks to run (fullpage, spotting, or both)'
        required: false
        default: 'fullpage,spotting'
        type: string
      limit:
        description: 'Limit samples per task (0 = all)'
        required: false
        default: '0'
        type: string
      skip_existing:
        description: 'Skip already processed samples'
        required: false
        default: true
        type: boolean
      devices:
        description: 'Comma-separated targets (linux-x64-cpu, linux-x64-gpu, darwin-arm64-metal)'
        required: false
        default: 'linux-x64-cpu,linux-x64-gpu'
        type: string
      kernel_precision:
        description: 'EasyOCR/CRNN conv-kernel precision (default = backend-aware; f16/f32 = forced override)'
        required: false
        default: 'default'
        type: choice
        options:
          - default
          - f16
          - f32

env:
  PKG_DIR: packages/ocr-ggml
  EASYOCR_S3_PREFIX: qvac_models_compiled/ocr/gguf/easyocr/2026-05-14
  DOCTR_S3_PREFIX: qvac_models_compiled/ocr/gguf/doctrf16/2026-05-15

permissions:
  contents: read

# Manual benchmark runs compete for scarce self-hosted GPU runners
# (mac-mini-m4-gpu, qvac-ubuntu2404-x64-gpu); don't cancel an in-flight run.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  label-gate:
    name: Authorise (label-gate)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    outputs:
      authorised: ${{ steps.gate.outputs.authorised }}
    steps:
      - name: Checkout (label-gate action only)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          ref: ${{ github.event.repository.default_branch }}
          sparse-checkout: .github/actions/label-gate
          sparse-checkout-cone-mode: false

      - name: Run label-gate
        id: gate
        uses: ./.github/actions/label-gate
        with:
          github-token: ${{ secrets.PAT_TOKEN }}

  prepare:
    needs: label-gate
    if: needs.label-gate.outputs.authorised == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    name: Resolve device matrix
    outputs:
      matrix: ${{ steps.build.outputs.matrix }}
      platforms: ${{ steps.build.outputs.platforms }}
    steps:
      - name: Build device/backend matrix
        id: build
        env:
          DEVICES: ${{ inputs.devices }}
        run: |
          python3 << 'PY' >> "$GITHUB_OUTPUT"
          import json, os, sys
          # device -> runner, ggml backend, and the prebuild platform/arch it
          # downloads. Linux x64 (CPU + NVIDIA Vulkan) and Apple-Silicon Metal
          # are wired; Windows GPU and mobile accuracy remain follow-ups.
          allowed = {
              "linux-x64-cpu": {"device": "linux-x64-cpu", "runner": "ubuntu-24.04", "backend": "cpu", "platform": "linux", "arch": "x64"},
              "linux-x64-gpu": {"device": "linux-x64-gpu", "runner": "qvac-ubuntu2404-x64-gpu", "backend": "vulkan", "platform": "linux", "arch": "x64"},
              "darwin-arm64-metal": {"device": "darwin-arm64-metal", "runner": "mac-mini-m4-gpu", "backend": "metal", "platform": "darwin", "arch": "arm64"},
          }
          requested = [d.strip() for d in os.environ.get("DEVICES", "").split(",") if d.strip()]
          if not requested:
              print("::error::no devices requested", file=sys.stderr)
              sys.exit(1)
          rows = []
          for d in requested:
              if d not in allowed:
                  print(f"::error::unknown device '{d}' (allowed: {', '.join(allowed)})", file=sys.stderr)
                  sys.exit(1)
              rows.append(allowed[d])
          print("matrix=" + json.dumps({"include": rows}))
          # Distinct platforms requested, so each build job runs only when its
          # platform is actually needed (saves an expensive macOS runner, and
          # keeps the run from failing on an unrequested platform's build).
          print("platforms=" + ",".join(sorted({r["platform"] for r in rows})))
          PY

  build-linux:
    needs: [label-gate, prepare]
    if: needs.label-gate.outputs.authorised == 'true' && contains(needs.prepare.outputs.platforms, 'linux')
    runs-on: ubuntu-24.04
    environment: release
    timeout-minutes: 120
    name: Build prebuild (linux-x64)
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          submodules: recursive

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # 6.3.0
        with:
          node-version: lts/*

      - name: Install global dependencies
        run: npm install -g --force bare-make bare-runtime

      - name: Configure vcpkg
        run: echo "VCPKG_ROOT=$VCPKG_INSTALLATION_ROOT" >> $GITHUB_ENV

      - name: Cache vcpkg packages
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # 5.0.4
        with:
          key: vcpkg-linux-x64-ocr-ggml-${{ hashFiles('packages/ocr-ggml/**/vcpkg.json', 'packages/ocr-ggml/**/CMakeLists.txt') }}
          path: |
            ${{ env.VCPKG_ROOT }}/installed
            ${{ env.VCPKG_ROOT }}/packages
            ~/.cache/vcpkg
          restore-keys: vcpkg-linux-x64-ocr-ggml-

      - name: Cache ccache
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # 5.0.4
        with:
          key: ccache-linux-x64-ocr-ggml-${{ github.sha }}
          path: ~/.ccache
          restore-keys: ccache-linux-x64-ocr-ggml-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake wget build-essential ccache

      - name: Setup LLVM
        uses: tetherto/qvac/.github/actions/setup-llvm@0c819dd1110e4902223b1f7646cc0f1be2c9bc5c

      - name: Setup Vulkan SDK
        uses: tetherto/qvac/.github/actions/setup-vulkan-sdk@0bbdca93da303a0b1634ba14a89cec085621078d
        with:
          platform: linux
          arch: x64

      - name: Configure ccache
        run: |
          ccache --set-config=max_size=500M
          ccache --set-config=compression=true
          ccache -z

      - name: Cache npm dependencies
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # 5.0.4
        with:
          key: npm-ocr-ggml-${{ hashFiles('packages/ocr-ggml/package-lock.json') }}
          path: ~/.npm
          restore-keys: npm-ocr-ggml-

      - name: Install npm dependencies
        working-directory: ${{ env.PKG_DIR }}
        run: npm install

      - name: Build addon
        working-directory: ${{ env.PKG_DIR }}
        env:
          CMAKE_C_COMPILER_LAUNCHER: ccache
          CMAKE_CXX_COMPILER_LAUNCHER: ccache
        run: |
          bare-make generate --platform linux --arch x64
          bare-make build
          bare-make install

      - name: Show ccache stats
        run: ccache -s

      - name: Upload prebuild artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # 7.0.0
        with:
          name: ggml-ocr-linux-x64
          path: ${{ env.PKG_DIR }}/prebuilds
          retention-days: 1

  # Apple-Silicon (Metal) prebuild. Mirrors the darwin-arm64 leg of
  # reusable-prebuilds.yml (the canonical recipe) on a GitHub-hosted macOS
  # runner; Metal is enabled by the addon build on darwin, so no Vulkan SDK is
  # needed for the GPU path here.
  build-darwin:
    needs: [label-gate, prepare]
    if: needs.label-gate.outputs.authorised == 'true' && contains(needs.prepare.outputs.platforms, 'darwin')
    runs-on: macos-15
    environment: release
    timeout-minutes: 120
    name: Build prebuild (darwin-arm64)
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Setup build host
        uses: tetherto/qvac/.github/actions/setup-build-host@7671af404baf8de85fa61cf3e1908da1f0a8fcaf
        with:
          platform: darwin
          arch: arm64

      - name: Setup LLVM
        uses: tetherto/qvac/.github/actions/setup-llvm@0c819dd1110e4902223b1f7646cc0f1be2c9bc5c

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          submodules: recursive

      - name: Setup AWS CLI
        uses: tetherto/qvac/.github/actions/setup-aws-prebuild@2e2c94d66a50c8b8851824314e343ede5297eb1f
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}

      - name: Setup vcpkg
        uses: tetherto/qvac/.github/actions/setup-vcpkg@98990f3d11736a1ae88feddc514d14d78d7abdc7
        env:
          MODEL_S3_BUCKET: ${{ secrets.MODEL_S3_BUCKET }}
        with:
          platform: darwin
          arch: arm64

      - name: Setup Bare tooling
        uses: tetherto/qvac/.github/actions/setup-bare-tooling@8668ac46334eb595aa095c94b53322c557b1bc39
        with:
          shell_type: bash

      - name: Setup Apple Clang
        uses: tetherto/qvac/.github/actions/setup-apple-clang@6e8d3c306a462a58589396cda428d65e015f0d8b

      - name: Cache npm dependencies
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # 5.0.4
        with:
          key: npm-ocr-ggml-darwin-${{ hashFiles('packages/ocr-ggml/package-lock.json') }}
          path: ~/.npm
          restore-keys: npm-ocr-ggml-darwin-

      - name: Install npm dependencies
        working-directory: ${{ env.PKG_DIR }}
        run: npm install

      - name: Build addon
        working-directory: ${{ env.PKG_DIR }}
        run: |
          bare-make generate --platform darwin --arch arm64 -D BUILD_TESTING=OFF
          bare-make build
          bare-make install

      - name: Strip static libraries (.a) from prebuilds
        working-directory: ${{ env.PKG_DIR }}
        run: |
          if [ -d prebuilds ]; then
            find prebuilds -type f -name '*.a' -delete
          fi

      - name: Upload prebuild artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # 7.0.0
        with:
          name: ggml-ocr-darwin-arm64
          path: ${{ env.PKG_DIR }}/prebuilds
          retention-days: 1

  evaluate:
    needs:
      - build-linux
      - build-darwin
      - label-gate
      - prepare
    # Run after the builds regardless of each other's result (a failed mac build
    # must not skip the linux legs). Each matrix row downloads only its own
    # platform prebuild, so a missing artifact fails just that row.
    if: ${{ always() && needs.label-gate.outputs.authorised == 'true' && needs.prepare.result == 'success' }}
    runs-on: ${{ matrix.runner }}
    environment: release
    timeout-minutes: 180
    name: Evaluate (${{ matrix.device }})
    permissions:
      contents: read
      id-token: write

    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare.outputs.matrix) }}

    steps:
      # Self-hosted GPU runners keep their workspace between jobs; wipe it before
      # checkout so each run starts clean. No-op on GitHub-hosted runners.
      # See docs/ci/SELF-HOSTED-RUNNERS.md.
      - name: Manual Workspace Cleanup
        run: rm -rf "$GITHUB_WORKSPACE" && mkdir -p "$GITHUB_WORKSPACE"
        shell: bash
        working-directory: .
        if: runner.environment != 'github-hosted'

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          submodules: recursive

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # 6.3.0
        with:
          node-version: 20

      - name: Install bare-runtime
        # --force so the global install succeeds on persistent self-hosted
        # runners (e.g. mac-mini-m4-gpu) where it may already be present.
        run: npm install -g --force bare-runtime

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # 6.2.0
        with:
          python-version: '3.14'
          cache: pip

      - name: Download prebuild for this platform
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # 8.0.1
        with:
          name: ggml-ocr-${{ matrix.platform }}-${{ matrix.arch }}
          path: ${{ env.PKG_DIR }}/prebuilds

      - name: Install npm dependencies
        working-directory: ${{ env.PKG_DIR }}
        run: npm install

      # GitHub-hosted runners have no GPU, so install Mesa (software Vulkan) for
      # the CPU leg. Self-hosted GPU runners already ship a vendor Vulkan ICD
      # (e.g. NVIDIA) and must not have it swapped for Mesa.
      - name: Install system dependencies
        if: runner.environment == 'github-hosted'
        run: |
          sudo apt-get update
          sudo apt-get install -y mesa-vulkan-drivers

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # 6.0.0
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: eu-central-1

      - name: Download EasyOCR GGML models
        if: inputs.pipeline == 'easyocr' || inputs.pipeline == 'both'
        working-directory: ${{ env.PKG_DIR }}
        env:
          MODEL_S3_BUCKET: ${{ secrets.MODEL_S3_BUCKET }}
        run: |
          mkdir -p models/ocr/gguf/easyocr
          aws s3 cp s3://$MODEL_S3_BUCKET/${{ env.EASYOCR_S3_PREFIX }}/craft_mlt_25k.gguf models/ocr/gguf/easyocr/
          aws s3 cp s3://$MODEL_S3_BUCKET/${{ env.EASYOCR_S3_PREFIX }}/latin_g2.gguf models/ocr/gguf/easyocr/
          echo "Downloaded EasyOCR GGML models:"
          ls -la models/ocr/gguf/easyocr/

      - name: Download DocTR GGML models
        if: inputs.pipeline == 'doctr' || inputs.pipeline == 'both'
        working-directory: ${{ env.PKG_DIR }}
        env:
          MODEL_S3_BUCKET: ${{ secrets.MODEL_S3_BUCKET }}
        run: |
          mkdir -p models/ocr/gguf/doctr
          aws s3 cp s3://$MODEL_S3_BUCKET/${{ env.DOCTR_S3_PREFIX }}/db_mobilenet_v3_large.gguf models/ocr/gguf/doctr/
          aws s3 cp s3://$MODEL_S3_BUCKET/${{ env.DOCTR_S3_PREFIX }}/crnn_mobilenet_v3_small.gguf models/ocr/gguf/doctr/
          echo "Downloaded DocTR GGML models:"
          ls -la models/ocr/gguf/doctr/

      - name: Download OCRBench_v2 dataset
        working-directory: ${{ env.PKG_DIR }}
        env:
          MODEL_S3_BUCKET: ${{ secrets.MODEL_S3_BUCKET }}
        run: |
          mkdir -p benchmarks/quality_eval/data
          echo "Downloading OCRBench_v2 dataset from S3..."
          aws s3 sync s3://$MODEL_S3_BUCKET/qvac_datasets/ocr/OCRBench_v2/ benchmarks/quality_eval/data/OCRBench_v2/ --exclude "*.zip"
          echo "Dataset downloaded:"
          ls -la benchmarks/quality_eval/data/OCRBench_v2/ | head -20

      - name: Free up disk space
        if: runner.environment == 'github-hosted'
        run: |
          echo "Disk space before cleanup:"
          df -h
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          sudo apt-get clean
          echo "Disk space after cleanup:"
          df -h

      - name: Install Python dependencies
        working-directory: ${{ env.PKG_DIR }}/benchmarks/quality_eval
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build common evaluate args
        id: eval-args
        shell: bash
        run: |
          SKIP_FLAG=""
          # Validate workflow inputs before building the eval argv. Restricts the
          # surface for shell injection through the (quoted) step outputs below.
          case "${{ inputs.pipeline }}" in
            easyocr|doctr|both) ;;
            *) echo "ERROR: invalid pipeline: ${{ inputs.pipeline }}" >&2; exit 1 ;;
          esac
          if ! [[ "${{ inputs.limit }}" =~ ^[0-9]+$ ]]; then
            echo "ERROR: limit must be a non-negative integer" >&2; exit 1
          fi

          if [ "${{ inputs.skip_existing }}" = "true" ]; then
            SKIP_FLAG="--skip-existing"
          else
            SKIP_FLAG="--no-skip-existing"
          fi

          LIMIT_ARG=""
          if [ "${{ inputs.limit }}" != "0" ]; then
            LIMIT_ARG="--limit ${{ inputs.limit }}"
          fi

          PIPELINE_ARG="--pipeline ${{ inputs.pipeline }}"

          EASYOCR_ARGS=""
          if [ "${{ inputs.pipeline }}" = "easyocr" ] || [ "${{ inputs.pipeline }}" = "both" ]; then
            EASYOCR_ARGS="--detector $(pwd)/${{ env.PKG_DIR }}/models/ocr/gguf/easyocr/craft_mlt_25k.gguf --recognizer $(pwd)/${{ env.PKG_DIR }}/models/ocr/gguf/easyocr/latin_g2.gguf"
          fi

          DOCTR_ARGS=""
          if [ "${{ inputs.pipeline }}" = "doctr" ] || [ "${{ inputs.pipeline }}" = "both" ]; then
            DOCTR_ARGS="--doctr-detector $(pwd)/${{ env.PKG_DIR }}/models/ocr/gguf/doctr/db_mobilenet_v3_large.gguf --doctr-recognizer $(pwd)/${{ env.PKG_DIR }}/models/ocr/gguf/doctr/crnn_mobilenet_v3_small.gguf"
          fi

          echo "skip_flag=$SKIP_FLAG" >> $GITHUB_OUTPUT
          echo "limit_arg=$LIMIT_ARG" >> $GITHUB_OUTPUT
          echo "pipeline_arg=$PIPELINE_ARG" >> $GITHUB_OUTPUT
          echo "easyocr_args=$EASYOCR_ARGS" >> $GITHUB_OUTPUT
          echo "doctr_args=$DOCTR_ARGS" >> $GITHUB_OUTPUT

      - name: Run Full-page OCR benchmark (HierText)
        if: contains(inputs.tasks, 'fullpage')
        timeout-minutes: 90
        working-directory: ${{ env.PKG_DIR }}/benchmarks/quality_eval
        run: |
          python evaluate.py \
            --dataset-path "data/OCRBench_v2" \
            ${{ steps.eval-args.outputs.pipeline_arg }} \
            ${{ steps.eval-args.outputs.easyocr_args }} \
            ${{ steps.eval-args.outputs.doctr_args }} \
            --task-types "full-page OCR en" \
            --dataset-filter "HierText" \
            --results-dir "results/${{ matrix.device }}/full-page-ocr" \
            --backend "${{ matrix.backend }}" \
            --qvac-addon-path "$(pwd)/../.." \
            ${{ steps.eval-args.outputs.skip_flag }} \
            ${{ steps.eval-args.outputs.limit_arg }}
        env:
          PYTHONUNBUFFERED: 1
          OCR_GGML_CRAFT_KERNEL_F16: ${{ inputs.kernel_precision == 'f16' && '1' || '' }}
          OCR_GGML_CRNN_KERNEL_F16: ${{ inputs.kernel_precision == 'f16' && '1' || '' }}
          OCR_GGML_CRAFT_KERNEL_F32: ${{ inputs.kernel_precision == 'f32' && '1' || '' }}
          OCR_GGML_CRNN_KERNEL_F32: ${{ inputs.kernel_precision == 'f32' && '1' || '' }}

      - name: Run Text Spotting benchmark (IC15)
        if: contains(inputs.tasks, 'spotting')
        timeout-minutes: 90
        working-directory: ${{ env.PKG_DIR }}/benchmarks/quality_eval
        run: |
          python evaluate.py \
            --dataset-path "data/OCRBench_v2" \
            ${{ steps.eval-args.outputs.pipeline_arg }} \
            ${{ steps.eval-args.outputs.easyocr_args }} \
            ${{ steps.eval-args.outputs.doctr_args }} \
            --task-types "text spotting en" \
            --dataset-filter "IC15" \
            --results-dir "results/${{ matrix.device }}/text-spotting" \
            --backend "${{ matrix.backend }}" \
            --qvac-addon-path "$(pwd)/../.." \
            ${{ steps.eval-args.outputs.skip_flag }} \
            ${{ steps.eval-args.outputs.limit_arg }}
        env:
          PYTHONUNBUFFERED: 1
          OCR_GGML_CRAFT_KERNEL_F16: ${{ inputs.kernel_precision == 'f16' && '1' || '' }}
          OCR_GGML_CRNN_KERNEL_F16: ${{ inputs.kernel_precision == 'f16' && '1' || '' }}
          OCR_GGML_CRAFT_KERNEL_F32: ${{ inputs.kernel_precision == 'f32' && '1' || '' }}
          OCR_GGML_CRNN_KERNEL_F32: ${{ inputs.kernel_precision == 'f32' && '1' || '' }}

      - name: Upload evaluation results
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # 7.0.0
        if: always()
        with:
          name: ocr-ggml-benchmark-results-${{ matrix.device }}
          path: ${{ env.PKG_DIR }}/benchmarks/quality_eval/results
          retention-days: 30

      - name: Upload evaluation logs
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # 7.0.0
        if: failure()
        with:
          name: ocr-ggml-benchmark-logs-${{ matrix.device }}
          path: |
            ${{ env.PKG_DIR }}/benchmarks/quality_eval/*.log
          retention-days: 7

  summarize:
    needs: evaluate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    if: always()

    steps:
      - name: Download results
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # 8.0.1
        continue-on-error: true
        with:
          pattern: ocr-ggml-benchmark-results-*
          merge-multiple: true
          path: results

      - name: Skip summary if results are missing
        if: ${{ !hashFiles('results/**') }}
        run: |
          echo "No ocr-ggml-benchmark-results-* artifacts found; skipping summary."
          exit 0

      - name: Generate results summary
        env:
          PIPELINE: ${{ inputs.pipeline }}
          TASKS: ${{ inputs.tasks }}
          LIMIT: ${{ inputs.limit }}
          PRECISION: ${{ inputs.kernel_precision }}
        run: |
          python3 << 'PYTHON_SCRIPT' >> "$GITHUB_STEP_SUMMARY"
          import json
          import os
          from pathlib import Path

          PIPELINE = os.environ.get("PIPELINE", "both")
          run_easyocr = PIPELINE in ("easyocr", "both")
          run_doctr = PIPELINE in ("doctr", "both")

          def load_aggregate(base, sub, backend, task_type):
              task_dir = task_type.replace(" ", "_")
              path = Path(base) / sub / backend / task_dir / "aggregate.json"
              if path.exists():
                  with open(path) as f:
                      return json.load(f)
              return None

          def pick_winner(val_a, val_b, name_a, name_b, lower_is_better=True):
              if val_a is None or val_b is None:
                  return "N/A", "N/A", "-"
              a_wins = (val_a < val_b) if lower_is_better else (val_a > val_b)
              a_str = f"**{val_a:.4f}**" if a_wins else f"{val_a:.4f}"
              b_str = f"**{val_b:.4f}**" if not a_wins else f"{val_b:.4f}"
              return a_str, b_str, (name_a if a_wins else name_b)

          def ocr_table(qv, ref, qname, rname):
              if not (qv and ref):
                  return
              print(f"#### {qname} vs {rname}\n")
              print(f"| Metric | {qname} | {rname} | Winner |")
              print("|--------|---|---|--------|")
              for label, key, lib in [("CER ↓", "cer", True), ("WER ↓", "wer", True), ("ANLS ↑", "anls", False)]:
                  a = qv["metrics"].get(key, {}).get("mean")
                  b = ref["metrics"].get(key, {}).get("mean")
                  a_s, b_s, w = pick_winner(a, b, qname, rname, lib)
                  print(f"| {label} | {a_s} | {b_s} | {w} |")
              if qv.get("speed") and ref.get("speed"):
                  qs = qv["speed"]["mean_time_per_image"]
                  rs = ref["speed"]["mean_time_per_image"]
                  if qs > 0 and rs > 0:
                      winner = f"{qname} ({rs / qs:.1f}x)" if qs < rs else f"{rname} ({qs / rs:.1f}x)"
                      print(f"| Speed | {qs:.1f}s/img | {rs:.1f}s/img | {winner} |")
              print(f"\n*Samples: {qv['total_samples']}*\n")

          def spot_table(qv, ref, qname, rname):
              if not (qv and ref):
                  return
              print(f"#### {qname} vs {rname}\n")
              print(f"| Metric | {qname} | {rname} | Winner |")
              print("|--------|---|---|--------|")
              for label, key, lib in [
                  ("E2E F1 ↑", "e2e_f1", False),
                  ("E2E Precision ↑", "e2e_precision", False),
                  ("E2E Recall ↑", "e2e_recall", False),
                  ("Detection F1 ↑", "det_f1", False),
                  ("Avg CER ↓", "avg_cer", True),
                  ("Avg ANLS ↑", "avg_anls", False),
              ]:
                  a = qv["metrics"].get(key, {}).get("mean")
                  b = ref["metrics"].get(key, {}).get("mean")
                  a_s, b_s, w = pick_winner(a, b, qname, rname, lib)
                  print(f"| {label} | {a_s} | {b_s} | {w} |")
              print(f"\n*Samples: {qv['total_samples']}*\n")

          def summarize_device(base):
              print("### Full-page OCR (HierText)\n")
              for task_type in ["full-page OCR en"]:
                  if run_easyocr:
                      ocr_table(
                          load_aggregate(base, "full-page-ocr", "qvac-easyocr", task_type),
                          load_aggregate(base, "full-page-ocr", "easyocr", task_type),
                          "QVAC EasyOCR", "EasyOCR Python")
                  if run_doctr:
                      ocr_table(
                          load_aggregate(base, "full-page-ocr", "qvac-doctr", task_type),
                          load_aggregate(base, "full-page-ocr", "doctr", task_type),
                          "QVAC DocTR", "DocTR Python")
              print("### Text Spotting (IC15)\n")
              for task_type in ["text spotting en"]:
                  if run_easyocr:
                      spot_table(
                          load_aggregate(base, "text-spotting", "qvac-easyocr", task_type),
                          load_aggregate(base, "text-spotting", "easyocr", task_type),
                          "QVAC EasyOCR", "EasyOCR Python")
                  if run_doctr:
                      spot_table(
                          load_aggregate(base, "text-spotting", "qvac-doctr", task_type),
                          load_aggregate(base, "text-spotting", "doctr", task_type),
                          "QVAC DocTR", "DocTR Python")

          print("# OCR GGML Accuracy Benchmark\n")
          print("**Configuration:**")
          print(f"- Pipeline: `{PIPELINE}`")
          print(f"- Tasks: `{os.environ.get('TASKS', '')}`")
          print(f"- Sample Limit: `{os.environ.get('LIMIT', '')}`")
          print(f"- Kernel precision: `{os.environ.get('PRECISION', 'default')}`\n")

          root = Path("results")
          device_dirs = sorted([d for d in root.iterdir() if d.is_dir()]) if root.exists() else []
          if not device_dirs:
              print("_No results found._")
          for d in device_dirs:
              print(f"## Device: `{d.name}`\n")
              summarize_device(str(d))
          PYTHON_SCRIPT

