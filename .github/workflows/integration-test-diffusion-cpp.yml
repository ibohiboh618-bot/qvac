name: Integration Tests (Stable Diffusion)

on:
  workflow_call:
    inputs:
      ref:
        description: "ref"
        type: string
      repository:
        type: string

  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref (branch/tag/SHA) to test"
        type: string
        required: false
        default: main
      prebuild_package:
        description: "NPM package containing prebuilds (e.g. @qvac/diffusion-cpp@0.1.0)"
        type: string
        required: true

jobs:
  run-integration-tests:
    timeout-minutes: ${{ matrix.timeout || 360 }}
    continue-on-error: true
    runs-on: ${{ matrix.runner }}
    environment: release
    name: test-${{ matrix.platform }}-${{ matrix.arch }}
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      WORKDIR: packages/diffusion-cpp
      NO_GPU: ${{ matrix.no_gpu || 'false' }}
    permissions:
      contents: read
      packages: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            platform: linux
            arch: x64
            runner: qvac-ubuntu2204-x64-gpu
          - os: ubuntu-24.04
            platform: linux
            arch: x64
            runner: qvac-ubuntu2404-x64-gpu
          - os: ubuntu-24.04-arm
            platform: linux
            arch: arm64
            runner: ubuntu-24.04-arm
            no_gpu: 'true'
          - os: ubuntu-22.04-arm
            platform: linux
            arch: arm64
            runner: ubuntu-22.04-arm
            no_gpu: 'true'
          - os: mac-mini-m4
            platform: darwin
            arch: arm64
            runner: mac-mini-m4-gpu
          - os: macos-15-large
            platform: darwin
            arch: x64
            runner: macos-15-large
            no_gpu: 'true'
          - os: windows-2025
            platform: win32
            arch: x64
            runner: qvac-win25-x64-gpu
            timeout: 1800

    steps:
      - name: Bootstrap
        uses: ./.github/actions/run-desktop-integration-tests/bootstrap
        with:
          runner: ${{ matrix.runner }}
          repository: ${{ inputs.repository }}
          ref: ${{ inputs.ref }}
          pat-token: ${{ secrets.PAT_TOKEN }}
          bare-packages: bare bare-make bare-runtime bare-https brittle

      # PNGs are test-generated outputs uploaded as artifacts further
      # down; exclude them so they do not accumulate in the cache.
      - name: Cache integration test models
        id: model-cache
        if: startsWith(matrix.runner, 'qvac-')
        uses: ./.github/actions/cache-models
        with:
          package: diffusion-cpp
          paths: |
            packages/diffusion-cpp/test/model
            !packages/diffusion-cpp/test/model/*.png

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # 6.0.0
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: eu-central-1

      - name: Configure dual registry
        uses: ./.github/actions/run-desktop-integration-tests/configure-dual-registry
        with:
          platform: ${{ matrix.platform }}
          workdir: ${{ env.WORKDIR }}
          npm-token: ${{ secrets.NPM_TOKEN }}
          gpr-token: ${{ secrets.GITHUB_TOKEN }}
          git-pat: ${{ secrets.PAT_TOKEN }}

      - name: Install NPM dependencies
        working-directory: ${{ env.WORKDIR }}
        shell: bash
        run: npm install

      - name: Resolve prebuilds
        uses: ./.github/actions/run-desktop-integration-tests/resolve-prebuilds
        with:
          platform: ${{ matrix.platform }}
          workdir: ${{ env.WORKDIR }}
          prebuild-package: ${{ inputs.prebuild_package }}

      - name: Install system dependencies
        uses: ./.github/actions/run-desktop-integration-tests/install-system-deps
        with:
          platform: ${{ matrix.platform }}
          arch: ${{ matrix.arch }}
          os: ${{ matrix.os }}

      - name: macOS — Metal GPU diagnostic
        if: matrix.platform == 'darwin'
        shell: bash
        run: |
          echo "=== GPU Hardware ==="
          system_profiler SPDisplaysDataType 2>/dev/null || echo "(system_profiler unavailable)"
          echo ""
          echo "=== Metal Device Check ==="
          cat > /tmp/metal_check.m << 'OBJC'
          #import <Metal/Metal.h>
          #import <stdio.h>
          int main() {
            id<MTLDevice> dev = MTLCreateSystemDefaultDevice();
            if (!dev) { printf("No Metal device available\n"); return 1; }
            printf("Device    : %s\n", [[dev name] UTF8String]);
            printf("Headless  : %s\n", dev.headless ? "yes" : "no");
            printf("LowPower  : %s\n", dev.lowPower ? "yes" : "no");
            printf("Apple4    : %d\n", [dev supportsFamily:MTLGPUFamilyApple4]);
            printf("Apple7    : %d\n", [dev supportsFamily:MTLGPUFamilyApple7]);
            printf("Metal3    : %d\n", [dev supportsFamily:MTLGPUFamilyMetal3]);
            printf("simdgroup : %d\n", [dev supportsFamily:MTLGPUFamilyApple7]);
            return 0;
          }
          OBJC
          clang -x objective-c -framework Metal -framework Foundation \
                -o /tmp/metal_check /tmp/metal_check.m 2>/dev/null && /tmp/metal_check || echo "(Metal check failed to compile/run)"

      - name: Run integration test (Linux/macOS)
        if: ${{ matrix.platform != 'win32' }}
        working-directory: ${{ env.WORKDIR }}
        run: |
          npm run test:integration 2>&1 | tee test-output.log
          exit ${PIPESTATUS[0]}
        shell: bash
        env:
          QASE_API_TOKEN: ${{ secrets.QASE_API_TOKEN }}

      - name: Run integration test (Windows)
        if: ${{ matrix.platform == 'win32' }}
        working-directory: ${{ env.WORKDIR }}
        run: |
          npm run test:integration:generate
          bare test/integration/all.js --exit | Tee-Object test-output.log
        shell: powershell
        env:
          QASE_API_TOKEN: ${{ secrets.QASE_API_TOKEN }}

      - name: List generated images
        if: always() && !cancelled()
        shell: bash
        working-directory: ${{ env.WORKDIR }}
        run: |
          echo "## Generated Images (${{ matrix.os }}-${{ matrix.arch }})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if ls test/model/*.png 1>/dev/null 2>&1; then
            echo "| File | Test Source | Size |" >> $GITHUB_STEP_SUMMARY
            echo "|------|------------|------|" >> $GITHUB_STEP_SUMMARY
            for f in test/model/*.png; do
              fname=$(basename "$f")
              test_source=$(echo "$fname" | sed 's/--.*//')
              size=$(du -h "$f" | cut -f1)
              echo "| \`$fname\` | \`${test_source}.test.js\` | $size |" >> $GITHUB_STEP_SUMMARY
            done
          else
            echo "*No images were generated.*" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload generated images
        if: always() && !cancelled()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # 7.0.0
        with:
          name: sd-test-images-${{ matrix.os }}-${{ matrix.arch }}
          path: ${{ env.WORKDIR }}/test/model/*.png
          if-no-files-found: ignore
          retention-days: 30

