name: On PR Trigger (OCR-GGML)

on:
  pull_request_target:
    types:
      - opened
      - synchronize
      - reopened
      - labeled
    branches:
      - main
      - release-*
      - feature-*
      - tmp-*
    paths:
      - "packages/ocr-ggml/**"
      - ".github/workflows/*ocr-ggml*.yml"
  workflow_dispatch:
    inputs:
      base_sha:
        description: >-
          Optional base SHA for cpp-lint (clang-format + clang-tidy) to diff
          against. When empty, the reusable cpp-lint workflow falls back to
          HEAD~1, so only files touched by the current commit get linted.
          Set this to a commit further back (e.g. 14e7c83e, the last commit
          before the clang-tidy buckets) to re-lint every C++ file we have
          touched since.
        type: string
        required: false
        default: ""
  workflow_call:

permissions:
  contents: read
  pull-requests: read
  packages: read
  id-token: write

env:
  PKG_DIR: packages/ocr-ggml

jobs:
  label-gate:
    name: Authorise (label-gate)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: write
    outputs:
      authorised: ${{ steps.gate.outputs.authorised }}
    steps:
      - name: Checkout (label-gate action only)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          ref: ${{ github.event.repository.default_branch }}
          sparse-checkout: .github/actions/label-gate
          sparse-checkout-cone-mode: false
      - name: Run label-gate
        id: gate
        uses: ./.github/actions/label-gate
        with:
          github-token: ${{ secrets.PAT_TOKEN }}

  ci-router:
    name: CI Router (label detection)
    runs-on: ubuntu-latest
    timeout-minutes: 2
    permissions:
      contents: read
      pull-requests: read
    outputs:
      run_verified_checks: ${{ steps.route.outputs.run_verified_checks }}
      run_prebuilds: ${{ steps.route.outputs.run_prebuilds }}
      run_cpp_tests: ${{ steps.route.outputs.run_cpp_tests }}
      run_desktop: ${{ steps.route.outputs.run_desktop }}
      run_mobile: ${{ steps.route.outputs.run_mobile }}
    steps:
      - name: Checkout ci-router composite (default branch)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          ref: ${{ github.event.repository.default_branch }}
          sparse-checkout: .github/actions/ci-router
          sparse-checkout-cone-mode: false
      - name: Route CI stages
        id: route
        uses: ./.github/actions/ci-router

  authorize:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: write
    outputs:
      allowed: ${{ steps.auth.outputs.allowed }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          ref: ${{ github.event.repository.default_branch }}
      - name: Authorize
        id: auth
        uses: ./.github/actions/authorize-pr
        with:
          github-token: ${{ github.token }}

  verify-fabric-lockstep:
    if: needs.authorize.outputs.allowed == 'true'
    needs: [authorize]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2

      - name: Verify qvac-fabric versions are lockstep
        id: lockstep
        uses: ./.github/actions/verify-qvac-fabric-lockstep

      - name: Report verified version
        run: 'echo "Verified qvac-fabric version: ${{ steps.lockstep.outputs.version }}"'

  sanity-checks:
    if: needs.ci-router.outputs.run_verified_checks == 'true' && needs.label-gate.outputs.authorised == 'true' && (needs.authorize.outputs.allowed == 'true' || github.event_name == 'workflow_dispatch')
    needs:
      - authorize
      - ci-router
      - label-gate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      PKG_DIR: packages/ocr-ggml
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          fetch-depth: 0

      - name: Run Sanity checks
        uses: ./.github/actions/sanity-checks
        with:
          secret-token: ${{ secrets.GITHUB_TOKEN }}
          pat-token: ${{ secrets.PAT_TOKEN }}
          run-integration: ${{ needs.authorize.outputs.allowed == 'true' }}
          workdir: packages/ocr-ggml

      - name: Verify that yaml files are formatted
        id: yamlfmt
        uses: ./.github/actions/yamlfmt
        with:
          workdir: ${{ env.PKG_DIR }}
        continue-on-error: true

  cpp-lint:
    needs: [authorize, ci-router, label-gate]
    if: needs.ci-router.outputs.run_verified_checks == 'true' && needs.label-gate.outputs.authorised == 'true' && (needs.authorize.outputs.allowed == 'true' || github.event_name == 'workflow_dispatch')
    uses: ./.github/workflows/cpp-lint.yaml
    secrets: inherit
    with:
      sha: ${{ inputs.base_sha || github.event.pull_request.base.sha }}
      pr_head_sha: ${{ github.event.pull_request.head.sha }}
      workdir: packages/ocr-ggml

  ts-checks:
    needs: authorize
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # 6.3.0
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: packages/ocr-ggml
        run: npm install

      - name: Type declaration check
        working-directory: packages/ocr-ggml
        run: npm run test:dts

  detect-native-changes:
    if: needs.ci-router.outputs.run_prebuilds == 'true' && needs.label-gate.outputs.authorised == 'true' && (needs.authorize.outputs.allowed == 'true' || github.event_name == 'workflow_dispatch')
    needs:
      - authorize
      - ci-router
      - label-gate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      native_changed: ${{ steps.detect.outputs.native_changed }}
      native_hash: ${{ steps.detect.outputs.native_hash }}
    steps:
      - name: Checkout composite source (default branch)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          ref: ${{ github.event.repository.default_branch }}
      - name: Detect native file changes
        id: detect
        uses: ./.github/actions/detect-native-changes
        with:
          workdir: packages/ocr-ggml

  prebuild-artifact-reuse:
    if: needs.label-gate.outputs.authorised == 'true' && needs.detect-native-changes.outputs.native_changed == 'false'
    needs:
      - detect-native-changes
      - sanity-checks
      - label-gate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      actions: read
    outputs:
      reuse_hit: ${{ steps.reuse.outputs.reuse_hit }}
    steps:
      - name: Checkout prebuild-artifact-reuse composite (default branch)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          ref: ${{ github.event.repository.default_branch }}
          sparse-checkout: .github/actions/prebuild-artifact-reuse
          sparse-checkout-cone-mode: false
      - name: Reuse prebuilds from a prior run
        id: reuse
        uses: ./.github/actions/prebuild-artifact-reuse
        with:
          github-token: ${{ github.token }}
          workflow-file: on-pr-ocr-ggml.yml
          native-hash: ${{ needs.detect-native-changes.outputs.native_hash }}
          pr-number: ${{ github.event.pull_request.number }}

  prebuild:
    permissions:
      contents: write
      pull-requests: write
      packages: write
      id-token: write
    needs:
      - authorize
      - ci-router
      - sanity-checks
      - detect-native-changes
      - prebuild-artifact-reuse
      - label-gate
    if: |
      always() &&
      needs.sanity-checks.result == 'success' &&
      needs.ci-router.outputs.run_prebuilds == 'true' &&
      needs.label-gate.outputs.authorised == 'true' &&
      (needs.authorize.outputs.allowed == 'true' || github.event_name == 'workflow_dispatch') &&
      (needs.detect-native-changes.outputs.native_changed == 'true' || needs.prebuild-artifact-reuse.outputs.reuse_hit != 'true')
    uses: ./.github/workflows/prebuilds-ocr-ggml.yml
    secrets: inherit
    with:
      repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
      ref: ${{ github.event.pull_request.head.ref || github.ref }}

  prebuild-artifact-save:
    if: always() && needs.label-gate.outputs.authorised == 'true' && needs.prebuild.result == 'success'
    needs:
      - prebuild
      - detect-native-changes
      - label-gate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Checkout prebuild-artifact-save composite (default branch)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          ref: ${{ github.event.repository.default_branch }}
          sparse-checkout: .github/actions/prebuild-artifact-save
          sparse-checkout-cone-mode: false
      - name: Save reuse marker
        uses: ./.github/actions/prebuild-artifact-save
        with:
          native-hash: ${{ needs.detect-native-changes.outputs.native_hash }}
          pr-number: ${{ github.event.pull_request.number }}

  run-integration-tests:
    permissions:
      contents: read
      packages: read
      id-token: write
    needs: [authorize, prebuild, prebuild-artifact-reuse, ci-router, label-gate]
    if: always() && needs.ci-router.outputs.run_desktop == 'true' && needs.label-gate.outputs.authorised == 'true' && (needs.authorize.outputs.allowed == 'true' || github.event_name == 'workflow_dispatch') && (needs.prebuild.result == 'success' || needs.prebuild-artifact-reuse.outputs.reuse_hit == 'true')
    uses: ./.github/workflows/integration-test-ocr-ggml.yml
    secrets: inherit
    with:
      repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
      ref: ${{ github.event.pull_request.head.ref || github.ref }}

  run-mobile-integration-tests:
    permissions:
      contents: read
      packages: read
      pull-requests: write
      id-token: write
    needs: [authorize, prebuild, prebuild-artifact-reuse, ci-router, label-gate]
    if: always() && needs.ci-router.outputs.run_mobile == 'true' && needs.label-gate.outputs.authorised == 'true' && (needs.authorize.outputs.allowed == 'true' || github.event_name == 'workflow_dispatch') && (needs.prebuild.result == 'success' || needs.prebuild-artifact-reuse.outputs.reuse_hit == 'true')
    uses: ./.github/workflows/integration-mobile-test-ocr-ggml.yml
    secrets: inherit
    with:
      repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
      ref: ${{ github.event.pull_request.head.ref || github.ref }}

  combine-perf-reports:
    name: Combined Performance Report
    needs: [authorize, run-integration-tests, run-mobile-integration-tests]
    if: always() && needs.authorize.outputs.allowed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout repo (composites + perf scripts)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          sparse-checkout: |
            .github/actions/run-mobile-integration-tests
            scripts/perf-report
          sparse-checkout-cone-mode: false

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # 6.3.0
        with:
          node-version: lts/*

      - name: Combine performance reports
        uses: ./.github/actions/run-mobile-integration-tests/combine-perf-reports
        with:
          artifact-pattern: perf-report-ocr-*-${{ github.run_number }}
          report-title: 'OCR-GGML Performance Report (All Platforms)'
          # Drop desktop-only EasyOCR rows from the cross-platform table: the
          # full-suite and canvasSize tests are `skip: isMobile`, so their rows
          # can never have mobile data and only add empty columns here. They
          # still run on desktop and remain in the per-device desktop reports.
          exclude: 'full-suite|canvasSize lab_results'

  merge-guard:
    needs: [authorize, ci-router, sanity-checks, prebuild, prebuild-artifact-reuse, prebuild-artifact-save, detect-native-changes, run-integration-tests, run-mobile-integration-tests, label-gate]
    # Always run so the PR still gets a status check even if label-gate is
    # skipped or fails; matches on-pr-tts-ggml.yml's pattern.
    if: always()
    uses: ./.github/workflows/public-pr.yml
    with:
      sanity-checks-status: ${{ needs.sanity-checks.result == 'success' }}
      build-status: ${{ needs.prebuild.result == 'success' || needs.prebuild-artifact-reuse.outputs.reuse_hit == 'true' }}
      integration-tests-status: ${{ (needs.run-integration-tests.result == 'success' || needs.run-integration-tests.result == 'skipped') && (needs.run-mobile-integration-tests.result == 'success' || needs.run-mobile-integration-tests.result == 'skipped') }}
