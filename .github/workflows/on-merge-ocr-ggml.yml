name: On Merge Trigger (OCR-GGML)

on:
  push:
    branches:
      - main
      - release-*
      - feature-*
      - tmp-*
    paths:
      - "packages/ocr-ggml/**"
      - ".github/workflows/*ocr-ggml*.yml"

  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish with"
        required: false
        default: ""
        type: choice
        options:
          - ""
          - dev
          - feature
          - temp
          - latest
      npm_tag:
        description: "NPM dist-tag (default: latest). e.g. release-1.x"
        required: false
        default: ""
        type: string

permissions:
  contents: read
  pull-requests: read
  packages: read
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  label-gate:
    name: Authorise (label-gate)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: write
    outputs:
      authorised: ${{ steps.gate.outputs.authorised }}
    steps:
      - name: Checkout (label-gate action only)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # 7.0.0
        with:
          ref: ${{ github.event.repository.default_branch }}
          sparse-checkout: .github/actions/label-gate
          sparse-checkout-cone-mode: false
      - name: Run label-gate
        id: gate
        uses: ./.github/actions/label-gate
        with:
          github-token: ${{ secrets.PAT_TOKEN }}

  publish-logic:
    needs:
      - label-gate
    if: needs.label-gate.outputs.authorised == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: release
    outputs:
      publish_main: ${{ steps.logic.outputs.publish_main }}
      publish_release: ${{ steps.logic.outputs.publish_release }}
      publish_feature: ${{ steps.logic.outputs.publish_feature }}
      publish_tmp: ${{ steps.logic.outputs.publish_tmp }}
      gpr_tag: ${{ steps.logic.outputs.gpr_tag }}
    steps:
      - id: logic
        uses: tetherto/qvac-actions/npm-publish-logic@38693d9315c5fb6bba1354d8d1ef9823bf6c10a3 # 0.1.0

  release-merge-guard:
    name: Release Merge Guard
    needs:
      - label-gate
    if: >-
      needs.label-gate.outputs.authorised == 'true' && ((github.event_name == 'push' || github.event_name == 'workflow_dispatch') && startsWith(github.ref_name, 'release-'))
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: release
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # 7.0.0
        with:
          fetch-depth: 0
      - uses: ./.github/actions/release-merge-guard
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          base-ref: ${{ github.ref_name }}
          base-sha: ${{ github.event.before }}
          head-sha: ${{ github.sha }}
          package-slug: ocr-ggml
          package-json-path: packages/ocr-ggml/package.json
          changelog-path: packages/ocr-ggml/CHANGELOG.md

  build:
    needs:
      - publish-logic
      - release-merge-guard
      - label-gate
    if: >-
      needs.label-gate.outputs.authorised == 'true' && (!cancelled() && ( needs.publish-logic.outputs.publish_main == 'true' || needs.publish-logic.outputs.publish_feature == 'true' || needs.publish-logic.outputs.publish_tmp == 'true' || ( needs.publish-logic.outputs.publish_release == 'true' && needs.release-merge-guard.result == 'success' ) ))
    permissions:
      contents: write
      packages: write
      pull-requests: write
      id-token: write
    uses: ./.github/workflows/prebuilds-ocr-ggml.yml
    secrets: inherit

  publish-gpr:
    needs:
      - build
      - publish-logic
      - label-gate
    if: >-
      needs.label-gate.outputs.authorised == 'true' && (needs.publish-logic.outputs.publish_main == 'true' || needs.publish-logic.outputs.publish_feature == 'true' || needs.publish-logic.outputs.publish_tmp == 'true')
    timeout-minutes: 20
    outputs:
      published_version: ${{ steps.publish.outputs.npm_published_version }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      PKG_DIR: packages/ocr-ggml
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # 7.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download prebuild artifacts into package dir
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # 8.0.1
        with:
          name: prebuilds
          path: ${{ env.PKG_DIR }}/prebuilds

      - name: Publish to GitHub Package Registry
        id: publish
        uses: ./.github/actions/publish-library-to-gpr
        with:
          secret-token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ inputs.tag || needs.publish-logic.outputs.gpr_tag }}
          workdir: ${{ env.PKG_DIR }}
          name-suffix: "-mono"

  publish-npm:
    needs:
      - build
      - publish-logic
      - release-merge-guard
      - label-gate
    if: >-
      needs.label-gate.outputs.authorised == 'true' && (!cancelled() && needs.build.result == 'success' && needs.publish-logic.outputs.publish_release == 'true' && (needs.release-merge-guard.result == 'success' || needs.release-merge-guard.result == 'skipped'))
    continue-on-error: false
    timeout-minutes: 20
    outputs:
      published_version: ${{ steps.publish.outputs.npm_published_version }}
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: write
      packages: write
      id-token: write
    env:
      PKG_DIR: packages/ocr-ggml
    steps:
      - name: Validate npm_tag input
        if: inputs.npm_tag != ''
        shell: bash
        env:
          NPM_TAG_INPUT: ${{ inputs.npm_tag }}
        run: |
          if ! echo "$NPM_TAG_INPUT" | grep -qE '^[a-zA-Z0-9][a-zA-Z0-9._-]*$'; then
            echo "::error::Invalid npm dist-tag '$NPM_TAG_INPUT'. Must match ^[a-zA-Z0-9][a-zA-Z0-9._-]*$ (e.g. release-1.x)"
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # 7.0.0
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: Download prebuild artifacts into package dir
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # 8.0.1
        with:
          name: prebuilds
          path: ${{ env.PKG_DIR }}/prebuilds

      - name: Determine dist-tag
        id: dist-tag
        uses: tetherto/qvac-actions/npm-dist-tag-determination@38693d9315c5fb6bba1354d8d1ef9823bf6c10a3 # 0.1.0
        with:
          workdir: ${{ env.PKG_DIR }}
          tag: ${{ inputs.npm_tag }}

      - name: Publish to NPM Package Registry
        id: publish
        uses: tetherto/qvac-actions/publish-library-to-npm@38693d9315c5fb6bba1354d8d1ef9823bf6c10a3 # 0.1.0
        with:
          tag: ${{ steps.dist-tag.outputs.tag }}
          workdir: ${{ env.PKG_DIR }}

  # Tag the published version (no GitHub Release; SDK-only releases policy)
  create-tag:
    needs:
      - publish-npm
      - label-gate
    if: |-
      needs.label-gate.outputs.authorised == 'true' && (!cancelled() && needs.publish-npm.result == 'success' && needs.publish-npm.outputs.published_version != '')
    permissions:
      contents: write
    uses: ./.github/workflows/create-release-tag.yml
    with:
      repo_name: "ocr-ggml"
      published_version: ${{ needs.publish-npm.outputs.published_version }}

  post-build-gate:
    name: Post-Build Gate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs:
      - publish-gpr
      - publish-npm
      - label-gate
    if: needs.label-gate.outputs.authorised == 'true' && !cancelled()
    outputs:
      should_run_tests: ${{ steps.gate.outputs.should_run_tests }}
    steps:
      - id: gate
        shell: bash
        run: |
          set -euo pipefail
          should="false"

          if [ "${{ needs.publish-gpr.result }}" = "success" ] || \
             [ "${{ needs.publish-npm.result }}" = "success" ]; then
            should="true"
          fi

          echo "should_run_tests=$should" >> "$GITHUB_OUTPUT"

  integration-tests:
    permissions:
      contents: read
      packages: read
      id-token: write
    uses: ./.github/workflows/integration-test-ocr-ggml.yml
    needs:
      - post-build-gate
      - label-gate
    if: needs.label-gate.outputs.authorised == 'true' && (needs.post-build-gate.outputs.should_run_tests == 'true')
    secrets: inherit
    with:
      repository: ${{ github.repository }}
      ref: ${{ github.sha }}
