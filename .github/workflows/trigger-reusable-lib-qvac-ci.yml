name: General CI/CD (qvac-ci)

on:
  push:
    branches:
      - main
      - release-*
      - feature-*
      - tmp-*
    paths:
      - "packages/qvac-ci/**"
  workflow_dispatch:

env:
  WORKDIR: packages/qvac-ci

permissions:
  contents: read

jobs:
  label-gate:
    name: Authorise (label-gate)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    outputs:
      authorised: ${{ steps.gate.outputs.authorised }}
    steps:
      - name: Checkout (label-gate action only)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          ref: ${{ github.event.repository.default_branch }}
          sparse-checkout: .github/actions/label-gate
          sparse-checkout-cone-mode: false
      - name: Run label-gate
        id: gate
        uses: ./.github/actions/label-gate
        with:
          github-token: ${{ secrets.PAT_TOKEN }}

  release-merge-guard:
    name: Release Merge Guard
    if: >-
      github.event_name == 'push' && startsWith(github.ref_name, 'release-')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          fetch-depth: 0
      - uses: ./.github/actions/release-merge-guard
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          base-ref: ${{ github.ref_name }}
          base-sha: ${{ github.event.before }}
          head-sha: ${{ github.sha }}
          package-slug: qvac-ci
          package-json-path: packages/qvac-ci/package.json
          changelog-path: packages/qvac-ci/CHANGELOG.md

  publish-logic:
    runs-on: ubuntu-latest
    outputs:
      publish_main: ${{ steps.logic.outputs.publish_main }}
      publish_release: ${{ steps.logic.outputs.publish_release }}
      publish_feature: ${{ steps.logic.outputs.publish_feature }}
      publish_tmp: ${{ steps.logic.outputs.publish_tmp }}
      gpr_tag: ${{ steps.logic.outputs.gpr_tag }}
    steps:
      - id: logic
        uses: tetherto/qvac-actions/npm-publish-logic@38693d9315c5fb6bba1354d8d1ef9823bf6c10a3 # 0.1.0

  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # 6.3.0
        with:
          node-version: 18

      - name: Install dependencies
        working-directory: ${{ env.WORKDIR }}
        run: npm install

      - name: Lint
        working-directory: ${{ env.WORKDIR }}
        run: npm run lint

      - name: Unit tests
        working-directory: ${{ env.WORKDIR }}
        run: npm test

  publish-main-gpr-dev:
    needs:
      - lint-and-test
      - publish-logic
      - label-gate
    if: needs.label-gate.outputs.authorised == 'true' && (needs.publish-logic.outputs.publish_main == 'true')
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          fetch-depth: 0

      - name: Publish to GitHub Packages (dev)
        uses: ./.github/actions/publish-library-to-gpr
        with:
          secret-token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ needs.publish-logic.outputs.gpr_tag }}
          workdir: ${{ env.WORKDIR }}
          name-suffix: "-mono"

  publish-release-npm:
    needs:
      - lint-and-test
      - publish-logic
      - release-merge-guard
      - label-gate
    if: |-
      needs.label-gate.outputs.authorised == 'true' && (always() && needs.publish-logic.outputs.publish_release == 'true' && (needs.release-merge-guard.result == 'success' || needs.release-merge-guard.result == 'skipped'))
    permissions:
      contents: read
      packages: write
      id-token: write
    uses: ./.github/workflows/public-reusable-npm.yml
    secrets: inherit
    with:
      workdir: packages/qvac-ci
      caller_event_name: ${{ github.event_name }}

  # Tag the published version (no GitHub Release; SDK-only releases policy)
  create-tag:
    needs: [publish-release-npm]
    if: needs.publish-release-npm.result == 'success' && needs.publish-release-npm.outputs.published_version != ''
    permissions:
      contents: write
    uses: ./.github/workflows/create-release-tag.yml
    with:
      repo_name: "qvac-ci"
      published_version: ${{ needs.publish-release-npm.outputs.published_version }}

  publish-feature-gpr:
    needs:
      - lint-and-test
      - publish-logic
      - label-gate
    if: needs.label-gate.outputs.authorised == 'true' && (needs.publish-logic.outputs.publish_feature == 'true')
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          fetch-depth: 0

      - name: Publish to GitHub Packages (feature)
        uses: ./.github/actions/publish-library-to-gpr
        with:
          secret-token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ needs.publish-logic.outputs.gpr_tag }}
          workdir: ${{ env.WORKDIR }}
          name-suffix: "-mono"

  publish-tmp-gpr:
    needs:
      - lint-and-test
      - publish-logic
      - label-gate
    if: needs.label-gate.outputs.authorised == 'true' && (needs.publish-logic.outputs.publish_tmp == 'true')
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          fetch-depth: 0

      - name: Publish to GitHub Packages (tmp)
        uses: ./.github/actions/publish-library-to-gpr
        with:
          secret-token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ needs.publish-logic.outputs.gpr_tag }}
          workdir: ${{ env.WORKDIR }}
          name-suffix: "-mono"
