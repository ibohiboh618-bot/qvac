name: Mobile Integration Tests (LLM)

# Migrated to .github/actions/run-mobile-integration-tests in QVAC-18168.
#
# LLM uses sharded scheduling: 8 Android groups + 15 iOS groups, each
# scheduled as its own Device Farm run against the LLM device pool. The
# group definitions live in the addon at test/mobile/test-groups.json so
# adding/moving a test changes the shard composition without editing this
# workflow.
#
# See docs/integration-test-workflow-refactor.md.

on:
  workflow_call:
    inputs:
      ref:
        description: "Git ref to checkout"
        type: string
        required: false
      repository:
        description: "Repository to checkout"
        type: string
        required: false
      qvac_perf_runs:
        description: "Override QVAC_PERF_RUNS pushed to the device"
        type: string
        required: false
        default: ""
      qvac_perf_warmup_runs:
        description: "Override QVAC_PERF_WARMUP_RUNS pushed to the device"
        type: string
        required: false
        default: ""
      qvac_perf_only:
        description: "If true, restrict each test group to its perf-emitting tests only. Used by Benchmark Performance (LLM)."
        type: boolean
        required: false
        default: false
      test_groups:
        description: "JSON array of {name,grep} overrides. When set, replaces auto-detected test-groups.json shards."
        type: string
        required: false
        default: ""
      job_timeout_minutes:
        description: "Override the build-and-test job timeout (minutes). Default 150. Raised by Benchmark Performance (LLM) where the sharded matrix needs more headroom."
        type: number
        required: false
        default: 150
      artifact_suffix:
        description: "Optional suffix appended to the perf-report artifact-name stem (before the platform segment) so multiple invocations in one run (e.g. Benchmark batches) don't collide. Default empty keeps the existing name."
        type: string
        required: false
        default: ""
      pre_build_script:
        description: "Optional node script (path under packages/llm-llamacpp) run before the mobile build to bootstrap a benchmark into the framework (stage files + regenerate the test list). Default '' = no-op."
        type: string
        required: false
        default: ""
      fixture_images_uri:
        description: "Optional object-store URI (e.g. s3://…) the bootstrap syncs fixture assets from before staging. Caller supplies the URI; default '' = skip."
        type: string
        required: false
        default: ""
      platforms:
        description: "Optional CSV-ish platform filter: 'Android' or 'iOS' to run a single platform. Default '' = both (unchanged for existing callers)."
        type: string
        required: false
        default: ""
      device_model:
        description: "Optional Device Farm MODEL filter (e.g. 'S25 Ultra', 'iPhone 17'). When set, the single test spec is scheduled on exactly ONE matching device (single-device mode) instead of the dual-flagship default. Default '' = unchanged for existing callers."
        type: string
        required: false
        default: ""
      device_manufacturer:
        description: "Optional Device Farm MANUFACTURER filter used with device_model (e.g. 'Samsung', 'Apple'). Default '' = any."
        type: string
        required: false
        default: ""
      device_env:
        description: "Optional semicolon-separated KEY=VALUE pairs pushed to the on-device test app (qvacPerfConfig.txt channel; each key is os.setEnv()'d before the tests load). Default '' = nothing extra."
        type: string
        required: false
        default: ""
      mocha_timeout_ms:
        description: "Override the WDIO/Mocha per-test timeout in ms (mochaOpts.timeout). Default '' keeps the established 2100000 (35 min) — unchanged for existing callers."
        type: string
        required: false
        default: ""
      per_test_timeout_minutes:
        description: "Override the generated-spec per-test timeout in minutes on ALL platforms (Android + iOS). Default '' keeps the established per-platform defaults (Android 30 / iOS 20) — unchanged for existing callers."
        type: string
        required: false
        default: ""
      addon_npm_version:
        description: "Bundle a specific published addon version from npm instead of the freshly-built prebuild artifact (skips the artifact download). Used to run a pinned BASELINE build on-device. Default '' keeps the established artifact-first behaviour (test the build produced in this run) — unchanged for existing callers."
        type: string
        required: false
        default: ""
    # Additive outputs (QVAC weekend job): surface the monitor verdict so a
    # caller can read real pass/fail past the job's `continue-on-error: true`.
    # When a caller runs both platforms in one call the matrix overwrites these
    # nondeterministically — single-platform callers (the weekend workflow uses
    # `platforms:` to run one platform per call) get a well-defined value.
    outputs:
      test-result:
        description: "Aggregate Device Farm verdict ('passed'/'failed')."
        value: ${{ jobs.build-and-test.outputs.test-result }}
      test-total:
        description: "Total test cases executed."
        value: ${{ jobs.build-and-test.outputs.test-total }}
      test-passed:
        description: "Test cases passed."
        value: ${{ jobs.build-and-test.outputs.test-passed }}
      test-failed:
        description: "Test cases failed."
        value: ${{ jobs.build-and-test.outputs.test-failed }}
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref (branch/tag/SHA) to test"
        type: string
        required: false
        default: main
      package:
        description: "Full NPM package spec to test"
        type: string
        required: true
        default: "@qvac/llm-llamacpp@latest"
      qvac_perf_runs:
        description: "Override QVAC_PERF_RUNS pushed to the device"
        type: string
        required: false
        default: ""
      qvac_perf_warmup_runs:
        description: "Override QVAC_PERF_WARMUP_RUNS pushed to the device"
        type: string
        required: false
        default: ""
      qvac_perf_only:
        description: "If true, restrict each test group to its perf-emitting tests only."
        type: boolean
        required: false
        default: false

jobs:
  build-and-test:
    name: Build ${{ matrix.platform }} and Run E2E Tests
    runs-on: ${{ matrix.runner }}
    environment: release
    timeout-minutes: ${{ inputs.job_timeout_minutes || 150 }}
    continue-on-error: true
    # Surfaced as workflow_call outputs above so schedule-driven callers can
    # report a verdict (the job itself never fails — continue-on-error).
    outputs:
      test-result: ${{ steps.monitor.outputs.test-result }}
      test-total: ${{ steps.monitor.outputs.test-total }}
      test-passed: ${{ steps.monitor.outputs.test-passed }}
      test-failed: ${{ steps.monitor.outputs.test-failed }}
    permissions:
      contents: read
      packages: read
      pull-requests: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        # Default (platforms='') runs both, preserving behaviour for every existing
        # caller; a caller may pass platforms='Android' or 'iOS' to run a single one.
        include: ${{ fromJSON(inputs.platforms == 'Android' && '[{"platform":"Android","os":"ubuntu-22.04","runner":"qvac-ubuntu2204-x64"}]' || inputs.platforms == 'iOS' && '[{"platform":"iOS","os":"macos-14","runner":"macos-14"}]' || '[{"platform":"Android","os":"ubuntu-22.04","runner":"qvac-ubuntu2204-x64"},{"platform":"iOS","os":"macos-14","runner":"macos-14"}]') }}

    steps:
      - name: Validate Dispatch Inputs
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.package
        run: |
          if [[ ! "${{ github.event.inputs.package }}" =~ ^@qvac/ ]]; then
            echo "::error::Invalid package scope. Only @qvac/* is allowed."
            exit 1
          fi

      - name: Checkout composite action source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          sparse-checkout: |
            .github/actions/run-mobile-integration-tests
          sparse-checkout-cone-mode: false

      - name: Checkout addon repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          repository: ${{ inputs.repository || github.repository }}
          ref: ${{ inputs.ref || github.ref }}
          token: ${{ secrets.PAT_TOKEN }}
          path: addon
          fetch-depth: 0

      - name: Validate mobile tests are up-to-date
        working-directory: addon/packages/llm-llamacpp
        run: npm run test:mobile:validate || true

      - name: Setup mobile test environment
        uses: ./.github/actions/run-mobile-integration-tests/setup
        with:
          platform: ${{ matrix.platform }}
          addon-workdir: 'packages/llm-llamacpp'
          addon-npm-name: '@qvac/llm-llamacpp'
          # Default (addon_npm_version unset): artifact-first — bundle the prebuild built
          # in THIS run (the established behaviour for PR/merge mobile tests). When a
          # pinned version is requested (baseline leg), skip the artifact so it can't pick
          # up a candidate prebuild from the same run, and pull that exact version from npm.
          prebuild-artifact-prefix: ${{ inputs.addon_npm_version == '' && 'llama-cpp-' || '' }}
          # Baseline leg (pinned version): force the npm prebuild and ignore ALL
          # CI artifacts. Without this the merged `prebuilds` artifact (built from
          # the candidate in this same run) is pulled in when the per-matrix
          # artifact is absent, so the baseline session would silently run the
          # candidate binary. See run-mobile-integration-tests/setup.
          force-npm-prebuild: ${{ inputs.addon_npm_version != '' && 'true' || 'false' }}
          package-version: ${{ inputs.addon_npm_version }}
          pat-token: ${{ secrets.PAT_TOKEN }}

      # The mobile perf benchmark shards (benchmark-perf-*.test.js) are not
      # committed — they are generated from test/integration/_benchmark-matrix.js.
      # Regenerate them after setup (which provisions Node) but before the
      # bundle is built, so the Device Farm app contains them, then hard-fail if
      # any are still missing. This makes it impossible to build the bundle
      # without the shards present. (Runs for every LLM mobile run; for
      # non-benchmark runs the generated shards are simply skipped, like any
      # other mobile-only test.)
      - name: Generate benchmark shards
        working-directory: addon/packages/llm-llamacpp
        run: |
          npm run generate:benchmark-shards
          node scripts/generate-benchmark-shards.js --assert-shards

      # ── Benchmark bootstrap (additive, opt-in via pre_build_script) ──────────
      # When a caller passes pre_build_script (only the VLM benchmark does), run the
      # bootstrap: optionally pull fixture assets from the caller-supplied object-store
      # URI (fixture_images_uri — the literal URI lives in the caller, not here), copy
      # the test/harness/config/fixture into test/integration + assets into testAssets,
      # then regenerate the mobile test list so the new test is bundled. All in the
      # ephemeral checkout — nothing committed. Other callers leave these inputs '' → no-op.
      - name: Configure AWS credentials (benchmark assets)
        if: inputs.fixture_images_uri != ''
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # 6.0.0
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: us-west-2
      - name: Bootstrap benchmark into the mobile framework (pre-build)
        if: inputs.pre_build_script != ''
        working-directory: addon/packages/llm-llamacpp
        env:
          FIXTURE_IMAGES_URI: ${{ inputs.fixture_images_uri }}
        run: |
          if [ -n "$FIXTURE_IMAGES_URI" ]; then
            aws s3 sync "$FIXTURE_IMAGES_URI" benchmarks/vlm-benchmark/fixture/
          fi
          node "${{ inputs.pre_build_script }}"
          # the test-list generator runs under `bare` and imports bare-fs/bare-path,
          # so the addon's JS deps must be present (skip native build via --ignore-scripts).
          npm install --no-audit --no-fund --ignore-scripts
          npm install -g bare 2>/dev/null || true
          npm run test:mobile:generate
          echo "bootstrapped: staged files + regenerated mobile test list"

      - name: Build mobile app
        id: build
        uses: ./.github/actions/run-mobile-integration-tests/build-mobile-app
        with:
          platform: ${{ matrix.platform }}
          addon-workdir: 'packages/llm-llamacpp'
          addon-npm-name: '@qvac/llm-llamacpp'
          ios-build-cert-base64: ${{ secrets.TEST_APP_APPLE_DISTRIBUTION_CERTIFICATE }}
          ios-build-cert-password: ${{ secrets.APPLE_P12_PASSWORD }}
          ios-keychain-password: ${{ secrets.APPLE_KEYCHAIN_PASSWORD }}
          ios-provisioning-profile-base64: ${{ secrets.TEST_APP_APPLE_PROVISIONING_PROFILE }}
          apple-team-id: ${{ secrets.APPLE_TEAM_ID }}
          # QVAC-17830: VLM image tests on Android exceed the 20-minute
          # default per-test ceiling. Paired with mocha-timeout-ms on
          # upload-to-devicefarm below (35 min) so the WDIO/Mocha
          # session outlives any single test. This Android-only 30-min
          # default is preserved for every caller (iOS keeps its 20 min).
          android-per-test-timeout-minutes: '30'
          # Platform-neutral override (Android + iOS) — set only by callers
          # that need iOS too (the VLM benchmark forwards per_test_timeout_minutes).
          # Empty keeps the per-platform defaults above; when set it wins.
          per-test-timeout-minutes: ${{ inputs.per_test_timeout_minutes }}

      # Generate the per-shard model pre-stage script (Android). The Device Farm
      # host has reliable network; it downloads exactly the models the shard
      # needs and adb pushes them to /data/local/tmp so the phone never fetches
      # from huggingface.co. Block is derived from model-manifest.json.
      - name: Generate model pre-stage commands (Android)
        id: prestage
        if: matrix.platform == 'Android'
        working-directory: addon/packages/llm-llamacpp
        run: |
          node scripts/generate-prestage-block.js > "$RUNNER_TEMP/prestage-block.txt"
          {
            echo "block<<PRESTAGE_EOF"
            cat "$RUNNER_TEMP/prestage-block.txt"
            echo "PRESTAGE_EOF"
          } >> "$GITHUB_OUTPUT"

      # LLM ships with its own dedicated Device Farm project + iOS pool
      # (the LLM_* secrets), historically because LLM runs more often
      # than the others. Sharded mode is wired automatically: the composite
      # auto-detects test-groups.json under <addon-workdir>/test/mobile/.
      - name: Upload to Device Farm
        id: upload
        uses: ./.github/actions/run-mobile-integration-tests/upload-to-devicefarm
        with:
          platform: ${{ matrix.platform }}
          addon-workdir: 'packages/llm-llamacpp'
          app-path: ${{ steps.build.outputs.app-path }}
          app-type: ${{ steps.build.outputs.app-type }}
          app-name: ${{ steps.build.outputs.app-name }}
          aws-role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          device-farm-project-arn: ${{ secrets.LLM_AWS_DEVICE_FARM_PROJECT_ARN }}
          enables-perf: 'true'
          # QVAC-17830: 35-minute WDIO/Mocha ceiling so the runner
          # outlives the per-test 30-minute ceiling enforced above.
          # Caller-overridable (mocha_timeout_ms); '' keeps 2100000.
          mocha-timeout-ms: ${{ inputs.mocha_timeout_ms != '' && inputs.mocha_timeout_ms || '2100000' }}
          qvac-perf-runs: ${{ inputs.qvac_perf_runs }}
          qvac-perf-warmup-runs: ${{ inputs.qvac_perf_warmup_runs }}
          qvac-perf-only: ${{ inputs.qvac_perf_only }}
          test-groups: ${{ inputs.test_groups }}
          extra-device-env: ${{ inputs.device_env }}
          # Host pre-stages this shard's models to /data/local/tmp (adb-writable
          # + app-readable) so the phone never downloads from huggingface.co.
          extra-pre-test-commands: ${{ steps.prestage.outputs.block }}
              echo "[prestage] done"

      - name: Schedule Device Farm test runs
        id: schedule
        uses: ./.github/actions/run-mobile-integration-tests/schedule-test-run
        with:
          platform: ${{ matrix.platform }}
          device-farm-project-arn: ${{ secrets.LLM_AWS_DEVICE_FARM_PROJECT_ARN }}
          android-device-pool-arn: ${{ secrets.LLM_ANDROID_DEVICE_POOL_ARN }}
          ios-device-pool-arn: ${{ secrets.LLM_IOS_DEVICE_POOL_ARN }}
          scheduling-mode: ${{ inputs.device_model != '' && 'single-device' || 'dual-flagship' }}
          device-model: ${{ inputs.device_model }}
          device-manufacturer: ${{ inputs.device_manufacturer }}
          app-upload-arn: ${{ steps.upload.outputs.app-upload-arn }}
          test-package-upload-arn: ${{ steps.upload.outputs.test-package-upload-arn }}
          test-specs: ${{ steps.upload.outputs.test-specs }}

      - name: Monitor Device Farm test runs
        id: monitor
        uses: ./.github/actions/run-mobile-integration-tests/monitor-test-run
        with:
          run-arns: ${{ steps.schedule.outputs.run-arns }}
          run-count: ${{ steps.schedule.outputs.run-count }}
          test-specs: ${{ steps.upload.outputs.test-specs }}

      - name: Cancel Device Farm runs on workflow cancellation
        if: cancelled() && steps.schedule.outputs.run-arns != '' && steps.schedule.outputs.run-arns != '[]'
        uses: ./.github/actions/run-mobile-integration-tests/cancel-device-farm-runs
        with:
          run-arns: ${{ steps.schedule.outputs.run-arns }}
          aws-role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}

      - name: Collect and upload Device Farm logs
        if: always() && !cancelled()
        uses: ./.github/actions/run-mobile-integration-tests/collect-and-upload-logs
        with:
          platform: ${{ matrix.platform }}
          addon-npm-name: '@qvac/llm-llamacpp'
          artifact-name-suffix: ${{ inputs.artifact_suffix }}
          enables-perf: 'true'
          aws-role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          run-arns: ${{ steps.schedule.outputs.run-arns }}

      # QVAC-17830: VLM image tests are split across multiple
      # `image-*.test.js` files; each Device Farm group emits its own
      # `performance-report.json` payload, so we pass merge=true to
      # union them per device. We also need
      # unzip-customer-artifacts=true so the markers buried in
      # bare_console.log inside Customer_Artifacts.zip are visible to
      # extract-from-log.js. Artifact name matches the pattern the
      # umbrella `combine-perf-reports` job (on-pr-llm-llamacpp.yml)
      # scans for.
      - name: Extract & upload addon perf report (LLM)
        if: always() && !cancelled() && steps.schedule.outputs.run-count != '0' && steps.schedule.outputs.run-count != ''
        uses: ./.github/actions/run-mobile-integration-tests/extract-addon-perf
        with:
          platform: ${{ matrix.platform }}
          merge: 'true'
          unzip-customer-artifacts: 'true'
          artifact-name: perf-report-llamacpp-llm-${{ inputs.artifact_suffix }}${{ matrix.platform }}-${{ github.run_number }}

      - name: Comment results on PR
        if: always() && !cancelled()
        uses: ./.github/actions/run-mobile-integration-tests/comment-on-pr
        with:
          addon-npm-name: '@qvac/llm-llamacpp'
          platform: ${{ matrix.platform }}
          test-result: ${{ steps.monitor.outputs.test-result }}
          test-total: ${{ steps.monitor.outputs.test-total }}
          test-passed: ${{ steps.monitor.outputs.test-passed }}
          test-failed: ${{ steps.monitor.outputs.test-failed }}
          test-skipped: ${{ steps.monitor.outputs.test-skipped }}
          user-test-passed: ${{ steps.monitor.outputs.user-test-passed }}
          user-test-failed: ${{ steps.monitor.outputs.user-test-failed }}
