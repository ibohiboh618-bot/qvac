# Post-merge: regenerate docs on main when SDK changes, commit back to main.
# Keeps monorepo main in sync with generated docs.
#
# Currently manual-only (workflow_dispatch). The original `push:` trigger to
# `main` is intentionally not wired up while production tracks `main` (not
# `docs-production`) — auto-committing regenerated docs back to `main` would
# loop the workflow back into itself on every push. Restore the `push:`
# trigger once production moves to `docs-production`.
name: Docs Post-Merge Sync

on:
  workflow_dispatch:

concurrency:
  group: docs-post-merge-sync-${{ github.ref }}
  cancel-in-progress: false

jobs:
  sync-docs:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # 2.2.0

      - name: Install docs dependencies
        working-directory: docs/website
        run: bun install

      - name: Install SDK dependencies
        working-directory: packages/sdk
        run: bun install

      - name: Generate docs
        working-directory: docs/website
        env:
          SDK_PATH: ${{ github.workspace }}/packages/sdk
        run: bun run docs:generate

      - name: Check for doc changes
        id: changes
        run: |
          git add \
            "docs/website/content/docs/sdk/api/" \
            "docs/website/content/docs/sdk/release-notes/" \
            "docs/website/src/lib/versions.ts" 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "has_doc_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_doc_changes=true" >> "$GITHUB_OUTPUT"
          fi

      # Open a PR against `main` rather than pushing directly: the `main`
      # ruleset rejects direct pushes ("Changes must be made through a pull
      # request") and requires the `Tier-based Approval Check` status check
      # dispatched by `approval-check-worker.yml` on PR events. We also drop
      # `[skip ci]` from the commit message — it would suppress the approval
      # worker and leave the PR permanently un-mergeable.
      #
      # Mirrors the existing pattern in `docs-generate-api.yml` and
      # `docs-release-pipeline.yml`. Branch is namespaced by `github.run_id`
      # so concurrent dispatches don't collide.
      - name: Open docs sync PR
        if: steps.changes.outputs.has_doc_changes == 'true'
        uses: peter-evans/create-pull-request@c0f553fe549906ede9cf27b5156039d195d2ece0 # 8.1.0
        with:
          token: ${{ secrets.DOCS_SYNC_PAT || secrets.GITHUB_TOKEN }}
          base: main
          branch: docs/post-merge-sync-${{ github.run_id }}
          delete-branch: true
          commit-message: "chore(docs): regenerate SDK API docs"
          title: "chore(docs): regenerate SDK API docs"
          body: |
            ## Auto-generated SDK docs sync

            Triggered by `${{ github.event_name }}` on `${{ github.ref }}` (commit `${{ github.sha }}`).

            Regenerates SDK API summary and release notes from the current `packages/sdk` source.

            Updates:
            - `docs/website/content/docs/sdk/api/`
            - `docs/website/content/docs/sdk/release-notes/`
            - `docs/website/src/lib/versions.ts`
          labels: documentation, auto-generated, tier1
          author: ${{ vars.DOCS_SYNC_BOT_NAME || 'docs-sync-bot' }} <${{ vars.DOCS_SYNC_BOT_EMAIL || 'docs-sync-bot@users.noreply.github.com' }}>
          committer: ${{ vars.DOCS_SYNC_BOT_NAME || 'docs-sync-bot' }} <${{ vars.DOCS_SYNC_BOT_EMAIL || 'docs-sync-bot@users.noreply.github.com' }}>
