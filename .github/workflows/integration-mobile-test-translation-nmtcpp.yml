name: Mobile Integration Tests (NMTCPP)

# Migrated to .github/actions/run-mobile-integration-tests in QVAC-18168.
# Addon checkout normalised from `monorepo/` -> `addon/` to match every other
# mobile workflow (decision §9 in the design doc). Bergamot + IndicTrans
# model-URL provisioning delegated to scripts/provision-mobile-models.sh.
# See docs/integration-test-workflow-refactor.md.

on:
  workflow_call:
    inputs:
      ref:
        description: "Git ref to checkout"
        type: string
        required: false
      repository:
        description: "Repository to checkout"
        type: string
        required: false
        default: "tetherto/qvac"
      workdir:
        description: "Working directory inside the repo (monorepo package path)"
        type: string
        required: false
        default: "packages/translation-nmtcpp"
      bergamot_language_pair:
        description: "Bergamot language pair, e.g. 'enit'"
        type: string
        required: false
        default: "enit"
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref (branch/tag/SHA) to test"
        type: string
        required: false
        default: main
      package:
        description: "Full NPM package spec to test"
        type: string
        required: true
        default: "@qvac/translation-nmtcpp@latest"
      bergamot_language_pair:
        description: "Bergamot language pair, e.g. 'enit'"
        type: string
        required: false
        default: "enit"

jobs:
  build-and-test:
    name: Build ${{ matrix.platform }} and Run E2E Tests
    runs-on: ${{ matrix.runner || matrix.os }}
    environment: release
    timeout-minutes: 120
    continue-on-error: true
    permissions:
      contents: read
      packages: read
      pull-requests: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: Android
            os: ubuntu-24.04
            runner: qvac-ubuntu2404-x64
          - platform: iOS
            os: macos-14

    steps:
      - name: Checkout composite action source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          sparse-checkout: |
            .github/actions/run-mobile-integration-tests
          sparse-checkout-cone-mode: false

      - name: Checkout addon repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          repository: ${{ inputs.repository || 'tetherto/qvac' }}
          ref: ${{ inputs.ref || github.ref }}
          token: ${{ secrets.PAT_TOKEN }}
          path: addon
          fetch-depth: 0

      - name: Validate mobile tests are up-to-date
        working-directory: addon/${{ inputs.workdir || 'packages/translation-nmtcpp' }}
        run: npm run test:mobile:validate || true

      - name: Configure AWS credentials (model presigning)
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # 6.0.0
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: us-west-2
          role-duration-seconds: 7200

      - name: Provision NMT models for mobile tests
        working-directory: addon/${{ inputs.workdir || 'packages/translation-nmtcpp' }}
        env:
          BERGAMOT_LANG_PAIR: ${{ inputs.bergamot_language_pair || 'enit' }}
          AWS_REGION: eu-central-1
          MODEL_S3_BUCKET: ${{ secrets.MODEL_S3_BUCKET }}
        run: |
          chmod +x scripts/provision-mobile-models.sh
          scripts/provision-mobile-models.sh

      - name: Setup mobile test environment
        uses: ./.github/actions/run-mobile-integration-tests/setup
        with:
          platform: ${{ matrix.platform }}
          addon-workdir: ${{ inputs.workdir || 'packages/translation-nmtcpp' }}
          addon-npm-name: '@qvac/translation-nmtcpp'
          pat-token: ${{ secrets.PAT_TOKEN }}

      - name: Build mobile app
        id: build
        uses: ./.github/actions/run-mobile-integration-tests/build-mobile-app
        with:
          platform: ${{ matrix.platform }}
          addon-workdir: ${{ inputs.workdir || 'packages/translation-nmtcpp' }}
          addon-npm-name: '@qvac/translation-nmtcpp'
          ios-build-cert-base64: ${{ secrets.TEST_APP_APPLE_DISTRIBUTION_CERTIFICATE }}
          ios-build-cert-password: ${{ secrets.APPLE_P12_PASSWORD }}
          ios-keychain-password: ${{ secrets.APPLE_KEYCHAIN_PASSWORD }}
          ios-provisioning-profile-base64: ${{ secrets.TEST_APP_APPLE_PROVISIONING_PROFILE }}
          apple-team-id: ${{ secrets.APPLE_TEAM_ID }}

      - name: Upload to Device Farm
        id: upload
        uses: ./.github/actions/run-mobile-integration-tests/upload-to-devicefarm
        with:
          platform: ${{ matrix.platform }}
          addon-workdir: ${{ inputs.workdir || 'packages/translation-nmtcpp' }}
          app-path: ${{ steps.build.outputs.app-path }}
          app-type: ${{ steps.build.outputs.app-type }}
          app-name: ${{ steps.build.outputs.app-name }}
          aws-role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          device-farm-project-arn: ${{ secrets.AWS_DEVICE_FARM_PROJECT_ARN_NMTCPP }}
          enables-perf: 'true'

      - name: Schedule Device Farm test run
        id: schedule
        uses: ./.github/actions/run-mobile-integration-tests/schedule-test-run
        with:
          platform: ${{ matrix.platform }}
          device-farm-project-arn: ${{ secrets.AWS_DEVICE_FARM_PROJECT_ARN_NMTCPP }}
          ios-device-pool-arn: ${{ secrets.IOS_DEVICE_POOL_ARN_NMTCPP }}
          app-upload-arn: ${{ steps.upload.outputs.app-upload-arn }}
          test-package-upload-arn: ${{ steps.upload.outputs.test-package-upload-arn }}
          test-specs: ${{ steps.upload.outputs.test-specs }}
          # NMT inference is heavier than the other addons; bump the per-job
          # Device Farm timeout from the 60-min default to match main.
          job-timeout-minutes: '120'

      - name: Monitor Device Farm test run
        id: monitor
        uses: ./.github/actions/run-mobile-integration-tests/monitor-test-run
        with:
          run-arns: ${{ steps.schedule.outputs.run-arns }}
          run-count: ${{ steps.schedule.outputs.run-count }}
          test-specs: ${{ steps.upload.outputs.test-specs }}

      - name: Cancel Device Farm runs on workflow cancellation
        if: cancelled() && steps.schedule.outputs.run-arns != '' && steps.schedule.outputs.run-arns != '[]'
        uses: ./.github/actions/run-mobile-integration-tests/cancel-device-farm-runs
        with:
          run-arns: ${{ steps.schedule.outputs.run-arns }}
          aws-role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}

      - name: Collect and upload Device Farm logs
        if: always()
        uses: ./.github/actions/run-mobile-integration-tests/collect-and-upload-logs
        with:
          platform: ${{ matrix.platform }}
          addon-npm-name: '@qvac/translation-nmtcpp'
          enables-perf: 'true'
          aws-role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          run-arns: ${{ steps.schedule.outputs.run-arns }}

      - name: Extract and report NMT performance
        if: always() && steps.schedule.outputs.run-arns != '[]' && steps.schedule.outputs.run-arns != ''
        uses: ./.github/actions/run-mobile-integration-tests/extract-addon-perf
        with:
          platform: ${{ matrix.platform }}
          step-summary-title: 'Mobile Performance: nmtcpp (${{ matrix.platform }})'
          artifact-name: perf-report-nmtcpp-mobile-${{ matrix.platform }}-${{ github.run_number }}

      - name: Comment results on PR
        if: always()
        uses: ./.github/actions/run-mobile-integration-tests/comment-on-pr
        with:
          addon-npm-name: '@qvac/translation-nmtcpp'
          platform: ${{ matrix.platform }}
          test-result: ${{ steps.monitor.outputs.test-result }}
          test-total: ${{ steps.monitor.outputs.test-total }}
          test-passed: ${{ steps.monitor.outputs.test-passed }}
          test-failed: ${{ steps.monitor.outputs.test-failed }}
          test-skipped: ${{ steps.monitor.outputs.test-skipped }}
          user-test-passed: ${{ steps.monitor.outputs.user-test-passed }}
          user-test-failed: ${{ steps.monitor.outputs.user-test-failed }}
