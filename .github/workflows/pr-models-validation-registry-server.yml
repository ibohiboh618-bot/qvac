# PR Validation and Post-Merge Staging Sync
#
# On PR: validates models.prod.json and runs tests (with 'verified' label).
# On merge to main: syncs models to staging registry and runs smoke test.

name: PR Validation and Staging Sync (Registry-server)

on:
  pull_request_target:
    branches: [main, release-*, feature-*, tmp-*]
    types: [opened, synchronize, reopened, labeled]
    paths:
      - "packages/registry-server/**"
  push:
    branches: [main]
    paths:
      - "packages/registry-server/**"
  workflow_dispatch:
    inputs:
      deploy_mode:
        description: "Manual-run deploy mode: dry-run (preflight only), rehearse (isolated clone + throwaway pm2 process), or live. sync-staging runs only for live."
        type: choice
        options:
          - dry-run
          - rehearse
          - live
        default: dry-run

env:
  PKG_DIR: packages/registry-server
  MODELS_FILE: packages/registry-server/data/models.prod.json

permissions:
  contents: read

# Serialize deploy-capable runs (push / workflow_dispatch) under one fixed group
# so two runs can never roll the staging cluster at the same time — max-parallel
# only serializes nodes within a single run. PR-validation runs stay grouped
# per-ref so different PRs still run in parallel. Never cancel an in-flight
# deploy.
concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request_target' && github.ref || 'deploy' }}
  cancel-in-progress: false

jobs:
  label-gate:
    name: Authorise (label-gate)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    outputs:
      authorised: ${{ steps.gate.outputs.authorised }}
    steps:
      - name: Checkout (label-gate action only)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          ref: ${{ github.event.repository.default_branch }}
          sparse-checkout: .github/actions/label-gate
          sparse-checkout-cone-mode: false
      - name: Run label-gate
        id: gate
        uses: ./.github/actions/label-gate
        with:
          github-token: ${{ secrets.PAT_TOKEN }}
  authorize:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    outputs:
      allowed: ${{ steps.auth.outputs.allowed }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
      - name: Authorize
        id: auth
        uses: ./.github/actions/authorize-pr
        with:
          github-token: ${{ github.token }}

  detect-changes:
    needs: authorize
    runs-on: ubuntu-latest
    if: needs.authorize.outputs.allowed == 'true'
    outputs:
      models_changed: ${{ steps.filter.outputs.models }}
      models_only: ${{ steps.filter.outputs.models == 'true' && steps.filter.outputs.other == 'false' }}
      other_changed: ${{ steps.filter.outputs.other }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - name: Detect file changes
        id: filter
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PKG_DIR: ${{ env.PKG_DIR }}
          MODELS_FILE: ${{ env.MODELS_FILE }}
        run: |
          set -euo pipefail

          EVENT_NAME="${{ github.event_name }}"

          # Pick SHAs based on event type (PR vs push vs manual)
          if [[ "$EVENT_NAME" == "pull_request" || "$EVENT_NAME" == "pull_request_target" ]]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          elif [[ "$EVENT_NAME" == "push" ]]; then
            BASE_SHA="${{ github.event.before }}"
            HEAD_SHA="${{ github.sha }}"
          else
            # workflow_dispatch (and anything else): diff current commit against its parent
            HEAD_SHA="${{ github.sha }}"
            BASE_SHA="$(git rev-parse "${HEAD_SHA}^" 2>/dev/null || true)"
          fi

          # Safety rails: never allow empty SHAs
          if [[ -z "${HEAD_SHA:-}" ]]; then
            echo "::error::HEAD_SHA is empty (event=$EVENT_NAME)"
            exit 1
          fi
          if [[ -z "${BASE_SHA:-}" || "$BASE_SHA" =~ ^0+$ ]]; then
            BASE_SHA="$HEAD_SHA"
          fi

          echo "event=$EVENT_NAME"
          echo "base=$BASE_SHA"
          echo "head=$HEAD_SHA"

          PKG_DIR="${{ env.PKG_DIR }}"
          MODELS_FILE="${{ env.MODELS_FILE }}"

          echo "Changed files (scoped to $PKG_DIR):"
          CHANGED_FILES="$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" -- "$PKG_DIR/" || true)"
          echo "$CHANGED_FILES"

          # models_changed?
          if echo "$CHANGED_FILES" | grep -qxF "$MODELS_FILE"; then
            echo "models=true" >> "$GITHUB_OUTPUT"
          else
            echo "models=false" >> "$GITHUB_OUTPUT"
          fi

          # other_changed? (inside this package; excluding models file + markdown)
          OTHER_CHANGES="$(echo "$CHANGED_FILES" | grep -v -x -F "$MODELS_FILE" | grep -v -E '\.md$' || true)"
          if [[ -n "$OTHER_CHANGES" ]]; then
            echo "other=true" >> "$GITHUB_OUTPUT"
          else
            echo "other=false" >> "$GITHUB_OUTPUT"
          fi

  validate-json:
    needs: [authorize, detect-changes]
    if: |
      needs.authorize.outputs.allowed == 'true' &&
      needs.detect-changes.outputs.models_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # 6.3.0
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: ${{ env.PKG_DIR }}
        shell: bash
        run: npm install

      - name: Validate models.prod.json
        working-directory: ${{ env.PKG_DIR }}
        shell: bash
        run: node scripts/validate-models-json.js --file=./data/models.prod.json

  test:
    needs: [authorize, detect-changes]
    if: |
      needs.authorize.outputs.allowed == 'true' &&
      needs.detect-changes.outputs.other_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # 6.3.0
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: ${{ env.PKG_DIR }}
        shell: bash
        run: npm install

      - name: Lint
        working-directory: ${{ env.PKG_DIR }}
        shell: bash
        run: npm run lint

      - name: Run unit tests
        working-directory: ${{ env.PKG_DIR }}
        shell: bash
        run: npm run test:unit

      - name: Run integration tests
        working-directory: ${{ env.PKG_DIR }}
        shell: bash
        run: npm run test:integration

      - name: Lint and test client
        working-directory: ${{ env.PKG_DIR }}/client
        shell: bash
        run: npm install && npm run lint && npm run test:unit

  # Resolve the list of staging nodes to deploy to. vars.REGISTRY_STAGING_INSTANCES
  # is a JSON array of GCE instance names, e.g. ["registry-stg-01","registry-stg-02"].
  # Fails loudly if unset so a misconfiguration blocks the deploy rather than
  # silently skipping it.
  resolve-deploy-targets:
    needs: [authorize, detect-changes, label-gate]
    if: |-
      needs.label-gate.outputs.authorised == 'true' &&
      needs.authorize.outputs.allowed == 'true' &&
      (needs.detect-changes.outputs.models_changed == 'true' || github.event_name == 'workflow_dispatch') &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      instances: ${{ steps.targets.outputs.instances }}
    steps:
      - name: Resolve staging instances
        id: targets
        shell: bash
        env:
          INSTANCES_JSON: ${{ vars.REGISTRY_STAGING_INSTANCES }}
        run: |
          set -euo pipefail
          if [ -z "${INSTANCES_JSON:-}" ]; then
            echo "::error::vars.REGISTRY_STAGING_INSTANCES is not set (expected a JSON array of GCE instance names)"
            exit 1
          fi
          if ! echo "$INSTANCES_JSON" | jq -e 'type == "array" and length > 0 and all(.[]; has("name") and has("zone"))' >/dev/null; then
            echo "::error::vars.REGISTRY_STAGING_INSTANCES must be a non-empty JSON array of {\"name\",\"zone\"} objects"
            exit 1
          fi
          echo "instances=$(echo "$INSTANCES_JSON" | jq -c .)" >> "$GITHUB_OUTPUT"

  # Deploy code + data (incl. licenses) to every staging node BEFORE sync runs,
  # so whichever indexer the sync RPC reaches already knows any new license.
  # Nodes are rolled one at a time (max-parallel: 1, fail-fast) to preserve
  # Autobase quorum; each node must report indexer status before the next.
  deploy-staging:
    needs:
      - detect-changes
      - validate-json
      - test
      - label-gate
      - resolve-deploy-targets
    if: |-
      needs.label-gate.outputs.authorised == 'true' && (always() && (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && (needs.detect-changes.outputs.models_changed == 'true' || github.event_name == 'workflow_dispatch') && (needs.validate-json.result == 'success' || needs.validate-json.result == 'skipped') && (needs.test.result == 'success' || needs.test.result == 'skipped') && needs.resolve-deploy-targets.result == 'success')
    runs-on: qvac-ubuntu2204-x64
    timeout-minutes: 15
    environment: release
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: true
      max-parallel: 1
      matrix:
        target: ${{ fromJSON(needs.resolve-deploy-targets.outputs.instances || '[]') }}
    steps:
      - name: Manual Workspace Cleanup
        run: rm -rf "$GITHUB_WORKSPACE" && mkdir -p "$GITHUB_WORKSPACE"
        shell: bash
        working-directory: .
        if: runner.environment != 'github-hosted'

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2

      - name: Deploy to ${{ matrix.target.name }}
        uses: ./.github/actions/deploy-registry-server
        with:
          instance: ${{ matrix.target.name }}
          zone: ${{ matrix.target.zone }}
          project: ${{ vars.GCP_PROJECT_ID }}
          workload-identity-provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service-account: ${{ secrets.GCP_DEPLOY_SERVICE_ACCOUNT }}
          repo-path: ${{ vars.REGISTRY_NODE_REPO_PATH }}
          run-as-user: ${{ vars.REGISTRY_NODE_RUN_AS_USER || 'work' }}
          deploy-sha: ${{ github.sha }}
          mode: ${{ github.event.inputs.deploy_mode || 'live' }}

  sync-staging:
    needs:
      - detect-changes
      - validate-json
      - test
      - label-gate
      - deploy-staging
    if: |-
      needs.label-gate.outputs.authorised == 'true' && (always() && (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && needs.detect-changes.outputs.models_changed == 'true' && needs.validate-json.result == 'success' && (needs.test.result == 'success' || needs.test.result == 'skipped') && needs.deploy-staging.result == 'success' && (github.event.inputs.deploy_mode == '' || github.event.inputs.deploy_mode == 'live'))
    runs-on: ubuntu-latest
    environment: release
    env:
      QVAC_AUTOBASE_KEY: ${{ secrets.QVAC_AUTOBASE_KEY }}
      QVAC_REGISTRY_CORE_KEY: ${{ secrets.QVAC_REGISTRY_CORE_KEY }}
      QVAC_WRITER_PUBLIC_KEY: ${{ secrets.QVAC_WRITER_PUBLIC_KEY }}
      QVAC_WRITER_SECRET_KEY: ${{ secrets.QVAC_WRITER_SECRET_KEY }}
      QVAC_INDEXER_KEYS: ${{ secrets.QVAC_INDEXER_KEYS }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2

      - name: Validate required secrets
        working-directory: ${{ env.PKG_DIR }}
        shell: bash
        run: |
          missing=""
          [ -z "$QVAC_AUTOBASE_KEY" ] && missing="$missing QVAC_AUTOBASE_KEY"
          [ -z "$QVAC_REGISTRY_CORE_KEY" ] && missing="$missing QVAC_REGISTRY_CORE_KEY"
          [ -z "$QVAC_WRITER_PUBLIC_KEY" ] && missing="$missing QVAC_WRITER_PUBLIC_KEY"
          [ -z "$QVAC_WRITER_SECRET_KEY" ] && missing="$missing QVAC_WRITER_SECRET_KEY"
          if [ -n "$missing" ]; then
            echo "::error::Missing required secrets:$missing"
            exit 1
          fi
          echo "✓ All required secrets are set"

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # 6.3.0
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: ${{ env.PKG_DIR }}
        shell: bash
        run: npm install

      - name: Install client dependencies
        working-directory: ${{ env.PKG_DIR }}/client
        shell: bash
        run: npm install

      - name: Sync to staging
        working-directory: ${{ env.PKG_DIR }}
        shell: bash
        run: node scripts/sync-models.js --file=./data/models.prod.json
        timeout-minutes: 70

  smoke-test:
    needs:
      - sync-staging
      - label-gate
    runs-on: ubuntu-latest
    env:
      QVAC_REGISTRY_CORE_KEY: ${{ secrets.QVAC_REGISTRY_CORE_KEY }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2

      - name: Validate required secrets
        shell: bash
        working-directory: ${{ env.PKG_DIR }}
        run: |
          if [ -z "$QVAC_REGISTRY_CORE_KEY" ]; then
            echo "::error::Missing required secret: QVAC_REGISTRY_CORE_KEY"
            exit 1
          fi
          echo "✓ All required secrets are set"

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # 6.3.0
        with:
          node-version: 20

      - name: Install server dependencies
        working-directory: ${{ env.PKG_DIR }}
        shell: bash
        run: npm install

      - name: Install client dependencies
        working-directory: ${{ env.PKG_DIR }}/client
        shell: bash
        run: npm install

      - name: Smoke test registry
        working-directory: ${{ env.PKG_DIR }}
        shell: bash
        run: node scripts/smoke-test-client.js --file=./data/models.prod.json
        timeout-minutes: 5
    if: needs.label-gate.outputs.authorised == 'true'
