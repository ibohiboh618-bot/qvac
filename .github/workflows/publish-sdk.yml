name: Build and Publish QVAC SDK (sdk)

on:
  push:
    branches:
      - main
      - release-*
      - feature-*
      - tmp-*
    paths:
      - "packages/sdk/**"
      - "packages/bare-sdk/**"
  pull_request_target:
    types:
      - opened
      - synchronize
      - reopened
      - edited
      - labeled
    branches:
      - release-*
      - feature-*
      - tmp-*
      - main
    paths:
      - "packages/sdk/**"
      - "packages/bare-sdk/**"

  workflow_dispatch:
    inputs:
      tag:
        description: "Tag for publishing (optional override for GPR)"
        required: false
        default: "dev"
      npm_tag:
        description: "NPM dist-tag (default: latest). e.g. release-1.x"
        required: false
        default: ""
        type: string

env:
  WORKDIR: packages/sdk

permissions:
  contents: read

jobs:
  label-gate:
    name: Authorise (label-gate)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    outputs:
      authorised: ${{ steps.gate.outputs.authorised }}
    steps:
      - name: Checkout (label-gate action only)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # 7.0.0
        with:
          ref: ${{ github.event.repository.default_branch }}
          sparse-checkout: .github/actions/label-gate
          sparse-checkout-cone-mode: false
      - name: Run label-gate
        id: gate
        uses: ./.github/actions/label-gate
        with:
          github-token: ${{ secrets.PAT_TOKEN }}
  authorize:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    outputs:
      allowed: ${{ steps.auth.outputs.allowed }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # 7.0.0
      - name: Authorize
        id: auth
        uses: ./.github/actions/authorize-pr
        with:
          github-token: ${{ github.token }}

  release-merge-guard:
    name: Release Merge Guard
    if: >-
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && startsWith(github.ref_name, 'release-')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # 7.0.0
        with:
          fetch-depth: 0
      - uses: ./.github/actions/release-merge-guard
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          base-ref: ${{ github.ref_name }}
          base-sha: ${{ github.event.before }}
          head-sha: ${{ github.sha }}
          package-slug: sdk
          package-json-path: packages/sdk/package.json
          changelog-path: packages/sdk/CHANGELOG.md

  build:
    needs:
      - authorize
      - label-gate
    if: needs.label-gate.outputs.authorised == 'true' && (needs.authorize.outputs.allowed == 'true')
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
      packages: write
    env:
      READ_NPM_TOKEN: ${{ secrets.PAT_TOKEN }}
      WRITE_NPM_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      READ_REPO_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # 7.0.0
        with:
          repository: ${{ github.event.pull_request.base.repo.full_name || github.repository }}
          ref: ${{ github.event.pull_request.base.sha || github.sha }}
          token: ${{ secrets.PAT_TOKEN }}
          fetch-depth: 0

      - name: Fetch PR head commits
        if: github.event_name == 'pull_request_target'
        run: |
          git fetch origin ${{ github.event.pull_request.head.sha }}

      - name: Verify @qvac/sdk and @qvac/bare-sdk version lockstep
        shell: bash
        env:
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          # pull_request_target pins the working tree to base.sha; read both
          # manifests from the PR head SHA so a missed bare-sdk bump fails pre-merge.
          set -euo pipefail
          REF="${PR_HEAD_SHA:-${GITHUB_SHA}}"
          SDK_VER=$(git show "${REF}":packages/sdk/package.json | jq -r .version)
          BARE_VER=$(git show "${REF}":packages/bare-sdk/package.json | jq -r .version)
          if [ "$SDK_VER" != "$BARE_VER" ]; then
            echo "::error title=Version mismatch::@qvac/sdk@$SDK_VER vs @qvac/bare-sdk@$BARE_VER at ${REF}. Both packages must share the same version (lockstep release). Bump both packages together in the release branch."
            exit 1
          fi
          echo "OK: @qvac/sdk and @qvac/bare-sdk both at $SDK_VER (verified at ${REF})"

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # 2.2.0
        with:
          bun-version: latest

      - name: Configure scoped registry for @tetherto and @qvac packages
        env:
          GIT_PAT: ${{ secrets.PAT_TOKEN }}
        shell: bash
        working-directory: ${{ env.WORKDIR }}
        run: |
          echo "Configuring scoped registry for @tetherto and @qvac packages..."
          set -eu
          echo "Writing .npmrc for dual registry install…"
          cat > .npmrc <<NPMRC
          registry=https://registry.npmjs.org/
          @qvac:registry=https://registry.npmjs.org/
          @tetherto:registry=https://npm.pkg.github.com/
          //npm.pkg.github.com/:_authToken=${GIT_PAT}
          NPMRC

          # Optional: make private git deps work without prompting
          if [ -n "${GIT_PAT:-}" ]; then
            git config --global url."https://${GIT_PAT}:@github.com/".insteadOf "https://github.com/"
          else
            # Using the workflow's GITHUB_TOKEN for git clones when possible
            git config --global url."https://${{ github.token }}:@github.com/".insteadOf "https://github.com/"
          fi

          # Configure bunfig.toml for reading packages (in same dir as package.json)
          cat > bunfig.toml << EOF
          [install]
          registry = "https://registry.npmjs.org/"

          [install.scopes]
          "@tetherto" = { token = "${{ env.READ_NPM_TOKEN }}", url = "https://npm.pkg.github.com" }
          EOF

      - name: Install dependencies
        run: bun install
        working-directory: ${{ env.WORKDIR }}

      - name: Modify package name for branch-based builds
        working-directory: ${{ env.WORKDIR }}
        run: |
          BRANCH_NAME="${GITHUB_REF#refs/heads/}"

          # Only modify package name for main, fix-*, feature-* branches
          case "$BRANCH_NAME" in
            release-*)
              echo "Release branch - keeping original package name"
              exit 0
              ;;
            main)
              SUFFIX="mono"
              ;;
            fix-*|feature-*)
              SUFFIX=$(echo "$BRANCH_NAME" | sed 's/\//-/g')
              ;;
            *)
              echo "Branch $BRANCH_NAME not configured for modified package name"
              exit 0
              ;;
          esac

          echo "Modifying package for branch: $BRANCH_NAME"

          # Change namespace from @qvac to @tetherto and add suffix
          ORIGINAL_NAME=$(node -p "require('./package.json').name")
          NEW_NAME="@tetherto/sdk-${SUFFIX}"

          echo "Package name: $ORIGINAL_NAME → $NEW_NAME"

          # Update package.json
          jq ".name = \"${NEW_NAME}\"" package.json > package.json.tmp
          mv package.json.tmp package.json

          MODIFIED_NAME=$(node -p "require('./package.json').name")
          echo "✓ Modified package.json: $MODIFIED_NAME"

          # Update @qvac/cli references in withMobileBundle.ts to @tetherto/cli-mono
          MOBILE_BUNDLE_FILE="expo/plugins/withMobileBundle.ts"
          if [ -f "$MOBILE_BUNDLE_FILE" ]; then
            echo "Updating @qvac/cli references in $MOBILE_BUNDLE_FILE to @tetherto/cli-mono"
            sed -i.bak "s|\"@qvac\"|\"@tetherto\"|g" "$MOBILE_BUNDLE_FILE"
            sed -i.bak "s|\"cli\"|\"cli-mono\"|g" "$MOBILE_BUNDLE_FILE"
            sed -i.bak "s|@qvac/cli|@tetherto/cli-mono|g" "$MOBILE_BUNDLE_FILE"
            sed -i.bak "s|npx qvac|npx tetherto|g" "$MOBILE_BUNDLE_FILE"
            rm "${MOBILE_BUNDLE_FILE}.bak"
            echo "✓ Updated $MOBILE_BUNDLE_FILE"
          fi

          # Update references in expo-rpc-client.ts
          EXPO_RPC_CLIENT_FILE="client/rpc/expo-rpc-client.ts"
          if [ -f "$EXPO_RPC_CLIENT_FILE" ]; then
            echo "Updating @qvac/sdk references in $EXPO_RPC_CLIENT_FILE to $NEW_NAME"
            sed -i.bak "s|@qvac/sdk|${NEW_NAME}|g" "$EXPO_RPC_CLIENT_FILE"
            rm "${EXPO_RPC_CLIENT_FILE}.bak"
            echo "✓ Updated $EXPO_RPC_CLIENT_FILE"
          fi

      - name: Build (includes lint, typecheck, compile)
        run: bun run build
        working-directory: ${{ env.WORKDIR }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # 7.0.1
        with:
          name: dist
          path: ${{ env.WORKDIR }}/dist/
          retention-days: 30

      - name: Determine version and tag
        id: version
        working-directory: ${{ env.WORKDIR }}
        run: |
          BRANCH_NAME=${GITHUB_REF#refs/heads/}
          BASE_VERSION=$(node -p "require('./package.json').version")

          if [ "$BRANCH_NAME" = "main" ]; then
            VERSION="$BASE_VERSION"
            TAG="latest"
            echo "Publishing main branch as @latest"
          else
            # Clean branch name for npm (replace invalid chars with -)
            CLEAN_BRANCH=$(echo "$BRANCH_NAME" | sed 's/[^a-zA-Z0-9.-]/-/g')
            VERSION="${BASE_VERSION}-${CLEAN_BRANCH}.$(date +%s).${GITHUB_SHA:0:7}"
            TAG="$CLEAN_BRANCH"
            echo "Publishing branch '$BRANCH_NAME' as @$TAG"
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "branch=$BRANCH_NAME" >> $GITHUB_OUTPUT

    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      branch: ${{ steps.version.outputs.branch }}

  build-bare-sdk:
    name: Build @qvac/bare-sdk (from sdk dist)
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      WORKDIR_BARE: packages/bare-sdk
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # 7.0.0
        with:
          repository: ${{ github.event.pull_request.base.repo.full_name || github.repository }}
          ref: ${{ github.event.pull_request.base.sha || github.sha }}
          token: ${{ secrets.PAT_TOKEN }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # 2.2.0
        with:
          bun-version: latest

      - name: Download @qvac/sdk dist artifact
        uses: ./.github/actions/download-release-artifact
        with:
          name: dist
          path: packages/sdk/dist/

      - name: Build bare-sdk (bundle from sdk + run guards)
        shell: bash
        working-directory: ${{ env.WORKDIR_BARE }}
        run: bun run build

      - name: Upload bare-sdk dist artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # 7.0.1
        with:
          name: dist-bare-sdk
          path: ${{ env.WORKDIR_BARE }}/dist/
          retention-days: 30

  publish-logic:
    runs-on: ubuntu-latest
    outputs:
      publish_main: ${{ steps.logic.outputs.publish_main }}
      publish_release: ${{ steps.logic.outputs.publish_release }}
      publish_feature: ${{ steps.logic.outputs.publish_feature }}
      publish_tmp: ${{ steps.logic.outputs.publish_tmp }}
      gpr_tag: ${{ steps.logic.outputs.gpr_tag }}
    steps:
      - id: logic
        shell: bash
        run: |
          set -euo pipefail
          ref_name="${GITHUB_REF_NAME}"
          event_name="${GITHUB_EVENT_NAME}"

          publish_main="false"
          publish_release="false"
          publish_feature="false"
          publish_tmp="false"

          if [ "$event_name" = "push" ] || [ "$event_name" = "workflow_dispatch" ]; then
            if [ "$ref_name" = "main" ]; then
              publish_main="true"
            elif [[ "$ref_name" == release-* ]]; then
              publish_release="true"
            elif [[ "$ref_name" == feature-* ]]; then
              publish_feature="true"
            elif [[ "$ref_name" == tmp-* ]]; then
              publish_tmp="true"
            fi
          fi

          gpr_tag="dev"
          if [ "$ref_name" = "main" ]; then
            gpr_tag="dev"
          elif [[ "$ref_name" == feature-* ]]; then
            gpr_tag="feature"
          elif [[ "$ref_name" == tmp-* ]]; then
            gpr_tag="temp"
          fi

          echo "publish_main=$publish_main" >> "$GITHUB_OUTPUT"
          echo "publish_release=$publish_release" >> "$GITHUB_OUTPUT"
          echo "publish_feature=$publish_feature" >> "$GITHUB_OUTPUT"
          echo "publish_tmp=$publish_tmp" >> "$GITHUB_OUTPUT"
          echo "gpr_tag=$gpr_tag" >> "$GITHUB_OUTPUT"

  publish-gpr:
    name: Publish to GitHub Packages (GPR)
    needs: [build, publish-logic]
    if: ${{ needs.publish-logic.outputs.publish_main == 'true' || needs.publish-logic.outputs.publish_feature == 'true' || needs.publish-logic.outputs.publish_tmp == 'true' }}
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # 7.0.0

      - name: Download build artifacts
        uses: ./.github/actions/download-release-artifact
        with:
          name: dist
          path: ${{ runner.temp }}/dist-staging

      - name: Move dist from staging to workspace
        shell: bash
        run: |
          mkdir -p ${{ env.WORKDIR }}/dist
          cp -r ${{ runner.temp }}/dist-staging/. ${{ env.WORKDIR }}/dist/
          echo "Dist moved from staging area"
          ls -la ${{ env.WORKDIR }}/dist/

      - name: Modify package name for branch-based test publishing
        working-directory: ${{ env.WORKDIR }}
        run: |
          BRANCH_NAME="${GITHUB_REF#refs/heads/}"

          # Extract suffix from branch patterns
          case "$BRANCH_NAME" in
            dev)
              SUFFIX="dev"
              ;;
            fix-*|feature-*)
              SUFFIX=$(echo "$BRANCH_NAME" | sed 's/\//-/g')
              ;;
            *)
              echo "Branch $BRANCH_NAME not configured for modified package name"
              exit 0
              ;;
          esac

          echo "Modifying package name for branch: $BRANCH_NAME → suffix: $SUFFIX"

          # Modify package.json
          ORIGINAL_NAME=$(node -p "require('./package.json').name")
          NEW_NAME="${ORIGINAL_NAME}-${SUFFIX}"

          jq ".name = \"${NEW_NAME}\"" package.json > package.json.tmp
          mv package.json.tmp package.json

          MODIFIED_NAME=$(node -p "require('./package.json').name")
          echo "Package name: $ORIGINAL_NAME → $MODIFIED_NAME"

      - name: Publish to GitHub Package Registry
        id: publish
        uses: ./.github/actions/publish-library-to-gpr
        with:
          secret-token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ inputs.tag || github.event.inputs.tag || needs.publish-logic.outputs.gpr_tag || 'dev'}}
          workdir: ${{ env.WORKDIR }}
          name-suffix: "-mono"

  publish-gpr-bare-sdk:
    name: Publish @qvac/bare-sdk to GitHub Packages (GPR)
    needs: [build-bare-sdk, publish-logic]
    if: ${{ needs.publish-logic.outputs.publish_main == 'true' || needs.publish-logic.outputs.publish_feature == 'true' || needs.publish-logic.outputs.publish_tmp == 'true' }}
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read
      packages: write
    env:
      WORKDIR_BARE: packages/bare-sdk
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # 7.0.0

      - name: Download bare-sdk dist artifact
        uses: ./.github/actions/download-release-artifact
        with:
          name: dist-bare-sdk
          path: ${{ env.WORKDIR_BARE }}/dist/

      - name: Modify bare-sdk package name for branch-based test publishing
        working-directory: ${{ env.WORKDIR_BARE }}
        run: |
          BRANCH_NAME="${GITHUB_REF#refs/heads/}"

          case "$BRANCH_NAME" in
            dev)
              SUFFIX="dev"
              ;;
            fix-*|feature-*)
              SUFFIX=$(echo "$BRANCH_NAME" | sed 's/\//-/g')
              ;;
            *)
              echo "Branch $BRANCH_NAME not configured for modified package name"
              exit 0
              ;;
          esac

          echo "Modifying bare-sdk package name for branch: $BRANCH_NAME → suffix: $SUFFIX"

          ORIGINAL_NAME=$(node -p "require('./package.json').name")
          NEW_NAME="${ORIGINAL_NAME}-${SUFFIX}"

          jq ".name = \"${NEW_NAME}\"" package.json > package.json.tmp
          mv package.json.tmp package.json

          MODIFIED_NAME=$(node -p "require('./package.json').name")
          echo "Package name: $ORIGINAL_NAME → $MODIFIED_NAME"

      - name: Publish to GitHub Package Registry
        id: publish
        uses: ./.github/actions/publish-library-to-gpr
        with:
          secret-token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ inputs.tag || github.event.inputs.tag || needs.publish-logic.outputs.gpr_tag || 'dev'}}
          workdir: ${{ env.WORKDIR_BARE }}
          name-suffix: "-mono"

  publish-npm:
    name: Publish to NPM
    needs:
      - build
      - publish-logic
      - release-merge-guard
      - label-gate
    if: >-
      needs.label-gate.outputs.authorised == 'true' && (needs.publish-logic.outputs.publish_release == 'true' && (needs.release-merge-guard.result == 'success' || needs.release-merge-guard.result == 'skipped'))
    runs-on: ubuntu-latest
    environment: npm
    outputs:
      published_version: ${{ steps.publish.outputs.npm_published_version }}
    permissions:
      contents: write
      packages: write
      id-token: write
    steps:
      - name: Validate npm_tag input
        if: inputs.npm_tag != ''
        shell: bash
        run: |
          tag="${{ inputs.npm_tag }}"
          if ! echo "$tag" | grep -qE '^[a-zA-Z0-9][a-zA-Z0-9._-]*$'; then
            echo "::error::Invalid npm dist-tag '$tag'. Must match ^[a-zA-Z0-9][a-zA-Z0-9._-]*$ (e.g. release-1.x)"
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # 7.0.0

      - name: Download build artifacts
        uses: ./.github/actions/download-release-artifact
        with:
          name: dist
          path: ${{ runner.temp }}/dist-staging

      - name: Move dist from staging to workspace
        shell: bash
        run: |
          mkdir -p ${{ env.WORKDIR }}/dist
          cp -r ${{ runner.temp }}/dist-staging/. ${{ env.WORKDIR }}/dist/
          echo "Dist moved from staging area"
          ls -la ${{ env.WORKDIR }}/dist/

      - name: Determine dist-tag
        id: dist-tag
        uses: tetherto/qvac-actions/npm-dist-tag-determination@38693d9315c5fb6bba1354d8d1ef9823bf6c10a3 # 0.1.0
        with:
          workdir: ${{ env.WORKDIR }}
          tag: ${{ inputs.npm_tag }}

      - name: Publish to NPM Package Registry
        id: publish
        uses: tetherto/qvac-actions/publish-library-to-npm@38693d9315c5fb6bba1354d8d1ef9823bf6c10a3 # 0.1.0
        with:
          tag: ${{ steps.dist-tag.outputs.tag }}
          workdir: ${{ env.WORKDIR }}

  publish-npm-bare-sdk:
    name: Publish @qvac/bare-sdk to NPM
    needs:
      - build-bare-sdk
      - publish-logic
      - release-merge-guard
      - label-gate
    if: >-
      needs.label-gate.outputs.authorised == 'true' && (needs.publish-logic.outputs.publish_release == 'true' && (needs.release-merge-guard.result == 'success' || needs.release-merge-guard.result == 'skipped'))
    runs-on: ubuntu-latest
    environment: npm
    outputs:
      published_version: ${{ steps.publish.outputs.npm_published_version }}
    permissions:
      contents: write
      packages: write
      id-token: write
    env:
      WORKDIR_BARE: packages/bare-sdk
    steps:
      - name: Validate npm_tag input
        if: inputs.npm_tag != ''
        shell: bash
        run: |
          tag="${{ inputs.npm_tag }}"
          if ! echo "$tag" | grep -qE '^[a-zA-Z0-9][a-zA-Z0-9._-]*$'; then
            echo "::error::Invalid npm dist-tag '$tag'. Must match ^[a-zA-Z0-9][a-zA-Z0-9._-]*$ (e.g. release-1.x)"
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # 7.0.0

      - name: Download bare-sdk dist artifact
        uses: ./.github/actions/download-release-artifact
        with:
          name: dist-bare-sdk
          path: ${{ env.WORKDIR_BARE }}/dist/

      - name: Determine dist-tag
        id: dist-tag-2
        uses: tetherto/qvac-actions/npm-dist-tag-determination@38693d9315c5fb6bba1354d8d1ef9823bf6c10a3 # 0.1.0
        with:
          workdir: ${{ env.WORKDIR_BARE }}
          tag: ${{ inputs.npm_tag }}

      - name: Publish to NPM Package Registry
        id: publish
        uses: tetherto/qvac-actions/publish-library-to-npm@38693d9315c5fb6bba1354d8d1ef9823bf6c10a3 # 0.1.0
        with:
          tag: ${{ steps.dist-tag-2.outputs.tag }}
          workdir: ${{ env.WORKDIR_BARE }}

  # Create GitHub release only for actual releases (after NPM publish).
  # Gated on BOTH publish-npm jobs succeeding so we never tag a release
  # where @qvac/sdk shipped but @qvac/bare-sdk failed (or vice versa)
  publish-release:
    needs: [publish-npm, publish-npm-bare-sdk]
    if: >-
      needs.publish-npm.result == 'success' && needs.publish-npm.outputs.published_version != ''
      && needs.publish-npm-bare-sdk.result == 'success' && needs.publish-npm-bare-sdk.outputs.published_version != ''
    permissions:
      contents: write
    uses: ./.github/workflows/create-github-release.yml
    with:
      repo_name: "sdk"
      release_name: "QVAC SDK"
      published_version: ${{ needs.publish-npm.outputs.published_version }}
      prev_sha: ${{ github.event.before }}
      workdir: "packages/sdk"
