# Self-test for the prebuild symbol gate (scripts/verify-prebuild-symbols.mjs).
#
# Proves -- straight off the published artifacts, no device or rebuild -- that
# the gate CATCHES the @qvac/tts-ggml@0.2.1 Android dlopen regression (the build
# #2502 reverted: UND ggml_backend_is_cpu / ggml_get_type_traits_cpu) and PASSES
# the good 0.2.0. Guards the gate itself from silently rotting. Uses public npm
# only, so it runs on fork PRs without secrets.
name: Gate self-test (prebuild symbols)

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "scripts/verify-prebuild-symbols.mjs"
      - ".github/workflows/gate-selftest.yml"

permissions:
  contents: read

jobs:
  selftest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # 6.3.0
        with:
          node-version: lts/*

      - name: Gate MUST hard-fail on the broken 0.2.1 (the build #2502 reverted)
        shell: bash
        run: |
          set -euo pipefail
          rm -rf /tmp/bad && mkdir -p /tmp/bad
          npm pack @qvac/tts-ggml@0.2.1 --pack-destination /tmp/bad
          tar -xf /tmp/bad/*.tgz -C /tmp/bad package/prebuilds/android-arm64
          if node scripts/verify-prebuild-symbols.mjs --dir /tmp/bad/package/prebuilds/android-arm64 --platform android; then
            echo "::error::Gate PASSED on the known-broken 0.2.1 prebuild -- the gate would NOT catch the regression."
            exit 1
          fi
          echo "OK: gate correctly hard-failed on 0.2.1 (expected: ggml_backend_is_cpu / ggml_get_type_traits_cpu)."

      - name: Gate MUST pass on the good 0.2.0
        shell: bash
        run: |
          set -euo pipefail
          rm -rf /tmp/good && mkdir -p /tmp/good
          npm pack @qvac/tts-ggml@0.2.0 --pack-destination /tmp/good
          tar -xf /tmp/good/*.tgz -C /tmp/good package/prebuilds/android-arm64
          node scripts/verify-prebuild-symbols.mjs --dir /tmp/good/package/prebuilds/android-arm64 --platform android
          echo "OK: gate correctly passed on 0.2.0."

  fleet-dryrun:
    # De-risks the fleet-wide activation flagged in review: the gate runs inside
    # reusable-prebuilds.yml, which all 14 prebuild-*.yml callers reference by
    # LOCAL PATH (uses: ./.github/workflows/reusable-prebuilds.yml) -- resolved
    # at the caller's ref, no pinned SHA. So the UND hard-fail goes live for
    # every ggml/onnx addon on its next publish the moment this merges (not
    # gradually). This job dry-runs the gate over EVERY currently-published
    # addon's android-arm64 prebuild (the platform the UND check bites hardest)
    # and reports each one's result as merge evidence. Informational only -- the
    # enforcing gate is per-addon in reusable-prebuilds.yml; a hard-fail here is a
    # real Android dlopen regression in THAT addon (the gate would correctly
    # block its next publish until fixed), with the other addons unaffected.
    # Public npm only -> no secrets, runs on fork PRs too. Packs `latest`, so it
    # also keeps tracking the live fleet on every gate-touching PR.
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # 6.3.0
        with:
          node-version: lts/*

      - name: Dry-run the UND gate over every published addon (android-arm64)
        shell: bash
        run: |
          set -uo pipefail
          addons="tts-ggml transcription-parakeet transcription-whispercpp bci-whispercpp llm-llamacpp embed-llamacpp classification-ggml vla-ggml ocr-ggml translation-nmtcpp diffusion-cpp ocr-onnx"
          checked=0
          failed=0
          skipped=0
          echo "| addon | version | android-arm64 UND gate |" >> "$GITHUB_STEP_SUMMARY"
          echo "| --- | --- | --- |" >> "$GITHUB_STEP_SUMMARY"
          for a in $addons; do
            d="/tmp/fleet/$a"
            rm -rf "$d"
            mkdir -p "$d"
            if ! npm pack "@qvac/$a" --pack-destination "$d"; then
              echo "::warning::npm pack @qvac/$a failed (not on public npm?) -- skipping"
              echo "| \`@qvac/$a\` | - | skipped (pack failed) |" >> "$GITHUB_STEP_SUMMARY"
              skipped=$((skipped + 1))
              continue
            fi
            tar -xf "$d"/*.tgz -C "$d"
            ver=$(node -p "require('$d/package/package.json').version")
            if [ ! -d "$d/package/prebuilds/android-arm64" ]; then
              echo "-- @qvac/$a@$ver: no android-arm64 prebuild in tarball -- skipping"
              echo "| \`@qvac/$a\` | $ver | skipped (no android prebuild) |" >> "$GITHUB_STEP_SUMMARY"
              skipped=$((skipped + 1))
              continue
            fi
            echo "== @qvac/$a@$ver =="
            checked=$((checked + 1))
            if node scripts/verify-prebuild-symbols.mjs --dir "$d/package/prebuilds/android-arm64" --platform android; then
              echo "OK: @qvac/$a@$ver passes the UND gate on android-arm64"
              echo "| \`@qvac/$a\` | $ver | PASS |" >> "$GITHUB_STEP_SUMMARY"
            else
              echo "::warning::@qvac/$a@$ver HARD-FAILS the UND gate on android-arm64 -- a real fleet regression to fix in that addon, NOT a defect in this gate PR"
              echo "| \`@qvac/$a\` | $ver | **HARD-FAIL** |" >> "$GITHUB_STEP_SUMMARY"
              failed=$((failed + 1))
            fi
          done
          echo "=== $checked addon(s) checked on android-arm64, $failed hard-fail(s), $skipped skipped ==="
          {
            echo ""
            echo "**$checked checked, $failed hard-fail(s), $skipped skipped.** Informational only: the enforcing gate runs per-addon in reusable-prebuilds.yml. A hard-fail here is a genuine Android dlopen regression in that *addon* (the gate would correctly block its next publish until fixed), not a problem with this PR -- and the other addons are unaffected (per-addon prebuild workflows)."
          } >> "$GITHUB_STEP_SUMMARY"
