name: Benchmark VLM (model comparison)

# Manually-triggered cross-platform VLM quality + speed benchmark for
# @qvac/llm-llamacpp. Runs the config-driven matrix in
# packages/llm-llamacpp/benchmarks/vlm-benchmark/ — either two-models (compare two
# model blobs) or several-sources (one model across addon / fabric-cli / upstream-cli)
# — on a token-selected set of desktop legs (Linux / macOS arm64 / Windows ×
# CPU/GPU via matrix_desktop) and mobile devices (S25, Pixel 9, iPhone 16/17/
# 17 Pro × CPU/GPU on AWS Device Farm via matrix_mobile), and renders one report.
# Self-contained: the benchmark folder + this workflow are the only additions; the
# mobile leg bootstraps the test into the framework at launch (nothing committed
# outside the folder). See benchmarks/vlm-benchmark/README.md.

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "  addon ref — qvac branch / tag / SHA (default: current branch)"
        required: false
        type: string
      matrix_sources:
        description: "  builds under comparison, comma-sep: addon (published, default) | fabric@<ref> | upstream@<ref>; addon@candidate/addon@baseline reserved (A2). See benchmarks/vlm-benchmark/CONTRACT.md"
        required: false
        type: string
        default: "addon"
      matrix_models:
        description: "  models override, comma-sep: catalog names and/or [label=]<llm-url>|<mmproj-url>[@ctx=N] pairs, or json:[…]. Empty = config defaults. See CONTRACT.md §3"
        required: false
        type: string
        default: ""
      # ── Matrix (config-driven quality+speed) ──────
      # Runs the @qvac/llm-llamacpp addon over the frozen fixture (lmms-eval quality +
      # vision-encode speed) on Linux (and S25), driven by
      # packages/llm-llamacpp/benchmarks/vlm-benchmark/config.cjs.
      run_matrix:
        description: "run the VLM quality+speed matrix (must be true)"
        required: false
        type: boolean
        default: true
      matrix_mode:
        description: "  matrix mode: two-models (f16 vs q8, addon) or several-sources (addon+fabric-cli+upstream-cli; desktop only — builds native CLIs, so Linux/macOS/Windows, no mobile)"
        required: false
        type: string
        default: "two-models"
      matrix_preset:
        description: "  task group: smoke (1 task), cognitive (5 VQA×5), ocr1page (1 light ocr-page doc), ocr5pages (all 5 ocr-page docs, desktop), full (cognitive + ocr-small + 1 light ocr-page). Forwarded to every leg."
        required: false
        type: string
        default: "full"
      matrix_desktop:
        description: "  desktop legs, comma-sep <os>-<backend>: linux-cpu,linux-gpu,macos-cpu,macos-gpu,macmini-cpu,macmini-gpu,windows-cpu,windows-gpu (macos = GitHub-hosted VM, macmini = bare-metal M4)"
        required: false
        type: string
        default: "linux-cpu,linux-gpu"
      matrix_samples:
        description: "  override samples/task (empty = preset default; e.g. 1 for a quick check)"
        required: false
        type: string
        default: ""
      matrix_mobile:
        description: "  mobile (AWS Device Farm) legs, comma-sep <device>[-<backend>]: s26,s25,pixel9,iphone16,iphone17,iphone17pro, e.g. 's26-cpu,s26-gpu,iphone17' (bare device = cpu+gpu in one session; empty = no mobile)"
        required: false
        type: string
        default: ""
      mobile_timeout_min:
        description: "  mobile per-leg timeout in MINUTES — raises the Device-Farm WDIO/Mocha per-test + Android generated-spec ceiling for this run (capped by the 120-min DF/GH job ceilings). Empty = config.cjs `mobileTimeoutMin`; if that is null, the pipeline default (35-min Mocha / 30-min Android per-test)."
        required: false
        type: string
        default: ""
permissions:
  contents: read
  packages: read
  pull-requests: write
  id-token: write

jobs:
  # ── Context ────────────────────────────────────────────────────────
  # Resolves the repo + ref so downstream jobs check out the right
  # commit even when the workflow_dispatch is invoked without `ref`,
  # and builds the desktop matrix from the per-platform input toggles.
  # Matrix is computed here (instead of via job-level `if:`) because
  # GitHub Actions doesn't allow `matrix.*` references in job-level
  # conditions — they're evaluated before the matrix is expanded.
  context:
    runs-on: ubuntu-latest
    outputs:
      repository: ${{ steps.ctx.outputs.repository }}
      ref: ${{ steps.ctx.outputs.ref }}
      desktop_matrix: ${{ steps.dmatrix.outputs.value }}
      desktop_count: ${{ steps.dmatrix.outputs.count }}
      mobile_matrix: ${{ steps.mmatrix.outputs.value }}
      mobile_count: ${{ steps.mmatrix.outputs.count }}
      mobile_mocha_ms: ${{ steps.tmo.outputs.mocha_ms }}
      mobile_pertest_min: ${{ steps.tmo.outputs.pertest_min }}
      engine: ${{ steps.sources.outputs.engine }}
      fabric_ref: ${{ steps.sources.outputs.fabric_ref }}
      upstream_ref: ${{ steps.sources.outputs.upstream_ref }}
      models_b64: ${{ steps.sources.outputs.models_b64 }}
      merge_base: ${{ steps.commits.outputs.merge_base }}
      head_sha: ${{ steps.commits.outputs.head_sha }}
      head_title: ${{ steps.commits.outputs.head_title }}
      head_date: ${{ steps.commits.outputs.head_date }}
      base_title: ${{ steps.commits.outputs.base_title }}
      base_date: ${{ steps.commits.outputs.base_date }}
    steps:
      - id: ctx
        shell: bash
        env:
          INPUT_REF: ${{ inputs.ref }}
          REPO: ${{ github.repository }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          repo="$REPO"
          ref="${INPUT_REF:-$REF_NAME}"
          echo "repository=$repo" >> "$GITHUB_OUTPUT"
          echo "ref=$ref" >> "$GITHUB_OUTPUT"
      # Resolve the mobile timeout (minutes) so matrix-mobile can forward it to the
      # reusable workflow's mocha_timeout_ms / per_test_timeout_minutes inputs.
      # Precedence: workflow input > config.cjs `mobileTimeoutMin` > '' (pipeline default).
      - name: Checkout benchmark config (mobile-timeout default)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          repository: ${{ steps.ctx.outputs.repository }}
          ref: ${{ steps.ctx.outputs.ref }}
          sparse-checkout: |
            packages/llm-llamacpp/benchmarks/vlm-benchmark
          sparse-checkout-cone-mode: false
      - id: tmo
        shell: bash
        env:
          INPUT_MIN: ${{ inputs.mobile_timeout_min }}
        run: |
          min="$INPUT_MIN"
          if [ -z "$min" ]; then
            min=$(node -e 'try{const c=require("./packages/llm-llamacpp/benchmarks/vlm-benchmark/config.cjs");process.stdout.write(c.mobileTimeoutMin==null?"":String(c.mobileTimeoutMin))}catch(e){}' || true)
          fi
          if [ -n "$min" ]; then
            echo "mocha_ms=$((min*60000))" >> "$GITHUB_OUTPUT"
            echo "pertest_min=$min" >> "$GITHUB_OUTPUT"
            echo "Mobile timeout: ${min} min (Mocha $((min*60000)) ms, Android per-test ${min} min)"
          else
            echo "mocha_ms=" >> "$GITHUB_OUTPUT"
            echo "pertest_min=" >> "$GITHUB_OUTPUT"
            echo "Mobile timeout: pipeline default (35-min Mocha / 30-min Android per-test)"
          fi
      - id: dmatrix
        shell: bash
        env:
          RUN_MATRIX: ${{ inputs.run_matrix }}
          MATRIX_DESKTOP: ${{ inputs.matrix_desktop }}
          MATRIX_MODE: ${{ inputs.matrix_mode }}
        run: |
          cells='[]'
          if [[ "$RUN_MATRIX" == "true" ]]; then
            IFS=',' read -ra tokens <<< "${MATRIX_DESKTOP:-linux-cpu}"
            for raw in "${tokens[@]}"; do
              sel=$(echo "$raw" | xargs)
              # several-sources builds native fabric/upstream CLIs, so the Linux CPU
              # leg needs a runner with cmake+toolchain → GitHub-hosted ubuntu-latest.
              cpu_runner=qvac-ubuntu2204-x64
              if [[ "$MATRIX_MODE" == "several-sources" ]]; then cpu_runner=ubuntu-latest; fi
              case "$sel" in
                linux-cpu)   host=linux;   backend=cpu; runner=$cpu_runner;             no_gpu=true ;;
                linux-gpu)   host=linux;   backend=gpu; runner=qvac-ubuntu2404-x64-gpu;  no_gpu=false ;;
                # macOS arm64 (Apple Silicon): same GitHub-hosted runner for both
                # backends — gpu means Metal there, selected by the addon at runtime.
                macos-cpu)   host=macos;   backend=cpu; runner=macos-15-xlarge;          no_gpu=true ;;
                macos-gpu)   host=macos;   backend=gpu; runner=macos-15-xlarge;          no_gpu=false ;;
                # Bare-metal Apple M4 (self-hosted Mac mini) — real-hardware Metal
                # numbers vs the virtualized macos-* runner above.
                macmini-cpu) host=macmini; backend=cpu; runner=mac-mini-m4-gpu;          no_gpu=true ;;
                macmini-gpu) host=macmini; backend=gpu; runner=mac-mini-m4-gpu;          no_gpu=false ;;
                # Windows x64: the self-hosted runners the LLM integration tests
                # use (the gpu one is Vulkan-provisioned).
                windows-cpu) host=windows; backend=cpu; runner=qvac-win25-x64;           no_gpu=true ;;
                windows-gpu) host=windows; backend=gpu; runner=qvac-win25-x64-gpu;       no_gpu=false ;;
                "") continue ;;
                *) echo "::warning::Unknown matrix_desktop token '$sel' (known: {linux,macos,macmini,windows}-{cpu,gpu})"; continue ;;
              esac
              cells=$(echo "$cells" | jq -c \
                --arg h "$host" --arg b "$backend" --arg r "$runner" --arg n "$no_gpu" \
                '. + [{"host":$h,"backend":$b,"runner":$r,"no_gpu":$n}]')
            done
          fi
          count=$(echo "$cells" | jq 'length')
          echo "value=$cells" >> "$GITHUB_OUTPUT"
          echo "count=$count" >> "$GITHUB_OUTPUT"
          echo "Desktop matrix ($count entries): $cells"
      # Mobile matrix: one cell per <device>[-<backend>] token. The device part
      # maps to an AWS Device Farm filter (one phone per leg); the backend part
      # becomes QVAC_VLM_DEVICES on the phone (absent = cpu,gpu in one session).
      # Adding a phone (e.g. a future s26) = one new case line, nothing else.
      - id: mmatrix
        shell: bash
        env:
          RUN_MATRIX: ${{ inputs.run_matrix }}
          MATRIX_MOBILE: ${{ inputs.matrix_mobile }}
          MATRIX_MODE: ${{ inputs.matrix_mode }}
        run: |
          cells='[]'
          # Mobile runs the addon only; several-sources (native CLIs) is desktop-only.
          if [[ "$RUN_MATRIX" == "true" && "$MATRIX_MODE" != "several-sources" && -n "$MATRIX_MOBILE" ]]; then
            IFS=',' read -ra tokens <<< "$MATRIX_MOBILE"
            for raw in "${tokens[@]}"; do
              sel=$(echo "$raw" | xargs)
              [[ -z "$sel" ]] && continue
              case "$sel" in
                *-cpu) vlm_devices=cpu;       dev=${sel%-cpu} ;;
                *-gpu) vlm_devices=gpu;       dev=${sel%-gpu} ;;
                *)     vlm_devices="cpu,gpu"; dev=$sel ;;
              esac
              case "$dev" in
                s26)         platform=Android; manufacturer=Samsung; model="S26 Ultra" ;;
                s25)         platform=Android; manufacturer=Samsung; model="S25 Ultra" ;;
                pixel9)      platform=Android; manufacturer=Google;  model="Pixel 9" ;;
                iphone16)    platform=iOS;     manufacturer=Apple;   model="iPhone 16" ;;
                iphone17)    platform=iOS;     manufacturer=Apple;   model="iPhone 17" ;;
                iphone17pro) platform=iOS;     manufacturer=Apple;   model="iPhone 17 Pro" ;;
                *) echo "::warning::Unknown matrix_mobile device '$dev' (known: s26, s25, pixel9, iphone16, iphone17, iphone17pro)"; continue ;;
              esac
              cells=$(echo "$cells" | jq -c \
                --arg t "$sel" --arg p "$platform" --arg man "$manufacturer" \
                --arg mod "$model" --arg d "$vlm_devices" \
                '. + [{"token":$t,"platform":$p,"manufacturer":$man,"model":$mod,"vlm_devices":$d}]')
            done
          fi
          count=$(echo "$cells" | jq 'length')
          echo "value=$cells" >> "$GITHUB_OUTPUT"
          echo "count=$count" >> "$GITHUB_OUTPUT"
          echo "Mobile matrix ($count entries): $cells"
      # Parse the matrix_sources tokens (CONTRACT.md §3) into the refs the legs
      # consume, and base64 the matrix_models value for the on-device transport
      # (the device-config channel is semicolon-delimited; b64 is delimiter-safe).
      - id: sources
        shell: bash
        env:
          MATRIX_SOURCES: ${{ inputs.matrix_sources }}
          MATRIX_MODELS: ${{ inputs.matrix_models }}
        run: |
          engine=addon; fabric_ref=v8189.0.2; upstream_ref=b8189
          IFS=',' read -ra toks <<< "${MATRIX_SOURCES:-addon}"
          for raw in "${toks[@]}"; do
            t=$(echo "$raw" | xargs)
            case "$t" in
              ""|addon|fabric|upstream) ;;
              addon@candidate|addon@baseline) echo "::warning::'$t' is reserved (wired by A2) — running the published addon" ;;
              fabric@*) fabric_ref="${t#fabric@}" ;;
              upstream@*) upstream_ref="${t#upstream@}" ;;
              *) echo "::warning::Unknown matrix_sources token '$t' (known: addon[@candidate|@baseline], fabric@<ref>, upstream@<ref>)" ;;
            esac
          done
          models_b64=""
          if [ -n "$MATRIX_MODELS" ]; then models_b64=$(printf '%s' "$MATRIX_MODELS" | base64 -w0); fi
          {
            echo "engine=$engine"
            echo "fabric_ref=$fabric_ref"
            echo "upstream_ref=$upstream_ref"
            echo "models_b64=$models_b64"
          } >> "$GITHUB_OUTPUT"
          echo "sources: engine=$engine fabric=$fabric_ref upstream=$upstream_ref models_b64_len=${#models_b64}"
      # Resolve commit metadata so the consolidated report can show what
      # the candidate ref + merge-base actually point at (hash, title,
      # date). Needs a real clone — sparse checkout doesn't give us git
      # history.
      - name: Checkout for commit lookup
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          repository: ${{ steps.ctx.outputs.repository }}
          ref: ${{ steps.ctx.outputs.ref }}
          fetch-depth: 0
      # Contract guard: config loads, scenarios/models grammar parses, the
      # sample markers match the v2 schema (see CONTRACT.md). Fails the run
      # early on a broken contract instead of after expensive legs.
      - name: Contract selfcheck
        shell: bash
        run: node packages/llm-llamacpp/benchmarks/vlm-benchmark/run-desktop.cjs --selfcheck

      - id: commits
        shell: bash
        run: |
          git fetch origin main --quiet
          HEAD_SHA=$(git rev-parse HEAD)
          MERGE_BASE=$(git merge-base HEAD origin/main || echo "")
          HEAD_TITLE=$(git log -1 --pretty=%s "$HEAD_SHA")
          HEAD_DATE=$(git log -1 --pretty=%cI "$HEAD_SHA")
          if [[ -n "$MERGE_BASE" ]]; then
            BASE_TITLE=$(git log -1 --pretty=%s "$MERGE_BASE")
            BASE_DATE=$(git log -1 --pretty=%cI "$MERGE_BASE")
          else
            BASE_TITLE=""
            BASE_DATE=""
          fi
          {
            echo "head_sha=$HEAD_SHA"
            echo "merge_base=$MERGE_BASE"
            echo "head_title=$HEAD_TITLE"
            echo "head_date=$HEAD_DATE"
            echo "base_title=$BASE_TITLE"
            echo "base_date=$BASE_DATE"
          } >> "$GITHUB_OUTPUT"
          echo "HEAD:       $HEAD_SHA - $HEAD_TITLE ($HEAD_DATE)"
          echo "merge-base: $MERGE_BASE - $BASE_TITLE ($BASE_DATE)"

  # ── Desktop benchmark matrix ───────────────────────────────────────
  # Each leg is the same shape — pick the runner via matrix.host/backend.
  # Linux GPU rows target self-hosted Vulkan runners pre-provisioned
  # with the Vulkan SDK; macOS arm64 uses Metal on the GitHub-hosted
  # macos-15-xlarge runner (same runner the LLM integration tests use).
  # The matrix itself is built dynamically by the context job above
  # from the `matrix_desktop` input.
  matrix-desktop:
    needs: context
    if: needs.context.outputs.desktop_count != '0'
    name: vlm-matrix-${{ matrix.host }}-${{ matrix.backend }}
    runs-on: ${{ matrix.runner }}
    # `release` environment exposes AWS_OIDC_ROLE_ARN and satisfies the role's OIDC
    # trust policy (environment:release claim) for the S3 fixture-image download.
    environment: release
    # several-sources builds two CLIs from source (first run, pre-cache) + per-image
    # CLI model reloads, so allow more wall-clock than the addon-only two-models path.
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.context.outputs.desktop_matrix) }}
    env:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      WORKDIR: packages/llm-llamacpp
    steps:
      - name: Manual Workspace Cleanup
        if: runner.environment != 'github-hosted'
        shell: bash
        run: rm -rf "$GITHUB_WORKSPACE" && mkdir -p "$GITHUB_WORKSPACE"

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          repository: ${{ needs.context.outputs.repository }}
          ref: ${{ needs.context.outputs.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # 6.3.0
        with:
          node-version: 22

      - name: Install addon deps
        working-directory: ${{ env.WORKDIR }}
        shell: bash
        run: npm install --no-audit --no-fund

      - name: Install bare tooling
        shell: bash
        run: npm install -g --force bare bare-make bare-runtime bare-https brittle

      # Branch JS + published native prebuild: pull the host's prebuild
      # (linux-x64 / darwin-arm64) from the public npm package into the
      # workspace so the harness's require('../../index.js') loads. The
      # published prebuild handles both cpu and gpu (Vulkan on Linux,
      # Metal on macOS) via runtime device selection.
      - name: Fetch published prebuilds
        working-directory: ${{ env.WORKDIR }}
        shell: bash
        run: |
          npm pack @qvac/llm-llamacpp@latest
          tar -xzf *.tgz
          ADDON_VER=$(node -e "console.log(require('./package/package.json').version)")
          echo "ADDON_VERSION=$ADDON_VER" >> "$GITHUB_ENV"
          rm -rf prebuilds
          mv package/prebuilds ./prebuilds
          rm -rf package *.tgz
          echo "addon @qvac/llm-llamacpp@$ADDON_VER"
          ls -la prebuilds/

      # Linux GPU runners ship the Vulkan SDK at the well-known path; stamp the
      # env so the addon's loader finds it. No-op on cpu and macOS (Metal) legs.
      - name: Configure Vulkan SDK env (Linux GPU)
        if: matrix.host == 'linux' && matrix.backend == 'gpu'
        shell: bash
        run: |
          echo "VULKAN_SDK=/opt/vulkansdk/x86_64" >> "$GITHUB_ENV"
          echo "/opt/vulkansdk/x86_64/bin" >> "$GITHUB_PATH"

      # The self-hosted mac-mini-m4-gpu runner does not ship the AWS CLI (hosted
      # macOS runners do). Install it user-local (no sudo) so the S3 fixture
      # sync below works. Mirrors integration-test-ocr-ggml.yml.
      - name: Install AWS CLI (self-hosted macOS fallback)
        if: matrix.host == 'macmini'
        shell: bash
        run: |
          if command -v aws >/dev/null 2>&1; then
            echo "AWS CLI already on PATH: $(command -v aws)"; aws --version; exit 0
          fi
          for p in /opt/homebrew/bin/aws /usr/local/bin/aws "$HOME/.local/aws-cli/aws"; do
            if [ -x "$p" ]; then
              echo "AWS CLI at $p; adding $(dirname "$p") to PATH"
              echo "$(dirname "$p")" >> "$GITHUB_PATH"; "$p" --version; exit 0
            fi
          done
          echo "Installing AWS CLI v2 user-local..."
          curl -sSL "https://awscli.amazonaws.com/AWSCLIV2.pkg" -o /tmp/AWSCLIV2.pkg
          rm -rf /tmp/awscli-expanded
          pkgutil --expand-full /tmp/AWSCLIV2.pkg /tmp/awscli-expanded
          mkdir -p "$HOME/.local"
          rm -rf "$HOME/.local/aws-cli"
          mv /tmp/awscli-expanded/aws-cli.pkg/Payload/aws-cli "$HOME/.local/aws-cli"
          rm -rf /tmp/awscli-expanded /tmp/AWSCLIV2.pkg
          echo "$HOME/.local/aws-cli" >> "$GITHUB_PATH"

      # Fixture images live in S3 (not committed to git). Pull them into the benchmark's
      # fixture/ dir so the harness and the several-sources CLI runner read them locally.
      - name: Configure AWS credentials (fixture images)
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # 6.0.0
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: us-west-2
      - name: Download fixture images from S3
        working-directory: ${{ env.WORKDIR }}
        shell: bash
        run: |
          # Use the OIDC env-var creds set by the configure step. On the self-hosted
          # Windows runner a persistent AWS profile / shared-credentials file shadows
          # them and signs with a stale key (SignatureDoesNotMatch); clearing those
          # sources makes every platform sign with the same temporary creds. No-op on
          # Linux/macOS where these are already unset.
          unset AWS_PROFILE AWS_DEFAULT_PROFILE AWS_SHARED_CREDENTIALS_FILE AWS_CONFIG_FILE
          aws s3 sync s3://tether-ai-dev/vlm-benchmark/ benchmarks/vlm-benchmark/fixture/
          echo "fixture images:"; ls benchmarks/vlm-benchmark/fixture/

      - name: Run VLM matrix
        working-directory: ${{ env.WORKDIR }}
        shell: bash
        env:
          QVAC_VLM_MATRIX: "1"
          QVAC_VLM_MODE: ${{ inputs.matrix_mode }}
          QVAC_VLM_PRESET: ${{ inputs.matrix_preset }}
          QVAC_VLM_ENGINE: addon # this leg is always the 'addon' source
          QVAC_VLM_SAMPLES: ${{ inputs.matrix_samples }} # '' → use the preset's value
          QVAC_VLM_DEVICES: ${{ matrix.backend }}
          QVAC_VLM_MODELS: ${{ inputs.matrix_models }} # '' → config defaults (CONTRACT.md §3)
          QVAC_VLM_SOURCE_ID: addon
          NO_GPU: ${{ matrix.no_gpu }}
        run: |
          # Point brittle straight at the benchmark dir (no staging needed on desktop),
          # then run it under bare. In several-sources mode this is the addon leg;
          # fabric/upstream CLIs are appended to the same log by the next step.
          export QVAC_VLM_SOURCE_REF="npm:${ADDON_VERSION:-published}"
          npx brittle -r test/integration/all.js benchmarks/vlm-benchmark/vlm-matrix.test.js
          bare test/integration/all.js --exit 2>&1 | tee "vlm-matrix-${{ matrix.host }}-${{ matrix.backend }}.log"
          exit ${PIPESTATUS[0]}

      # several-sources only: build native fabric/upstream llama-mtmd-cli and run
      # them over the SAME fixture, appending [VLMROW]/[VLMSEG] markers to the addon
      # log so aggregate.js renders a 3-source comparison. Desktop-only (no mobile):
      # build-cli-sources.js compiles per-OS (Vulkan on linux/win, Metal on darwin),
      # so every desktop leg builds its own CLIs and reports a per-platform comparison.
      - name: Cache CLI builds (several-sources)
        if: inputs.matrix_mode == 'several-sources'
        uses: actions/cache@v4
        with:
          path: ${{ env.WORKDIR }}/benchmarks/vlm-benchmark/cli-builds
          key: vlm-cli-v3-${{ matrix.host }}-${{ matrix.backend }}-${{ needs.context.outputs.fabric_ref }}-${{ needs.context.outputs.upstream_ref }}

      # Windows several-sources: the self-hosted runner's bash shell exposes neither
      # cmake nor the MSVC toolchain. Fetch Kitware cmake onto PATH (matches
      # pr-test-inference-addon-cpp) and select the VS 2022 generator so cmake locates
      # cl.exe itself — no vcvars sourcing needed. Linux/macOS already have cmake+clang.
      - name: Setup CMake + MSVC generator (Windows several-sources)
        if: inputs.matrix_mode == 'several-sources' && matrix.host == 'windows'
        shell: powershell
        run: |
          $ver = "3.31.6"
          $dir = "$env:RUNNER_TEMP\cmake-$ver-windows-x86_64"
          if (-not (Test-Path "$dir\bin\cmake.exe")) {
            Invoke-WebRequest "https://github.com/Kitware/CMake/releases/download/v$ver/cmake-$ver-windows-x86_64.zip" -OutFile "$env:RUNNER_TEMP\cmake.zip"
            Expand-Archive "$env:RUNNER_TEMP\cmake.zip" -DestinationPath "$env:RUNNER_TEMP" -Force
          }
          "$dir\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding ascii -Append
          "CMAKE_GENERATOR=Visual Studio 17 2022" | Out-File -FilePath $env:GITHUB_ENV -Encoding ascii -Append
          "CMAKE_GENERATOR_PLATFORM=x64" | Out-File -FilePath $env:GITHUB_ENV -Encoding ascii -Append

      - name: Build + run fabric/upstream CLIs over the fixture (several-sources)
        if: inputs.matrix_mode == 'several-sources'
        working-directory: ${{ env.WORKDIR }}/benchmarks/vlm-benchmark
        shell: bash
        env:
          LOG: ${{ github.workspace }}/${{ env.WORKDIR }}/vlm-matrix-${{ matrix.host }}-${{ matrix.backend }}.log
          MODEL_DIR: ${{ github.workspace }}/${{ env.WORKDIR }}/test/model
          SAMPLES: ${{ inputs.matrix_samples }}
          PRESET: ${{ inputs.matrix_preset }}
        run: |
          # Match the addon leg's run size: samples + repeats come from the active
          # preset in config.cjs (matrix_samples still overrides samples). CLI build +
          # runner are vendored into this folder (no vlm-performance dependency).
          PRESET_SAMPLES=$(node -e "console.log((require('./config.cjs').presets['$PRESET']||{}).samplesPerTask||3)")
          REPEATS=$(node -e "console.log((require('./config.cjs').presets['$PRESET']||{}).repeats||1)")
          SAMPLES="${SAMPLES:-$PRESET_SAMPLES}"
          # Per-task sample caps from the preset (e.g. full caps ocr-page to 1) so the
          # CLI legs run the SAME items as the addon leg.
          TASK_SAMPLES=$(node -e "console.log(JSON.stringify((require('./config.cjs').presets['$PRESET']||{}).taskSamples||{}))")
          node build-cli-sources.js --sources=fabric,upstream \
            --fabric-ref=${{ needs.context.outputs.fabric_ref }} --upstream-ref=${{ needs.context.outputs.upstream_ref }} \
            --backend=${{ matrix.backend }}
          FABRIC_BIN=$(node -e "console.log(require('./cli-sources-resolved.json').fabric.binaryPath)")
          UPSTREAM_BIN=$(node -e "console.log(require('./cli-sources-resolved.json').upstream.binaryPath)")
          # Model files were downloaded by the addon leg (names from config.cjs).
          LLM="$MODEL_DIR/reg-qwen-unsloth-Q8_0.gguf"
          MMPROJ="$MODEL_DIR/reg-qwen-mradermacher-mmproj-Q8_0.gguf"
          run_src () {
            echo ">> $1 over fixture ($2)"
            node cli-fixture-runner.cjs \
              --binary "$3" --source "$1" --llm "$LLM" --mmproj "$MMPROJ" \
              --backend "${{ matrix.backend }}" --samples "$SAMPLES" --repeats "$REPEATS" \
              --tasks textvqa,vizwiz,gqa,docvqa,ai2d,ocr-small,ocr-page \
              --task-samples "$TASK_SAMPLES" \
              --main-origin "Qwen3.5-0.8B-Q8_0 (Registry)" \
              --mmproj-origin "Qwen3.5-0.8B mmproj-Q8_0 (Registry)" >> "$LOG" 2>&1 || echo "::warning::$1 run had errors"
          }
          run_src fabric-cli fabric "$FABRIC_BIN"
          run_src upstream-cli upstream "$UPSTREAM_BIN"
          echo "appended fabric-cli + upstream-cli to $LOG"

      # HW/SW provenance so a reader can reproduce the numbers. Rendered in the
      # report's Details section (passed to aggregate.js via --provenance).
      - name: Gather provenance
        if: always()
        working-directory: ${{ env.WORKDIR }}
        shell: bash
        run: |
          F="prov-${{ matrix.host }}-${{ matrix.backend }}.md"
          {
            echo "**${{ matrix.host }} · ${{ matrix.backend }}** (runner \`${{ matrix.runner }}\`)"
            echo "- addon: \`@qvac/llm-llamacpp@${ADDON_VERSION:-?}\` (published prebuild)"
            echo "- git: \`${{ needs.context.outputs.head_sha }}\` (ref \`${{ needs.context.outputs.ref }}\`)"
            echo "- node: $(node -v 2>/dev/null) · bare: $(bare --version 2>/dev/null || echo n/a)"
            if [ "${{ matrix.host }}" = "macos" ] || [ "${{ matrix.host }}" = "macmini" ]; then
              echo "- os: $(sw_vers -productName 2>/dev/null) $(sw_vers -productVersion 2>/dev/null) $(uname -m)"
              echo "- cpu: $(sysctl -n machdep.cpu.brand_string 2>/dev/null) ($(sysctl -n hw.ncpu 2>/dev/null) cores)"
              echo "- ram: $(awk -v b="$(sysctl -n hw.memsize 2>/dev/null)" 'BEGIN{ if (b>0) printf "%.0f GB", b/1073741824; else printf "?" }')"
              if [ "${{ matrix.backend }}" = "gpu" ]; then
                # system_profiler reports no chipset on the virtualized runner GPU
                GPU_NAME=$(system_profiler SPDisplaysDataType 2>/dev/null | sed -n 's/^ *Chipset Model: //p' | head -1)
                echo "- gpu: ${GPU_NAME:-Apple virtualized} (Metal)"
              fi
            elif [ "${{ matrix.host }}" = "windows" ]; then
              # git-bash: query hardware via CIM (wmic is removed on Server 2025)
              PS="powershell -NoProfile -Command"
              echo "- os: $($PS '(Get-CimInstance Win32_OperatingSystem).Caption' 2>/dev/null | tr -d '\r') $(uname -m)"
              echo "- cpu: $($PS '(Get-CimInstance Win32_Processor).Name' 2>/dev/null | tr -d '\r' | head -1) (${NUMBER_OF_PROCESSORS:-?} cores)"
              echo "- ram: $($PS '[math]::Round((Get-CimInstance Win32_ComputerSystem).TotalPhysicalMemory/1GB)' 2>/dev/null | tr -d '\r') GB"
              if [ "${{ matrix.backend }}" = "gpu" ]; then
                echo "- gpu: $($PS '(Get-CimInstance Win32_VideoController).Name' 2>/dev/null | tr -d '\r' | head -1) (Vulkan)"
              fi
            else
              echo "- os: $(. /etc/os-release 2>/dev/null; echo "$PRETTY_NAME") $(uname -m)"
              echo "- cpu: $(lscpu 2>/dev/null | sed -n 's/^Model name:[[:space:]]*//p' | head -1) ($(nproc) cores)"
              echo "- ram: $(free -h 2>/dev/null | awk '/^Mem:/{print $2}')"
              if [ "${{ matrix.backend }}" = "gpu" ]; then
                echo "- gpu: $(vulkaninfo --summary 2>/dev/null | sed -n 's/.*deviceName[[:space:]]*=[[:space:]]*//p' | head -1 || echo '?')"
              fi
            fi
          } > "$F"
          cat "$F"

      - name: Upload matrix log
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # 7.0.0
        with:
          name: vlm-matrix-log-${{ matrix.host }}-${{ matrix.backend }}-${{ github.run_number }}
          path: |
            ${{ env.WORKDIR }}/vlm-matrix-${{ matrix.host }}-${{ matrix.backend }}.log
            ${{ env.WORKDIR }}/prov-${{ matrix.host }}-${{ matrix.backend }}.md
          retention-days: 14
          if-no-files-found: warn

  # ── Matrix mode: mobile (AWS Device Farm) ──────────────────────────
  # One leg per matrix_mobile token, each reusing the mobile workflow to run
  # the SAME matrix harness on ONE phone (single-device filter — extra devices
  # only add Device Farm queue/concurrency contention and can outwait the
  # 120-min job ceiling; see the first iPhone run). The backend selection and
  # the dispatched mode/preset reach the phone via device_env (the
  # qvacPerfConfig.txt push channel), so mobile runs what was dispatched —
  # config.cjs stays the fallback when env is absent. Markers come back in
  # the S25's logcat / the iPhone's bare_console.log (no logcat on iOS),
  # uploaded as console-logs-…-<platform>-<token>.
  matrix-mobile:
    needs: context
    if: needs.context.outputs.mobile_count != '0'
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.context.outputs.mobile_matrix) }}
    uses: ./.github/workflows/integration-mobile-test-llm-llamacpp.yml
    secrets: inherit
    with:
      ref: ${{ needs.context.outputs.ref }}
      repository: ${{ needs.context.outputs.repository }}
      # Bootstrap the benchmark into the framework at launch (stages test/harness/config/
      # fixture into test/integration + images into testAssets, regenerates the test list)
      # — nothing committed outside benchmarks/vlm-benchmark/.
      pre_build_script: benchmarks/vlm-benchmark/stage.cjs
      # Fixture-image object store (kept only in this workflow). The reusable workflow
      # syncs from this URI without referencing it literally.
      fixture_images_uri: s3://tether-ai-dev/vlm-benchmark/
      platforms: ${{ matrix.platform }}
      device_manufacturer: ${{ matrix.manufacturer }}
      device_model: ${{ matrix.model }}
      device_env: "QVAC_VLM_DEVICES=${{ matrix.vlm_devices }};QVAC_VLM_MODE=${{ inputs.matrix_mode }};QVAC_VLM_PRESET=${{ inputs.matrix_preset }}${{ inputs.matrix_samples != '' && format(';QVAC_VLM_SAMPLES={0}', inputs.matrix_samples) || '' }}${{ inputs.matrix_models != '' && format(';QVAC_VLM_MODELS=b64:{0}', needs.context.outputs.models_b64) || '' }}"
      artifact_suffix: ${{ matrix.token }}
      # Select ONLY our test via the shard override (no edits to the committed
      # test-groups.json / perf-tests.json). qvac_perf_only=false so the override isn't
      # intersected with perf-tests.json (which we don't touch).
      qvac_perf_only: false
      test_groups: '[{"name":"vlmMatrix","grep":"runVlmMatrixTest"}]'
      # Mobile timeout (Option 2): empty = the reusable workflow's defaults
      # (35-min Mocha / Android 30-min / iOS 20-min per-test) are kept untouched.
      # per_test_timeout_minutes is the platform-neutral knob (raises the
      # generated-spec ceiling on Android AND iOS) — needed for the iPhone leg.
      mocha_timeout_ms: ${{ needs.context.outputs.mobile_mocha_ms }}
      per_test_timeout_minutes: ${{ needs.context.outputs.mobile_pertest_min }}

  # ── Matrix mode: combine ───────────────────────────────────────────
  # Aggregates [VLMROW]/[VLMSEG]/[VLMMETA] markers from every matrix log
  # (desktop .log files + S25 logcat + iPhone bare_console.log) into one
  # quality+speed report via vlm-benchmark/aggregate.js, surfaced to the
  # step summary + PR comment. This is the mechanism that makes mobile
  # (Device Farm) results visible.
  matrix-combine:
    needs:
      - context
      - matrix-desktop
      - matrix-mobile
    if: always() && inputs.run_matrix && needs.context.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          repository: ${{ needs.context.outputs.repository }}
          ref: ${{ needs.context.outputs.ref }}
          sparse-checkout: |
            packages/llm-llamacpp/benchmarks/vlm-benchmark
          sparse-checkout-cone-mode: false

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # 6.3.0
        with:
          node-version: 22

      - name: Download desktop matrix logs
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # 8.0.1
        with:
          pattern: vlm-matrix-log-*-${{ github.run_number }}
          path: matrix-logs

      # Mobile raw device logs (S25 logcat / iPhone bare_console.log hold the
      # [VLMROW] markers). continue-on-error so a desktop-only run (no mobile
      # artifact) still combines.
      - name: Download mobile device logs
        continue-on-error: true
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # 8.0.1
        with:
          pattern: console-logs-*
          path: matrix-logs

      # All combine logic (log discovery, host tagging, mobile provenance,
      # report rendering, and the B4 accuracy gate via exit code) lives in
      # benchmarks/vlm-benchmark/combine.cjs so report changes never touch
      # this workflow. See CONTRACT.md for the marker schema it consumes.
      - name: Aggregate matrix logs
        shell: bash
        run: |
          node packages/llm-llamacpp/benchmarks/vlm-benchmark/combine.cjs \
            --dir matrix-logs \
            --out consolidated/vlm-matrix-consolidated.md \
            --title "VLM Matrix — ${{ inputs.matrix_mode }} / ${{ inputs.matrix_preset }} (run #${{ github.run_number }})" \
            --mode "${{ inputs.matrix_mode }}" --engine "${{ needs.context.outputs.engine }}" \
            --run-number "${{ github.run_number }}"

      - name: Post step summary
        if: always()
        shell: bash
        run: |
          {
            echo "# VLM Matrix — Consolidated"
            echo ""
            cat consolidated/vlm-matrix-consolidated.md 2>/dev/null || echo "No consolidated matrix report generated."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Post PR comment
        if: always() && hashFiles('consolidated/vlm-matrix-consolidated.md') != ''
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REF: ${{ needs.context.outputs.ref }}
        run: |
          PR_NUMBER=$(gh pr list --head "$REF" --state open --json number --jq '.[0].number' 2>/dev/null || echo "")
          if [[ -z "$PR_NUMBER" ]]; then
            echo "No open PR found for ref $REF — skipping PR comment."
            exit 0
          fi
          {
            echo "## VLM Matrix Benchmark"
            echo ""
            echo "_Run #${{ github.run_number }} — [full report](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})_"
            echo ""
            cat consolidated/vlm-matrix-consolidated.md
          } > /tmp/matrix-comment.md
          gh pr comment "$PR_NUMBER" --body-file /tmp/matrix-comment.md

      - name: Upload consolidated matrix report
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # 7.0.0
        with:
          name: vlm-matrix-consolidated-${{ github.run_number }}
          path: consolidated/
          retention-days: 30
          if-no-files-found: warn
