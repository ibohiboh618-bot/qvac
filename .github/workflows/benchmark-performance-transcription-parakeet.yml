name: Benchmark Performance (Parakeet)

on:
  workflow_dispatch:
    inputs:
      repository:
        description: "Repository to benchmark"
        required: false
        type: string
      ref:
        description: "Git ref (branch/tag/SHA) to benchmark"
        required: false
        type: string
      run_desktop:
        description: "Run desktop (CPU/GPU) RTF benchmarks"
        required: false
        type: boolean
        default: true
      run_mobile:
        description: "Run mobile (Android/iOS) RTF benchmarks on Device Farm"
        required: false
        type: boolean
        default: true

permissions:
  contents: read
  packages: read
  id-token: write

jobs:
  label-gate:
    name: Authorise (label-gate)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    outputs:
      authorised: ${{ steps.gate.outputs.authorised }}
    steps:
      - name: Checkout (label-gate action only)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          ref: ${{ github.event.repository.default_branch }}
          sparse-checkout: .github/actions/label-gate
          sparse-checkout-cone-mode: false
      - name: Run label-gate
        id: gate
        uses: ./.github/actions/label-gate
        with:
          github-token: ${{ secrets.PAT_TOKEN }}
  context:
    runs-on: ubuntu-latest
    outputs:
      repository: ${{ steps.ctx.outputs.repository }}
      ref: ${{ steps.ctx.outputs.ref }}
    steps:
      - id: ctx
        shell: bash
        env:
          INPUT_REPO: ${{ inputs.repository }}
          INPUT_REF: ${{ inputs.ref }}
          REPO: ${{ github.repository }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          repo="${INPUT_REPO:-$REPO}"
          ref="${INPUT_REF:-$REF_NAME}"
          echo "repository=$repo" >> "$GITHUB_OUTPUT"
          echo "ref=$ref" >> "$GITHUB_OUTPUT"

  prebuild:
    needs:
      - context
      - label-gate
    permissions:
      contents: write
      packages: write
      pull-requests: write
      id-token: write
    uses: ./.github/workflows/prebuilds-transcription-parakeet.yml
    secrets: inherit
    with:
      repository: ${{ needs.context.outputs.repository }}
      ref: ${{ needs.context.outputs.ref }}

    if: needs.label-gate.outputs.authorised == 'true'
  desktop-benchmarks:
    needs:
      - context
      - prebuild
      - label-gate
    permissions:
      contents: read
      packages: read
      id-token: write
    uses: ./.github/workflows/integration-test-transcription-parakeet.yml
    secrets: inherit
    with:
      repository: ${{ needs.context.outputs.repository }}
      ref: ${{ needs.context.outputs.ref }}
      run_integration_tests: false
      run_rtf_benchmarks: true

    if: needs.label-gate.outputs.authorised == 'true' && inputs.run_desktop
  mobile-benchmarks:
    needs:
      - context
      - prebuild
      - label-gate
    permissions:
      contents: read
      packages: read
      pull-requests: write
      id-token: write
    uses: ./.github/workflows/integration-mobile-test-transcription-parakeet.yml
    secrets: inherit
    with:
      repository: ${{ needs.context.outputs.repository }}
      ref: ${{ needs.context.outputs.ref }}

    if: needs.label-gate.outputs.authorised == 'true' && inputs.run_mobile
  summarize:
    needs:
      - context
      - desktop-benchmarks
      - mobile-benchmarks
      - label-gate
    if: needs.label-gate.outputs.authorised == 'true' && (always())
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          repository: ${{ needs.context.outputs.repository }}
          ref: ${{ needs.context.outputs.ref }}
          token: ${{ secrets.PAT_TOKEN }}

      # No merge-multiple: same-platform runners (e.g. qvac-ubuntu2204-x64 and
      # qvac-ubuntu2204-x64-gpu) emit identically named rtf-benchmark-*.json
      # files, so merging into one directory would clobber all but the last.
      # Per-artifact subdirectories keep every runner; the aggregator's
      # walkFiles recurses and dedupes on device.
      - name: Download desktop benchmark artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # 8.0.1
        with:
          pattern: rtf-results-*
          path: benchmark-artifacts/desktop

      # Per-platform subdirectories: Android + iOS each upload a
      # performance-report.json, so a flat merge would collide. The
      # aggregator's walkFiles recurses and dedupes mobile rows on device.
      - name: Download mobile benchmark artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # 8.0.1
        continue-on-error: true
        with:
          pattern: perf-report-parakeet-*
          path: benchmark-artifacts/mobile

      - name: Generate consolidated benchmark report
        run: |
          node scripts/perf-report/aggregate-parakeet-rtf.js \
            --dir benchmark-artifacts \
            --manual-dir packages/transcription-parakeet/benchmarks/manual-results \
            --output benchmark-artifacts/parakeet-performance-findings.md \
            --output-json benchmark-artifacts/parakeet-performance-findings.json \
            --output-html benchmark-artifacts/parakeet-performance-findings.html

      - name: Add summary
        run: cat benchmark-artifacts/parakeet-performance-findings.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload consolidated benchmark report
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # 7.0.0
        with:
          name: parakeet-performance-findings
          path: |
            benchmark-artifacts/parakeet-performance-findings.md
            benchmark-artifacts/parakeet-performance-findings.json
            benchmark-artifacts/parakeet-performance-findings.html
          retention-days: 30
