name: Integration Tests (Vla)

on:
  workflow_call:
    inputs:
      ref:
        description: "ref"
        type: string
      repository:
        type: string
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref (branch/tag/SHA) to test"
        type: string
        required: false
        default: main
      prebuild_package:
        description: "NPM package containing prebuilds (e.g. @qvac/vla@1.0.0)"
        type: string
        required: true

jobs:
  run-integration-tests:
    runs-on: ${{ matrix.runner || matrix.os }}
    environment: release
    name: ${{ matrix.platform }}-${{ matrix.arch }}-integration-tests
    permissions:
      contents: read
      packages: read
      id-token: write

    env:
      WORKDIR: packages/qvac-lib-infer-vla

    strategy:
      fail-fast: false
      matrix:
        include:
          # Run Linux x64 tests on both Ubuntu 22.04 and 24.04 to ensure compatibility
          - os: ubuntu-22.04
            platform: linux
            arch: x64
          - os: ubuntu-24.04
            platform: linux
            arch: x64
            runner: ai-run-linux-gpu
          - os: ubuntu-22.04-arm
            platform: linux
            arch: arm64
            runner: ubuntu-22.04-arm
          - os: ubuntu-24.04-arm
            platform: linux
            arch: arm64
            runner: ubuntu-24.04-arm
          - os: macos-14-xlarge
            platform: darwin
            arch: arm64
          - os: macos-15-large
            platform: darwin
            arch: x64
          - os: windows-11
            platform: win32
            arch: x64
            runner: ai-run-windows11-gpu

    steps:
      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # 6.3.0
        with:
          node-version: lts/*

      - name: Windows - enable git long paths
        if: ${{ matrix.platform == 'win32' }}
        shell: powershell
        run: git config --system core.longpaths true

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          repository: ${{ inputs.repository || github.repository }}
          ref: ${{ inputs.ref || github.ref }}
          token: ${{ secrets.PAT_TOKEN }}

      - name: Configure scoped registry for @tetherto and @qvac packages (Linux/macOS)
        if: ${{ matrix.platform != 'win32' }}
        working-directory: ${{ env.WORKDIR }}
        env:
          GPR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          GIT_PAT: ${{ secrets.PAT_TOKEN }}
        shell: bash
        run: |
          echo "Configuring scoped registry for @tetherto and @qvac packages..."
          set -eu
          echo "Writing .npmrc for dual registry install…"
          cat > .npmrc <<NPMRC
          registry=https://registry.npmjs.org/
          @qvac:registry=https://registry.npmjs.org/
          @tetherto:registry=https://npm.pkg.github.com/
          //registry.npmjs.org/:_authToken=${NPM_TOKEN}
          //npm.pkg.github.com/:_authToken=${GPR_TOKEN}
          NPMRC

          # Optional: make private git deps work without prompting
          if [ -n "${GIT_PAT:-}" ]; then
            git config --global url."https://${GIT_PAT}:@github.com/".insteadOf "https://github.com/"
          else
            # Using the workflow's GITHUB_TOKEN for git clones when possible
            git config --global url."https://${{ github.token }}:@github.com/".insteadOf "https://github.com/"
          fi

      - name: Configure scoped registry for @tetherto and @qvac packages (Windows)
        if: ${{ matrix.platform == 'win32' }}
        working-directory: ${{ env.WORKDIR }}
        env:
          GPR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          GIT_PAT: ${{ secrets.PAT_TOKEN }}
        run: |
          echo "=== Configuring scoped registry for @tetherto and @qvac packages ==="
          echo "Writing .npmrc for dual registry install…"
          @"
          registry=https://registry.npmjs.org/
          @qvac:registry=https://registry.npmjs.org/
          @tetherto:registry=https://npm.pkg.github.com/
          //registry.npmjs.org/:_authToken=$env:NPM_TOKEN
          //npm.pkg.github.com/:_authToken=$env:GPR_TOKEN
          "@ | Out-File -FilePath .npmrc -Encoding utf8

          # Optional: make private git deps work without prompting
          if ($env:GIT_PAT) {
            git config --global url."https://$env:GIT_PAT:@github.com/".insteadOf "https://github.com/"
          } else {
            git config --global url."https://${{ github.token }}:@github.com/".insteadOf "https://github.com/"
          }
        shell: powershell

      - name: Install NPM dependencies
        working-directory: ${{ env.WORKDIR }}
        run: |
          npm install
          npm install -g bare bare-make

      - name: Download prebuilds (from artifacts)
        if: ${{ !inputs.prebuild_package }}
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # 8.0.1
        with:
          path: ${{ env.WORKDIR }}/prebuilds
          merge-multiple: true

      - name: Download prebuilds from package (Linux/macOS)
        if: ${{ inputs.prebuild_package && matrix.platform != 'win32' }}
        working-directory: ${{ env.WORKDIR }}
        shell: bash
        run: |
          PACKAGE="${{ inputs.prebuild_package }}"
          echo "Downloading $PACKAGE from npm..."

          # Download package from npm with error handling
          if ! npm pack $PACKAGE; then
            echo "ERROR: Failed to download $PACKAGE from npm"
            echo "Please check that the package exists"
            exit 1
          fi

          # Extract the tarball
          tar -xzf *.tgz

          # Validate prebuilds directory exists
          if [ ! -d "package/prebuilds" ]; then
            echo "ERROR: No prebuilds directory found in package"
            echo "The downloaded package may not contain prebuilt binaries"
            exit 1
          fi

          # Move prebuilds to expected location
          mv package/prebuilds ./prebuilds

          # Cleanup
          rm -rf package *.tgz

          echo "Prebuilds downloaded from npm successfully"
          ls -la prebuilds/

      - name: Download prebuilds from package (Windows)
        if: ${{ inputs.prebuild_package && matrix.platform == 'win32' }}
        working-directory: ${{ env.WORKDIR }}
        shell: powershell
        run: |
          $PACKAGE = "${{ inputs.prebuild_package }}"

          echo "Downloading $PACKAGE from npm..."

          # Download package from npm with error handling
          npm pack $PACKAGE
          if ($LASTEXITCODE -ne 0) {
            echo "ERROR: Failed to download $PACKAGE from npm"
            echo "Please check that the package exists"
            exit 1
          }

          # Find the downloaded tarball
          $TARBALL = Get-ChildItem -Filter "*.tgz" | Select-Object -First 1 -ExpandProperty Name
          if (-not $TARBALL) {
            echo "ERROR: Could not find downloaded tarball"
            exit 1
          }

          echo "Extracting $TARBALL..."
          tar -xzf $TARBALL

          # Validate prebuilds directory exists
          if (-not (Test-Path "package/prebuilds")) {
            echo "ERROR: No prebuilds directory found in package"
            echo "The downloaded package may not contain prebuilt binaries"
            exit 1
          }

          # Move prebuilds to expected location
          Move-Item package/prebuilds ./prebuilds

          # Cleanup
          Remove-Item -Recurse -Force package
          Remove-Item $TARBALL

          echo "Prebuilds downloaded from npm successfully"
          Get-ChildItem prebuilds/

      - name: Print run state
        shell: bash
        working-directory: ${{ env.WORKDIR }}
        run: |
          echo "node version: $(node -v)"
          echo "npm version: $(npm -v)"
          echo "bare version: $(bare -v)"
          echo "bare-make version: $(bare-make --version)"
          npm list
          npm config list
        continue-on-error: true

      - name: Install gh cli for ai-run-linux-gpu
        if: ${{ matrix.platform == 'linux' }}
        shell: bash
        run: |
          (type -p wget >/dev/null || (sudo apt update && sudo apt-get install wget -y)) \
            && sudo mkdir -p -m 755 /etc/apt/keyrings \
                  && out=$(mktemp) && wget -nv -O$out https://cli.github.com/packages/githubcli-archive-keyring.gpg \
                  && cat $out | sudo tee /etc/apt/keyrings/githubcli-archive-keyring.gpg > /dev/null \
            && sudo chmod go+r /etc/apt/keyrings/githubcli-archive-keyring.gpg \
            && echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null \
            && sudo apt update \
            && sudo apt install gh -y
          gh --version
        continue-on-error: true

      - name: Print run state
        shell: bash
        working-directory: ${{ env.WORKDIR }}
        run: |
          echo "node version: $(node -v)"
          echo "npm version: $(npm -v)"
          echo "bare version: $(bare -v)"
          echo "bare-make version: $(bare-make --version)"
          ls -la prebuilds || true
          tree prebuilds || true
        continue-on-error: true

      - name: Linux - install dependencies
        if: matrix.platform == 'linux' || matrix.platform == 'android'
        shell: bash
        run: sudo apt-get update && sudo apt-get install -y mesa-vulkan-drivers

      - if: ${{ matrix.platform == 'win32' }}
        name: Install AWS CLI on self-hosted Windows runner
        shell: powershell
        run: |
          if (Get-Command aws -ErrorAction SilentlyContinue) {
            Write-Host "AWS CLI already installed"
            aws --version
          } else {
            Write-Host "Installing AWS CLI v2..."
            Invoke-WebRequest -Uri https://awscli.amazonaws.com/AWSCLIV2.msi -OutFile $env:TEMP\AWSCLIV2.msi
            Start-Process msiexec.exe -Wait -ArgumentList '/I', "$env:TEMP\AWSCLIV2.msi", '/qn'
            $env:PATH = "C:\Program Files\Amazon\AWSCLIV2;$env:PATH"
            echo "C:\Program Files\Amazon\AWSCLIV2" >> $env:GITHUB_PATH
            aws --version
          }

      - if: ${{ matrix.platform == 'linux' }}
        name: Install AWS CLI on Linux (idempotent, covers self-hosted runners)
        shell: bash
        run: |
          # Self-hosted runners sometimes have a leftover aws install at the
          # standard path with perms the runner user can't exec. Treat both
          # "on PATH" and "executable at /usr/local/bin/aws" as "installed".
          if command -v aws >/dev/null 2>&1; then
            echo "AWS CLI already on PATH"
            aws --version
            exit 0
          fi
          if [ -x /usr/local/bin/aws ]; then
            echo "AWS CLI at /usr/local/bin/aws; adding to PATH"
            echo "/usr/local/bin" >> "$GITHUB_PATH"
            /usr/local/bin/aws --version
            exit 0
          fi
          echo "Installing AWS CLI v2..."
          ARCH=$(uname -m)
          case "$ARCH" in
            x86_64) AWS_ARCH="x86_64" ;;
            aarch64|arm64) AWS_ARCH="aarch64" ;;
            *) echo "Unsupported arch $ARCH" ; exit 1 ;;
          esac
          curl -sSL "https://awscli.amazonaws.com/awscli-exe-linux-${AWS_ARCH}.zip" -o /tmp/awscliv2.zip
          sudo apt-get update -y && sudo apt-get install -y unzip
          unzip -q /tmp/awscliv2.zip -d /tmp/
          sudo /tmp/aws/install --update
          rm -rf /tmp/aws /tmp/awscliv2.zip
          # Persist /usr/local/bin on PATH for subsequent steps, and fix up
          # perms in case a previous run left the tree world-readable but
          # not executable for the runner user.
          echo "/usr/local/bin" >> "$GITHUB_PATH"
          sudo chmod -R a+rX /usr/local/aws-cli /usr/local/bin/aws 2>/dev/null || true
          /usr/local/bin/aws --version

      - name: Configure AWS credentials via OIDC
        # Intel-mac runners use the Apple Paravirtual GPU which has ~1 GB of
        # working set — too small for the 4 GB SmolVLA model. Skip S3 download
        # and e2e there; the surface/rejects tests still run below.
        if: ${{ !(matrix.platform == 'darwin' && matrix.arch == 'x64') }}
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # 6.0.0
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: eu-central-1

      - name: Download SmolVLA model from S3
        if: ${{ !(matrix.platform == 'darwin' && matrix.arch == 'x64') }}
        working-directory: ${{ env.WORKDIR }}
        shell: bash
        run: |
          echo "Downloading SmolVLA LIBERO model from S3..."
          mkdir -p model/vla
          aws s3 cp "s3://${{ secrets.MODEL_S3_BUCKET }}/qvac_models_compiled/vla/smolvla-libero/2026-04-21/smolvla-libero-f32-fixed.gguf" model/vla/smolvla-libero-f32-fixed.gguf
          echo "SmolVLA model files:"
          ls -la model/vla/

      - name: Run integration test (Linux/macOS)
        if: ${{ matrix.platform != 'win32' }}
        working-directory: ${{ env.WORKDIR }}
        shell: bash
        env:
          QVAC_VLA_MODEL: ${{ (matrix.platform == 'darwin' && matrix.arch == 'x64') && '' || format('{0}/{1}/model/vla/smolvla-libero-f32-fixed.gguf', github.workspace, env.WORKDIR) }}
        run: |
          set +e
          # Stream test output AND capture it so we can inspect the TAP summary
          # if the process exits with a non-zero code. Some GPU configurations
          # (ai-run-linux-gpu with Tesla T4 + Vulkan) crash with SIGSEGV (exit
          # code 139) during static-destructor teardown AFTER all tests have
          # passed. Tolerate that specific case, but surface any real failure.
          TESTLOG=$(mktemp)
          npm run test:integration ${{ matrix.platform }}-${{ matrix.arch }} 2>&1 | tee "$TESTLOG"
          EXIT=${PIPESTATUS[0]}
          if [ "$EXIT" -eq 0 ]; then
            exit 0
          fi
          if [ "$EXIT" -eq 139 ] && grep -qE '^# ok$' "$TESTLOG" && grep -qE '^# tests = [0-9]+/[0-9]+ pass$' "$TESTLOG"; then
            echo "::warning::Tests all passed but process crashed at teardown with SIGSEGV (exit 139) on $(uname -srvmo). Known ggml/Vulkan static-destructor issue; treating as pass."
            exit 0
          fi
          exit "$EXIT"

      - name: Run integration test (Windows)
        if: ${{ matrix.platform == 'win32' }}
        working-directory: ${{ env.WORKDIR }}
        shell: powershell
        env:
          QVAC_VLA_MODEL: ${{ github.workspace }}/${{ env.WORKDIR }}/model/vla/smolvla-libero-f32-fixed.gguf
        run: npm run test:integration ${{ matrix.platform }}-${{ matrix.arch }}

      - name: Upload performance report
        if: ${{ always() }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # 7.0.0
        with:
          name: vla-perf-${{ matrix.platform }}-${{ matrix.arch }}-${{ matrix.os }}
          path: ${{ env.WORKDIR }}/test/results/performance-report.json
          if-no-files-found: ignore
          retention-days: 14
