name: Integration Tests (GGML Classification)

on:
  workflow_dispatch:
    inputs:
      prebuild_package:
        description: "NPM package containing prebuilds (e.g. @qvac/classification-ggml@0.1.0)"
        required: false
        type: string
  workflow_call:
    inputs:
      ref:
        description: "ref"
        type: string
        required: false
      repository:
        type: string
        required: false
        default: "tetherto/qvac"
      workdir:
        description: "Working directory inside the repo (monorepo package path)"
        type: string
        required: false
        default: "packages/classification-ggml"

env:
  PKG_DIR: packages/classification-ggml

jobs:
  run-integration-tests:
    timeout-minutes: 30
    runs-on: ${{ matrix.os }}
    environment: release
    name: ${{ matrix.platform }}-${{ matrix.arch }}-integration-tests
    permissions:
      contents: read
      packages: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            platform: linux
            arch: x64
          - os: ubuntu-24.04
            platform: linux
            arch: x64
          - os: ubuntu-22.04-arm
            platform: linux
            arch: arm64
          - os: macos-14
            platform: darwin
            arch: arm64
          - os: windows-2022
            platform: win32
            arch: x64

    steps:
      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # 6.3.0
        with:
          node-version: lts/*

      - name: Windows — enable git long paths
        if: ${{ matrix.platform == 'win32' }}
        shell: bash
        run: git config --system core.longpaths true

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          repository: ${{ inputs.repository || github.repository }}
          ref: ${{ inputs.ref || github.ref }}
          token: ${{ secrets.PAT_TOKEN }}

      - name: Setup Bare runtime
        uses: tetherto/qvac/.github/actions/setup-bare-tooling@0bbdca93da303a0b1634ba14a89cec085621078d

      - name: Install npm dependencies
        working-directory: ${{ env.PKG_DIR }}
        run: npm install

      - name: Download prebuild artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # 4.3.0
        with:
          pattern: prebuild-${{ matrix.platform }}-${{ matrix.arch }}*
          path: ${{ env.PKG_DIR }}/prebuilds
          merge-multiple: true

      # === [TEMP] Marshalling probe -- diagnostic only, runs on win32 only.
      # The probe is independent diagnostic scaffolding for the
      # win32-x64 first-`js_create_double`-returns-0 bug; it never gates
      # the build (continue-on-error: true). Removal: see the checklist
      # at the top of `addon/src/js-interface/marshal_probe.hpp`.
      - name: Run marshalling probe (diagnostic, win32 only)
        if: ${{ matrix.platform == 'win32' }}
        continue-on-error: true
        working-directory: ${{ env.PKG_DIR }}
        run: bare scripts/marshal-probe.js
      # === [/TEMP] ===

      - name: Run JS integration tests
        working-directory: ${{ env.PKG_DIR }}
        env:
          # Opt in to the C++ per-inference trace so CI logs contain
          # raw logits / probs / sorted results for every classification.
          # Invaluable for debugging platform-specific numerical issues
          # (noise is bounded to a few lines per sample image).
          QVAC_CLASSIFICATION_TRACE: "1"
        run: npm run test:integration

      - name: Upload performance report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # 4.6.2
        with:
          name: classification-perf-report-${{ matrix.platform }}-${{ matrix.arch }}
          path: ${{ env.PKG_DIR }}/test/results/performance-report.json
          if-no-files-found: ignore
          retention-days: 30
