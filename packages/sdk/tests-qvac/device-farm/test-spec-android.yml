version: 0.1
android_test_host: amazon_linux_2

phases:
  pre_test:
    commands:
      # ------------------------------------------------------------------
      # S3-backed model pre-cache (no-op when `cache-models` is disabled).
      #
      # When CI uploads `models-manifest.json` into the test package, this
      # block downloads every listed model from our same-region (us-west-2)
      # S3 bucket onto the Device Farm host, then `adb push`-es each blob
      # into `/data/local/tmp/qvac-models/`. The mobile consumer copies
      # them out of `/data/local/tmp/` and into the app sandbox at
      # bootstrap (see `copyModelsFromCache` in `tests/mobile/consumer.ts`)
      # — that staging hop avoids SELinux write restrictions on
      # `/data/local/tmp`. When the manifest is absent we fall through
      # silently so local / cache-disabled runs behave like before.
      #
      # Timing visibility: each model logs `dl_time / push_time` and a
      # MB/s rate, plus aggregate `S3 download` and `device push` totals
      # at the end. This is the data Lauri asked us to surface when we
      # were debugging cross-region latency.
      - |-
        MANIFEST="$DEVICEFARM_TEST_PACKAGE_PATH/models-manifest.json"
        if [ -f "$MANIFEST" ]; then
          FILE_COUNT=$(python3 -c "import json; print(len(json.load(open('$MANIFEST'))))" 2>/dev/null || echo "?")
          echo "Models manifest found: ${FILE_COUNT} files"

          adb push "$MANIFEST" /data/local/tmp/models-manifest.json
          adb shell "mkdir -p /data/local/tmp/qvac-models"

          echo "Downloading models from S3 and pushing to device..."
          python3 << 'PYEOF'
        import json, subprocess, os, time

        manifest_path = os.path.join(
            os.environ.get("DEVICEFARM_TEST_PACKAGE_PATH", "."),
            "models-manifest.json",
        )
        manifest = json.load(open(manifest_path))
        total = len(manifest)
        downloaded = 0
        failed = 0
        start = time.time()

        total_dl_time = 0
        total_push_time = 0

        for i, (filename, url) in enumerate(manifest.items(), 1):
            tmp_path = f"/tmp/qvac-dl-{filename}"
            print(f"[{i}/{total}] {filename}", flush=True)

            t0 = time.time()
            ret = subprocess.run(
                ["curl", "-fSL", "--connect-timeout", "30", "--max-time", "900",
                 "-o", tmp_path, url],
                capture_output=True, text=True,
            )
            dl_time = time.time() - t0
            if ret.returncode != 0:
                print(f"  curl failed: {ret.stderr[:200]}", flush=True)
                failed += 1
                continue

            size_mb = round(os.path.getsize(tmp_path) / 1048576, 1)
            total_dl_time += dl_time

            t0 = time.time()
            ret = subprocess.run(
                ["adb", "push", tmp_path,
                 f"/data/local/tmp/qvac-models/{filename}"],
                capture_output=True, text=True,
            )
            push_time = time.time() - t0
            os.remove(tmp_path)

            if ret.returncode != 0:
                print(f"  push failed: {ret.stderr[:200]}", flush=True)
                failed += 1
            else:
                total_push_time += push_time
                downloaded += 1
                elapsed = int(time.time() - start)
                dl_speed = round(size_mb / dl_time, 1) if dl_time > 0 else 0
                push_speed = round(size_mb / push_time, 1) if push_time > 0 else 0
                print(f"  OK {size_mb}MB [dl {int(dl_time)}s @ {dl_speed}MB/s | push {int(push_time)}s @ {push_speed}MB/s | total {elapsed}s]", flush=True)

        elapsed = int(time.time() - start)
        print(f"Models ready: {downloaded}/{total} pushed, {failed} failed, {elapsed}s total")
        print(f"  S3 download: {int(total_dl_time)}s | device push: {int(total_push_time)}s")
        PYEOF
        else
          echo "No models manifest (cache-models not enabled)"
        fi

      # Install and launch the app (custom test spec doesn't do this automatically)
      - |-
        echo "Installing app..."
        adb install -r "$DEVICEFARM_APP_PATH"
        echo "Launching app..."
        adb shell am start -n io.tether.qvac_test_consumer_mobile/.MainActivity
        sleep 5
        echo "App launched"

      # Clear logcat buffer and start continuous background capture (unfiltered)
      # Captures everything; filtering happens post-test when extracting subsets
      - |-
        adb logcat -c
        adb logcat -v threadtime \
          >> "$DEVICEFARM_LOG_DIR/testconsumer.log" 2>&1 &
        echo $! > "$DEVICEFARM_LOG_DIR/logcat-pid.txt"
        echo "Background logcat capture started (pid: $(cat $DEVICEFARM_LOG_DIR/logcat-pid.txt))"

      # Periodic screenshots every 30s in the background
      - |-
        (while true; do
          TIMESTAMP=$(date +%s)
          adb shell screencap -p > "$DEVICEFARM_SCREENSHOT_PATH/screen-${TIMESTAMP}.png" 2>/dev/null
          sleep 30
        done) &
        echo "Screenshot capture started (every 30s)"

  test:
    commands:
      # Poll the background log file for test progress and completion
      - |-
        TIMEOUT=${DEVICEFARM_TIMEOUT:-5400}
        START=$(date +%s)
        PASSED=0
        FAILED=0
        COMPLETED=0
        EXPECTED="?"
        RESULTS_FILE="$DEVICEFARM_LOG_DIR/test-results.txt"
        LOGFILE="$DEVICEFARM_LOG_DIR/testconsumer.log"

        touch "$RESULTS_FILE"

        echo "Monitoring app logs for test results (timeout: ${TIMEOUT}s)..."

        tail -f "$LOGFILE" | while IFS= read -r line; do
          case "$line" in
            # Surface cache-staging + bootstrap progress so a stuck device
            # is obvious from the live log (saved us 30min of guessing
            # while iterating on the iOS pymobiledevice3 push path).
            *"📦"*)
              echo "[CACHE] $line"
              ;;
            *"📥"*|*"🔧 Bootstrap"*|*"🔧 Running bootstrap"*)
              echo "[BOOT] $line"
              ;;
            *"Registration ack"*"tests in queue"*)
              EXPECTED=$(echo "$line" | grep -oP '\d+(?= tests in queue)')
              echo "Registered: $EXPECTED tests expected"
              ;;
            *"✅"*"ms)"*)
              PASSED=$((PASSED+1))
              COMPLETED=$((COMPLETED+1))
              echo "[PASS $COMPLETED/$EXPECTED] $line"
              echo "PASS|$line" >> "$RESULTS_FILE"
              ;;
            *"❌"*"ms)"*)
              FAILED=$((FAILED+1))
              COMPLETED=$((COMPLETED+1))
              echo "[FAIL $COMPLETED/$EXPECTED] $line"
              echo "FAIL|$line" >> "$RESULTS_FILE"
              ;;
            *"❌"*"failed:"*)
              FAILED=$((FAILED+1))
              COMPLETED=$((COMPLETED+1))
              echo "[ERROR $COMPLETED/$EXPECTED] $line"
              echo "ERROR|$line" >> "$RESULTS_FILE"
              ;;
            *"Consumer shutting down"*)
              echo ""
              echo "========================================="
              echo "COMPLETE: $PASSED passed, $FAILED failed ($COMPLETED/$EXPECTED)"
              echo "========================================="
              break
              ;;
          esac

          NOW=$(date +%s)
          if [ $((NOW - START)) -ge $TIMEOUT ]; then
            echo "TIMEOUT after ${TIMEOUT}s ($PASSED passed, $FAILED failed, $COMPLETED/$EXPECTED completed)"
            exit 1
          fi
        done

  post_test:
    commands:
      # Stop background logcat capture
      - |-
        if [ -f "$DEVICEFARM_LOG_DIR/logcat-pid.txt" ]; then
          kill $(cat "$DEVICEFARM_LOG_DIR/logcat-pid.txt") 2>/dev/null || true
          echo "Background logcat stopped"
        fi

      # Extract React Native JS logs into a separate file
      - |-
        grep "ReactNativeJS" "$DEVICEFARM_LOG_DIR/testconsumer.log" \
          > "$DEVICEFARM_LOG_DIR/react-native-logs.log" 2>/dev/null || true
        RN_LINES=$(wc -l < "$DEVICEFARM_LOG_DIR/react-native-logs.log" 2>/dev/null || echo 0)
        echo "=== React Native logs: ${RN_LINES} lines ==="
        tail -50 "$DEVICEFARM_LOG_DIR/react-native-logs.log" 2>/dev/null || echo "(none)"

      - echo "=== Full logcat summary ==="
      - wc -l "$DEVICEFARM_LOG_DIR/testconsumer.log" 2>/dev/null || echo "No logs captured"

      - echo "Available log files:"
      - ls -lh $DEVICEFARM_LOG_DIR/ || true

      # Final screenshot
      - adb shell screencap -p > "$DEVICEFARM_SCREENSHOT_PATH/final.png" 2>/dev/null

      # Generate JUnit XML from captured test results (script is in the test package)
      - python3 $DEVICEFARM_TEST_PACKAGE_PATH/gen-junit.py

artifacts:
  - $DEVICEFARM_LOG_DIR
